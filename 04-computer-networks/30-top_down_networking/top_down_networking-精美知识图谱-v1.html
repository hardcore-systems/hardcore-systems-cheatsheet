": "<li>  <strong>O(1) \u4e8b\u4ef6\u68c0\u7d22</strong>\uff1a<code>epoll</code> \u653e\u5f03\u4e86 <code>select</code>/<code>poll</code> \u5bf9\u63cf\u8ff0\u7b26\u96c6\u5408\u7684 O(N) \u7ebf\u6027\u904d\u5386\uff0c\u5728\u5185\u6838\u7ef4\u62a4\u7ea2\u9ed1\u6811\u8ffd\u8e2a\u76d1\u6d4b Socket\uff0c\u5e76\u4f7f\u7528\u53cc\u5411\u94fe\u8868 (Ready List) \u5b58\u653e\u5c31\u7eea\u4e8b\u4ef6\u3002</li><li>  <strong>\u89e6\u53d1\u6a21\u5f0f\u5bf9\u6bd4</strong>\uff1a</li><li>  <strong>\u6c34\u5e73\u89e6\u53d1 (LT)</strong>\uff1a\u53ea\u8981\u7f13\u51b2\u533a\u6709\u672a\u8bfb\u6570\u636e\uff0c<code>epoll_wait</code> \u5c31\u4f1a\u6301\u7eed\u89e6\u53d1\u901a\u77e5\u3002</li><li>  <strong>\u8fb9\u7f18\u89e6\u53d1 (ET)</strong>\uff1a\u4ec5\u5728\u7f13\u51b2\u533a\u72b6\u6001\u6539\u53d8\uff08\u5982\u6570\u636e\u5230\u8fbe\uff09\u65f6\u89e6\u53d1\u4e00\u6b21\u3002\u8981\u6c42\u5957\u63a5\u5b57\u5fc5\u987b\u4e3a\u975e\u963b\u585e (Non-blocking)\uff0c\u4e14\u5fc5\u987b\u5faa\u73af\u8bfb\u53d6\u76f4\u81f3\u8fd4\u56de <code>EAGAIN</code>\uff0c\u4ee5\u9632\u6f0f\u8bfb\u3002</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "\u4f20\u8f93\u5c42\u4e0e TCP \u53ef\u9760\u4f20\u8f93", "color": "#7D8F7B", "title": "\u4f20\u8f93\u5c42\u89e3\u590d\u7528\u673a\u5236\u4e0e\u53cc\u7aef\u7aef\u53e3\u7ed1\u5b9a\u89c4\u5219 (`net/ipv4/af_inet.c`)", "body": "<li>  <strong>\u65e0\u8fde\u63a5\u89e3\u590d\u7528 (UDP)</strong>\uff1a\u6839\u636e\u4e8c\u5143\u7ec4\uff08\u76ee\u7684 IP\u3001\u76ee\u7684\u7aef\u53e3\uff09\u5206\u53d1\u62a5\u6587\uff0c\u4e0d\u540c\u6e90\u7aef\u53d1\u5f80\u76f8\u540c\u76ee\u7684\u7aef\u53e3\u7684\u62a5\u6587\u8fdb\u5165\u540c\u4e00\u4e2a Socket \u961f\u5217\u3002</li><li>  <strong>\u9762\u5411\u8fde\u63a5\u89e3\u590d\u7528 (TCP)</strong>\uff1a\u6839\u636e\u56db\u5143\u7ec4\uff08\u6e90 IP\u3001\u6e90\u7aef\u53e3\u3001\u76ee\u7684 IP\u3001\u76ee\u7684\u7aef\u53e3\uff09\u5206\u53d1\u3002</li><li>  <strong>\u591a Socket \u76d1\u542c</strong>\uff1a\u591a\u8def\u5e76\u53d1\u8fde\u63a5\u53ef\u4ee5\u5171\u4eab\u76f8\u540c\u7684\u76ee\u7684\u7aef\u53e3\uff0c\u5185\u6838\u901a\u8fc7\u54c8\u5e0c\u8868\uff08Established HashTable\uff09\u7cbe\u51c6\u5b9a\u4f4d\u5230\u5404\u4e2a\u4e0d\u540c\u7684 Socket \u5b9e\u4f53\u3002</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "\u4f20\u8f93\u5c42\u4e0e TCP \u53ef\u9760\u4f20\u8f93", "color": "#7D8F7B", "title": "\u6ed1\u52a8\u7a97\u53e3\u56de\u9000 N \u6b65 (GBN) \u72b6\u6001\u673a\u4e0e\u7d2f\u79ef\u786e\u8ba4\u9650\u5236 (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>\u53d1\u9001\u7a97\u53e3\u63a7\u5236</strong>\uff1a\u5141\u8bb8\u53d1\u9001\u65b9\u53d1\u9001\u6700\u591a $N$ \u4e2a\u672a\u786e\u8ba4\u62a5\u6587\uff0c\u7531\u4e00\u4e2a\u5168\u5c40\u5b9a\u65f6\u5668\u76d1\u63a7\u6700\u65e9\u53d1\u9001\u7684\u672a\u786e\u8ba4\u5757\u3002</li><li>  <strong>\u7d2f\u79ef\u786e\u8ba4 (Cumulative ACK)</strong>\uff1a\u63a5\u6536\u65b9\u53ea\u53d1\u9001\u5f53\u524d\u6709\u5e8f\u5230\u8fbe\u7684\u6700\u5927\u5e8f\u53f7\u786e\u8ba4\uff08ACK $y$ \u4ee3\u8868 $y$ \u53ca\u4ee5\u524d\u7684\u62a5\u6587\u5747\u5df2\u6536\u59a5\uff09\uff0c\u4e22\u5f03\u6240\u6709\u5931\u5e8f\u5230\u8fbe\u7684\u62a5\u6587\u3002</li><li>  <strong>\u8d85\u65f6\u56de\u9000</strong>\uff1a\u4e00\u65e6\u53d1\u751f\u8d85\u65f6\uff0c\u53d1\u9001\u65b9\u5fc5\u987b\u91cd\u4f20\u7a97\u53e3\u5185\u6240\u6709\u5df2\u53d1\u9001\u4f46\u672a\u786e\u8ba4\u7684 $N$ \u4e2a\u62a5\u6587\uff0c\u541e\u5410\u7387\u53d7\u9ad8\u5ef6\u8fdf\u94fe\u8def\u5f71\u54cd\u5267\u70c8\u3002</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "\u4f20\u8f93\u5c42\u4e0e TCP \u53ef\u9760\u4f20\u8f93", "color": "#7D8F7B", "title": "\u9009\u62e9\u91cd\u4f20 (SR) \u4e71\u5e8f\u7f13\u5b58\u4e0e\u63a5\u6536\u7a97\u53e3\u9501\u6b65\u5bf9\u9f50 (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>\u5355\u5305\u5b9a\u65f6\u5668</strong>\uff1a\u53d1\u9001\u65b9\u4e3a\u6bcf\u4e2a\u53d1\u9001\u7684\u62a5\u6587\u7ef4\u62a4\u72ec\u7acb\u7684\u5b9a\u65f6\u5668\uff0c\u8d85\u65f6\u4ec5\u91cd\u4f20\u4e22\u5931\u7684\u5355\u5305\uff0c\u4e0d\u5f71\u54cd\u540e\u7eed\u5df2\u53d1\u9001\u62a5\u6587\u3002</li><li>  <strong>\u63a5\u6536\u7aef\u4e71\u5e8f\u7f13\u5b58</strong>\uff1a\u63a5\u6536\u65b9\u7a97\u53e3\u5927\u5c0f\u540c\u6837\u4e3a $N$\uff08\u6ee1\u8db3 $N \\le 2^{\\text{seq}-1}$ \u4ee5\u514d\u6df7\u6dc6\u65b0\u65e7\u5e8f\u53f7\uff09\uff0c\u63a5\u6536\u5e76\u7f13\u5b58\u5931\u5e8f\u62a5\u6587\uff0c\u56de\u9001\u975e\u7d2f\u79ef\u7684\u72ec\u7acb\u786e\u8ba4 (ACK)\u3002</li><li>  <strong>\u7a97\u53e3\u6ed1\u52a8\u5bf9\u9f50</strong>\uff1a\u5f53\u4e14\u4ec5\u5f53\u63a5\u6536\u7a97\u53e3\u7684\u57fa\u5e8f\u53f7\uff08\u5f53\u524d\u6700\u5c0f\u672a\u6536\u62a5\u6587\uff09\u88ab\u586b\u8865\u5e76\u6ed1\u52a8\u65f6\uff0c\u63a5\u6536\u7aef\u624d\u5411\u4e0a\u5c42\u9012\u4ea4\u6570\u636e\u3002</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "\u4f20\u8f93\u5c42\u4e0e TCP \u53ef\u9760\u4f20\u8f93", "color": "#7D8F7B", "title": "RTT \u52a8\u6001\u4f30\u8ba1\u4e0e\u8d85\u65f6\u671f (RTO) \u6307\u6570\u52a0\u6743\u79fb\u52a8\u5e73\u5747\u7b97\u6cd5 (EWMA) (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>\u5e73\u6ed1 RTT \u91c7\u6837</strong>\uff1a\u901a\u8fc7\u53d1\u9001\u4e0e ACK \u7684\u65f6\u95f4\u5dee\u6d4b\u91cf SampleRTT\u3002</li><li>  $\\text{EstimatedRTT} = (1 - \\alpha) \\times \\text{EstimatedRTT} + \\alpha \\times \\text{SampleRTT}$\uff08$\\alpha = 0.125$\uff09</li><li>  <strong>\u504f\u5dee\u4e0e\u6ce2\u52a8\u7387\u8ba1\u7b97</strong>\uff1a</li><li>  $\\text{DevRTT} = (1 - \\beta) \\times \\text{DevRTT} + \\beta \\times |\\text{SampleRTT} - \\text{EstimatedRTT}|$\uff08$\\beta = 0.25$\uff09</li><li>  <strong>\u5b89\u5168 RTO \u8ba1\u7b97</strong>\uff1a$\\text{TimeoutInterval} (RTO) = \\text{EstimatedRTT} + 4 \\times \\text{DevRTT}$\u3002\u5f53\u91cd\u4f20\u8d85\u65f6\u89e6\u53d1\u65f6\uff0cRTO \u5f3a\u5236\u7ffb\u500d\uff08\u6307\u6570\u9000\u907f\uff09\uff0c\u4ee5\u964d\u4f4e\u7f51\u7edc\u8d1f\u8377\u3002</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "\u4f20\u8f93\u5c42\u4e0e TCP \u53ef\u9760\u4f20\u8f93", "color": "#7D8F7B", "title": "TCP \u4e09\u6b21\u63e1\u624b\u5efa\u8fde\u4e0e\u56db\u6b21\u6325\u624b\u534a\u5173\u95ed\u72b6\u6001\u8f6c\u79fb\u77e9\u9635 (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>\u5efa\u8fde\u72b6\u6001\u673a</strong>\uff1a</li><li>  Client <code>CLOSED</code> \u279c \u53d1\u9001 SYN \u279c <code>SYN_SENT</code> \u279c \u6536\u5230 SYN+ACK\u5e76\u53d1\u56de ACK \u279c <code>ESTABLISHED</code>\u3002</li><li>  Server <code>LISTEN</code> \u279c \u6536\u5230 SYN\u5e76\u56de\u9001 SYN+ACK \u279c <code>SYN_RCVD</code> \u279c \u6536\u5230 ACK \u279c <code>ESTABLISHED</code>\u3002</li><li>  <strong>\u65ad\u5f00\u534a\u5173\u95ed\u72b6\u6001\u673a</strong>\uff1a</li><li>  \u4e3b\u52a8\u5173\u95ed\u65b9\uff1a<code>ESTABLISHED</code> \u279c \u53d1\u9001 FIN \u279c <code>FIN_WAIT_1</code> \u279c \u6536\u5230 ACK \u279c <code>FIN_WAIT_2</code> \u279c \u6536\u5230 FIN\u5e76\u53d1\u56de ACK \u279c <code>TIME_WAIT</code>\uff08\u7b49\u5f85 2MSL \u4ee5\u786e\u4fdd\u6b8b\u7559\u62a5\u6587\u6d88\u4ea1\uff09 \u279c <code>CLOSED</code>\u3002</li><li>  \u88ab\u52a8\u5173\u95ed\u65b9\uff1a<code>ESTABLISHED</code> \u279c \u6536\u5230 FIN\u5e76\u53d1\u56de ACK \u279c <code>CLOSE_WAIT</code> \u279c \u51c6\u5907\u5b8c\u6bd5\u53d1\u9001 FIN \u279c <code>LAST_ACK</code> \u279c \u6536\u5230\u6700\u540e ACK \u279c <code>CLOSED</code>\u3002</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "TCP \u62e5\u585e\u63a7\u5236\u4e0e\u7b97\u6cd5\u5206\u6d41", "color": "#9E828A", "title": "\u7ecf\u5178 AIMD \u952f\u9f7f\u6ce2\u4e0e\u6162\u542f\u52a8/\u62e5\u585e\u907f\u514d\u8f6c\u6362\u9600\u95e8 (`net/ipv4/tcp_cong.c`)", "body": "<li>  <strong>\u6162\u542f\u52a8 (Slow Start)</strong>\uff1a\u62e5\u585e\u7a97\u53e3 $cwnd$ \u4ece 1 MSS \u5f00\u59cb\uff0c\u6bcf\u6536\u5230\u4e00\u4e2a ACK\uff0c\u7a97\u53e3\u5927\u5c0f\u52a0 1\uff0c\u5373\u6bcf\u4e2a RTT \u5185 $cwnd$ \u5448\u6307\u6570\u7ffb\u500d\uff0c\u76f4\u5230 $cwnd \\ge ssthresh$\u3002</li><li>  <strong>\u62e5\u585e\u907f\u514d (Congestion Avoidance)</strong>\uff1a$cwnd$ \u9650\u5236\u4e3a\u6bcf\u4e2a RTT \u4ec5\u589e\u52a0 1 MSS\uff08\u52a0\u6027\u589e\uff0cAdditive Increase\uff09\u3002</li><li>  <strong>\u9608\u503c\u9600\u95e8\u5224\u5b9a</strong>\uff1a\u4e00\u65e6\u53d1\u751f\u4e22\u5305\uff08\u8d85\u65f6\u89e6\u53d1\uff09\uff0c\u5c06\u6162\u542f\u52a8\u9608\u503c $ssthresh$ \u7f6e\u4e3a\u5f53\u524d $cwnd / 2$\uff0c\u5e76\u5c06 $cwnd$ \u91cd\u7f6e\u4e3a 1 MSS\uff0c\u91cd\u65b0\u8fdb\u5165\u6162\u542f\u52a8\u3002</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "TCP \u62e5\u585e\u63a7\u5236\u4e0e\u7b97\u6cd5\u5206\u6d41", "color": "#9E828A", "title": "\u5feb\u901f\u91cd\u4f20\u4e0e\u5feb\u901f\u6062\u590d\u673a\u5236 (FRR / RFC 5681) (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>\u4e09\u91cd\u590d\u786e\u8ba4\u89e6\u53d1</strong>\uff1a\u5f53\u63a5\u6536\u7aef\u68c0\u6d4b\u5230\u62a5\u6587\u6bb5\u5931\u5e8f\uff0c\u4f1a\u7acb\u5373\u8fde\u7eed\u56de\u9001\u5197\u4f59\u7684\u786e\u8ba4\uff08Duplicate ACK\uff09\u3002\u53d1\u9001\u7aef\u4e00\u65e6\u7d2f\u79ef\u6536\u5230 3 \u4e2a\u5197\u4f59\u786e\u8ba4\uff08\u5373 4 \u4e2a\u76f8\u540c ACK\uff09\uff0c\u5224\u5b9a\u8be5\u5305\u4e22\u5931\uff0c\u7acb\u5373\u91cd\u4f20\u8be5\u5305\uff0c\u65e0\u9700\u7b49\u5f85\u5b9a\u65f6\u5668\u8d85\u65f6\uff08\u5feb\u901f\u91cd\u4f20\uff09\u3002</li><li>  <strong>\u5feb\u901f\u6062\u590d (Fast Recovery)</strong>\uff1a\u907f\u514d\u5c06 $cwnd$ \u8dcc\u843d\u81f3 1\u3002\u5c06 $ssthresh$ \u8bbe\u4e3a $cwnd / 2$\uff0c\u914d\u7f6e $cwnd = ssthresh + 3 \\times \\text{MSS}$\uff0c\u6536\u5230\u65b0\u6570\u636e\u786e\u8ba4\u540e\u5c06 $cwnd$ \u964d\u56de\u5230 $ssthresh$\uff0c\u76f4\u63a5\u8fdb\u5165\u62e5\u585e\u907f\u514d\u72b6\u6001\u3002</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "TCP \u62e5\u585e\u63a7\u5236\u4e0e\u7b97\u6cd5\u5206\u6d41", "color": "#9E828A", "title": "Cubic \u62e5\u585e\u7b97\u6cd5\u4e09\u6b21\u65b9\u63a7\u5236\u66f2\u7ebf\u4e0e\u516c\u5e73\u6027\u9650\u754c (`net/ipv4/tcp_cubic.c`)", "body": "<li>  <strong>\u4e09\u6b21\u65b9\u589e\u957f\u51fd\u6570</strong>\uff1aCubic \u653e\u5f03\u4e86\u4f20\u7edf\u7ebf\u6027\u7a97\u53e3\u589e\u957f\uff0c\u7a97\u53e3\u5927\u5c0f $W(t)$ \u4e0e\u4e0a\u6b21\u62e5\u585e\u51cf\u5c11\u4ee5\u6765\u7684\u65f6\u95f4 $t$ \u5448\u4e09\u6b21\u65b9\u5173\u7cfb\uff1a</li><p>$$W(t) = C(t - K)^3 + W_{\\max}$$</p><p>\u5176\u4e2d $K = \\sqrt[3]{W_{\\max} \\times (1 - \\beta) / C}$\u3002</p><li>  <strong>\u63a7\u5236\u66f2\u7ebf\u7279\u5f81</strong>\uff1a\u5728\u63a5\u8fd1\u4e0a\u6b21\u53d1\u751f\u62e5\u585e\u7684\u7a97\u53e3\u5927\u5c0f $W_{\\max}$ \u65f6\uff0c\u7a97\u53e3\u589e\u957f\u6781\u5ea6\u6241\u5e73\u5e73\u7f13\uff0c\u63d0\u9ad8\u7a33\u5b9a\u6027\uff1b\u8fdc\u79bb\u8be5\u533a\u57df\u540e\u8fc5\u901f\u52a0\u901f\u589e\u957f\u4ee5\u63a2\u6d4b\u94fe\u8def\u65b0\u5e26\u5bbd\uff0c\u5b8c\u7f8e\u517c\u987e\u9ad8\u5e26\u5bbd\u65f6\u5ef6\u79ef\u94fe\u8def\u7684\u516c\u5e73\u6027\u4e0e\u541e\u5410\u3002</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "TCP \u62e5\u585e\u63a7\u5236\u4e0e\u7b97\u6cd5\u5206\u6d41", "color": "#9E828A", "title": "Google BBR \u7b97\u6cd5\u74f6\u9888\u5e26\u5bbd/\u6700\u5c0f RTT \u4f30\u7b97\u4e0e Kleinrock \u9650\u754c\u63a7\u5236 (`net/ipv4/tcp_bbr.c`)", "body": "<li>  <strong>\u975e\u4e22\u5305\u9a71\u52a8\u9769\u547d</strong>\uff1aCubic \u5e38\u56e0\u586b\u6ee1\u7269\u7406\u7f13\u51b2\u533a\u89e6\u53d1\u4e22\u5305\u800c\u5bfc\u81f4\u201c\u7f13\u51b2\u533a\u81a8\u80c0\u201d(Bufferbloat)\u3002BBR \u901a\u8fc7\u4e3b\u52a8\u6d4b\u91cf\u4e24\u4e2a\u6838\u5fc3\u6307\u6807\u6765\u63a7\u5236\u53d1\u9001\u901f\u7387\uff1a</li><li>  <strong>\u74f6\u9888\u5e26\u5bbd (BtlBw)</strong>\uff1a\u6ed1\u52a8\u7a97\u53e3\u5185\u6700\u5927\u6570\u636e\u6295\u9012\u7387\u3002</li><li>  <strong>\u6700\u5c0f\u4f20\u64ad\u65f6\u5ef6 (RTprop)</strong>\uff1a\u8fc7\u6ee4\u6389\u6392\u961f\u5ef6\u8fdf\u540e\u7684\u7269\u7406 RTT\u3002</li><li>  <strong>Kleinrock \u9650\u754c\u63a7\u5236</strong>\uff1a\u7ef4\u6301\u5728 Kleinrock \u6700\u4f18\u5de5\u4f5c\u70b9\uff1a\u53d1\u9001\u901f\u7387 $PacingRate = BtlBw$\uff0c\u7ba1\u4e2d\u6570\u636e\u91cf $\\text{Inflight} = BtlBw \\times RTprop$\uff08\u5373\u5e26\u5bbd\u65f6\u5ef6\u79ef BDP\uff09\u3002\u8fd9\u4f7f\u5f97\u7f51\u7edc\u541e\u5410\u6700\u5927\u5316\uff0c\u4e14\u7269\u7406\u961f\u5217\u6df1\u5ea6\u4e3a 0\uff0c\u6d88\u9664\u4e86\u5ef6\u8fdf\u6ce2\u52a8\u3002</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "\u7f51\u7edc\u5c42\u4e0e IP \u8def\u7531\u8f6c\u53d1\u5f15\u64ce", "color": "#B58A7D", "title": "IPv4 \u9996\u90e8\u5206\u7247\u673a\u5236\u4e0e IPv6 \u7b80\u5316\u6d41\u6807\u8bb0\u9996\u90e8\u5bf9\u6bd4 (`net/ipv4/ip_input.c`)", "body": "<li>  <strong>IPv4 \u5206\u7247\u63a7\u5236</strong>\uff1a\u901a\u8fc7 16 \u4f4d\u6807\u8bc6\u7b26 (Identification)\u30013 \u4f4d\u6807\u5fd7\u4f4d (Flags\uff1aDF \u4e0d\u5206\u7247\uff0cMF \u66f4\u591a\u5206\u7247) \u4ee5\u53ca 13 \u4f4d\u7247\u504f\u79fb (Fragment Offset) \u5728\u4f20\u8f93\u8def\u5f84\u4e0a\u5bf9\u8d85\u8fc7 MTU \u7684\u62a5\u6587\u8fdb\u884c\u7269\u7406\u5206\u7247\uff0c\u5e76\u5728\u76ee\u7684\u4e3b\u673a\u91cd\u7ec4\u3002</li><li>  <strong>IPv6 \u6781\u7b80\u4f18\u5316</strong>\uff1a\u53d6\u6d88\u4e86\u8def\u7531\u5668\u5206\u7247\u529f\u80fd\uff08\u8981\u6c42\u6e90\u7aef\u5fc5\u987b\u901a\u8fc7\u8def\u5f84 MTU \u53d1\u73b0\u9884\u5148\u5206\u7247\uff09\uff0c\u9996\u90e8\u5927\u5c0f\u56fa\u5b9a\u4e3a 40 \u5b57\u8282\u3002\u79fb\u9664\u4e86\u9996\u90e8\u6821\u9a8c\u548c\u4ee5\u63d0\u9ad8\u8f6c\u53d1\u901f\u7387\uff0c\u5e76\u65b0\u589e 20 \u4f4d\u6d41\u6807\u8bb0 (Flow Label)\uff0c\u7528\u4e8e\u52a0\u901f\u7279\u5b9a\u591a\u5a92\u4f53\u6d41\u7684\u5206\u7c7b\u8def\u7531\u5904\u7406\u3002</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "\u7f51\u7edc\u5c42\u4e0e IP \u8def\u7531\u8f6c\u53d1\u5f15\u64ce", "color": "#B58A7D", "title": "\u786c\u4ef6\u7ea7\u6700\u957f\u524d\u7f00\u5339\u914d (LPM) \u4e8c\u53c9 Trie \u6811\u67e5\u627e\u7b97\u6cd5 (`net/ipv4/fib_trie.c`)", "body": "<li>  <strong>\u6700\u957f\u524d\u7f00\u5339\u914d (LPM)</strong>\uff1a\u8def\u7531\u5668\u8f6c\u53d1\u8868\u4f7f\u7528 CIDR \u659c\u7ebf\u8bb0\u6cd5\uff0c\u4e00\u4e2a\u76ee\u7684 IP \u53ef\u80fd\u5339\u914d\u591a\u4e2a\u5b50\u7f51\u63a9\u7801\u524d\u7f00\uff0c\u5fc5\u987b\u9009\u62e9\u6700\u957f\u5339\u914d\u7684\u524d\u7f00\u8f6c\u53d1\u3002</li><li>  <strong>Trie \u6811\u4f18\u5316\u7ed3\u6784</strong>\uff1a</li><li>  <strong>\u8f6f\u4ef6\u5b9e\u73b0</strong>\uff1a\u91c7\u7528 Level-Compressed Trie (LC-Trie) \u6811\uff0c\u901a\u8fc7\u8def\u5f84\u538b\u7f29\u548c\u5b50\u6811\u538b\u7f29\uff0c\u5c06\u4e8c\u53c9\u6811\u53d8\u4e3a\u591a\u8def\u67e5\u627e\u6811\uff0c\u51cf\u5c11\u5185\u5b58\u8bbf\u95ee\u6b21\u6570\u3002</li><li>  <strong>\u786c\u4ef6\u5b9e\u73b0</strong>\uff1a\u6838\u5fc3\u8def\u7531\u5668\u4f7f\u7528\u4e09\u6001\u5185\u5bb9\u5bfb\u5740\u5bc4\u5b58\u5668 TCAM (Ternary Content Addressable Memory)\uff0c\u5728\u4e00\u62cd\u65f6\u949f\u5185\u5e76\u884c\u5339\u914d\u6240\u6709\u7684 0\u30011 \u548c Wildcard (*) \u6807\u5fd7\uff0c\u5b9e\u73b0 O(1) \u7684\u8d85\u9ad8\u8f6c\u53d1\u901f\u5ea6\u3002</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "\u7f51\u7edc\u5c42\u4e0e IP \u8def\u7531\u8f6c\u53d1\u5f15\u64ce", "color": "#B58A7D", "title": "\u8def\u7531\u5668\u5185\u90e8\u6a2a\u8de8\u6761 (Crossbar) \u4ea4\u6362\u77e9\u9635\u4e0e\u5934\u90e8\u963b\u585e (HOL) (`Router Switch`)", "body": "<li>  <strong>\u6a2a\u8de8\u6761\u4ea4\u6362</strong>\uff1a\u975e\u963b\u585e\u4ea4\u6362\u7f51\u7edc\uff0c\u7531 $N \\times N$ \u6761\u534a\u5bfc\u4f53\u4ea4\u53c9\u7ebf\u7ec4\u6210\uff0c\u5141\u8bb8 $N$ \u4e2a\u8f93\u5165\u7aef\u53e3\u4e0e $N$ \u4e2a\u8f93\u51fa\u7aef\u53e3\u5e76\u53d1\u65e0\u51b2\u7a81\u4f20\u8f93\u3002</li><li>  <strong>\u961f\u5934\u963b\u585e (HOL)</strong>\uff1a\u5982\u679c\u8f93\u5165\u961f\u5217\u5f00\u5934\u7684\u4e24\u4e2a\u62a5\u6587\u540c\u65f6\u7ade\u4e89\u540c\u4e00\u4e2a\u8f93\u51fa\u7aef\u53e3\uff0c\u5176\u4e2d\u4e00\u4e2a\u4f1a\u88ab\u963b\u585e\u5728\u8f93\u5165\u961f\u5217\u5f00\u5934\u3002\u8fd9\u4f1a\u5bfc\u81f4\u8be5\u961f\u5217\u4e2d\u540e\u7eed\u53d1\u5f80\u5176\u4ed6\u7a7a\u95f2\u8f93\u51fa\u7aef\u53e3\u7684\u62a5\u6587\u4e5f\u65e0\u6cd5\u5411\u524d\u79fb\u52a8\uff0c\u9650\u5236\u4e86\u4ea4\u6362\u6027\u80fd\u3002</li><li>  <strong>\u89e3\u51b3\u65b9\u6848</strong>\uff1a\u8f93\u5165\u7aef\u4f7f\u7528\u865a\u62df\u8f93\u51fa\u961f\u5217 VOQ (Virtual Output Queueing)\uff0c\u5c06\u4e00\u4e2a\u7269\u7406\u961f\u5217\u62c6\u5206\u4e3a\u9762\u5411\u4e0d\u540c\u8f93\u51fa\u7aef\u53e3\u7684 $N$ \u4e2a\u903b\u8f91\u961f\u5217\u3002</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "\u7f51\u7edc\u5c42\u4e0e IP \u8def\u7531\u8f6c\u53d1\u5f15\u64ce", "color": "#B58A7D", "title": "ICMP \u5dee\u9519\u62a5\u6587\u63a7\u5236\u534f\u8bae\u4e0e Traceroute \u7269\u7406\u5bfb\u5f84\u539f\u7406 (`net/ipv4/icmp.c`)", "body": "<li>  <strong>ICMP \u5dee\u9519\u63a7\u5236</strong>\uff1aIP \u534f\u8bae\u4e4b\u4e0a\uff08\u534f\u8bae\u53f7 1\uff09\u7684\u63a7\u5236\u534f\u8bae\uff0c\u7528\u4e8e\u62a5\u544a\u7f51\u7edc\u5f02\u5e38\u3002\u7c7b\u578b 3 \u4ee3\u8868\u76ee\u7684\u4e0d\u53ef\u8fbe\uff0c\u7c7b\u578b 11 \u4ee3\u8868\u8d85\u65f6\uff08TTL Exceeded\uff09\u3002</li><li>  <strong>Traceroute \u7269\u7406\u5bfb\u5f84</strong>\uff1a</li><li>1. \u6e90\u7aef\u53d1\u9001\u4e00\u4e2a\u76ee\u7684\u5730\u4e3a\u9ad8\u7aef\u53e3\u53f7\u7684\u4e0d\u53ef\u8fbe UDP \u62a5\u6587\uff0c\u521d\u59cb TTL \u8bbe\u4e3a 1\u3002</li><li>2. \u7b2c\u4e00\u8df3\u8def\u7531\u5668\u5c06 TTL \u51cf 1 \u5f52\u96f6\uff0c\u4e22\u5f03\u8be5\u62a5\u6587\uff0c\u5411\u6e90\u7aef\u56de\u9001\u4e00\u4e2a ICMP \u5dee\u9519\u62a5\u6587\uff08Type 11 Code 0\uff09\u3002</li><li>3. \u6e90\u7aef\u83b7\u53d6\u7b2c\u4e00\u8df3\u8def\u7531\u5668\u7684 IP \u5730\u5740\u3002</li><li>4. \u9012\u589e TTL\uff082, 3...\uff09\u91cd\u590d\u53d1\u9001\uff0c\u76f4\u5230\u62a5\u6587\u5230\u8fbe\u76ee\u7684\u4e3b\u673a\u3002\u76ee\u7684\u4e3b\u673a\u7531\u4e8e\u7aef\u53e3\u4e0d\u53ef\u8fbe\uff0c\u56de\u9001 ICMP Port Unreachable \u62a5\u6587\uff08Type 3 Code 3\uff09\uff0c\u5ba3\u544a\u8def\u7531\u8ffd\u8e2a\u7ed3\u675f\u3002</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "\u8def\u7531\u534f\u8bae\u4e0e\u81ea\u6cbb\u7cfb\u7edf\u8def\u7531", "color": "#5F7582", "title": "\u94fe\u8def\u72b6\u6001\u8def\u7531\u7b97\u6cd5 (Dijkstra) \u4e0e OSPF \u6d2a\u6cdb\u540c\u6b65 (`OSPF Daemon`)", "body": "<li>  <strong>\u5168\u5c40\u4fe1\u606f\u8def\u7531</strong>\uff1a\u8981\u6c42\u6240\u6709\u8def\u7531\u5668\u638c\u63e1\u5b8c\u6574\u7684\u7f51\u7edc\u62d3\u6251\u3002</li><li>  <strong>OSPF \u6d2a\u6cdb\u534f\u8bae</strong>\uff1a\u8def\u7531\u5668\u5411\u81ea\u6cbb\u7cfb\u7edf\u5185\u6240\u6709\u5176\u4ed6\u8def\u7531\u5668\u6d2a\u6cdb\u94fe\u8def\u72b6\u6001\u901a\u544a (LSA)\uff0c\u901a\u544a\u81ea\u8eab\u4e0e\u90bb\u5c45\u7684\u94fe\u8def\u4ee3\u4ef7\u3002</li><li>  <strong>LSDB \u540c\u6b65\u4e0e\u8ba1\u7b97</strong>\uff1a\u5404\u8def\u7531\u901a\u8fc7\u53ef\u9760\u786e\u8ba4\u540c\u6b65\u94fe\u8def\u72b6\u6001\u6570\u636e\u5e93 (LSDB)\u3002\u540c\u6b65\u5b8c\u6210\u540e\uff0c\u672c\u5730\u72ec\u7acb\u8fd0\u884c Dijkstra \u6700\u77ed\u8def\u5f84\u7b97\u6cd5\uff0c\u6784\u5efa\u4ee5\u81ea\u8eab\u4e3a\u6839\u8282\u70b9\u7684\u5355\u6e90\u6700\u77ed\u8def\u5f84\u6811\uff0c\u8f93\u51fa\u4e0b\u4e00\u8df3\u8def\u7531\u3002</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "\u8def\u7531\u534f\u8bae\u4e0e\u81ea\u6cbb\u7cfb\u7edf\u8def\u7531", "color": "#5F7582", "title": "\u8ddd\u79bb\u5411\u91cf\u8def\u7531\u7b97\u6cd5 (Bellman-Ford) \u73af\u8def\u4e0e\u65e0\u7a77\u5927\u6536\u655b\ ": "M5", "moduleName": "\u8def\u7531\u534f\u8bae\u4e0e\u81ea\u6cbb\u7cfb\u7edf\u8def\u7531", "color": "#5F7582", "title": "\u5185\u90e8 BGP (iBGP) \u4e0e \u5916\u90e8 BGP (eBGP) \u7ea7\u8054\u6ce8\u5165\u6d41\u5411 (`BGP Peering`)", "body": "<li>  <strong>\u5916\u90e8\u5bf9\u7b49\u4f53 (eBGP)</strong>\uff1a\u4e24\u4e2a\u5904\u4e8e\u4e0d\u540c AS \u7684\u8fb9\u754c\u8def\u7531\u5668\u4e4b\u95f4\u7684 BGP \u8fde\u63a5\uff0c\u7528\u4e8e\u8de8\u81ea\u6cbb\u7cfb\u7edf\u901a\u544a\u5916\u90e8\u53ef\u8fbe\u8def\u5f84\u3002</li><li>  <strong>\u5185\u90e8\u5bf9\u7b49\u4f53 (iBGP)</strong>\uff1a\u540c\u4e00\u4e2a AS \u5185\u90e8\u8def\u7531\u5668\u4e4b\u95f4\u7684 BGP \u8fde\u63a5\uff0c\u7528\u4e8e\u5728\u81ea\u6cbb\u7cfb\u7edf\u5185\u90e8\u540c\u6b65\u548c\u5206\u53d1\u4ece eBGP \u83b7\u77e5\u7684\u5916\u90e8\u8def\u7531\u3002</li><li>  <strong>\u6c34\u5e73\u5206\u5272\u7ea6\u675f</strong>\uff1a\u4e3a\u9632\u6b62 AS \u5185\u90e8\u7684 BGP \u8def\u7531\u73af\u8def\uff0ciBGP \u89c4\u5b9a\uff1a\u901a\u8fc7 iBGP \u5b66\u5230\u7684\u8def\u7531\u4e0d\u80fd\u518d\u901a\u544a\u7ed9\u5176\u4ed6 iBGP \u90bb\u5c45\u3002\u8fd9\u8981\u6c42 AS \u5185\u90e8\u6240\u6709\u8fd0\u884c BGP \u7684\u8def\u7531\u5668\u5fc5\u987b\u5efa\u7acb <strong>\u5168\u7f51\u72b6\u8fde\u63a5 (Full Mesh)</strong>\uff0c\u6216\u4f7f\u7528\u8def\u7531\u53cd\u5c04\u5668 (Route Reflector) \u8fdb\u884c\u96c6\u4e2d\u540c\u6b65\u3002</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "\u8def\u7531\u534f\u8bae\u4e0e\u81ea\u6cbb\u7cfb\u7edf\u8def\u7531", "color": "#5F7582", "title": "\u8f6f\u4ef6\u5b9a\u4e49\u7f51\u7edc (SDN) \u63a7\u5236\u9762\u4e0e\u6570\u636e\u9762 OpenFlow \u6d41\u8868\u89e3\u8026 (`SDN Architecture`)", "body": "<li>  <strong>\u6570\u63a7\u5206\u79bb\u89e3\u8026</strong>\uff1a\u5c06\u7f51\u7edc\u8bbe\u5907\u7684\u8def\u7531\u8ba1\u7b97\u903b\u8f91\uff08\u63a7\u5236\u9762\uff09\u4ece\u4ea4\u6362\u82af\u7247\u8f6c\u53d1\u786c\u4ef6\uff08\u6570\u636e\u9762\uff09\u4e2d\u5265\u79bb\uff ID\uff09\u5b58\u5165 MAC \u5730\u5740\u8868\u5e76\u914d\u7f6e\u8001\u5316\u65f6\u95f4\u3002\u82e5\u76ee\u7684 MAC \u672a\u5728\u8868\u4e2d\uff0c\u5219\u5728\u8be5 VLAN \u7684\u6240\u6709\u5176\u4ed6\u7aef\u53e3\u5e7f\u64ad\u8f6c\u53d1\uff1b\u82e5\u5339\u914d\uff0c\u5219\u5355\u64ad\u5b9a\u5411\u8f6c\u53d1\u3002</li>"}];
        let activeModule = 'ALL';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            cards.forEach(c => {
                const matchesSearch = c.title.toLowerCase().includes(query) || c.body.toLowerCase().includes(query);
                const matchesModule = activeModule === 'ALL' || c.module === activeModule;

                if (matchesSearch && matchesModule) {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.borderLeft = `4px solid ${c.color}`;
                    el.innerHTML = `
                        <div class="card-header">
                            <span class="card-id" style="background-color: ${c.color}22; color: ${c.color}">${c.relativeId}</span>
                            <h3 class="card-title">${c.title}</h3>
                        </div>
                        <div class="card-body">
                            ${c.body}
                        </div>
                        <div class="card-footer">
                            <span>${c.moduleName}</span>
                            <span style="color: ${c.color}">Card #${c.id}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                }
            });
        }

        function filterModule(mod) {
            activeModule = mod;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(mod) || (mod === 'ALL' && btn.innerText === 'ALL')) {
                    btn.classList.add('active');
                }
            });
            renderCards();
        }

        document.getElementById('search').addEventListener('input', renderCards);
        renderCards();
