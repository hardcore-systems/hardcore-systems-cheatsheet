<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>redis-internals Redis Storage Engine Architecture Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161820;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #f3f4f6, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .stat-item {
            background: #1e293b50;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn:hover {
            border-color: var(--accent-color);
            color: #fff;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--theme-color);
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--theme-color);
            box-shadow: 0 10px 20px -10px var(--theme-color-50);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .relative-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            background-color: var(--theme-color);
        }
        .module-tag {
            font-size: 0.7rem;
            color: var(--theme-color);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.75rem;
        }
        .card-body {
            font-size: 0.78rem;
            color: #94a3b8;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .card-body ul, .card-body ol {
            padding-left: 1rem;
            margin-top: 0.25rem;
        }
        .card-body li {
            margin-bottom: 0.25rem;
        }
        .card-body code {
            font-family: monospace;
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
            color: #3b82f6;
        }
        .card-body strong {
            color: #f1f5f9;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>redis-internals Storage Kernel Map</h1>
        <p>High-Density ae.c Event Loops, SDS/Dict Structures, RDB/AOF COW Persistence, and Cluster Sharding Reference System</p>
        <div class="stats-bar">
            <span class="stat-item">Core Cards: 28</span>
            <span class="stat-item">Category Modules: 6</span>
            <span class="stat-item">3-Level Filtering</span>
            <span class="stat-item">Zone T Tuning Parameters</span>
        </div>
    </header>

    <div class="main-container">
        <div class="filter-controls">
            <button class="filter-btn active" onclick="filterModule('all', this)">ALL</button>
            <button class="filter-btn" style="--theme-color: var(--slate-blue)" onclick="filterModule('M1', this)">M1. Event Loop</button>
            <button class="filter-btn" style="--theme-color: var(--moss-green)" onclick="filterModule('M2', this)">M2. Structures</button>
            <button class="filter-btn" style="--theme-color: var(--plum-rose)" onclick="filterModule('M3', this)">M3. Persistence</button>
            <button class="filter-btn" style="--theme-color: var(--terracotta)" onclick="filterModule('M4', this)">M4. Eviction</button>
            <button class="filter-btn" style="--theme-color: var(--indigo)" onclick="filterModule('M5', this)">M5. HA & Cluster</button>
            <button class="filter-btn" style="--theme-color: var(--antique-gold)" onclick="filterModule('M6', this)">M6. Optimizations</button>
        </div>

        <div class="grid-layout" id="cardsGrid">
            <!-- Cards will be dynamically injected here -->
        </div>
    </div>

    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Event Loop & RESP", "color": "#7A8B99", "title": "ae.c Single-Threaded Event Loop", "body": "<li>  <strong>Event Merging</strong>: The core loop in <code>aeProcessEvents</code> coordinates both network events (socket reads/writes) and timer tasks (e.g., key expiration, clustering heartbeat).</li><li>  <strong>Zero Locking</strong>: By running entirely on a single thread, Redis avoids thread switching, mutex locking, and cache line invalidations caused by thread scheduling.</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Event Loop & RESP", "color": "#7A8B99", "title": "I/O Multiplexing Abstraction", "body": "<li>  <strong>OS Interface Wrapper</strong>: Redis abstracts operating system non-blocking select interfaces via conditional compiles (<code>ae_select.c</code>, <code>ae_epoll.c</code>, <code>ae_kqueue.c</code>).</li><li>  <strong>Platform Selection</strong>: Selects the fastest interface (epoll on Linux, kqueue on BSD) to support $O(1)$ event callbacks on thousands of sockets.</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Event Loop & RESP", "color": "#7A8B99", "title": "Client Connection Buffers", "body": "<li>  <strong>Buffer Controls</strong>: Client connection descriptors allocate a 16KB query read buffer that expands to a 1GB safety limit, dropping connections exceeding this limit.</li><li>  <strong>Write Response Buffers</strong>: Outbound payloads are formatted into client static buffers or appended to queue link lists before being flushed during socket write events.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Event Loop & RESP", "color": "#7A8B99", "title": "RESP Protocol Parser", "body": "<li>  <strong>Binary-Safe Format</strong>: RESP (Redis Serialization Protocol) uses prefix codes (e.g., <code>+</code> for strings, <code>$</code> for bulk strings, <code>:</code> for integers) to parse streams.</li><li>  <strong>Low Overhead</strong>: The parser splits data payloads without JSON/XML parser allocations, ensuring safe execution with binary strings using length headers.</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "Data Structures", "color": "#7D8F7B", "title": "SDS (Simple Dynamic String)", "body": "<li>  <strong>Length Trackers</strong>: SDS structures store current length <code>len</code>, allocated capacity <code>alloc</code>, and header metadata <code>flags</code> to provide $O(1)$ length operations.</li><li>  <strong>Overflow Protection</strong>: SDS allocation monitors bounds before write operations, expanding capacity (doubling if under 1MB, adding 1MB if over) to handle binary payloads.</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "Data Structures", "color": "#7D8F7B", "title": "Dict Progressive Rehash", "body": "<li>  <strong>Incremental Hashing</strong>: Redis dictionaries manage hash collisions using two tables, <code>ht[0]</code> and <code>ht[1]</code>. If table size exceeds limits, <code>ht[1]</code> is allocated at double capacity.</li><li>  <strong>Rehash Index Tracker</strong>: Commands (e.g., add, find, delete) migrate buckets step-by-step from <code>ht[0]</code> to <code>ht[1]</code>, tracking progress via <code>rehashidx</code> to avoid CPU blocks.</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "Data Structures", "color": "#7D8F7B", "title": "Ziplist & Listpack Memory Alignment", "body": "<li>  <strong>Contiguous Layout</strong>: Ziplists store elements sequentially in a single memory block (<code>[prev_entry_len][encoding][entry_data]</code>) to avoid pointer memory overheads.</li><li>  <strong>Cascade Update Prevention</strong>: Newer versions use Listpacks. Listpacks store element lengths as suffixes rather than prefixes, preventing cascade updates during insertions.</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "Data Structures", "color": "#7D8F7B", "title": "Dict & Skiplist Integration", "body": "<li>  <strong>ZSET Dual Layout</strong>: Sorted sets (ZSET) integrate a hash table (<code>dict</code>) and a skiplist (<code>zskiplist</code>) to support different query patterns.</li><li>  <strong>Range Scan Acceleration</strong>: The skiplist supports $O(\\log N)$ range searches and sorting, while the hash table provides $O(1)$ key-to-score lookups.</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "Data Structures", "color": "#7D8F7B", "title": "Quicklist & Intset", "body": "<li>  <strong>Pointer Optimization</strong>: A <code>quicklist</code> is a double-linked list where each node is a compact <code>ziplist</code>, reducing memory fragmentation.</li><li>  <strong>Integer Array Compression</strong>: An <code>intset</code> stores integers in a compact sorted array, automatically upgrading elements (int16 $\\rightarrow$ int32 $\\rightarrow$ int64) to save memory.</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "Persistence", "color": "#9E828A", "title": "RDB Snapshotting & Copy-on-Write", "body": "<li>  <strong>Page Table Sharing</strong>: Executing <code>BGSAVE</code> forks a child process sharing the parent's page tables to write database state to an RDB file.</li><li>  <strong>COW Page Split</strong>: When the parent process writes to a page, the OS triggers a copy-on-write fault to clone the page, keeping the child's snapshot consistent.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "Persistence", "color": "#9E828A", "title": "AOF Logging & Fsync Policies", "body": "<li>  <strong>Log Buffer Serialization</strong>: Database writes append RESP commands to an <code>aof_buf</code> buffer before flushing to disk.</li><li>  <strong>Fsync Configurations</strong>:</li><li>1.  <code>always</code>: Syncs on every event loop iteration; highly secure but bottlenecked by disk speed.</li><li>2.  <code>everysec</code>: Async background thread syncs every second; balances write speed and safety (Standard).</li><li>3.  <code>no</code>: Relies on OS write flushes; prone to data loss.</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "Persistence", "color": "#9E828A", "title": "AOF BGREWRITEAOF Rewrite", "body": "<li>  <strong>Size Reduction</strong>: When AOF files exceed limits, <code>BGREWRITEAOF</code> creates a child process to write the current memory state into a new file.</li><li>  <strong>Rewrite Buffer Tracking</strong>: Active writes are appended to an <code>aof_rewrite_buf</code> buffer, which is merged into the new file by the main thread after rewriting.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "Persistence", "color": "#9E828A", "title": "Hybrid Persistence Recovery", "body": "<li>  <strong>RDB & AOF Merging</strong>: Hybrid persistence writes the current dataset as a binary RDB snapshot at the header of the AOF file, appending subsequent writes as RESP commands.</li><li>  <strong>Recovery Speed</strong>: Bypasses parsing overhead during initial startup phases while retaining incremental write logs.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "Memory & Eviction", "color": "#B58A7D", "title": "jemalloc Allocator & Fragmentation", "body": "<li>  <strong>Arena Management</strong>: Redis uses the jemalloc allocator to allocate fixed size slots, reducing memory page fragmentation.</li><li>  <strong>Fragmentation Ratio</strong>: The <code>mem_fragmentation_ratio</code> in <code>INFO memory</code> monitors RSS versus allocated bytes; ratios exceeding 1.5 suggest fragmentation.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "Memory & Eviction", "color": "#B58A7D", "title": "robj Object Layer", "body": "<li>  <strong>Abstraction Wrappers</strong>: All database entries are wrapped in a <code>redisObject</code> header specifying data <code>type</code> and underlying memory <code>encoding</code>.</li><li>  <strong>Metadata Offsets</strong>: Stores a <code>refcount</code> for shared memory integer reuse and a 24-bit <code>lru</code> field tracking access times or LFU counters.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "Memory & Eviction", "color": "#B58A7D", "title": "Approximated LRU Eviction", "body": "<li>  <strong>Avoid Global Locks</strong>: Avoids the locking overhead of global double-linked lists by replacing them with randomized sampling.</li><li>  <strong>Randomized Sampling</strong>: When memory exceeds thresholds, Redis samples $N$ keys (default 5) and evicts the oldest key based on its <code>lru</code> offset.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "Memory & Eviction", "color": "#B58A7D", "title": "UNLINK Async Freeing", "body": "<li>  <strong>Main Thread Block Prevention</strong>: Traditional <code>DEL</code> operations on large collections block the main thread while freeing memory pages.</li><li>  <strong>Background bio Threads</strong>: The <code>UNLINK</code> command unlinks the key from the dictionary instantly, passing the memory pointer to <code>bio.c</code> threads for async deletion.</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "Replication & HA", "color": "#5F7582", "title": "Replication Backlog Buffer & PSYNC", "body": "<li>  <strong>Replication Offset</strong>: Master and replicas track replication progress using data stream offsets.</li><li>  <strong>Circular Replication Backlog</strong>: Replicas disconnected from the master send their offsets. If the offset falls within the master's circular <code>repl_backlog_buffer</code>, it performs a <code>PSYNC</code> incremental sync.</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "Replication & HA", "color": "#5F7582", "title": "Sentinel Failover Consensus", "body": "<li>  <strong>Three-Step Failover</strong>:</li><li>1.  <strong>sdown</strong>: A single Sentinel marks the master offline after heartbeats time out.</li><li>2.  <strong>odown</strong>: Once a quorum of Sentinels confirms the status, the master is marked offline.</li><li>3.  <strong>Raft Leader Election</strong>: Sentinels elect a leader via Raft to promote a replica and broadcast the new configuration.</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "Replication & HA", "color": "#5F7582", "title": "Cluster Gossip Protocol", "body": "<li>  <strong>Cluster Auto-Discovery</strong>: Nodes in a Redis Cluster communicate directly without central registration nodes.</li><li>  <strong>Gossip Messages</strong>: Nodes exchange <code>PING/PONG</code> packets containing slot ownership mappings and node metadata to converge cluster state.</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "Replication & HA", "color": "#5F7582", "title": "Hash Slots & ASK/MOVED Redirects", "body": "<li>  <strong>16384 Slots Mappings</strong>: The cluster routes keys across 16384 logical slots.</li><li>  <strong>Redirections</strong>: If a target slot is located on another node, the node returns a <code>MOVED</code> redirect. During migrations, it returns an <code>ASK</code> redirect.</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "Replication & HA", "color": "#5F7582", "title": "Transactions & WATCH Limits", "body": "<li>  <strong>No rollback Support</strong>: Redis transactions (<code>MULTI/EXEC</code>) group commands but execute all remaining instructions even if one fails, lacking ACID rollback support.</li><li>  <strong>WATCH CAS Locks</strong>: The <code>WATCH</code> command monitors keys, aborting the transaction if another client modifies the watched key before execution.</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "Replication & HA", "color": "#5F7582", "title": "Lua Script Atomicity", "body": "<li>  <strong>VM Isolation</strong>: Redis executes Lua scripts inside an embedded Lua interpreter.</li><li>  <strong>Exclusive Execution</strong>: While a script executes, the event loop blocks all other client requests, ensuring atomic operations.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "Optimizations", "color": "#BFA88F", "title": "Threaded I/O Socket Offloading", "body": "<li>  <strong>I/O Thread Pool</strong>: Redis 6.0 offloads read and write system calls to helper threads to maximize networking performance.</li><li>  <strong>Single-Threaded Core</strong>: Worker threads parse client packet buffers and write responses, while the core database operations remain single-threaded.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "Optimizations", "color": "#BFA88F", "title": "Active Defragmentation", "body": "<li>  <strong>Dynamic Heap Compaction</strong>: Background active defragmentation sweeps memory allocations without service restarts.</li><li>  <strong>Data Pointer Redirection</strong>: Relocates memory blocks to contiguous regions and updates dictionary data pointers to free fragmented pages.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "Optimizations", "color": "#BFA88F", "title": "Client-Side Caching", "body": "<li>  <strong>RESP3 Tracking</strong>: Replicas use RESP3 tracking to cache values directly in client memory.</li><li>  <strong>Invalidation Alerts</strong>: When a tracked key is modified, Redis broadcasts <code>Invalidation</code> packets to clients to clear local caches.</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "Optimizations", "color": "#BFA88F", "title": "Slowlog & Latency Doctor", "body": "<li>  <strong>Execution Timing</strong>: The <code>slowlog</code> records commands whose execution times in the core loop exceed thresholds, ignoring network delays.</li><li>  <strong>Diagnostics</strong>: The <code>LATENCY DOCTOR</code> command diagnoses issues (e.g., fork latency, AOF write stalls) to identify performance bottlenecks.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "Optimizations", "color": "#BFA88F", "title": "Modules API Extension", "body": "<li>  <strong>Dynamic Library Integration</strong>: The Modules API allows developers to load compiled C/C++ dynamic libraries into Redis.</li><li>  <strong>Native Execution</strong>: Modules access internal memory structures directly to support custom types and optimizations without Lua overhead.</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
