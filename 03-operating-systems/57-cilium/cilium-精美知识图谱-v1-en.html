<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cilium eBPF Architecture Map</title>
    <style>
        body {
            background-color: #121824;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4B5F7A;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #canvas-container {
            width: 90%;
            height: 600px;
            border: 2px solid #24324F;
            border-radius: 8px;
            background-color: #1A202C;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-align: center;
        }
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.1);
        }
        #tooltip {
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background-color: #2D3748;
            border-left: 5px solid #4B5F7A;
            border-radius: 4px;
            min-height: 80px;
        }
        .colorM1 { background-color: #4B5F7A; }
        .colorM2 { background-color: #6B8272; }
        .colorM3 { background-color: #9C6666; }
        .colorM4 { background-color: #7A7A7A; }
        .colorM5 { background-color: #9A825A; }
        .colorM6 { background-color: #755B77; }
    </style>
</head>
<body>
    <h1>Cilium eBPF Architecture Map</h1>
    <div id="canvas-container"></div>
    <div id="tooltip">
        <h3>Click a card to inspect Cilium's internal components</h3>
    </div>

    <script>
        const nodes = [
            { id: 1, group: 'M1', x: 80, y: 80, label: 'Card 1: eBPF Load', zh: '卡片 1: eBPF 加载挂载', desc: 'Loads bytecode into XDP/tc/Socket kernel program hooks.' },
            { id: 2, group: 'M1', x: 80, y: 160, label: 'Card 2: LLVM Compiler', zh: '卡片 2: LLVM 机器码生成', desc: 'LLVM translates restricted C code to 64-bit eBPF instructions.' },
            { id: 3, group: 'M1', x: 80, y: 240, label: 'Card 3: Verifier', zh: '卡片 3: 内核验证器', desc: 'Performs static flow analysis to ensure no loops and memory bounds.' },
            { id: 4, group: 'M1', x: 80, y: 320, label: 'Card 4: CO-RE BTF', zh: '卡片 4: CO-RE BTF 重定位', desc: 'Dynamically patches structural offsets to support cross-kernel running.' },
            { id: 5, group: 'M1', x: 80, y: 400, label: 'Card 5: BPF Map', zh: '卡片 5: BPF Map 哈希表', desc: 'Atomic lock-free key-value maps sharing data with user agents.' },
            { id: 6, group: 'M1', x: 80, y: 480, label: 'Card 6: Agent Comp', zh: '卡片 6: Cilium Agent 动态编译', desc: 'Daemon compiling tailored eBPF programs matching K8s states.' },
            
            { id: 7, group: 'M2', x: 260, y: 80, label: 'Card 7: XDP Intercept', zh: '卡片 7: XDP 网卡层极速拦截', desc: 'Runs inside DMA driver loops before skb memory allocations occur.' },
            { id: 8, group: 'M2', x: 260, y: 160, label: 'Card 8: tc Hook', zh: '卡片 8: tc 接口钩子', desc: 'Hooks ingress/egress schedulers managing standard sk_buff blocks.' },
            { id: 9, group: 'M2', x: 260, y: 240, label: 'Card 9: Header Parse', zh: '卡片 9: 包头无锁解析', desc: 'Verifies and casts protocol header offsets via pointer offsets.' },
            { id: 10, group: 'M2', x: 260, y: 320, label: 'Card 10: Conntrack Map', zh: '卡片 10: Conntrack 跟踪表', desc: 'Maintains bi-directional connection tuples in custom hash maps.' },
            { id: 11, group: 'M2', x: 260, y: 400, label: 'Card 11: NAT Rewrite', zh: '卡片 11: NAT 三层路由重写', desc: 'Alters IP/Port headers and recomputes checksums inside kernels.' },
            { id: 12, group: 'M2', x: 260, y: 480, label: 'Card 12: Tunneling', zh: '卡片 12: VxLAN/Geneve 隧道', desc: 'Overlay packet encapsulation bridging traffic across host hosts.' },

            { id: 13, group: 'M3', x: 440, y: 80, label: 'Card 13: sockops Event', zh: '卡片 13: sockops 事件拦截', desc: 'Captures TCP establishing handshakes to hook sockets directly.' },
            { id: 14, group: 'M3', x: 440, y: 160, label: 'Card 14: SOCKMAP', zh: '卡片 14: SOCKMAP 描述符映射', desc: 'Maps connection tuples directly to physical socket descriptors.' },
            { id: 15, group: 'M3', x: 440, y: 240, label: 'Card 15: sk_msg Redirect', zh: '卡片 15: sk_msg 缓冲区短路', desc: 'Pours send queues directly into destination socket receive queues.' },
            { id: 16, group: 'M3', x: 440, y: 320, label: 'Card 16: Local Pod Speed', zh: '卡片 16: 同机 Pod 极速通信', desc: 'Bypasses standard TCP/IP routing loops to maximize local routes.' },
            { id: 17, group: 'M3', x: 440, y: 400, label: 'Card 17: Lock Elimination', zh: '卡片 17: Socket 锁竞争规避', desc: 'Eliminates stack locks and context-switching overheads.' },
            { id: 18, group: 'M3', x: 440, y: 480, label: 'Card 18: UDS Compare', zh: '卡片 18: Unix Domain Socket 对比', desc: 'TCP short-circuiting matches UDS speed without code refactoring.' },

            { id: 19, group: 'M4', x: 620, y: 80, label: 'Card 19: Maglev Hashing', zh: '卡片 19: Maglev 一致性哈希', desc: 'Builds lookup tables mapping flows cleanly with minimal shifts.' },
            { id: 20, group: 'M4', x: 620, y: 180, label: 'Card 20: VIP Mapping', zh: '卡片 20: VIP 虚 IP 重写', desc: 'Rewrites virtual service IPs to target real backend pod IPs.' },
            { id: 21, group: 'M4', x: 620, y: 280, label: 'Card 21: LRU Session', zh: '卡片 21: LRU Map 会话保持', desc: 'Preserves client backend sticky bindings with auto stale evicts.' },
            { id: 22, group: 'M4', x: 620, y: 380, label: 'Card 22: DSR Routing', zh: 'Card 22: DSR 极速路由', desc: 'Forces backend pods to reply to clients bypassing gateways.' },

            { id: 23, group: 'M5', x: 800, y: 80, label: 'Card 23: Identity Label', zh: '卡片 23: 身份安全标签模型', desc: 'Replaces IP checks with static 32-bit logical group identity tags.' },
            { id: 24, group: 'M5', x: 800, y: 180, label: 'Card 24: IP-to-Identity', zh: '卡片 24: IP-to-Identity Trie', desc: 'LPM Trie maps IP prefixes to identities for non-overlay routes.' },
            { id: 25, group: 'M5', x: 800, y: 280, label: 'Card 25: L3/L4/L7 Policy', zh: '卡片 25: L3/L4/L7 混合安全', desc: 'tc-bpf guards L3/L4 while Envoy processes seven-layer HTTP logic.' },
            { id: 26, group: 'M5', x: 800, y: 380, label: 'Card 26: Kernel Encrypt', zh: '卡片 26: IPsec/WireGuard 加密', desc: 'Hooks IPsec XFRM and Wireguard modules after eBPF routing.' },

            { id: 27, group: 'M6', x: 980, y: 80, label: 'Card 27: Sidecarless Mesh', zh: '卡片 27: Sidecarless 网格', desc: 'Redirects port traffic via tc-bpf to a shared host Envoy daemon.' },
            { id: 28, group: 'M6', x: 980, y: 180, label: 'Card 28: Hubble Observability', zh: '卡片 28: Hubble 流量追踪', desc: 'Pushes metadata via BPF Ring Buffers for visual delay maps.' }
        ];

        const container = document.getElementById('canvas-container');
        const tooltip = document.getElementById('tooltip');

        nodes.forEach(n => {
            const div = document.createElement('div');
            div.className = `node color${n.group}`;
            div.style.left = `${n.x}px`;
            div.style.top = `${n.y}px`;
            div.innerText = n.label;
            div.onclick = () => {
                tooltip.innerHTML = `
                    <h3>\${n.label}</h3>
                    <p><strong>Module:</strong> \${n.group} | <strong>Details:</strong> \${n.desc}</p>
                `;
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
