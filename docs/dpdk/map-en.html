<!DOCTYPE html>
<html lang= + map_lang + >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content= + map_desc + >
    <title>DPDK Core Architecture & Memory Management Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #24324f;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background-color: #111827;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-badge span.num {
            color: var(--accent-color);
            font-weight: 700;
        }
        .filter-controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 300px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent-color);
        }
        .filter-btn {
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: #94a3b8;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .filter-btn:hover {
            color: var(--text-color);
            background-color: #1e293b;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .card-id {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-color);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
            margin-left: 0.75rem;
        }
        .card-body {
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .card-body li {
            margin-left: 1.2rem;
            margin-bottom: 0.25rem;
        }
        .card-body code {
            background-color: rgba(0,0,0,0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-family: monospace;
            color: #f472b6;
        }
        .card-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <header>
        <h1>DPDK High-Performance Networking Map</h1>
        <p>High-density userspace drivers, lockless ring CAS pointers, hugepage NUMA mapping, PMD descriptor loops, mbuf prefetching, and NIC offloads</p>
    </header>

    <div class="stats-bar">
        <div class="stat-badge">Core Cards: <span class="num">28</span></div>
        <div class="stat-badge">Category Modules: <span class="num">6</span></div>
        <div class="stat-badge">3-Level Filtering: <span class="num">L0➜L2</span></div>
        <div class="stat-badge">Zone T Tuning: <span class="num">Zone T</span></div>
    </div>

    <div class="filter-controls">
        <input type="text" id="search" class="search-box" placeholder="Search cards (e.g. Ring, VFIO, Hugepage, PMD, RSS)...">
        <button class="filter-btn active" onclick="filterModule('ALL')">ALL</button>
        <button class="filter-btn" onclick="filterModule('M1')">M1 Drivers</button>
        <button class="filter-btn" onclick="filterModule('M2')">M2 Ring</button>
        <button class="filter-btn" onclick="filterModule('M3')">M3 Memory</button>
        <button class="filter-btn" onclick="filterModule('M4')">M4 Polling</button>
        <button class="filter-btn" onclick="filterModule('M5')">M5 mbuf</button>
        <button class="filter-btn" onclick="filterModule('M6')">M6 Offloads</button>
    </div>

    <div class="grid" id="cards-grid">
        <!-- Rendered by JS -->
    </div>

    <script>
        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Kernel Bypass & Drivers", "color": "#7A8B99", "title": "UIO Simple Bypass vs VFIO Secure Isolation Bypass", "body": "<li>  <strong>Technical Mechanism</strong>: UIO (<code>igb_uio</code>) exposes interrupts and device memory to user space but lacks IOMMU hardware page isolation, allowing raw DMA to write anywhere and risking memory corruption. VFIO (<code>vfio-pci</code>) utilizes hardware IOMMU page tables, restricting DMA access only to mapped hugepage regions.</li><li>  <strong>Application Strategy</strong>: VFIO is mandatory in secure virtualized environments and multi-tenant containers. UIO should only be used as a fallback for legacy hardware lacking IOMMU support.</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Kernel Bypass & Drivers", "color": "#7A8B99", "title": "PCI BAR (Base Address Register) Mapping & Userspace PCI Access", "body": "<li>  <strong>Technical Mechanism</strong>: Physical NIC registers are exposed as PCI BAR space. During initialization, DPDK probes the device sysfs resource path (<code>/sys/bus/pci/devices/.../resourceX</code>) and maps the BAR descriptor directly to user space memory via <code>mmap()</code>.</li><li>  <strong>Application Strategy</strong>: Userspace drivers write directly to device registers using memory pointers (e.g. updating RX/TX head/tail indices), avoiding costly <code>ioctl()</code> syscall transitions.</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Kernel Bypass & Drivers", "color": "#7A8B99", "title": "DPDK EAL (Environment Abstraction Layer) Boot Sequence", "body": "<li>  <strong>Technical Mechanism</strong>: Initialized via <code>rte_eal_init()</code>, which parses configuration flags, probes and maps hugepage segments, scans the PCI bus, binds device drivers (e.g. <code>vfio-pci</code>), and spawns and pins worker threads (Lcores) to dedicated CPU cores.</li><li>  <strong>Application Strategy</strong>: Common boot failures are caused by missing hugepages, insufficient permissions to access <code>/dev/hugepages</code>, or core mask overlap.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Kernel Bypass & Drivers", "color": "#7A8B99", "title": "Userspace DMA vs Kernel sk_buff Double Copy Overhead", "body": "<li>  <strong>Technical Mechanism</strong>: In the kernel, packets are DMA-transferred to kernel memory, wrapped in <code>sk_buff</code> structs, processed, and then copied to userspace buffers via syscalls. DPDK maps pre-allocated hugepage buffers directly to the NIC's DMA engine, enabling direct userspace DMA writes.</li><li>  <strong>Application Strategy</strong>: For links exceeding 10Gbps, eliminating copy overheads is required to maintain line-rate throughput.</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "Lockless Ring & Mempool", "color": "#7D8F7B", "title": "rte_ring SPSC (Single-Producer Single-Consumer) Pointer Sliding", "body": "<li>  <strong>Technical Mechanism</strong>: The SPSC model utilizes independent pointers for <code>prod.head</code>/<code>prod.tail</code> and <code>cons.head</code>/<code>cons.tail</code>. With only one thread writing and one reading, no atomic CAS (Compare-And-Swap) overhead is required, relying only on lightweight memory barriers.</li><li>  <strong>Application Strategy</strong>: Use SPSC when data exchange is strictly locked between two dedicated core threads to save 30% overhead compared to MPMC rings.</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "Lockless Ring & Mempool", "color": "#7D8F7B", "title": "rte_ring MPMC (Multi-Producer Multi-Consumer) Atomic CAS Reservation", "body": "<li>  <strong>Technical Mechanism</strong>: Multiple producers execute an atomic CAS (<code>__atomic_compare_exchange_n()</code>) to reserve free slots by advancing <code>prod.head</code>. Threads write data in parallel within their reserved slots, then spin-wait until all preceding writes complete before updating <code>prod.tail</code>.</li><li>  <strong>Application Strategy</strong>: Ideal for core aggregation or thread distribution. The spin-waiting step to align tail pointers is the primary bottleneck.</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "Lockless Ring & Mempool", "color": "#7D8F7B", "title": "rte_ring Memory Barrier & Write Consistency", "body": "<li>  <strong>Technical Mechanism</strong>: Enqueuing involves writing data to the mbuf array and advancing the ring pointer. If the CPU reorders these steps, a consumer core might read garbage data. A write barrier <code>rte_smp_wmb()</code> must be inserted between data writes and pointer updates.</li><li>  <strong>Application Strategy</strong>: DPDK's modern C11 atomics handle this automatically. Custom ring implementations must explicitly place barriers to ensure read-after-write consistency.</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "Lockless Ring & Mempool", "color": "#7D8F7B", "title": "rte_mempool Ring Backend & Fast Packet Allocation", "body": "<li>  <strong>Technical Mechanism</strong>: <code>rte_mempool</code> is a fixed-size block allocator. It utilizes a <code>rte_ring</code> as its default backend to store unused mbuf memory block addresses. Allocating a packet equates to deqeueuing a pointer, and freeing a packet equates to enqueuing it.</li><li>  <strong>Application Strategy</strong>: Mempool size must be sized at boot to be 2-3x the sum of RX/TX descriptors and local cache size to prevent pool exhaustion under high traffic.</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "Lockless Ring & Mempool", "color": "#7D8F7B", "title": "rte_mempool Lcore Local Cache & Lock Elimination", "body": "<li>  <strong>Technical Mechanism</strong>: To avoid multiple cores competing on the global mempool ring CAS, each core (Lcore) is allocated a local cache block (<code>struct rte_mempool_cache</code>). Allocation and freeing occur on the local cache first, eliminating atomic spinlocks.</li><li>  <strong>Application Strategy</strong>: Cache size should be set to 32 or 64 in the fast path to bypass the global lock and ensure fast access.</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "Hugepage & NUMA", "color": "#9E828A", "title": "Hugepages (2MB / 1GB) & TLB Miss Elimination", "body": "<li>  <strong>Technical Mechanism</strong>: Standard 4KB pages yield large page table structures and frequent TLB (Translation Lookaside Buffer) misses. By scaling pages to 2MB or 1GB, the page table size decreases, enabling translation entries to be permanently cached in the CPU TLB.</li><li>  <strong>Application Strategy</strong>: Production DPDK setups should reserve 1GB hugepages at boot time (<code>default_hugepagesz=1G hugepages=16</code> in grub) to boost memory translation speed by 10%-15%.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "Hugepage & NUMA", "color": "#9E828A", "title": "Physical Contiguous Mapping (IOVA as VA vs IOVA as PA)", "body": "<li>  <strong>Technical Mechanism</strong>: IOVA (I/O Virtual Address) is the address space used by the NIC DMA engine. IOVA as PA maps memory using actual physical addresses, requiring root access to read page tables. IOVA as VA matches userspace virtual layout, managed safely by VFIO/IOMMU.</li><li>  <strong>Application Strategy</strong>: IOVA as VA is recommended for non-root containers and cloud deployments to bypass security access issues.</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "Hugepage & NUMA", "color": "#9E828A", "title": "NUMA (Non-Uniform Memory Access) Socket Affinity", "body": "<li>  <strong>Technical Mechanism</strong>: Cross-socket memory access via UPI/QPI interconnects doubles latency. DPDK enforces strict socket affinity: the NIC PCI lane, hugepage allocation memory segment, and polling core thread must reside on the same NUMA node.</li><li>  <strong>Application Strategy</strong>: Allocate structures using socket-aware interfaces like <code>rte_malloc_socket()</code> and pass the matching NUMA ID using <code>rte_eth_dev_socket_id()</code>.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "Hugepage & NUMA", "color": "#9E828A", "title": "Cacheline Alignment (__rte_cache_aligned) & False Sharing Elimination", "body": "<li>  <strong>Technical Mechanism</strong>: CPU cache coherence invalidates the entire cacheline (64 bytes) when a core writes to it. If two cores concurrently write to different variables residing in the same cacheline, the line bounces between L1 caches, causing false sharing.</li><li>  <strong>Application Strategy</strong>: Apply <code>__rte_cache_aligned</code> and padding to shared counters or core-specific variables to isolate writes on separate cachelines.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "PMD & Burst I/O", "color": "#B58A7D", "title": "Linux NAPI Interrupt Merging vs DPDK PMD Polling", "body": "<li>  <strong>Technical Mechanism</strong>: Traditional OS interrupts on high-speed links trigger high context-switch overheads and\u8edf\u4e2d\u65ad softirq latency (receive livelock). DPDK PMD disables hardware interrupts and runs a continuous loop on dedicated cores to poll hardware descriptors.</li><li>  <strong>Application Strategy</strong>: A 100% CPU utilization reading for PMD cores is expected. Polling is significantly more efficient than interrupt handling under loads exceeding 1 Mpps.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "PMD & Burst I/O", "color": "#B58A7D", "title": "Descriptor Ring Buffer & Write-Back State Management", "body": "<li>  <strong>Technical Mechanism</strong>: The descriptor ring is a physical memory array shared between the NIC and the CPU. The NIC writes packet addresses and sets the Descriptor Done (DD) bit. The CPU polls the DD bit, extracts the packet, and updates the descriptor.</li><li>  <strong>Application Strategy</strong>: Configure ring buffer depth (e.g. 1024, 2048) based on latency budgets to handle traffic bursts without dropping DMA transfers.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "PMD & Burst I/O", "color": "#B58A7D", "title": "rte_eth_rx_burst / rte_eth_tx_burst API & Instruction Prefetching", "body": "<li>  <strong>Technical Mechanism</strong>: <code>rte_eth_rx_burst</code> fetches packets in batches (default size 32). While processing packet N, the driver executes compiler assembly prefetch instructions (<code>rte_prefetch0()</code>) to load packet N+1's header into the L1 CPU Cache, hiding latency.</li><li>  <strong>Application Strategy</strong>: Ensure packet processing loops make use of batching and prefetching to hide memory bus latency during packet analysis.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "PMD & Burst I/O", "color": "#B58A7D", "title": "CPU Thread Pinning & isolcpus Isolation", "body": "<li>  <strong>Technical Mechanism</strong>: Although CPU affinity binds threads, the kernel scheduler can still dispatch system timers, interrupts, or other tasks onto PMD cores, causing micro-second latency spikes.</li><li>  <strong>Application Strategy</strong>: Configure <code>isolcpus=2-7 rcu_nocbs=2-7 nohz_full=2-7</code> in the boot grub loader to isolate worker cores from system task scheduling.</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "mbuf & Pipeline", "color": "#5F7582", "title": "rte_mbuf Metadata Layout & Cacheline Optimization", "body": "<li>  <strong>Technical Mechanism</strong>: <code>struct rte_mbuf</code> spans exactly two cachelines (128B). Cacheline 0 contains critical data path parameters (<code>buf_addr</code>, <code>buf_iova</code>, <code>data_len</code>, <code>pool</code>) to ensure a single cache miss loads all necessary info during receipt.</li><li>  <strong>Application Strategy</strong>: Do not insert custom variables into Cacheline 0. Use the predefined <code>udata64</code> field or store metadata in the packet data headroom.</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "mbuf & Pipeline", "color": "#5F7582", "title": "mbuf Headroom & Tailroom Layout", "body": "<li>  <strong>Technical Mechanism</strong>: The mbuf buffer layout is structured as: <code>[rte_mbuf] -> [Headroom] -> [Packet Data] -> [Tailroom]</code>. Headroom (default 128B) is reserved space to prepend protocol encapsulations (like VXLAN or GRE headers) without moving data.</li><li>  <strong>Application Strategy</strong>: Use <code>rte_pktmbuf_prepend()</code> to adjust headroom pointers, avoiding memory moves when adding network wrappers.</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "mbuf & Pipeline", "color": "#5F7582", "title": "mbuf Packet Cloning (rte_pktmbuf_clone) & Reference Counting", "body": "<li>  <strong>Technical Mechanism</strong>: Cloning creates a new mbuf metadata struct pointing to the same data segment inside hugepage memory, incrementing the data block's reference counter (<code>refcnt</code>).</li><li>  <strong>Application Strategy</strong>: The clone is freed via <code>rte_pktmbuf_free()</code>, which decrements <code>refcnt</code>. Memory is recycled only when <code>refcnt</code> drops to 0, enabling zero-copy multicasting.</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "mbuf & Pipeline", "color": "#5F7582", "title": "Run-to-completion Processing Model", "body": "<li>  <strong>Technical Mechanism</strong>: A single Lcore handles polling, packet parsing, routing lookup, offload configuration, and transmission. This model avoids inter-thread communication, locking, or queue overheads, keeping packet context in local L1/L2 caches.</li><li>  <strong>Application Strategy</strong>: Use this model for lightweight packet processing to achieve the highest throughput and lowest latency.</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "mbuf & Pipeline", "color": "#5F7582", "title": "Pipeline Core Distribution Model & rte_ring bottlenecks", "body": "<li>  <strong>Technical Mechanism</strong>: Divides complex logic (e.g. firewall, crypto, routing) into pipeline stages running on different cores. Packet pointers travel between cores via lockless <code>rte_ring</code> instances.</li><li>  <strong>Application Strategy</strong>: Cross-core queue moves introduce L3 cache migration and CAS contention. Map workloads to minimize inter-core ring hops.</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "mbuf & Pipeline", "color": "#5F7582", "title": "DPDK ACL (Access Control List) Trie Match Algorithm", "body": "<li>  <strong>Technical Mechanism</strong>: The <code>librte_acl</code> library compiles multi-dimensional firewall rules (5-tuple) into a multi-bit Trie trie structure. Searching rules scales to O(1), bypassing linear loop iterations.</li><li>  <strong>Application Strategy</strong>: Prefer DPDK's optimized ACL implementation for userspace firewalls and packet gateways to handle large rule sets at wire speed.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "NIC Offloads & SR-IOV", "color": "#BFA88F", "title": "RSS (Receive Side Scaling) Symmetric Toeplitz Hash Splitting", "body": "<li>  <strong>Technical Mechanism</strong>: RSS calculates a Toeplitz hash over packet IP/Port values in hardware, mapping packets to specific RX descriptor queues on the host to distribute incoming load.</li><li>  <strong>Application Strategy</strong>: Configure symmetric RSS keys to ensure bi-directional packet flows (e.g., source and destination flipped) land on the same RX queue and worker thread.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "NIC Offloads & SR-IOV", "color": "#BFA88F", "title": "FDIR (Flow Director) Flow Rules & Direct Core Steering", "body": "<li>  <strong>Technical Mechanism</strong>: FDIR provides precise ASIC matching rules (e.g. routing source IP 10.0.0.1 TCP port 80 to Queue 4). The NIC redirects matched traffic, bypassing CPU-based software filtering.</li><li>  <strong>Application Strategy</strong>: Configure flow rules via the <code>rte_flow</code> API to isolate specific traffic classes directly on dedicated worker cores.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "NIC Offloads & SR-IOV", "color": "#BFA88F", "title": "IP/TCP/UDP Checksum Offloading & L3/L4 Pre-calculation", "body": "<li>  <strong>Technical Mechanism</strong>: Instead of processing checksum additions in software, set offload flags (e.g. <code>RTE_MBUF_F_TX_IP_CKSUM</code>) on the mbuf. The hardware NIC recalculates and writes checksums during the DMA step.</li><li>  <strong>Application Strategy</strong>: Clear IP header checksums to 0 in software and set mbuf offload flags to bypass software loop checksum calculations.</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "NIC Offloads & SR-IOV", "color": "#BFA88F", "title": "TSO (TCP Segmentation Offload) & DMA Segmentation", "body": "<li>  <strong>Technical Mechanism</strong>: CPU submits a large TCP frame (up to 64KB) with TSO enabled. The NIC DMA hardware segments the packet into MTU-sized frames, duplicating the IP/TCP headers on the fly.</li><li>  <strong>Application Strategy</strong>: Enable TSO in the device tx capabilities to offload TCP packet segmentation, saving significant CPU cycles on outbound flows.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "NIC Offloads & SR-IOV", "color": "#BFA88F", "title": "SR-IOV (Single Root I/O Virtualization) & PF/VF Direct Pass-through", "body": "<li>  <strong>Technical Mechanism</strong>: Splitting a physical function (PF) NIC into virtual functions (VF). Each VF behaves as a standalone PCIe device, passed directly into VMs or containers.</li><li>  <strong>Application Strategy</strong>: Use SR-IOV to bypass hypervisor virtual switch software layers, achieving near-native line rate performance within VMs.</li>"}];
        let activeModule = 'ALL';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            cards.forEach(c => {
                const matchesSearch = c.title.toLowerCase().includes(query) || c.body.toLowerCase().includes(query);
                const matchesModule = activeModule === 'ALL' || c.module === activeModule;

                if (matchesSearch && matchesModule) {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.borderLeft = `4px solid ${c.color}`;
                    el.innerHTML = `
                        <div class="card-header">
                            <span class="card-id" style="background-color: ${c.color}22; color: ${c.color}">${c.relativeId}</span>
                            <h3 class="card-title">${c.title}</h3>
                        </div>
                        <div class="card-body">
                            ${c.body}
                        </div>
                        <div class="card-footer">
                            <span>${c.moduleName}</span>
                            <span style="color: ${c.color}">Card #${c.id}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                }
            });
        }

        function filterModule(mod) {
            activeModule = mod;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(mod) || (mod === 'ALL' && btn.innerText === 'ALL')) {
                    btn.classList.add('active');
                }
            });
            renderCards();
        }

        document.getElementById('search').addEventListener('input', renderCards);
        renderCards();
    </script>
</body>
</html>
