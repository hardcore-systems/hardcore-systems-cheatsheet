lth Checking\uff09\u7531 Envoy \u540e\u53f0\u7ebf\u7a0b\u5b9a\u65f6\u53d1\u8d77\u72ec\u7acb\u7684\u5065\u5eb7\u55c5\u63a2\u5305\uff08\u5982\u53d1\u9001 <code>GET /healthz</code> \u6216\u6267\u884c TCP \u8fde\u63a5\uff09\u3002\u53ea\u6709\u5f53\u7aef\u8282\u70b9\u8fde\u7eed\u6210\u529f N \u6b21\u540e\u624d\u5141\u8bb8\u91cd\u65b0\u52a0\u5165\u6d41\u91cf\u5206\u53d1\uff0c\u9632\u6b62\u6545\u969c\u8282\u70b9\u521a\u91cd\u542f\u5c1a\u672a\u5c31\u7eea\u5c31\u5206\u914d\u5927\u6d41\u91cf\u3002</li><li>  <strong>\u5e94\u7528\u7b56\u7565</strong>: \u5efa\u8bae\u5728\u5173\u952e\u6838\u5fc3\u670d\u52a1\u4e0a\u8054\u5408\u542f\u7528\u4e3b\u52a8\u548c\u88ab\u52a8\u5bb9\u707e\uff0c\u5e76\u5728\u63a2\u9488\u63a5\u53e3\u4e2d\u5f15\u5165\u8f7b\u91cf\u7ea7\u7684\u4f9d\u8d56\u6570\u636e\u5e93\u68c0\u67e5\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u5f39\u6027\u8bbe\u8ba1\uff1a\u7194\u65ad\u3001\u91cd\u8bd5\u4e0e\u9650\u6d41", "color": "#BFA88F", "title": "\u91cd\u8bd5\u9884\u7b97 (Retry Budgets) \u7b97\u6cd5\u9650\u5236\u4e0e\u91cd\u8bd5\u96ea\u5d29\u9632\u5fa1", "body": "<li>  <strong>\u6280\u672f\u673a\u5236</strong>: \u5982\u679c\u4e0a\u6e38\u5927\u91cf\u8d85\u65f6\uff0c\u5ba2\u6237\u7aef\u7684\u91cd\u8bd5\u8bf7\u6c42\u4f1a\u5728\u7f51\u5173\u5904\u5f62\u6210\u6d41\u91cf\u653e\u5927\u3002Envoy \u91cd\u8bd5\u9884\u7b97\u673a\u5236\u9650\u5236\uff1a\u6240\u6709\u91cd\u8bd5\u8bf7\u6c42\u6240\u5360\u603b\u6b63\u5e38\u8bf7\u6c42\u7684\u6bd4\u4f8b\u4e0d\u80fd\u8d85\u8fc7\u9884\u8bbe\u503c\uff08\u9ed8\u8ba4 <code>20%</code>\uff09\u3002\u4e00\u65e6\u91cd\u8bd5\u6d41\u91cf\u8d85\u51fa\u8fd9\u4e2a\u6bd4\u4f8b\uff0c\u8bf4\u660e\u540e\u7aef\u5df2\u5927\u9762\u79ef\u762b\u75ea\uff0c\u7f51\u5173\u5f3a\u884c\u62e6\u622a\u540e\u7eed\u91cd\u8bd5\uff0c\u9632\u6b62\u62d6\u57ae\u6574\u4e2a\u96c6\u7fa4\u3002</li><li>  <strong>\u5e94\u7528\u7b56\u7565</strong>: \u4e91\u539f\u751f\u73af\u5883\u4e0b\u9632\u6b62\u5fae\u670d\u52a1\u5fae\u670d\u52a1\u8c03\u7528\u4ea7\u751f\u96ea\u5d29\u6548\u5e94\u7684\u5f3a\u5236\u6700\u4f73\u5b9e\u8df5\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u5f39\u6027\u8bbe\u8ba1\uff1a\u7194\u65ad\u3001\u91cd\u8bd5\u4e0e\u9650\u6d41", "color": "#BFA88F", "title": "\u5c40\u90e8\u9650\u6d41\u4e0e\u5206\u5e03\u5f0f\u5168\u5c40\u9650\u6d41\u5bf9\u6bd4", "body": "<li>  <strong>\u6280\u672f\u673a\u5236</strong>: \u5c40\u90e8\u9650\u6d41\uff08Local Rate Limiting\uff09\u7531 Envoy \u8fc7\u6ee4\u5668\u5728\u672c\u5730\u5185\u5b58\u4e2d\u901a\u8fc7\u4ee4\u724c\u6876\uff08Token Bucket\uff09\u7b97\u6cd5\u5b9e\u73b0\uff0c\u65e0\u4efb\u4f55\u5916\u90e8 I/O \u4ea4\u4e92\uff0c\u6027\u80fd\u6781\u9ad8\uff1b\u5168\u5c40\u9650\u6d41\uff08Global Rate Limiting\uff09\u5219\u9700\u8981\u901a\u8fc7\u5f02\u6b65 gRPC \u53d1\u8d77\u5bf9\u5206\u5e03\u5f0f\u5916\u90e8\u96c6\u7fa4\uff08\u901a\u5e38\u4e3a Redis \u5b9e\u4f8b\uff09\u7684\u8bf7\u6c42\uff0c\u5177\u6709\u5168\u5c40\u51c6\u786e\u6027\u4f46\u4f1a\u5e26\u6765\u7f51\u7edc\u5f00\u9500\u3002</li><li>  <strong>\u5e94\u7528\u7b56\u7565</strong>: \u63a8\u8350\u5728\u7f51\u5173\u8fb9\u754c\u5c06\u4e24\u8005\u7ed3\u5408\u4f7f\u7528\uff1a\u5c40\u90e8\u9650\u6d41\u7528\u4e8e\u9632\u6b62\u6076\u610f\u7684 DDoS \u6d41\u91cf\u7206\u7834\uff1b\u5168\u5c40\u9650\u6d41\u7528\u4e8e\u6267\u884c\u7cbe\u7ec6\u7684\u5546\u4e1a\u4e1a\u52a1\u7ea7\u914d\u989d\u7ba1\u63a7\u3002</li>"}];
        let activeModule = 'ALL';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            cards.forEach(c => {
                const matchesSearch = c.title.toLowerCase().includes(query) || c.body.toLowerCase().includes(query);
                const matchesModule = activeModule === 'ALL' || c.module === activeModule;

                if (matchesSearch && matchesModule) {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.borderLeft = `4px solid ${c.color}`;
                    el.innerHTML = `
                        <div class="card-header">
                            <span class="card-id" style="background-color: ${c.color}22; color: ${c.color}">${c.relativeId}</span>
                            <h3 class="card-title">${c.title}</h3>
                        </div>
                        <div class="card-body">
                            ${c.body}
                        </div>
                        <div class="card-footer">
                            <span>${c.moduleName}</span>
                            <span style="color: ${c.color}">Card #${c.id}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                }
            });
        }

        function filterModule(mod) {
            activeModule = mod;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(mod) || (mod === 'ALL' && btn.innerText === 'ALL')) {
                    btn.classList.add('active');
                }
            });
            renderCards();
        }

        document.getElementById('search').addEventListener('input', renderCards);
        renderCards();
    </script>
