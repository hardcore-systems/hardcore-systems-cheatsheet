    <style>
        :root {

            --card-bg: #161820;

            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;

            letter-spacing: -1px;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-badge span.num {
            color: var(--accent-color);
            font-weight: 700;
        }
        .filter-controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 300px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent-color);
        }
        .filter-btn {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: #94a3b8;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .filter-btn:hover {
            color: var(--text-color);
            background-color: #2e3b4e;
        }

            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .grid {

            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .card-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            color: white;
            text-transform: uppercase;
        }
        .card-id {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: white;
        }
        .card-body {
            font-size: 0.9rem;
            color: #cbd5e1;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.75rem;
        }

            list-style-type: none;
            padding-left: 1.2rem;
            position: relative;
            margin-bottom: 0.5rem;
        }
        .card-body li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-color);
            font-weight: bold;
        }
        .card-body code {
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            font-family: monospace;
            color: #f43f5e;
        }
    </style>
</head>

        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "\u5206\u5e03\u5f0f\u67e5\u8be2\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "TCP/HTTP \u539f\u751f\u534f\u8bae\u4e0e\u62a5\u6587\u4ea4\u4e92 (Network Protocol)", "body": "<li>  <strong>\u53cc\u91cd\u534f\u8bae\u7f51\u5173</strong>\uff1aClickHouse \u540c\u65f6\u652f\u6301\u9ad8\u6548\u7387\u7684\u539f\u751f TCP \u534f\u8bae\uff08\u9ed8\u8ba4 9000 \u7aef\u53e3\uff09\u548c\u517c\u5bb9\u6027\u6781\u4f73\u7684 HTTP \u534f\u8bae\uff08\u9ed8\u8ba4 8123 \u7aef\u53e3\uff09\u3002</li><li>  <strong>\u5757\u7ea7\u62a5\u6587\u5e8f\u5217\u5316</strong>\uff1a\u539f\u751f TCP \u91c7\u7528\u81ea\u7814\u4e8c\u8fdb\u5236\u534f\u8bae\uff0c\u6570\u636e\u62a5\u6587\u6309 Block\uff08\u5217\u5f0f\u5757\uff09\u8fdb\u884c\u7d27\u51d1\u5e8f\u5217\u5316\u4f20\u8f93\uff0c\u6700\u5927\u7a0b\u5ea6\u538b\u69a8\u7f51\u5361\u5e26\u5bbd\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "\u5206\u5e03\u5f0f\u67e5\u8be2\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "\u4e24\u9636\u6bb5\u5206\u5e03\u5f0f\u67e5\u8be2\u6267\u884c\u4e0b\u63a8 (Distributed Query Executor)", "body": "<li>  <strong>\u5206\u5e03\u5f0f AST \u5206\u53d1</strong>\uff1a\u5206\u5e03\u5f0f\u8868\uff08Distributed Engine\uff09\u63a5\u6536\u67e5\u8be2\u540e\uff0c\u89e3\u6790\u4e3a\u5206\u5e03\u5f0f\u6267\u884c\u8ba1\u5212\u3002</li><li>  <strong>\u672c\u5730\u5e76\u884c\u6c47\u603b</strong>\uff1a\u7b2c\u4e00\u9636\u6bb5\u5c06 Query \u91cd\u5199\uff0c\u4e0b\u63a8\uff08Pushdown\uff09\u81f3\u5404 Shard \u8282\u70b9\u5e76\u884c\u6267\u884c\u672c\u5730\u8ba1\u7b97\uff1b\u7b2c\u4e8c\u9636\u6bb5\u7531 Coordinator \u8282\u70b9\u62c9\u53d6\u5404 Shard \u7684\u4e2d\u95f4\u805a\u5408\u7ed3\u679c\uff08\u5982 Hash \u69fd\u6bb5\uff09\u8fdb\u884c\u5168\u5c40\u5f52\u5e76\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "\u5206\u5e03\u5f0f\u67e5\u8be2\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "Shard / Replica \u62d3\u6251\u8def\u7531\u9009\u62e9 (Topology Routing)", "body": "<li>  <strong>\u903b\u8f91\u5206\u7247\u4e0e\u7269\u7406\u526f\u672c</strong>\uff1aCluster \u5728\u914d\u7f6e\u4e2d\u5b9a\u4e49\u5206\u7247\uff08Shard\uff09\u548c\u526f\u672c\uff08Replica\uff09\u3002</li><li>  <strong>\u52a8\u6001\u8def\u7531\u63a2\u6d4b</strong>\uff1a\u5199\u5165\u5206\u5e03\u5f0f\u8868\u65f6\uff0c\u6839\u636e <code>sharding_key</code> \u54c8\u5e0c\u503c\u8fdb\u884c\u8def\u7531\u5206\u914d\u3002\u67e5\u8be2\u65f6\uff0cCoordinator \u81ea\u52a8\u63a2\u6d4b\u526f\u672c\u5ef6\u8fdf\uff0c\u4f18\u5148\u8def\u7531\u81f3\u5ef6\u8fdf\u6700\u4f4e\u7684 Active Replica \u8282\u70b9\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "\u5206\u5e03\u5f0f\u67e5\u8be2\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "ClickHouse FDW \u5916\u90e8\u8868\u5f15\u64ce\u6302\u8f7d (Foreign Data Wrapper)", "body": "<li>  <strong>\u5f02\u6784\u8054\u90a6\u6302\u8f7d</strong>\uff1a\u652f\u6301 <code>MySQL</code>\u3001<code>PostgreSQL</code>\u3001<code>ODBC</code>\u3001<code>HDFS</code> \u7b49\u5916\u90e8\u5f15\u64ce\u3002</li><li>  <strong>\u7b97\u5b50\u7269\u7406\u4e0b\u63a8</strong>\uff1a\u5728\u6267\u884c\u8054\u90a6\u67e5\u8be2\u65f6\uff0cCH \u4f18\u5316\u5668\u89e3\u6790 Where \u8fc7\u6ee4\u6761\u4ef6\u548c Limit \u9650\u5236\uff0c\u5c06\u5176\u8f6c\u5316\u4e3a SQL \u4e0b\u63a8\u5230\u8fdc\u7aef\u6570\u636e\u5e93\u6267\u884c\uff0c\u907f\u514d\u5168\u8868\u62c9\u53d6\u3002</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "\u5411\u91cf\u5316\u6267\u884c\u4e0e\u9759\u6001\u4f18\u5316", "color": "#7D8F7B", "title": "ColumnVector \u5185\u5b58\u7269\u7406\u8fde\u7eed\u5bf9\u9f50 (Column Vector Layout)", "body": "<li>  <strong>\u5185\u5b58\u6570\u7ec4\u8fde\u7eed\u6027</strong>\uff1a\u5217\u5f0f\u6570\u636e\u5728\u5185\u5b58\u4e2d\u8868\u793a\u4e3a <code>ColumnVector</code> \u7ed3\u6784\u3002\u5185\u90e8\u4f7f\u7528\u4e00\u7247\u8fde\u7eed\u7684 C++ \u539f\u59 64cd\u4f5c\u62c9\u53d6\u5230\u672c\u5730\u7684 <code>replication_queue</code> \u961f\u5217\u3002</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "\u526f\u672c\u590d\u5236\u4e0e ZooKeeper \u534f\u540c", "color": "#5F7582", "title": "Replication Queue \u4e0e Parts \u5f02\u6b65\u62c9\u53d6 (Replication Queue)", "body": "<li>  <strong>\u4e0b\u8f7d\u4efb\u52a1\u6d41\u6c34\u7ebf</strong>\uff1a\u526f\u672c\u89e3\u6790 <code>replication_queue</code> \u4e2d\u7684\u4efb\u52a1\u3002</li><li>  <strong>HTTP \u76f4\u8fde\u62c9\u53d6</strong>\uff1a\u82e5\u53d1\u73b0\u7f3a\u5931\u67d0\u4e9b Parts\uff0c\u5e76\u4e0d\u901a\u8fc7 ZK \u4f20\u8f93\uff0c\u800c\u662f\u901a\u8fc7\u672c\u5730\u914d\u7f6e\u7684\u7aef\u53e3\uff0c\u76f4\u63a5\u901a\u8fc7 HTTP \u534f\u8bae\u4ece\u542b\u6709\u8be5 Part \u7684\u4e3b\u526f\u672c\u62c9\u53d6 bin \u538b\u7f29\u6570\u636e\uff0c\u7136\u540e\u672c\u5730\u52a0\u8f7d\u5e76\u4e0a\u62a5 ZK\u3002</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "\u526f\u672c\u590d\u5236\u4e0e ZooKeeper \u534f\u540c", "color": "#5F7582", "title": "\u5206\u5e03\u5f0f ON CLUSTER DDL \u5de5\u4f5c\u6d41 (DDLWorker)", "body": "<li>  <strong>\u5168\u5c40\u4efb\u52a1\u5206\u53d1</strong>\uff1a\u6267\u884c <code>DDL ON CLUSTER</code> \u65f6\uff0c\u4e3b Backend \u5c06 DDL \u6587\u672c\u5e8f\u5217\u5316\u5199\u5165 ZK \u7684 <code>/query_log/</code> \u8282\u70b9\u3002</li><li>  <strong>\u5404\u8282\u70b9\u5f02\u6b65\u76d1\u542c\u6d88\u8d39</strong>\uff1a\u6bcf\u4e2a\u526f\u672c\u8282\u70b9\u7684 <code>DDLWorker</code> \u7ebf\u7a0b\u76d1\u542c\u5230\u65b0\u4efb\u52a1\u540e\uff0c\u5728\u672c\u5730\u6267\u884c\u8be5 DDL\uff0c\u5e76\u5c06\u6267\u884c\u7ed3\u679c\u5199\u56de ZK \u5bf9\u5e94\u5b50\u8282\u70b9\uff0c\u4f9b Coordinator \u6536\u96c6\u6c47\u603b\u3002</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "\u526f\u672c\u590d\u5236\u4e0e ZooKeeper \u534f\u540c", "color": "#5F7582", "title": "ClickHouse Keeper \u66ff\u4ee3 ZooKeeper \u5b9e\u73b0 (CH Keeper)", "body": "<li>  <strong>\u6d88\u9664\u5916\u90e8\u4f9d\u8d56\u5f00\u9500</strong>\uff1aClickHouse \u5185\u7f6e <code>CH Keeper</code>\u3002</li><li>  <strong>RAFT \u534f\u8bae\u95ed\u73af</strong>\uff1a\u91c7\u7528 C++ \u5b9e\u73b0\u7684 RAFT \u5171\u8bc6\u7b97\u6cd5\uff0c\u5b8c\u5168\u517c\u5bb9 ZooKeeper \u534f\u8bae\u63a5\u53e3\uff0c\u4f46\u5728\u5185\u5b58\u5f00\u9500\u3001\u8bfb\u5199\u541e\u5410\u548c\u8fde\u63a5\u7a33\u5b9a\u6027\u4e0a\u663e\u8457\u4f18\u4e8e Java \u7f16\u5199\u7684 ZK\u3002</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "\u526f\u672c\u590d\u5236\u4e0e ZooKeeper \u534f\u540c", "color": "#5F7582", "title": "ZK \u65ad\u8fde\u526f\u672c Read-Only \u5b89\u5168\u964d\u7ea7 (ZK Connection Loss)", "body": "<li>  <strong>\u4f1a\u8bdd\u8d85\u65f6\u9632\u8111\u88c2</strong>\uff1a\u5f53\u526f\u672c\u4e0e ZooKeeper \u96c6\u7fa4\u65ad\u5f00\u8fde\u63a5\uff0c\u4e14\u4f1a\u8bdd\u8d85\u65f6\uff08Session Timeout\uff09\u65f6\u3002</li><li>  <strong>\u81ea\u52a8\u5199\u62e6\u622a\u964d\u7ea7</strong>\uff1a\u8be5\u526f\u672c\u4f1a\u81ea\u52a8\u5c06\u81ea\u8eab\u72b6\u6001\u964d\u7ea7\u4e3a <code>Read-only</code>\uff0c\u62e6\u622a\u4e00\u5207 INSERT \u5199\u5165\uff0c\u9632\u6b62\u8111\u88c2\u5bfc\u81f4\u591a\u526f\u672c\u6570\u636e\u6c38\u4e45\u5206\u53c9\u3002</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "\u6570\u636e\u7269\u7406\u5e03\u5c40\u4e0e\u538b\u7f29\u7f16\u7801", "color": "#BFA88F", "title": "Chunk \u4e0e Block \u5185\u5b58\u7269\u7406\u5bb9\u5668 (Memory Chunk)", "body": "<li>  <strong>\u7eaf\u7cb9\u5217\u5bb9\u5668</strong>\uff1a<code>Chunk</code> \u662f ClickHouse \u6267\u884c\u5f15\u64ce\u5728\u5185\u5b58\u4e2d\u4f20\u8f93\u7684\u7269\u7406\u5bb9\u5668\uff0c\u5305\u542b\u4e00\u7ec4 <code>Column</code> \u5217\u5411\u91cf\u548c\u884c\u6570\u3002</li><li>  <strong>Block \u5934\u5b9a\u4e49\u5143\u6570\u636e</strong>\uff1a<code>Block</code> \u662f Chunk \u7684\u8d85\u96c6\uff0c\u8ffd\u52a0\u4e86\u6bcf\u4e00\u5217\u7684\u540d\u79f0\u3001\u7c7b\u578b\u548c OID \u7b49 Header \u5143\u4fe1\u606f\uff0c\u4f5c\u4e3a\u8f93\u5165\u8f93\u51fa\u7684\u903b\u8f91\u8fb9\u754c\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u6570\u636e\u7269\u7406\u5e03\u5c40\u4e0e\u538b\u7f29\u7f16\u7801", "color": "#BFA88F", "title": "Compressed Block \u7269\u7406\u538b\u7f29\u94fe\u7ed3\u6784 (Compression Block)", "body": "<li>  <strong>\u6bb5\u843d\u5757\u5f0f\u7ed3\u6784</strong>\uff1a<code>.bin</code> \u6587\u4ef6\u7269\u7406\u4e0a\u7531\u591a\u4e2a\u8fde\u7eed\u7684 Compressed Block \u62fc\u63a5\u800c\u6210\u3002</li><li>  <strong>\u5757\u5934\u957f\u5ea6\u5b9a\u4e49</strong>\uff1a\u6bcf\u4e2a Compressed Block \u5934\u5305\u542b 1 \u5b57\u8282\u538b\u7f29\u7b97\u6cd5\u6807\u8bc6\u30014 \u5b57\u8282\u538b\u7f29\u540e\u957f\u5ea6\u30014 \u5b57\u8282\u89e3\u538b\u540e\u957f\u5ea6\u3002\u89e3\u538b\u65f6\u4ee5\u6574\u4e2a Block \u4e3a\u6700\u5c0f\u7269\u7406\u5355\u4f4d\u8f7d\u5165\u5185\u5b58\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u6570\u636e\u7269\u7406\u5e03\u5c40\u4e0e\u538b\u7f29\u7f16\u7801", "color": "#BFA88F", "title": "LZ4 \u4e0e ZSTD \u538b\u7f29\u7b97\u6cd5\u9009\u578b\u6298\u8877 (LZ4 vs ZSTD Codecs)", "body": "<li>  <strong>\u9ad8\u541e\u5410\u4f4e\u5ef6\u8fdf\u9009 LZ4</strong>\uff1a\u9ed8\u8ba4\u538b\u7f29\u7b97\u6cd5\uff0c\u89e3\u538b\u901f\u5ea6\u6781\u5feb\uff08\u6570 GB/s\uff09\uff0c\u9002\u5408\u9ad8\u9891\u70ed\u6570\u636e\u67e5\u8be2\uff0c\u4f46\u538b\u7f29\u6bd4\u4e00\u822c\u3002</li><li>  <strong>\u9ad8\u538b\u7f29\u9009 ZSTD</strong>\uff1a\u9002\u5408\u51b7\u6570\u636e\u5f52\u6863\uff0c\u538b\u7f29\u6bd4\u6781\u9ad8\uff0c\u80fd\u8282\u7701 30% \u4ee5\u4e0a\u78c1\u76d8\u7a7a\u95f4\uff0c\u4f46\u89e3\u538b\u548c\u538b\u7f29\u65f6 CPU \u5f00\u9500\u8f83\u5927\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u6570\u636e\u7269\u7406\u5e03\u5c40\u4e0e\u538b\u7f29\u7f16\u7801", "color": "#BFA88F", "title": "Specialized Codecs \u7269\u7406\u5217\u7ea7\u7f16\u7801 (Specialized Codecs)", "body": "<li>  <strong>\u7c7b\u578b\u5b9a\u5236\u7f16\u7801</strong>\uff1a</li><li>1.  <strong>DoubleDelta / Gorilla</strong>\uff1a\u9488\u5bf9\u65f6\u95f4\u6233\u3001\u9012\u589e ID \u6216\u65f6\u5e8f\u6d6e\u70b9\u6570\uff0c\u4ec5\u5b58\u50a8\u5dee\u503c\u7684\u5dee\u503c\uff0c\u538b\u7f29\u6bd4\u5448\u6307\u6570\u7ea7\u63d0\u5347\u3002</li><li>2.  <strong>T64</strong>\uff1a\u9488\u5bf9\u6574\u578b\uff0c\u901a\u8fc7\u65cb\u8f6c\u77e9\u9635\u53bb\u9664\u9ad8\u4f4d\u5197\u4f59\u7684 0 \u5360\u4f4d\u7b26\uff0c\u6781\u9002\u5408\u4f4e\u57fa\u6570\u5b57\u6bb5\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u6570\u636e\u7269\u7406\u5e03\u5c40\u4e0e\u538b\u7f29\u7f16\u7801", "color": "#BFA88F", "title": "Too Many Parts \u5199\u5165\u9650\u6d41\u6296\u52a8\u4fdd\u62a4 (Too Many Parts Protection)", "body": "<li>  <strong>\u5199\u7f13\u51b2\u5d29\u6e83\u4fdd\u62a4</strong>\uff1a\u5982\u679c MergeTree \u5206\u533a\u5185\u7684 Parts \u6570\u91cf\u8d85\u8fc7 <code>parts_to_delay_insert</code>\uff08\u9ed8\u8ba4 150\uff09\uff0c\u5199\u5165\u4f1a\u6545\u610f Stall \u5ef6\u8fdf\uff1b\u8d85 <code>parts_to_throw_insert</code>\uff08\u9ed8\u8ba4 300\uff09\u5219\u76f4\u63a5\u62a5\u9519\u3002</li><li>  <strong>\u9632\u6b62\u78c1\u76d8\u88ab\u5199\u6b7b</strong>\uff1a\u8fd9\u4e00\u5f3a\u9650\u5236\u662f\u4e3a\u4e86\u9632\u6b62\u78c1\u76d8\u788e\u7247\u8fc7\u591a\uff0c\u5f3a\u8feb\u5ba2\u6237\u7aef\u63a7\u5236\u5199\u5165\u9891\u6b21\u3002</li>"}];
        let activeFilter = 'all';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            const searchVal = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            cards.forEach(card => {
                const matchesFilter = activeFilter === 'all' || card.module === activeFilter;
                const matchesSearch = card.title.toLowerCase().includes(searchVal) || card.body.toLowerCase().includes(searchVal);

                if (matchesFilter && matchesSearch) {
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card';
                    cardEl.style.borderTop = `4px solid ${card.color}`;
                    cardEl.innerHTML = `
                        <div class="card-header">
                            <span class="card-tag" style="background-color: ${card.color}">${card.relativeId}</span>
                            <span class="card-id">Card ${card.id}</span>
                        </div>
                        <h3 class="card-title">${card.title}</h3>
                        <div class="card-body">${card.body}</div>
                    `;
                    grid.appendChild(cardEl);
                }
            });
        }

        function setFilter(mod, btn) {
            activeFilter = mod;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        window.onload = renderCards;
    </script>
</body>
