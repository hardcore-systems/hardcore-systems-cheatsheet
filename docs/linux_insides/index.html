        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "\u5185\u6838\u542f\u52a8\u4e0e\u65e9\u671f\u5f15\u5bfc\u9636\u6bb5", "color": "#7A8B99", "title": "x86 \u5f15\u5bfc\u6247\u533a\u8f7d\u5165\u4e0e\u5b9e\u6a21\u5f0f\u5411\u957f\u6a21\u5f0f\u5207\u6362 (Boot to Long Mode)", "body": "<li>  <strong>\u5f15\u5bfc\u72b6\u6001\u8df3\u8f6c</strong>\uff1aBIOS/UEFI \u8bfb\u53d6\u78c1\u76d8 MBR\uff0c\u8f7d\u5165\u5f15\u5bfc\u88c5\u8f7d\u7a0b\u5e8f\uff08\u5982 GRUB\uff09\uff0c\u5c06\u5185\u6838 bzImage \u8bfb\u53d6\u5230\u5185\u5b58\uff0c\u968f\u540e\u8df3\u8f6c\u81f3 <code>boot/header.S</code> \u6c47\u7f16\u5165\u53e3\u3002</li><li>  <strong>64\u4f4d\u957f\u6a21\u5f0f\u8fc7\u6e21</strong>\uff1a\u6267\u884c 16 \u4f4d\u5b9e\u6a21\u5f0f\u81ea\u68c0\u540e\uff0c\u5f00\u542f CR0 \u5bc4\u5b58\u5668\u7684 PE \u4f4d\u5207\u6362\u5230 32 \u4f4d\u4fdd\u62a4\u6a21\u5f0f\uff1b\u968f\u540e\u5efa\u7acb\u4e24\u7ea7\u4e34\u65f6\u7269\u7406\u6620\u5c04\u9875\u8868\uff0c\u5c06 CR4 \u5bc4\u5b58\u5668\u7684 PAE \u4f4d\u7f6e 1\uff0c\u4fee\u6539 EFER MSR \u5bc4\u5b58\u5668\uff0c\u6700\u7ec8\u8fdb\u5165 64 \u4f4d\u957f\u6a21\u5f0f\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "\u5185\u6838\u542f\u52a8\u4e0e\u65e9\u671f\u5f15\u5bfc\u9636\u6bb5", "color": "#7A8B99", "title": "head_64.S \u6c47\u7f16\u521d\u59cb\u5316\u4e0e C \u8bed\u8a00\u5165\u53e3 (head_64.S to start_kernel)", "body": "<li>  <strong>\u6c47\u7f16\u6bb5\u81ea\u4e3e</strong>\uff1aCPU \u8fdb\u5165 64 \u4f4d\u540e\uff0c\u8df3\u8f6c\u5230 <code>arch/x86/kernel/head_64.S</code>\u3002\u5728\u8fd9\u91cc\u6267\u884c\u6700\u521d\u7684\u6c47\u7f16\u4ee3\u7801\uff1a\u6e05\u9664 BSS \u6bb5\u3001\u8bbe\u7f6e\u6bb5\u5bc4\u5b58\u5668\u3001\u5206\u914d\u4e34\u65f6\u7684\u5185\u6838\u6808\uff08Kernel Stack\uff09\u5e76\u52a0\u8f7d\u6b63\u5f0f\u7684 GDT/IDT \u6307\u9488\u3002</li><li>  <strong>\u8df3\u8f6c start_kernel</strong>\uff1a\u4e00\u5207\u5c31\u7eea\u540e\uff0c\u901a\u8fc7 <code>jmp</code> \u6307\u4ee4\u98de\u8d8a\u7269\u7406\u8fb9\u754c\uff0c\u8fdb\u5165\u5185\u6838\u771f\u6b63\u7684 C \u8bed\u8a00\u521d\u59cb\u5316\u603b\u5165\u53e3 <code>start_kernel()</code>\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "\u5185\u6838\u542f\u52a8\u4e0e\u65e9\u671f\u5f15\u5bfc\u9636\u6bb5", "color": "#7A8B99", "title": "setup_arch() \u4e0e E820 \u5185\u5b58\u5e03\u5c40\u63a2\u67e5 (setup_arch & E820)", "body": "<li>  <strong>\u7269\u7406\u5185\u5b58\u63a2\u67e5</strong>\uff1a<code>setup_arch()</code> \u63a5\u6536\u6765\u81ea bootloader \u7684 <code>boot_params</code> \u53c2\u6570\u3002\u901a\u8fc7\u8bfb\u53d6 E820 \u7269\u7406\u5185\u5b58\u8868\uff0c\u638c\u63e1\u5bbf\u4e3b\u673a\u7269\u7406\u5185\u5b58\u7684\u7a7a\u95f2\u4e0e\u4fdd\u7559\u8fb9\u754c\u3002</li><li>  <strong>memblock \u4e34\u65f6\u5206\u914d\u5668</strong>\uff1a\u5728\u6b63\u5f0f\u7684\u4f19\u4f34\u7cfb\u7edf\u5efa\u7acb\u524d\uff0c\u4f7f\u7528 <code>memblock</code> \u7ed3\u6784\u4f53\u8fdb\u884c\u7c97\u7c92\u5ea6\u7684\u7269\u7406\u5185\u5b58\u7ba1\u7406\u4e0e\u4fdd\u7559\u533a\u5212\u5b9a\uff0c\u9632\u6b62\u521d\u59cb\u5316\u9636\u6bb5\u5185\u6838\u5185\u5b58\u88ab\u81ea\u6211\u8986\u76d6\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "\u5185\u6838\u542f\u52a8\u4e0e\u65e9\u671f\u5f15\u5bfc\u9636\u6bb5", "color": "#7A8B99", "title": "init_IRQ() \u4e0e\u5185\u6838\u65e9\u671f\u9875\u8868\u63a5\u7ba1 (init_IRQ & Kernel Page Tables)", "body": "<li>  <strong>\u4e2d\u65ad\u673a\u5236\u521d\u59cb\u5316</strong>\uff1a<code>init_IRQ()</code> \u521d\u59cb\u5316\u4e2d\u65ad\u63cf\u8ff0\u7b26\u8868\uff08IDT\uff09\uff0c\u5199\u5165\u5185\u6838\u6b63\u5f0f\u7684\u8f6f\u786c\u4ef6\u4e2d\u65ad\u95e8\uff08Interrupt Gates\uff09\u3002</li><li>  <strong>\u63a5\u7ba1\u65e9\u671f\u9875\u8868</strong>\uff1a\u9500\u6bc1 bootloader \u5efa\u7acb\u7684\u4e34\u65f6\u7269\u7406\u9875\u8868\uff0c\u5207\u6362\u5230\u7531\u5185\u6838\u7f16\u8bd1\u671f\u9759\u6001\u5 trong>\uff1a\u63cf\u8ff0\u6587\u4ef6\u7cfb\u7edf\u5168\u5c40\u5143\u6570\u636e\uff08\u5982\u5757\u5927\u5c0f\uff0c\u6302\u8f7d\u70b9\uff09\u3002</li><li>2.  <strong>inode</strong>\uff1a\u4ee3\u8868\u5177\u4f53\u7684\u7269\u7406\u6587\u4ef6\u5b9e\u4f53\uff0c\u5305\u542b\u6587\u4ef6\u7269\u7406\u5757\u6307\u9488\u3002</li><li>3.  <strong>dentry</strong>\uff1a\u8868\u793a\u76ee\u5f55\u6811\u4e2d\u7684\u4e00\u4e2a\u8282\u70b9\uff08\u6587\u4ef6\u540d\u4e0e Inode \u7684\u7ed1\u5b9a\uff09\uff0c\u52a0\u901f\u8def\u5f84\u5bfb\u5740\u3002</li><li>4.  <strong>file</strong>\uff1a\u4ee3\u8868\u8fdb\u7a0b\u6253\u5f00\u7684\u4e00\u4e2a\u6587\u4ef6\u5b9e\u4f8b\uff0c\u5305\u542b\u5f53\u524d\u7684\u8bfb\u53d6\u8bfb\u5199\u504f\u79fb\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u865a\u62df\u6587\u4ef6\u7cfb\u7edf\u4e0e\u5757\u8bbe\u5907 I/O \u8c03\u5ea6", "color": "#BFA88F", "title": "file_operations \u865a\u8868\u4e0e\u8bbe\u5907\u6587\u4ef6\u5206\u53d1\u9a71\u52a8 (file_operations VFS)", "body": "<li>  <strong>\u591a\u6001\u591a\u8def\u6587\u4ef6\u64cd\u4f5c\u63a5\u53e3</strong>\uff1a<code>struct file</code> \u5185\u7f6e\u6307\u5411 <code>struct file_operations</code> \u7684\u6307\u9488\u865a\u8868\u3002</li><li>  <strong>\u9a71\u52a8\u6302\u8f7d\u6620\u5c04</strong>\uff1a\u5728\u6267\u884c <code>read()</code> \u7cfb\u7edf\u8c03\u7528\u65f6\uff0c\u5185\u6838\u5e76\u4e0d\u5173\u5fc3\u5177\u4f53\u5e95\u5c42\u7ec6\u8282\uff0c\u800c\u662f\u6267\u884c <code>file->f_op->read()</code>\u3002\u5bf9\u4e8e EXT4\uff0c\u8fd9\u6307\u5411 <code>ext4_file_read</code>\uff1b\u5bf9\u4e8e\u5b57\u7b26\u8bbe\u5907\uff08\u5982 <code>/dev/null</code>\uff09\uff0c\u5b83\u88ab\u9a71\u52a8\u7a0b\u5e8f\u63a5\u7ba1\u76f4\u63a5\u6307\u5411\u8bbe\u5907\u64cd\u4f5c\u51fd\u6570\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u865a\u62df\u6587\u4ef6\u7cfb\u7edf\u4e0e\u5757\u8bbe\u5907 I/O \u8c03\u5ea6", "color": "#BFA88F", "title": "struct bio \u7269\u7406\u7ed3\u6784\u4e0e bio_vec \u9875\u5207\u7247\u5411\u91cf (struct bio Layout)", "body": "<li>  <strong>\u5757\u8bbe\u5907 I/O \u7269\u7406\u5355\u5143</strong>\uff1aVFS \u53d1\u8d77\u6570\u636e\u4f20\u8f93\u65f6\uff0c\u5c06\u6587\u4ef6\u9875\u7ffb\u8bd1\u4e3a <code>struct bio</code> \u7ed3\u6784\uff0c\u5b83\u662f\u5757\u8bbe\u5907 I/O \u7684\u6838\u5fc3\u8f7d\u4f53\u3002</li><li>  <strong>\u805a\u5408\u5206\u6563 DMA \u6620\u5c04</strong>\uff1a<code>struct bio</code> \u5305\u542b <code>bio_vec</code> \u6570\u7ec4\uff0c\u6bcf\u4e2a\u5143\u7d20\u63cf\u8ff0\u4e00\u4e2a\u5185\u5b58\u7269\u7406 Page\u3001\u5757\u5185\u504f\u79fb\u548c\u5927\u5c0f\u3002DMA \u63a7\u5236\u5668\u5229\u7528\u6b64\u6570\u7ec4\u6267\u884c\u5206\u6563-\u805a\u96c6\uff08Scatter-Gather\uff09I/O\uff0c\u76f4\u63a5\u5c06\u591a\u4e2a\u4e0d\u8fde\u7eed\u7269\u7406\u9875\u5237\u5165\u78c1\u76d8\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u865a\u62df\u6587\u4ef6\u7cfb\u7edf\u4e0e\u5757\u8bbe\u5907 I/O \u8c03\u5ea6", "color": "#BFA88F", "title": "I/O \u8bf7\u6c42\u961f\u5217\u5408\u5e76\u4e0e\u8c03\u5ea6\u7b97\u6cd5 (I/O Scheduler queue)", "body": "<li>  <strong>\u78c1\u76d8\u5408\u5e76\u9632\u6296\u52a8</strong>\uff1aBIO \u5757\u8fdb\u5165\u8bf7\u6c42\u961f\u5217 <code>request_queue</code>\u3002\u8c03\u5ea6\u5668\u9996\u5148\u6267\u884c\u7535\u68af\u5408\u5e76\uff08Elevator Merge\uff09\uff0c\u5c06\u76f8\u90bb\u6247\u533a\uff08Sector\uff09\u7684\u591a\u4e2a BIO \u5408\u5e76\u4e3a\u5355\u4e2a\u5927 Request\u3002</li><li>  <strong>\u73b0\u4ee3\u591a\u961f\u5217\u8c03\u5ea6</strong>\uff1a\u73b0\u4ee3\u5185\u6838\u5f15\u5165 blk-mq\uff08\u591a\u961f\u5217\uff09\u6846\u67b6\uff0c\u4e3a\u6bcf\u4e2a CPU \u6838\u5fc3\u5206\u914d\u4e13\u5c5e\u7684\u8f6f\u4ef6\u961f\u5217\uff0c\u7ed3\u5408 BFQ\uff08\u591a\u961f\u5217\u516c\u5e73\u8c03\u5ea6\uff09\u6216 Kyber\uff0c\u6d88\u9664\u4e86\u5757\u8bbe\u5907\u5168\u5c40\u5927\u9501\u7684\u7ade\u4e89\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u865a\u62df\u6587\u4ef6\u7cfb\u7edf\u4e0e\u5757\u8bbe\u5907 I/O \u8c03\u5ea6", "color": "#BFA88F", "title": "mmap \u7269\u7406\u6587\u4ef6\u6620\u5c04\u4e0e Page Fault \u96f6\u62f7\u8d1d\u8bfb\u53d6 (mmap & Page Fault)", "body": "<li>  <strong>\u865a\u62df\u5185\u5b58\u533a\u95f4\u5efa\u7acb</strong>\uff1a<code>mmap</code> \u521b\u5efa\u4e00\u4e2a\u65b0\u7684\u865a\u62df\u5185\u5b58\u533a\u95f4\uff08<code>struct vm_area_struct</code>\uff09\uff0c\u5c06\u5176\u4e0e\u76ee\u6807\u6587\u4ef6 <code>i_mapping</code> \u7ed1\u5b9a\uff0c\u4f46\u5728\u9875\u8868\u4e2d\u4e0d\u5206\u914d\u7269\u7406\u9875\u3002</li><li>  <strong>\u7f3a\u9875\u5f02\u5e38\u96f6\u62f7\u8d1d</strong>\uff1a\u5f53\u7a0b\u5e8f\u9996\u6b21\u8bfb\u53d6\u8be5\u5185\u5b58\u5730\u5740\u65f6\uff0cCPU \u89e6\u53d1\u7f3a\u9875\u5f02\u5e38\uff08Page Fault\uff09\u3002\u5185\u6838\u6355\u6349\u8be5\u5f02\u5e38\uff0c\u4ece\u78c1\u76d8\u8bfb\u53d6\u5bf9\u5e94\u6587\u4ef6\u9875\u586b\u5165 Page Cache\uff0c\u76f4\u63a5\u5c06\u8be5 Page \u7684\u7269\u7406\u5730\u5740\u5199\u5165\u8fdb\u7a0b\u9875\u8868\uff0c\u5b9e\u73b0\u4e86\u96f6\u62f7\u8d1d\u76f4\u63a5\u8bfb\u5199\u3002</li>"}];
        let activeModule = 'ALL';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            cards.forEach(c => {
                const matchesSearch = c.title.toLowerCase().includes(query) || c.body.toLowerCase().includes(query);

                    el.innerHTML = `

                        <div class="card-footer">

                            <span style="color: ${c.color}">Card #${c.id}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                }
            });
        }

        function filterModule(mod) {
            activeModule = mod;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(mod) || (mod === 'ALL' && btn.innerText === 'ALL')) {
                    btn.classList.add('active');
                }
            });
            renderCards();
        }

        document.getElementById('search').addEventListener('input', renderCards);
