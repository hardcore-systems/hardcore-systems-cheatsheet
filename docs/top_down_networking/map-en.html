<!DOCTYPE html>
<html lang= + map_lang + >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content= + map_desc + >
    <title>Computer Networking Protocol Stack Architecture Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #24324f;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background-color: #111827;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-badge span.num {
            color: var(--accent-color);
            font-weight: 700;
        }
        .filter-controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 300px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent-color);
        }
        .filter-btn {
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: #94a3b8;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .filter-btn:hover {
            color: var(--text-color);
            background-color: #1e293b;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .card-id {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-color);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
            margin-left: 0.75rem;
        }
        .card-body {
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .card-body li {
            margin-left: 1.2rem;
            margin-bottom: 0.25rem;
        }
        .card-body code {
            background-color: rgba(0,0,0,0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-family: monospace;
            color: #f472b6;
        }
        .card-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <header>
        <h1>Computer Networking Map</h1>
        <p>High-density application sockets, TCP sliding windows, Cubic/BBR congestion rates, router Switch fabrics, and link CSMA/CD media access internals</p>
    </header>

    <div class="stats-bar">
        <div class="stat-badge">Core Cards: <span class="num">28</span></div>
        <div class="stat-badge">Category Modules: <span class="num">6</span></div>
        <div class="stat-badge">3-Level Filtering: <span class="num">L0➜L2</span></div>
        <div class="stat-badge">Zone T Commands: <span class="num">Zone T</span></div>
    </div>

    <div class="filter-controls">
        <input type="text" id="search" class="search-box" placeholder="Search cards (e.g. Socket, Window, Cubic, BGP, CSMA)...">
        <button class="filter-btn active" onclick="filterModule('ALL')">ALL</button>
        <button class="filter-btn" onclick="filterModule('M1')">M1 Applications</button>
        <button class="filter-btn" onclick="filterModule('M2')">M2 TCP Sliding</button>
        <button class="filter-btn" onclick="filterModule('M3')">M3 Congestion</button>
        <button class="filter-btn" onclick="filterModule('M4')">M4 IP Forwarding</button>
        <button class="filter-btn" onclick="filterModule('M5')">M5 AS Routing</button>
        <button class="filter-btn" onclick="filterModule('M6')">M6 Link MAC</button>
    </div>

    <div class="grid" id="cards-grid">
        <!-- Rendered by JS -->
    </div>

    <script>
        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Application & Sockets", "color": "#7A8B99", "title": "HTTP/1.x Head-of-Line Blocking vs HTTP/2 Multiplexing (`HTTP/1.1` vs `HTTP/2`)", "body": "<li>  <strong>Head-of-Line Blocking (HOL)</strong>: HTTP/1.1 allows request pipelining but requires responses to be returned in strict request order. A slow response blocks all subsequent requests on the TCP connection.</li><li>  <strong>Binary Framing</strong>: HTTP/2 splits application messages into binary frames (<code>HEADERS</code> and <code>DATA</code>) and embeds a Stream ID in each frame's header.</li><li>  <strong>Multiplexing</strong>: Interleaves frames from multiple independent streams over a single TCP connection. The receiver reassembles them using Stream IDs, resolving HOL blocking.</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Application & Sockets", "color": "#7A8B99", "title": "DNS Query Hierarchy & Truncation Controls (`DNS Hierarchy`)", "body": "<li>  <strong>Query Dual Control</strong>:</li><li>  <strong>Recursive Query</strong>: The client requests the Local DNS server to resolve a name. The server must query other servers on behalf of the client and return the final IP.</li><li>  <strong>Iterative Query</strong>: The Local DNS server queries Root, TLD, and Authoritative servers in turn, with each level returning the IP of the next server to query.</li><li>  <strong>Transport limits</strong>: Uses UDP port 53. If a response exceeds 512 bytes, the server sets the TC (Truncated) bit in the header, forcing the client to reconnect via TCP port 53.</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Application & Sockets", "color": "#7A8B99", "title": "BSD Socket APIs & Kernel Connection Mapping (`net/socket.c`)", "body": "<li>  <strong>Server Lifecycle</strong>: <code>socket()</code> allocates a file descriptor \u279c <code>bind()</code> binds the descriptor to an IP and port \u279c <code>listen()</code> transitions the socket to listening and configures half-open (SYN) and established connection queue limits.</li><li>  <strong>Accepting Connections</strong>: <code>accept()</code> blocks until a connection in the established queue is ready, returning a new socket descriptor for data transfer.</li><li>  <strong>Client Connection</strong>: <code>connect()</code> initiates the active TCP three-way handshake, setting the local socket state to <code>SYN_SENT</code>.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Application & Sockets", "color": "#7A8B99", "title": "epoll Multiplexing Level & Edge Triggering (`fs/eventpoll.c`)", "body": "<li>  <strong>O(1) Event retrieval</strong>: <code>epoll</code> avoids <code>select</code>/<code>poll</code>'s O(N) scanning of file descriptor lists by tracking sockets in a kernel red-black tree and storing active sockets in a double-linked Ready List.</li><li>  <strong>Triggering Modes</strong>:</li><li>  <strong>Level Triggered (LT)</strong>: <code>epoll_wait</code> keeps returning notifications as long as data remains in the socket buffer.</li><li>  <strong>Edge Triggered (ET)</strong>: Fires a notification only when the buffer state changes. Requires non-blocking sockets and looping reads/writes until returning <code>EAGAIN</code> to prevent missing events.</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "TCP Reliable Transport", "color": "#7D8F7B", "title": "Port Demultiplexing & Socket Binding (`net/ipv4/af_inet.c`)", "body": "<li>  <strong>Connectionless Demultiplexing (UDP)</strong>: Packets are routed using a 2-tuple (destination IP, destination Port). Packets from different sources targeting the same port enter the same socket buffer.</li><li>  <strong>Connection-Oriented Demultiplexing (TCP)</strong>: Routes packets using a 4-tuple (source IP, source Port, destination IP, destination Port).</li><li>  <strong>Multiple Sockets</strong>: Allows multiple concurrent connections to share the identical destination port on a host, with the kernel hash table routing to distinct sockets.</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "TCP Reliable Transport", "color": "#7D8F7B", "title": "Go-Back-N (GBN) Sliding Window & Cumulative ACKs (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>Window limit</strong>: Allows the sender to transmit up to $N$ unacknowledged segments, monitored by a single timer for the oldest sent but unacknowledged packet.</li><li>  <strong>Cumulative ACK</strong>: The receiver acknowledges only the highest in-order sequence number received (ACK $y$ implies all bytes up to $y$ are received), discarding out-of-order segments.</li><li>  <strong>Window Rollback</strong>: On timeout, the sender retransmits all $N$ unacknowledged segments currently in the window, degrading throughput on high-latency paths.</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "TCP Reliable Transport", "color": "#7D8F7B", "title": "Selective Repeat (SR) Buffering & Lock-Step Alignment (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>Per-Packet Timers</strong>: The sender manages a separate timer for each segment, retransmitting only the specific packet that timed out.</li><li>  <strong>Out-of-Order Buffering</strong>: The receiver window has size $N$ (satisfying $N \\le 2^{\\text{seq}-1}$ to avoid sequence number overlap), buffering out-of-order segments and sending individual non-cumulative ACKs.</li><li>  <strong>Slide Alignment</strong>: The receiver window slides forward only when the lowest unreceived segment is successfully received and acknowledged.</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "TCP Reliable Transport", "color": "#7D8F7B", "title": "RTT Estimation & RTO EWMA Calculations (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>Smoothed RTT</strong>: Measures SampleRTT from send to ACK.</li><li>  $\\text{EstimatedRTT} = (1 - \\alpha) \\times \\text{EstimatedRTT} + \\alpha \\times \\text{SampleRTT}$ ($\\alpha = 0.125$)</li><li>  <strong>Deviation Calculation</strong>:</li><li>  $\\text{DevRTT} = (1 - \\beta) \\times \\text{DevRTT} + \\beta \\times |\\text{SampleRTT} - \\text{EstimatedRTT}|$ ($\\beta = 0.25$)</li><li>  <strong>Timeout Interval</strong>: $\\text{TimeoutInterval} (RTO) = \\text{EstimatedRTT} + 4 \\times \\text{DevRTT}$. The RTO doubles exponentially on successive timeouts (exponential backoff) to reduce congestion.</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "TCP Reliable Transport", "color": "#7D8F7B", "title": "TCP Connection Handshake & Half-Close FSM (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>Handshake FSM</strong>:</li><li>  Client <code>CLOSED</code> \u279c sends SYN \u279c <code>SYN_SENT</code> \u279c receives SYN-ACK, sends ACK \u279c <code>ESTABLISHED</code>.</li><li>  Server <code>LISTEN</code> \u279c receives SYN, sends SYN-ACK \u279c <code>SYN_RCVD</code> \u279c receives ACK \u279c <code>ESTABLISHED</code>.</li><li>  <strong>Teardown FSM</strong>:</li><li>  Active Closer: <code>ESTABLISHED</code> \u279c sends FIN \u279c <code>FIN_WAIT_1</code> \u279c receives ACK \u279c <code>FIN_WAIT_2</code> \u279c receives FIN, sends ACK \u279c <code>TIME_WAIT</code> (waits 2MSL to clear stale packets) \u279c <code>CLOSED</code>.</li><li>  Passive Closer: <code>ESTABLISHED</code> \u279c receives FIN, sends ACK \u279c <code>CLOSE_WAIT</code> \u279c sends FIN \u279c <code>LAST_ACK</code> \u279c receives final ACK \u279c <code>CLOSED</code>.</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "Congestion Control", "color": "#9E828A", "title": "AIMD Additive Increase & ssthresh Thresholds (`net/ipv4/tcp_cong.c`)", "body": "<li>  <strong>Slow Start</strong>: $cwnd$ starts at 1 MSS, doubling every RTT (each ACK increments $cwnd$ by 1) until $cwnd \\ge ssthresh$.</li><li>  <strong>Congestion Avoidance</strong>: $cwnd$ increases linearly by 1 MSS per RTT (Additive Increase).</li><li>  <strong>Multiplicative Decrease</strong>: On packet loss (timeout), sets $ssthresh = cwnd / 2$, resets $cwnd = 1$ MSS, and enters slow start.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "Congestion Control", "color": "#9E828A", "title": "Fast Retransmit & Fast Recovery (FRR / RFC 5681) (`net/ipv4/tcp_input.c`)", "body": "<li>  <strong>Triple Duplicate ACKs</strong>: The receiver sends duplicate ACKs on detecting out-of-order segments. If the sender receives 3 duplicate ACKs (4 total), it immediately retransmits the missing segment without waiting for RTO timeout.</li><li>  <strong>Fast Recovery</strong>: Avoids resetting $cwnd$ to 1. Sets $ssthresh = cwnd / 2$, configures $cwnd = ssthresh + 3 \\times \\text{MSS}$. On receiving the ACK for the missing segment, sets $cwnd = ssthresh$ and enters Congestion Avoidance.</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "Congestion Control", "color": "#9E828A", "title": "Cubic Congestion Window growth Curve (`net/ipv4/tcp_cubic.c`)", "body": "<li>  <strong>Cubic Window Equation</strong>: Calculates window size $W(t)$ as a cubic function of time $t$ elapsed since the last window reduction:</li><p>$$W(t) = C(t - K)^3 + W_{\\max}$$</p><p>where $K = \\sqrt[3]{W_{\\max} \\times (1 - \\beta) / C}$.</p><li>  <strong>Growth Curve behavior</strong>: Window growth slows down significantly as it approaches $W_{\\max}$ (the previous congestion point) to probe link capacity gently, then accelerates, ensuring high stability and link utilization.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "Congestion Control", "color": "#9E828A", "title": "Google BBR Congestion Control & Kleinrock limits (`net/ipv4/tcp_bbr.c`)", "body": "<li>  <strong>Pacing Rate Control</strong>: Unlike loss-based algorithms like Cubic that fill buffers until packet loss occurs (causing bufferbloat), BBR estimates two physical link metrics over a sliding window:</li><li>  <strong>Bottleneck Bandwidth (BtlBw)</strong>: Max delivery rate.</li><li>  <strong>Propagation RTT (RTprop)</strong>: Physical delay without queuing.</li><li>  <strong>Kleinrock Operating Point</strong>: Keeps the inflight data equal to the Bandwidth-Delay Product (BDP): $pacing\\_rate = BtlBw$ and $\\text{Inflight} = BtlBw \\times RTprop$. This maximizes throughput while keeping queue length at zero.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "IP Routing Engine", "color": "#B58A7D", "title": "IPv4 Fragmentation vs IPv6 Fixed Header (`net/ipv4/ip_input.c`)", "body": "<li>  <strong>IPv4 Fragmentation</strong>: Routers segment packets exceeding MTU using Identification (16 bits), Flags (DF, MF), and Fragment Offset (13 bits) fields. Reassembly is performed at the destination host.</li><li>  <strong>IPv6 Simplified Header</strong>: Employs a fixed 40-byte header, removing router-level fragmentation (senders must use Path MTU Discovery). Header checksums are removed to speed up processing, and a 20-bit Flow Label is introduced to classify streaming traffic.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "IP Routing Engine", "color": "#B58A7D", "title": "Longest Prefix Matching (LPM) via Trie Trees (`net/ipv4/fib_trie.c`)", "body": "<li>  <strong>Longest Prefix Match</strong>: Routers must forward packets based on the CIDR table prefix that matches the destination IP address for the longest number of bits.</li><li>  <strong>Trie Structures</strong>:</li><li>  <strong>Software</strong>: Level-Compressed Trie (LC-Trie) collapses path branches to reduce tree depth, minimizing memory accesses.</li><li>  <strong>Hardware</strong>: Core routers use Ternary Content Addressable Memory (TCAM) to match IP bits and wildcard bits (*) in parallel O(1) time.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "IP Routing Engine", "color": "#B58A7D", "title": "Crossbar Switch Fabric & Head-of-Line Blocking (`Router Switch`)", "body": "<li>  <strong>Crossbar Switch</strong>: Interconnects $N$ input ports to $N$ output ports using intersecting buses, allowing concurrent non-conflicting transfers.</li><li>  <strong>Head-of-Line (HOL) Blocking</strong>: Occurs when two packets at different input queues target the same output port, blocking one. The blocked packet at the front of the queue prevents packets behind it from crossing the fabric.</li><li>  <strong>Remedy</strong>: Input ports utilize Virtual Output Queueing (VOQ), separating the physical buffer into $N$ logical queues, one per output port.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "IP Routing Engine", "color": "#B58A7D", "title": "ICMP Error Reporting & Traceroute Path Discovery (`net/ipv4/icmp.c`)", "body": "<li>  <strong>ICMP Diagnostics</strong>: Runs directly over IP (protocol code 1) to send control messages. Type 3 indicates Destination Unreachable; Type 11 indicates Time Exceeded.</li><li>  <strong>Traceroute Path Discovery</strong>:</li><li>1. Senders dispatch a UDP packet targeting a high, unused port with TTL=1.</li><li>2. The first-hop router decrements TTL to 0, drops the packet, and returns an ICMP Time Exceeded message (Type 11, Code 0).</li><li>3. The sender records the router's IP, increments TTL (2, 3...), and repeats the process.</li><li>4. The destination host responds with an ICMP Port Unreachable message (Type 3, Code 3), terminating the trace.</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "BGP & Autonomous Systems", "color": "#5F7582", "title": "Link-State routing (Dijkstra) & OSPF Flooding (`OSPF Daemon`)", "body": "<li>  <strong>Global Link-State</strong>: Senders require the complete network topology map to calculate routing paths.</li><li>  <strong>OSPF LSA Flooding</strong>: Senders flood Link State Advertisements (LSAs) containing link weights to all other routers in the autonomous system.</li><li>  <strong>Shortest Path Trees</strong>: Senders compile a unified Link State Database (LSDB). Once synchronized, each router independently executes Dijkstra's algorithm, producing the shortest-path tree to all destinations.</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "BGP & Autonomous Systems", "color": "#5F7582", "title": "Distance-Vector Routing (Bellman-Ford) & Count-to-Infinity (`RIP Daemon`)", "body": "<li>  <strong>Decentralized Iteration</strong>: Senders use the Bellman-Ford equation: $D_x(y) = \\min_v \\{c(x,v) + D_v(y)\\}$, periodically exchanging distance vectors with direct neighbors.</li><li>  <strong>Count-to-Infinity</strong>: When a link fails, neighbors exchange stale vectors, creating routing loops and causing cost metrics to slowly increment to infinity.</li><li>  <strong>Prevention</strong>: Uses Split Horizon (do not advertise routes back to the neighbor from which they were learned) and Poison Reverse (advertise cost as 16 to indicate unreachable).</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "BGP & Autonomous Systems", "color": "#5F7582", "title": "BGP Path Attributes (AS-Path, Next-Hop, Local-Pref) (`BGP Daemon`)", "body": "<li>  <strong>BGP AS Routing</strong>: Manages routing between Autonomous Systems (AS), enforcing routing policies and avoiding loop generation.</li><li>  <strong>Core Attributes</strong>:</li><li>  <code>AS-Path</code>: List of AS numbers through which the route advertisement has passed. If a router detects its own AS in the list, it rejects the advertisement to prevent loops.</li><li>  <code>Next-Hop</code>: IP address of the boundary router leading to the next AS.</li><li>  <code>Local-Preference</code>: Configures the policy for outgoing traffic selection within the local AS (higher values are preferred).</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "BGP & Autonomous Systems", "color": "#5F7582", "title": "BGP Policy Decision Tree Selection (`BGP Engine`)", "body": "<li>  <strong>Decision Tree</strong>: If a BGP router receives multiple routes to the same destination prefix, it resolves them using a strict priority hierarchy:</li><li>1. Highest Local Preference (Local-Pref) value.</li><li>2. Shortest AS-Path length.</li><li>3. Lowest Origin type (IGP < EGP < Incomplete).</li><li>4. Lowest Multi-Exit Discriminator (MED) value.</li><li>5. Prefer routes learned via external BGP (eBGP) over internal BGP (iBGP).</li><li>6. Lowest IGP cost to the Next-Hop router.</li><li>7. Lowest BGP Router ID.</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "BGP & Autonomous Systems", "color": "#5F7582", "title": "Internal BGP (iBGP) vs External BGP (eBGP) routing (`BGP Peering`)", "body": "<li>  <strong>External BGP (eBGP)</strong>: Session between boundary routers in different ASes to exchange reachability information.</li><li>  <strong>Internal BGP (iBGP)</strong>: Session between routers inside the same AS to distribute reachability information learned from eBGP.</li><li>  <strong>Split-Horizon Rule</strong>: A router cannot advertise routes learned from an iBGP peer to other iBGP peers, requiring a Full Mesh of iBGP connections or Route Reflectors.</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "BGP & Autonomous Systems", "color": "#5F7582", "title": "Software-Defined Networking (SDN) & OpenFlow Flow Tables (`SDN Architecture`)", "body": "<li>  <strong>Control/Data decoupling</strong>: Separates the routing decision logic (control plane, centralized controller) from forwarding switches (data plane).</li><li>  <strong>OpenFlow Switch flow tables</strong>: Matches packets using three fields:</li><li>1. <strong>Match Fields</strong>: Matches headers across multiple layers (Port, MAC, IP, TCP/UDP ports).</li><li>2. <strong>Actions</strong>: Execution instructions on match (Forward, Drop, Modify headers, GoTo next table).</li><li>3. <strong>Counters</strong>: Aggregates match statistics for flow monitoring and logging.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "Link Layer & CSMA/CD", "color": "#BFA88F", "title": "Link Framing & CRC Polynomial Calculations (`net/core/`)", "body": "<li>  <strong>Framing</strong>: Encapsulates IP packets into link-layer frames, wrapping them in headers and trailers.</li><li>  <strong>CRC Error Detection</strong>: Senders append $R$ bits calculated over $d$ data bits $D$.</li><li>  A generator polynomial $G$ (size $r+1$) is selected.</li><li>  Computes $R$ such that the combined $(D \\cdot 2^r) \\oplus R$ is divisible by $G$ modulo 2.</li><li>  Receivers perform modulo 2 division of received bits by $G$. If the remainder is non-zero, the frame is discarded.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "Link Layer & CSMA/CD", "color": "#BFA88F", "title": "Ethernet CSMA/CD Carrier Sense & Exponential Backoff (`drivers/net/`)", "body": "<li>  <strong>Carrier Sensing</strong>: Senders listen to the channel before transmitting. If busy, they wait; if idle, they transmit.</li><li>  <strong>Collision Detection</strong>: Senders monitor the channel while transmitting. If a collision is detected, they abort, send a 48-bit jam signal, and back off.</li><li>  <strong>Binary Exponential Backoff</strong>: Senders wait $K \\times 512$ bit times before retrying, where $K$ is randomly chosen from $[0, 2^m - 1]$ ($m = \\min(n, 10)$ on the $n$-th collision). Aborts after 16 collisions.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "Link Layer & CSMA/CD", "color": "#BFA88F", "title": "Wi-Fi CSMA/CA Collision Avoidance & RTS/CTS (`net/mac80211/`)", "body": "<li>  <strong>No Collision Detection</strong>: Wi-Fi radios cannot transmit and listen concurrently.</li><li>  <strong>Collision Avoidance</strong>: Senders back off randomly if the channel is busy. If idle, they wait a DIFS duration and send the frame. Senders require an ACK frame from the receiver.</li><li>  <strong>RTS/CTS Handshake</strong>: Senders transmit a Request to Send (RTS) frame specifying transmission time. Senders wait for a Clear to Send (CTS) response from the receiver. Neighbors hearing RTS/CTS set their Network Allocation Vector (NAV) to remain silent.</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "Link Layer & CSMA/CD", "color": "#BFA88F", "title": "ARP IP-to-MAC Address Resolution & Aging (`net/ipv4/arp.c`)", "body": "<li>  <strong>MAC Address Resolution</strong>: Maps IP addresses to MAC addresses for local subnet delivery.</li><li>  <strong>Broadcast/Unicast</strong>: Senders broadcast an ARP query frame with destination MAC <code>FF:FF:FF:FF:FF:FF</code>. Senders cache the mapping and assign a Time-To-Live (TTL, e.g., 20 mins) to support interface card changes.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "Link Layer & CSMA/CD", "color": "#BFA88F", "title": "802.1Q VLAN Tagging & Switch Self-Learning (`net/8021q/`)", "body": "<li>  <strong>Broadcast Domain Isolation</strong>: Splitting a physical switch into separate logical VLAN domains.</li><li>  <strong>802.1Q Framing</strong>: Inserts a 4-byte VLAN tag (containing a 12-bit VLAN ID) into the Ethernet frame header for Trunk links.</li><li>  <strong>Switch Self-Learning</strong>: Switches log (Source MAC, Port, VLAN ID) into a MAC table. Senders flood frames on unknown destinations and unicast on cached hits.</li>"}];
        let activeModule = 'ALL';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            cards.forEach(c => {
                const matchesSearch = c.title.toLowerCase().includes(query) || c.body.toLowerCase().includes(query);
                const matchesModule = activeModule === 'ALL' || c.module === activeModule;

                if (matchesSearch && matchesModule) {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.borderLeft = `4px solid ${c.color}`;
                    el.innerHTML = `
                        <div class="card-header">
                            <span class="card-id" style="background-color: ${c.color}22; color: ${c.color}">${c.relativeId}</span>
                            <h3 class="card-title">${c.title}</h3>
                        </div>
                        <div class="card-body">
                            ${c.body}
                        </div>
                        <div class="card-footer">
                            <span>${c.moduleName}</span>
                            <span style="color: ${c.color}">Card #${c.id}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                }
            });
        }

        function filterModule(mod) {
            activeModule = mod;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(mod) || (mod === 'ALL' && btn.innerText === 'ALL')) {
                    btn.classList.add('active');
                }
            });
            renderCards();
        }

        document.getElementById('search').addEventListener('input', renderCards);
        renderCards();
    </script>
