    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "\u8fdb\u7a0b\u4e0e\u7ebf\u7a0b\u6a21\u578b", "color": "#7A8B99", "title": "\u6bcf\u8fde\u63a5\u5355\u8fdb\u7a0b\u6a21\u578b (Process-per-Connection Model)", "body": "<li>  <strong>\u65e9\u671f\u6570\u636e\u5e93\u9996\u9009</strong>\uff1aPostgreSQL \u65e9\u671f\u53ca Oracle \u91c7\u7528\u591a\u8fdb\u7a0b\u67b6\u6784\u3002\u64cd\u4f5c\u7cfb\u7edf\u4e3a\u6bcf\u4e2a\u5ba2\u6237\u7aef\u8fde\u63a5\u6d3e\u751f\u4e00\u4e2a\u72ec\u7acb\u7684 OS \u8fdb\u7a0b\u3002</li><li>  <strong>\u7269\u7406\u74f6\u9888</strong>\uff1a\u8fdb\u7a0b\u95f4\u901a\u4fe1\uff08IPC\uff09\u5fc5\u987b\u901a\u8fc7\u5171\u4eab\u5185\u5b58\uff08Shared Memory\uff09\uff1b\u8fdb\u7a0b\u521b\u5efa\u548c\u4e0a\u4e0b\u6587\u5207\u6362\u5f00\u9500\u6781\u5176\u6602\u8d35\uff0c\u5728\u8fde\u63a5\u6570\u8d85\u5343\u65f6\u4f1a\u5bfc\u81f4\u5bbf\u4e3b\u673a CPU \u8017\u5c3d\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "\u8fdb\u7a0b\u4e0e\u7ebf\u7a0b\u6a21\u578b", "color": "#7A8B99", "title": "\u6bcf\u8fde\u63a5\u5355\u7ebf\u7a0b\u6a21\u578b (Thread-per-Connection Model)", "body": "<li>  <strong>\u591a\u7ebf\u7a0b\u5171\u4eab\u5f00\u9500\u5c0f</strong>\uff1aMySQL \u53ca SQL Server \u91c7\u7528\u6bcf\u8fde\u63a5\u5355\u7ebf\u7a0b\u6a21\u578b\u3002\u6240\u6709\u7ebf\u7a0b\u5171\u4eab\u540c\u4e00\u4e2a\u8fdb\u7a0b\u7684\u865a\u62df\u5730\u5740\u7a7a\u95f4\u3002</li><li>  <strong>\u5806\u6808\u788e\u7247\u74f6\u9888</strong>\uff1a\u6bcf\u4e2a\u7ebf\u7a0b\u4f9d\u7136\u62e5\u6709\u72ec\u7acb\u7684\u5c40\u90e8\u5806\u6808\u3002\u5f53\u8fde\u63a5\u6570\u8fc7\u4e07\u65f6\uff0c\u7ebf\u7a0b\u8c03\u5ea6\u5f00\u9500\u548c\u5806\u6808\u5185\u5b58\u788e\u7247\u4f9d\u7136\u4f1a\u5bfc\u81f4\u7cfb\u7edf\u6027\u80fd\u9000\u5316\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "\u8fdb\u7a0b\u4e0e\u7ebf\u7a0b\u6a21\u578b", "color": "#7A8B99", "title": "\u5de5\u4f5c\u7ebf\u7a0b\u6c60\u5f02\u6b65\u8c03\u5ea6 (Worker Pool Scheduling)", "body": "<li>  <strong>\u5de5\u4f5c\u7ebf\u7a0b\u6c60\u590d\u7528</strong>\uff1a\u73b0\u4ee3\u9ad8\u6548\u6570\u636e\u5e93\uff08\u5982 MySQL Thread Pool\uff09\u5c06\u8fde\u63a5\u548c\u6267\u884c\u5206\u79bb\u3002\u6784\u5efa\u56fa\u5b9a\u5927\u5c0f\u7684 Worker \u7ebf\u7a0b\u6c60\u3002</li><li>  <strong>\u5f02\u6b65\u591a\u8def\u590d\u7528</strong>\uff1a\u524d\u7aef\u4f7f\u7528 <code>epoll</code> \u7b49\u5f02\u6b65\u591a\u8def\u590d\u7528\u673a\u5236\u63a5\u6536 Socket \u8bf7\u6c42\uff0c\u5c06\u5176\u5c01\u88c5\u4e3a\u4efb\u52a1\u653e\u5165\u961f\u5217\uff0c\u7531\u540e\u53f0 Worker \u7ebf\u7a0b\u7ade\u4e89\u6267\u884c\uff0c\u5b9e\u73b0\u4e86\u8d85\u4f4e\u5f00\u9500\u7684\u4e07\u7ea7\u9ad8\u5e76\u53d1\u8fde\u63a5\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "\u8fdb\u7a0b\u4e0e\u7ebf\u7a0b\u6a21\u578b", "color": "#7A8B99", "title": "Latch \u4e0e Mutex \u8f7b\u91cf\u9501 (Latch vs Mutex)", "body": "<li>  <strong>\u9501\u8bed\u4e49\u533a\u522b</strong>\uff1a\u5728\u6570\u636e\u5e93\u4e2d\uff0c<code>Lock</code> \u7528\u4e8e\u4fdd\u62a4\u6570\u636e\u5e93\u903b\u8f91\u4e8b\u52a1\u4e00\u81f4\u6027\uff08\u5bf9\u7528\u6237\u53ef\u89c1\uff09\uff1b\u800c <code>Latch</code> (\u5305\u62ec Mutex \u548c RWLock) \u7528\u4e8e\u4fdd\u62a4\u8fdb\u7a0b\u5185\u7684\u5171\u4eab\u5185\u5b58\u6570\u636e\u7ed3\u6784\uff08\u5982\u7f13\u51b2\u6c60\u9875\u8868\u3001B-Tree \u8282\u70b9\u6307\u9488\uff09\u3002</li><li>  <strong>\u77ed\u5e73\u5feb\u8bbe\u8ba1</strong>\uff1aLatch \u6781\u5176\u8f7b\u91cf\uff0c\u901a\u5e38\u7531 CPU CAS \u6307\u4ee4\u5b9e\u73b0\u81ea\u65cb\u9501\uff0c\u53ea\u5728\u6beb\u79d2\u7ea7\u5185\u6301\u6709\uff0c\u7528\u4e8e\u4fdd\u8bc1\u5185\u90e8\u591a\u7ebf\u7a0b\u5e76\u53d1\u4e0b\u7684\u6570\u636e\u5b89\u5168\u3002</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668", "color": "#7D8F7B", "title": "SQL \u8bcd\u6cd5\u89e3\u6790\u4e0e\u91cd\u5199 (SQL Parsing & Rewriting)", "body": "<li>  <strong>\u8bcd\u6cd5\u5206\u6790\u6811</strong>\uff1aParser \u63a5\u6536 SQL \u6587\u672c\uff0c\u901a\u8fc7\u8bcd\u6cd5\u548c\u8bed\u6cd5\u5206\u6790\u5c06\u5176\u7ffb\u8bd1\u4e3a Abstract Syntax Tree\uff08AST\uff0c\u62bd\u8c61\u8bed\u6cd5\u6811\uff09\u3002</li><li>  <strong>\u8bed\u4e49\u53bb\u91cd\u6241\u5e73\u5316</strong>\uff1aQuery Rewriter\uff08\u91cd\u5199\u5668\uff09\u63a5\u6536 AST\uff0c\u8fdb\u884c\u6743\u9650\u6821\u9a8c\u3001\u89c6\u56fe\uff08View\uff09\u6241\u5e73\u5316\u5c55\u5f00\u4ee5\u53ca\u5e38\u91cf\u6298\u53e0\u91cd\u5199\uff0c\u5c06\u5176\u8f6c\u6362\u4e3a\u903b\u8f91\u67e5\u8be2\u8ba1\u5212\uff08Logical Query Plan\uff09\u3002</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668", "color": "#7D8F7B", "title": "\u57fa\u4e8e\u4ee3\u4ef7\u4f18\u5316\u5668 CBO (Cost-Based Optimizer)", "body": "<li>  <strong>\u4ee3\u4ef7\u641c\u7d22\u7a7a\u95f4</strong>\uff1aCBO \u63a5\u6536\u903b\u8f91\u8ba1\u5212\uff0c\u8bc4\u4f30\u6bcf\u79cd\u7269\u7406\u7b97\u5b50\u6267\u884c\u8def\u5f84\u7684\u603b\u5f00\u9500\u3002</li><li>  <strong>\u7269\u7406\u4ee3\u4ef7\u516c\u5f0f</strong>\uff1a\u4f18\u5316\u5668\u57fa\u4e8e\u6536\u96c6\u5230\u7684\u7269\u7406\u8868\u5143\u6570\u636e\uff08\u5982\u884c\u6570\u3001\u76f4\u65b9\u56fe\u9009\u62e9\u5ea6\u3001\u7d22\u5f15\u9ad8\u5ea6\uff09\uff0c\u4f7f\u7528\u516c\u5f0f <code>Cost = Page_Reads * W_IO + Tuples_Scanned * W_CPU</code> \u8ba1\u7b97\u6bcf\u4e2a\u8def\u5f84\u7684\u603b\u4ee3\u4ef7\uff0c\u5e76\u9009\u62e9\u4ee3\u4ef7\u503c\u6700\u5c0f\u7684\u8ba1\u5212\u4f5c\u4e3a\u7269\u7406\u8ba1\u5212\uff08Physical Plan\uff09\u3002</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668", "color": "#7D8F7B", "title": "System R \u4f18\u5316\u8def\u5f84\u51b3\u7b56\u6a21\u578b (System R Dynamic Programming Join Plan)", "body": "<li>  <strong>Join \u8def\u5f84\u7206\u7834</strong>\uff1a\u591a\u8868 Join \u7684\u7269\u7406\u6392\u5217\u7ec4\u5408\u5448\u6307\u6570\u7ea7\u589e\u957f\u3002System R \u4f18\u5316\u5668\u5229\u7528\u52a8\u6001\u89c4\u5212\uff08Dynamic Programming\uff09\u7b97\u6cd5\u81ea\u5e95\u5411\u4e0a\u641c\u7d22 Join \u6811\u3002</li><li>  <strong>\u5de6\u6df1\u6811\u622a\u65ad</strong>\uff1a\u901a\u8fc7\u9650\u5236\u53ea\u751f\u6210\u5de6\u6df1\u6811\uff08Left-Deep Tree\uff0c\u5373 Join \u7684\u53f3\u5b50\u8282\u70b9\u5fc5\u987b\u662f\u539f\u59cb\u57fa\u8868\uff0c\u65b9\u4fbf\u6d41\u6c34\u7ebf\u6d41\u5f0f\u5904\u7406\uff09\uff0c\u5927\u5e45\u88c1\u526a\u641c\u7d22\u7a7a\u95f4\uff0c\u9009\u51fa\u6700\u4f18\u7684\u591a\u8868 Join \u8fde\u63a5\u987a\u5e8f\u3002</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668", "color": "#7D8F7B", "title": "Volcano \u706b\u5c71\u8fed\u4ee3\u5668\u6267\u884c\u6a21\u578b (Volcano Iterator Model)", "body": "<li>  <strong>\u7b97\u5b50\u8c03\u7528\u7ea6\u5b9a</strong>\uff1a\u6700\u7ecf\u5178\u4e14\u5e7f\u6cdb\u4f7f\u7528\u7684\u6267\u884c\u5f15\u64ce\u6a21\u578b\u3002\u6bcf\u4e2a\u7269\u7406\u7b97\u5b50\uff08\u5982 SeqScan, HashJoin\uff09\u5747\u7ee7\u627f\u7edf\u4e00\u63a5\u53e3\uff0c\u5b9e\u73b0 <code>open()</code>, <code>next()</code>, <code>close()</code> \u4e09\u4e2a\u65b9\u6cd5\u3002</li><li>  <strong>\u62c9\u53d6\u6d41\u6c34\u7ebf</strong>\uff1a\u7236\u7b97\u5b50\u5faa\u73af\u8c03\u7528\u5b50\u7b97\u5b50\u7684 <code>next()</code> \u83b7\u53d6\u4e00\u884c\u8bb0\u5f55\uff08Tuple\uff09\uff0c\u76f4\u5230\u5b50\u7b97\u5b50\u8fd4\u56de EOF\u3002\u6570\u636e\u81ea\u4e0b\u800c\u4e0a\u6d41\u5f0f\u6d41\u52a8\uff0c\u5185\u5b58\u5360\u7528\u6781\u5c0f\u3002</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668", "color": "#7D8F7B", "title": "\u5411\u91cf\u5316\u6267\u884c\u4e0e JIT \u7f16\u8bd1 (Vectorized Execution vs JIT)", "body": "<li>  <strong>\u4f20\u7edf\u706b\u5c7 u6838\u5fc3\u6570\u589e\u52a0\uff0c\u5185\u5b58\u603b\u7ebf\u4e89\u62a2\u548c CPU \u9ad8\u901f\u7f13\u5b58\u4e00\u81f4\u6027\uff08Cache Coherency\uff09\u534f\u8bae\u7ef4\u62a4\u5f00\u9500\u4f1a\u5448\u6307\u6570\u7ea7\u4e0a\u5347\uff0c\u786c\u4ef6\u6269\u5c55\u6027\u901a\u5e38\u5728\u6570\u51e0\u5341\u6838\u8fbe\u5230\u7269\u7406\u5929\u82b1\u677f\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u5e76\u884c\u4e0e\u5206\u5e03\u5f0f\u6570\u636e\u5e93", "color": "#BFA88F", "title": "\u5171\u4eab\u78c1\u76d8\u67b6\u6784\u9501\u534f\u8c03\u4ee3\u4ef7 (Shared-Disk Architecture)", "body": "<li>  <strong>SAN \u7f51\u7edc\u4e92\u8fde</strong>\uff1a\u6bcf\u4e2a\u8282\u70b9\u62e5\u6709\u72ec\u7acb\u7684\u5185\u5b58\uff0c\u4f46\u901a\u8fc7\u4e13\u7528\u7684\u9ad8\u901f\u5b58\u50a8\u5c40\u57df\u7f51\uff08SAN/NAS\uff09\u5171\u4eab\u5e95\u5c42\u7684\u5168\u90e8\u7269\u7406\u78c1\u76d8\u3002</li><li>  <strong>\u5206\u5e03\u5f0f\u9501\u5f00\u9500</strong>\uff1a\u7531\u4e8e\u4e0d\u540c\u8282\u70b9\u7684\u5185\u5b58\u72ec\u7acb\uff0c\u4e3a\u4e86\u9632\u6b62\u4e0d\u540c\u8282\u70b9\u5e76\u53d1\u8bfb\u5199\u540c\u4e00\u4e2a\u78c1\u76d8\u5757\uff0c\u9700\u8981\u5728\u8282\u70b9\u4e4b\u95f4\u901a\u8fc7\u7f51\u7edc\u5efa\u7acb\u6781\u5176\u590d\u6742\u7684\u5206\u5e03\u5f0f\u9501\u7ba1\u7406\u5668\uff08DLM\uff09\u534f\u8bae\uff0c\u9501\u534f\u8c03\u5f00\u9500\u8f83\u5927\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u5e76\u884c\u4e0e\u5206\u5e03\u5f0f\u6570\u636e\u5e93", "color": "#BFA88F", "title": "\u65e0\u5171\u4eab\u67b6\u6784\u6c34\u5e73\u6269\u5c55\u539f\u7406 (Shared-Nothing Architecture)", "body": "<li>  <strong>\u7269\u7406\u5b8c\u5168\u9694\u79bb</strong>\uff1a\u6bcf\u4e00\u4e2a\u7269\u7406\u8282\u70b9\uff08Broker/Node\uff09\u90fd\u62e5\u6709\u72ec\u7acb\u4e14\u5b8c\u5168\u9694\u79bb\u7684 CPU\u3001\u5185\u5b58\u548c\u78c1\u76d8\u3002\u8282\u70b9\u4e4b\u95f4\u53ea\u80fd\u901a\u8fc7\u9ad8\u901f\u4ee5\u592a\u7f51\u53d1\u9001\u6d88\u606f\u8fdb\u884c\u901a\u4fe1\u3002</li><li>  <strong>\u6c34\u5e73\u65e0\u9650\u6269\u5c55</strong>\uff1a\u6570\u636e\u901a\u8fc7\u5206\u533a\uff08Sharding\uff09\u6563\u5217\u5230\u4e0d\u540c\u8282\u70b9\u4e0a\uff0c\u8fd9\u662f\u73b0\u4ee3\u8d85\u5927\u89c4\u6a21\u5206\u5e03\u5f0f\u6570\u636e\u5e93\uff08\u5982 CockroachDB\u3001ClickHouse\uff09\u5b9e\u73b0\u8fd1\u4e4e\u65e0\u9650\u6c34\u5e73\u6269\u5c55\u7684\u9ec4\u91d1\u67b6\u6784\u6a21\u5f0f\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u5e76\u884c\u4e0e\u5206\u5e03\u5f0f\u6570\u636e\u5e93", "color": "#BFA88F", "title": "\u5206\u5e03\u5f0f\u4e8c\u9636\u6bb5\u63d0\u4ea4\u534f\u8bae (Two-Phase Commit)", "body": "<li>  <strong>\u5206\u5e03\u5f0f\u4e00\u81f4\u6027\u9632\u7ebf</strong>\uff1a</li><li>1.  <strong>\u51c6\u5907\u9636\u6bb5 (Prepare)</strong>\uff1a\u534f\u8c03\u8005\u5411\u6240\u6709\u53c2\u4e0e\u8282\u70b9\u5e7f\u64ad <code>Prepare</code> \u95ee\u8be2\uff0c\u8282\u70b9\u672c\u5730\u6267\u884c\u5e76\u9501\u4f4f\u8d44\u6e90\uff0c\u8fd4\u56de Ready \u6216 Abort\u3002</li><li>2.  <strong>\u63d0\u4ea4\u9636\u6bb5 (Commit)</strong>\uff1a\u53ea\u6709\u6240\u6709\u8282\u70b9\u90fd\u8fd4\u56de Ready\uff0c\u534f\u8c03\u8005\u624d\u5e7f\u64ad <code>Commit</code> \u6307\u4ee4\uff1b\u53ea\u8981\u6709\u4e00\u4e2a\u8282\u70b9\u8fd4\u56de Abort \u6216\u8d85\u65f6\uff0c\u534f\u8c03\u8005\u5e7f\u64ad <code>Rollback</code> \u56de\u6eda\uff0c\u786e\u4fdd\u5206\u5e03\u5f0f\u72b6\u6001\u539f\u5b50\u95ed\u73af\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u5e76\u884c\u4e0e\u5206\u5e03\u5f0f\u6570\u636e\u5e93", "color": "#BFA88F", "title": "\u5206\u5e03\u5f0f\u67e5\u8be2\u6570\u636e\u91cd\u5206\u5e03\u4e0e Join (Data Redistribution & Distributed Join)", "body": "<li>  <strong>\u6d77\u91cf\u8ba1\u7b97\u7f51\u5361\u4f20\u8f93</strong>\uff1a\u5206\u5e03\u5f0f\u591a\u8868 Join \u65f6\uff0c\u5982\u679c\u6570\u636e\u5b58\u653e\u5728\u4e0d\u540c\u8282\u70b9\uff0c\u5fc5\u987b\u8fdb\u884c\u7f51\u7edc\u79fb\u52a8\u3002</li><li>  <strong>\u4e09\u5927 Join \u9009\u578b</strong>\uff1a</li><li>1.  <strong>Colocated Join</strong>\uff1aJoin \u7684\u952e\u5df2\u7ecf\u662f\u76f8\u540c\u7684\u5206\u533a\u65b9\u5f0f\uff0c\u76f4\u63a5\u672c\u5730 Join\u3002</li><li>2.  <strong>Broadcast Join</strong>\uff1a\u628a\u5c0f\u8868\u5e7f\u64ad\u590d\u5236\u53d1\u9001\u7ed9\u5927\u8868\u7684\u6240\u6709\u8282\u70b9\u3002</li><li>3.  <strong>Shuffle Join</strong>\uff1a\u5927\u5c0f\u8868\u6309 Join \u952e\u91cd\u65b0\u54c8\u5e0c\uff0c\u901a\u8fc7\u7f51\u7edc\u8fdb\u884c\u91cd\u5206\u5e03\u4f20\u8f93\u540e\u518d\u672c\u5730 Join\uff0c\u6298\u8877\u7f51\u5361\u6d41\u91cf\u4e0e CPU \u8d1f\u8377\u3002</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
