    <script>
        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "\u5f15\u5bfc\u521d\u59cb\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "RISC-V \u5f15\u5bfc\u5165\u53e3\u4e0e\u591a\u6838\u4f11\u7720\u63a7\u5236 (`kernel/entry.S` / `kernel/start.c`)", "body": "<li>  <strong>\u5f15\u5bfc\u7269\u7406\u5165\u53e3</strong>\uff1aQEMU \u52a0\u8f7d\u5185\u6838\u540e\uff0c\u6240\u6709 CPU \u6838\u5fc3 (Hart) \u5747\u8df3\u8f6c\u81f3 <code>_entry</code> (entry.S)\u3002</li><li>  <strong>\u6838\u5fc3\u6808\u6307\u9488\u5efa\u7acb</strong>\uff1a\u901a\u8fc7\u6c47\u7f16\u8ba1\u7b97 <code>sp = stack0 + (hartid * 4096)</code>\uff0c\u4e3a\u6bcf\u4e2a\u6838\u5fc3\u9884\u7559 4KB \u7684\u5185\u6838\u6808\u7a7a\u95f4\u3002</li><li>  <strong>M Mode \u279c S Mode \u5207\u6362</strong>\uff1a\u5728 <code>start.c</code> \u4e2d\uff0c\u5c06\u673a\u5668\u72b6\u6001\u5bc4\u5b58\u5668 <code>mstatus</code> \u7684 MPP \u4f4d\u914d\u7f6e\u4e3a Supervisor \u6a21\u5f0f\uff0c\u5e76\u5c06 <code>mret</code> \u7684\u8df3\u8f6c\u5730\u5740 <code>mepc</code> \u6307\u5411 <code>main()</code>\u3002\u540c\u65f6\u914d\u7f6e CLINT \u5b9a\u65f6\u5668\uff0c\u5f00\u542f\u65f6\u949f\u4e2d\u65ad\u8def\u7531\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "\u5f15\u5bfc\u521d\u59cb\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "\u8fdb\u7a0b\u63a7\u5236\u5757 PCB \u5e03\u5c40\u4e0e\u8fdb\u7a0b\u5206\u914d (`struct proc` / `kernel/proc.c`)", "body": "<li>  <strong>PCB \u6570\u636e\u7ed3\u6784</strong>\uff1a<code>struct proc</code> \u5b9a\u4e49\u5728 <code>proc.h</code> \u4e2d\uff0c\u7ba1\u7406\u8fdb\u7a0b\u72b6\u6001 (<code>state</code>\uff1aUNUSED, SLEEPING, RUNNABLE, RUNNING, ZOMBIE)\u3001\u9875\u9762\u6839\u5730\u5740 (<code>pagetable</code>)\u3001\u5185\u6838\u6808\u5730\u5740 (<code>kstack</code>)\u3001Trap \u4e0a\u4e0b\u6587 (<code>trapframe</code>) \u53ca\u6253\u5f00\u7684\u6587\u4ef6\u63cf\u8ff0\u7b26\u8868\u3002</li><li>  <strong>\u8fdb\u7a0b\u521d\u59cb\u5316</strong>\uff1a<code>allocproc()</code> \u626b\u63cf\u5168\u5c40 <code>proc</code> \u6570\u7ec4\uff0c\u5206\u914d PID\uff0c\u4f7f\u7528 <code>kalloc()</code> \u7533\u8bf7\u7269\u7406\u9875\u7528\u4e8e\u5b58\u653e <code>trapframe</code>\uff1b\u5e76\u5728\u8fdb\u7a0b\u865a\u62df\u7a7a\u95f4\u6700\u9ad8\u7aef\u6620\u5c04 <code>TRAMPOLINE</code> \u4e0e <code>TRAPFRAME</code>\uff1b\u6700\u540e\u5728\u5185\u6838\u6808\u5e95\u4f2a\u9020\u4e00\u4e2a <code>context</code> \u7ed3\u6784\u4f53\uff0c\u5c06\u8fd4\u56de\u5730\u5740 <code>ra</code> \u6307\u5411 <code>forkret()</code>\uff0c\u4ee5\u517c\u5bb9\u8c03\u5ea6\u5207\u6362\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "\u5f15\u5bfc\u521d\u59cb\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "\u8f6e\u8be2\u5f0f\u8fdb\u7a0b\u8c03\u5ea6\u5faa\u73af\u673a\u5236 (`scheduler()` / `kernel/proc.c`)", "body": "<li>  <strong>\u8c03\u5ea6\u4e3b\u5faa\u73af</strong>\uff1a\u6bcf\u4e2a CPU \u6838\u5fc3\u8fd0\u884c\u4e00\u4e2a\u72ec\u7acb\u7684 <code>scheduler()</code> \u7ebf\u7a0b\uff08\u4ece\u4e0d\u8fd4\u56de\uff09\u3002\u5b83\u5faa\u73af\u626b\u63cf\u5168\u5c40\u8fdb\u7a0b\u6570\u7ec4 <code>proc</code>\uff0c\u5bfb\u627e\u72b6\u6001\u4e3a <code>RUNNABLE</code> \u7684\u8fdb\u7a0b\u3002</li><li>  <strong>\u5207\u6362\u9501\u5c4f\u969c</strong>\uff1a\u83b7\u53d6\u76ee\u6807\u8fdb\u7a0b\u7684 <code>p->lock</code>\uff0c\u5c06\u5176\u72b6\u6001\u53d8\u66f4\u4e3a <code>RUNNING</code>\uff0c\u5e76\u5c06\u5f53\u524d CPU \u7684\u8fd0\u884c\u6307\u9488 <code>c->proc</code> \u6307\u5411\u8be5\u8fdb\u7a0b\u3002</li><li>  <strong>\u4e0a\u4e0b\u6587\u5207\u6362</strong>\uff1a\u8c03\u7528 <code>swtch(&c->context, &p->context)</code>\uff0c\u5c06 CPU \u5bc4\u5b58\u5668\u5207\u6362\u4e3a\u76ee\u6807\u8fdb\u7a0b\u7684\u5185\u6838\u5bc4\u5b58\u5668\uff1b\u5f53\u8fdb\u7a0b\u56e0\u65f6\u95f4\u7247\u7528\u5c3d\uff08<code>yield()</code>\uff09\u3001\u7b49\u5f85 I/O\uff08<code> kernel/fs.c`)", "body": "<li>  <strong>\u76ee\u5f55\u9879\u67e5\u627e</strong>\uff1a\u76ee\u5f55\u4e5f\u662f\u4e00\u79cd\u6587\u4ef6\uff0c\u5176\u5185\u5bb9\u662f\u4e00\u7ec4 <code>struct dirent</code>\uff08\u76ee\u5f55\u9879\uff0c\u5305\u542b <code>inum</code> \u548c <code>name</code>\uff09\u3002</li><li>  <code>dirlookup(dp, name, poff)</code>\uff1a\u5faa\u73af\u8bfb\u53d6\u76ee\u5f55\u6587\u4ef6\u5185\u5bb9\uff0c\u5982\u679c\u627e\u5230\u5339\u914d\u7684 <code>name</code>\uff0c\u8fd4\u56de\u5bf9\u5e94\u7684 inode \u7f13\u5b58\u6307\u9488 <code>iget(dp->dev, de.inum)</code>\u3002</li><li>  <strong>\u786c\u94fe\u63a5\u521b\u5efa</strong>\uff1a<code>dirlink(dp, name, inum)</code> \u5411\u76ee\u5f55\u6587\u4ef6\u8ffd\u52a0\u5199\u5165\u4e00\u4e2a\u65b0\u7684 <code>struct dirent</code>\u3002\u521b\u5efa\u786c\u94fe\u63a5\uff08\u5982 <code>link</code> \u7cfb\u7edf\u8c03\u7528\uff09\u65f6\uff0c\u53ea\u662f\u5411\u76ee\u6807\u76ee\u5f55\u4e2d\u5199\u5165\u4e00\u4e2a\u65b0\u76ee\u5f55\u9879\uff0c\u5e76\u5c06\u76ee\u6807\u6587\u4ef6\u7684 <code>ip->nlink</code> \u81ea\u589e 1\uff0c\u800c\u4e0d\u9700\u8981\u590d\u5236\u5b9e\u9645\u7684\u6587\u4ef6\u6570\u636e\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u6587\u4ef6\u7cfb\u7edf\u4e0e IPC \u7ba1\u9053", "color": "#BFA88F", "title": "\u6587\u4ef6\u63cf\u8ff0\u7b26\u5206\u914d\u4e0e\u6587\u4ef6\u8868\u62bd\u8c61 (`struct file` / `kernel/file.c`)", "body": "<li>  <strong>\u4e09\u5c42\u6587\u4ef6\u62bd\u8c61</strong>\uff1a</li><li>1. <strong>\u8fdb\u7a0b\u5c42</strong>\uff1a<code>p->ofile[fd]</code> \u4fdd\u5b58\u6307\u5411\u6587\u4ef6\u8868\u9879\u7684\u6307\u9488\uff0c<code>fd</code> \u5373\u4e3a\u6570\u7ec4\u7d22\u5f15\u3002</li><li>2. <strong>\u7cfb\u7edf\u5c42</strong>\uff1a\u5168\u5c40\u6587\u4ef6\u8868 <code>ftable</code> \u5305\u542b\u6240\u6709\u6253\u5f00\u7684\u6587\u4ef6\u9879 <code>struct file</code>\uff0c\u7ba1\u7406\u8bfb\u5199\u504f\u79fb\u91cf <code>off</code> \u4ee5\u53ca\u6587\u4ef6\u5f15\u7528\u8ba1\u6570 <code>ref</code>\u3002</li><li>3. <strong>\u7269\u7406\u5c42</strong>\uff1a<code>struct file</code> \u53ef\u4ee5\u62bd\u8c61\u4e3a INODE\uff08\u666e\u901a\u6587\u4ef6/\u8bbe\u5907\uff09\u6216 PIPE\uff08\u7ba1\u9053\uff09\u3002</li><li>  <strong>\u5206\u914d\u4e0e\u5173\u95ed</strong>\uff1a<code>filealloc()</code> \u904d\u5386 <code>ftable</code> \u5206\u914d\u7a7a\u95f2\u6587\u4ef6\u9879\u3002<code>fileclose()</code> \u51cf\u5c11\u5176\u5f15\u7528\u8ba1\u6570 <code>ref</code>\u3002\u82e5\u5f15\u7528\u8ba1\u6570\u5f52\u96f6\uff0c\u5219\u6839\u636e\u5176\u7c7b\u578b\u8c03\u7528 <code>iput()</code> \u91ca\u653e inode \u6216\u8c03\u7528 <code>pipeclose()</code> \u5173\u95ed\u7ba1\u9053\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u6587\u4ef6\u7cfb\u7edf\u4e0e IPC \u7ba1\u9053", "color": "#BFA88F", "title": "IPC \u7ba1\u9053\u73af\u5f62\u7f13\u51b2\u533a\u4e0e\u540c\u6b65\u8bfb\u5199 (`pipe.c` / `kernel/pipe.c`)", "body": "<li>  <strong>\u5355\u9875\u5185\u5b58\u961f\u5217</strong>\uff1a<code>struct pipe</code> \u5305\u542b\u4e00\u4e2a\u5927\u5c0f\u4e3a 512 \u5b57\u8282\u7684\u73af\u5f62\u7f13\u51b2\u533a <code>data</code>\uff0c\u4ee5\u53ca\u8bfb\u5199\u8ba1\u6570\u6307\u9488 <code>nread</code> \u4e0e <code>nwrite</code>\u3002</li><li>  <strong>Pipe \u8bfb\u5199\u540c\u6b65</strong>\uff1a</li><li>  <code>pipewrite(pipe, addr, n)</code>\uff1a\u5411\u73af\u5f62\u7f13\u51b2\u533a\u5199\u5165\u6570\u636e\u3002\u82e5\u7f13\u51b2\u533a\u5df2\u6ee1\uff08<code>nwrite == nread + PIPESIZE</code>\uff09\uff0c\u8c03\u7528 <code>wakeup(&pipe->nread)</code> \u5524\u9192\u8bfb\u8fdb\u7a0b\uff0c\u5e76\u8c03\u7528 <code>sleep(&pipe->nwrite, &pipe->lock)</code> \u6302\u8d77\u5199\u8fdb\u7a0b\u3002</li><li>  <code>piperead(pipe, addr, n)</code>\uff1a\u4ece\u73af\u5f62\u7f13\u51b2\u533a\u8bfb\u53d6\u6570\u636e\u3002\u82e5\u7f13\u51b2\u533a\u4e3a\u7a7a\uff08<code>nread == nwrite</code>\uff09\uff0c\u8c03\u7528 <code>wakeup(&pipe->nwrite)</code> \u5524\u9192\u5199\u8fdb\u7a0b\uff0c\u5e76\u8c03\u7528 <code>sleep(&pipe->nread, &pipe->lock)</code> \u6302\u8d77\u8bfb\u8fdb\u7a0b\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u6587\u4ef6\u7cfb\u7edf\u4e0e IPC \u7ba1\u9053", "color": "#BFA88F", "title": "\u6587\u4ef6\u7cfb\u7edf\u8c03\u7528\u5c42\u4e0e\u5185\u6838\u8fb9\u754c\u5b89\u5168\u6821\u9a8c (`argraw` / `kernel/sysfile.c`)", "body": "<li>  <strong>\u5b89\u5168\u9632\u5fa1\u8fb9\u754c</strong>\uff1a\u7531\u4e8e\u7528\u6237\u8fdb\u7a0b\u53ef\u4ee5\u901a\u8fc7\u5bc4\u5b58\u5668\u4f20\u5165\u4efb\u610f\u6307\u9488\uff0c\u5185\u6838\u5728\u6267\u884c\u7cfb\u7edf\u8c03\u7528\u524d\u5fc5\u987b\u5bf9\u53c2\u6570\u8fdb\u884c\u4e25\u683c\u6821\u9a8c\u3002</li><li>  <strong>\u53c2\u6570\u63d0\u53d6\u4e0e\u8d8a\u754c\u6821\u9a8c</strong>\uff1a</li><li>  <code>argint(n, &val)</code> / <code>argaddr(n, &val)</code>\uff1a\u4ece <code>p->trapframe->a0 - a5</code> \u4e2d\u8bfb\u53d6\u7528\u6237\u4f20\u5165\u7684\u6574\u6570\u6216\u5730\u5740\u3002</li><li>  <code>argstr(n, buf, max)</code>\uff1a\u4ece\u7528\u6237\u7a7a\u95f4\u62f7\u8d1d\u4ee5 <code>\\0</code> \u7ed3\u5c3e\u7684\u5b57\u7b26\u4e32\u3002\u5185\u90e8\u4f7f\u7528 <code>fetchstr(addr, buf, max)</code> \u9010\u5b57\u8282\u8bfb\u53d6\uff0c\u5982\u679c\u8bfb\u53d6\u5730\u5740\u8d8a\u754c\uff08\u8d85\u51fa\u8fdb\u7a0b\u865a\u62df\u5185\u5b58\u7a7a\u95f4 <code>p->sz</code>\uff09\uff0c\u5219\u7acb\u5373\u62d2\u7edd\u5e76\u8fd4\u56de -1\uff0c\u4ece\u800c\u9632\u6b62\u6076\u610f\u6307\u9488\u6ea2\u51fa\u6216\u5185\u6838\u5185\u5b58\u6cc4\u6f0f\u3002</li>"}];
        let activeModule = 'ALL';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            cards.forEach(c => {
                const matchesSearch = c.title.toLowerCase().includes(query) || c.body.toLowerCase().includes(query);
                const matchesModule = activeModule === 'ALL' || c.module === activeModule;

                if (matchesSearch && matchesModule) {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.borderLeft = `4px solid ${c.color}`;
                    el.innerHTML = `
                        <div class="card-header">
                            <span class="card-id" style="background-color: ${c.color}22; color: ${c.color}">${c.relativeId}</span>
                            <h3 class="card-title">${c.title}</h3>
                        </div>
                        <div class="card-body">
                            ${c.body}
                        </div>
                        <div class="card-footer">
                            <span>${c.moduleName}</span>
                            <span style="color: ${c.color}">Card #${c.id}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                }
            });
        }

        function filterModule(mod) {
            activeModule = mod;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(mod) || (mod === 'ALL' && btn.innerText === 'ALL')) {
                    btn.classList.add('active');
                }
            });
            renderCards();
        }

        document.getElementById('search').addEventListener('input', renderCards);
        renderCards();
    </script>
</body>
</html>
