    <style>
        :root {

            <h1>h2o / quic-http3 协议栈图谱</h1>
            <p>基于自研 h2o_evloop 定时器轮、quicly 传输状态机、picotls 加密、QPACK 编解码流、HTTP/2 调度树与零拷贝 I/O 切片的高密图谱</p>

    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "自研轻量级事件循环", "color": "#7A8B99", "title": "h2o_evloop_t 的拓扑结构与基于 Epoll/Kqueue 的多后端抽象绑定", "body": "<li>  <strong>技术机制</strong>: H2O 自研的 <code>h2o_evloop_t</code> 结构体并不依赖第三方网络库。它在内部实现了一个轻量级的多路复用抽象层，支持根据编译时宏定义绑定不同操作系统的底层 I/O 后端（Linux 的 <code>epoll</code>、BSD/macOS 的 <code>kqueue</code>、Windows 的 <code>select</code>），屏蔽底层差异并实现极致的效率。</li><li>  <strong>应用策略</strong>: 在生产环境中，H2O 通过检测操作系统内核版本，在编译期自动选择 <code>epoll</code> 或 <code>kqueue</code>，最大化并发吞吐性能。</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "自研轻量级事件循环", "color": "#7A8B99", "title": "延迟状态变更链表 `_statechanged` 与合并更新机制", "body": "<li>  <strong>技术机制</strong>: 当套接字因读写就绪或等待状态发生变更时，H2O 不会立刻调用 <code>epoll_ctl</code> 进行内核状态修改。而是将对应的 <code>h2o_socket_t</code> 挂载到事件循环的 <code>_statechanged</code> 单向链表中。只有在事件循环进入新一轮 Tick 的开头阶段，才会批量遍历并调用一次系统更新函数，大幅消除了上下文切换。</li><li>  <strong>应用策略</strong>: 对于高吞吐的代理场景，这种合并更新能够有效降低在高并发包处理时的 CPU 自用开销。</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "自研轻量级事件循环", "color": "#7A8B99", "title": "h2o_timerwheel_t 级联定时器轮常数时间增删机理", "body": "<li>  <strong>技术机制</strong>: H2O 在定时器处理中使用了 <code>h2o_timerwheel_t</code>（时间轮）。针对 HTTP Keep-Alive 大部分连接的超时周期完全一致的特点，时间轮将定时器按过期槽位分布在级联的桶（Buckets）中。每次循环只需要递增时钟游标并检查对应桶，添加与删除均是 $O(1)$ 操作，避免了红黑树结构随节点数增长而变慢的缺陷。</li><li>  <strong>应用策略</strong>: 配置 <code>keepalive-timeout</code> 等宏观参数时，时间轮能自动对超长时间的空闲连接进行极其轻量的高效轮询清理。</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "自研轻量级事件循环", "color": "#7A8B99", "title": "单进程多线程工作模式下的套接字 SO_REUSEPORT 内核分发", "body": "<li>  <strong>技术机制</strong>: H2O 采用单进程多工作线程（Worker Threads）架构。每个 Worker 启动并拥有一个独立的 <code>h2o_evloop_t</code> 实例。为了防止多个线程在 accept 阶段竞争同一套接字产生锁冲突，H2O 开启了 <code>SO_REUSEPORT</code>，使得网卡收包后，由内核直接通过 Hash 算法对称地将新连接派发至指定 Worker 线程，实现彻底无锁。</li><li>  <strong>应用策略</strong>: 生产环境将工作线程数 <code>num-threads</code> 设为物理核心数，确保各核心资源独立且负载均衡。</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "QUIC 传输与 quicly 集成", "color": "#7D8F7B", "title": "quicly_conn_t 与 quicly_stream_t 状态机双重控制", "body": "<li>  <strong>技术机制</strong>: H2O 的 HTTP/3 底层通过子模块 <code>quicly</code> 驱动。<code>quicly_conn_t</code> 结构体承载整个 QUIC 传输连接上下文，负责连接级流控、加密握手、丢包恢复和拥塞算法演进；每个连接内划分出多个 <code>quicly_stream_t</code> 结构，专门用于多路复用的数据帧传递和流级重传。</li><li>  <strong>应用策略</strong>: 监控系统中应对 <code>quicly</code> 的连接级健康度与活动流数进行差异化统计，以便诊断传输异常。</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "QUIC 传输与 quicly 集成", "color": "#7D8F7B", "title": "picotls (TLS 1.3) 密钥衍生与 0-RTT 极速会话票据处理", "body": "<li>  <strong>技术机制</strong>: <code>quicly</code> 原生依赖极其紧凑的 TLS 1.3 实现库 <code>picotls</code>。握手阶段，<code>picotls</code> 在内存中就近解析 TLS Client Hello，生成对称工作密钥，并将 0-RTT 的 Session Ticket 信息进行无损恢复。使得再次建连的客户端能够在发送首个握手包时就携带加密数据，消除了握手的往返时延（RTT）。</li><li>  <strong>应用策略</strong>: 在客户端部署中合理启用 session resumption，让再次请求达到零握手开销（0-RTT），提升首屏渲染速度。</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "QUIC 传输与 quicly 集成", "color": "#7D8F7B", "title": "QUIC 握手阶段首包嗅探（First Byte Routing）与 CID 路由分发", "body": "<li>  <strong>技术机制</strong>: H2O 的 UDP 监听套接字收到物理包后，由 <code>h2o_http3_handle_packet</code> 函数进行首字节嗅探。若发现是新建握手包，则随机生成一个唯一的 Connection ID (CID) 并分发给客户端；若是已有连接的数据包，直接解析出 CID，并在全局无锁哈希表中检索对应的 <code>quicly_conn_t</code>，避免解析包头多余数据。</li><li>  <strong>应用策略</strong>: 该机制确保了高频包率下连接分流路径的最小化，避免了由于频繁建连造成的计算倾斜。</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "QUIC 传输与 quicly 集成", "color": "#7D8F7B", "title": "连接迁移 (Connection Migration) 与双向路径验证机制", "body": "<li>  <strong>技术机制</strong>: 当客户端从 WiFi 切换到 5G 导致其网络 IP 和端口物理变更时，QUIC 依旧使用原来的 Connection ID。H2O 接获新包后，立即发送一个带 64 位随机数的 <code>PATH_CHALLENGE</code> 帧到客户端的新 IP，待客户端回应相同的 <code>PATH_RESPONSE</code> 帧后，才验证客户端的合法性并更新路由地址，防止反射式 DoS 攻击。</li><li>  <strong>应用策略</strong>: 用于移动端接入加速，确保在电梯、室外等复杂切换场景下下载不断线、视频不卡顿。</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "QUIC 传输与 quicly 集成", "color": "#7D8F7B", "title": "自研 AES-GCM Fusion 融合硬件加速引擎的零拷贝发包流程", "body": "<li>  <strong>技术机制</strong>: QUIC 要求对每个输出的 UDP 数据包执行包头与包体双重加密。H2O 集成的 <code>picotls</code> 中自带了 <code>fusion</code> 加密引擎，利用 AVX2/AVX512 寄存器，将 AES-NI 加密与 Ghash 的乘法计算指令级融合在一个执行链内，使大块内存切片在单 CPU 周期内并行完成加密和数据拷贝。</li><li>  <strong>应用策略</strong>: 在 x86_64 服务器上建议启用支持 AVX512 的编译标志，以将 HTTP/3 阶段的整体加解密算力开销减半。</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "HTTP/3 协议与 QPACK 压缩", "color": "#9E828A", "title": "h2o_http3_conn_t 上下文结构与单向控制流状态机处理", "body": "<li>  <strong>技术机制</strong>: <code>h2o_http3_conn_t</code> 结构体是 L7 协议与 <code>quicly</code> 传输层之间的桥梁。它在建连初期自动启动一个专用的单向控制流（Control Stream），用于在双端之间宣告 <code>SETTINGS</code> 帧（包括并发流上限、QPACK 表大小），并使用控制流处理协议级异常与流状态重置。</li><li>  <strong>应用策略</strong>: 确保两端 <code>SETTINGS</code> 参数一致，避免因配置差异引发意外的连接重置。</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "HTTP/3 协议与 QPACK 压缩", "color": "#9E828A", "title": "QPACK 编解码器的表项管理与索引映射", "body": "<li>  <strong>技术机制</strong>: QPACK 是 HTTP/3 头部压缩规范。H2O 维护一个 99 项的静态表，以及一个在内存中动态分配、最大长度可配的动态表（Dynamic Table）。动态表缓存频繁出现的自定义报头（如 User-Agent、Cookie），编解码时用 1 字节索引代替冗长的字符串，实现报头的极致压缩。</li><li>  <strong>应用策略</strong>: 调优 <code>hpack-capacity</code> 参数，在内存开销和压缩效率之间取得最佳折衷。</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "HTTP/3 协议与 QPACK 压缩", "color": "#9E828A", "title": "QPACK 编解码单向同步流 (Encoder/Decoder Stream) 阻断排空", "body": "<li>  <strong>技术机制</strong>: 动态表项的增删和引用必须双端完全对齐。为此，H2O 开辟了两个专用单向流：Encoder Stream 和 Decoder Stream。当编码端在动态表添加新项时，必须通过 Encoder Stream 告知对端；对端解码成功后发送确认。若在未收到确认前发送了依赖新项的请求，该流将阻断解析，直至确认到达以防解码崩溃。</li><li>  <strong>应用策略</strong>: 合理限制并发未决请求数，避免在高延迟网络下发生由于单向同步引起的流死锁。</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "HTTP/3 协议与 QPACK 压缩", "color": "#9E828A", "title": "HTTP/3 多流无序传输与 QPACK 延迟解析的抗 HOLB 保障", "body": "<li>  <strong>技术机制</strong>: 得益于 QUIC 的 UDP 特性，HTTP/3 底层各个 stream 的 packet 在传输网络中允许乱序到达。H2O 对每个 Stream 独立进行 Frame 帧构建和解码。若某个流的 QPACK 动态表数据尚未完全就绪，H2O 会将该流的解码任务延迟挂起，其余流的业务解析和执行完全正常，实现了真正的流间隔离。</li><li>  <strong>应用策略</strong>: 极其适合边缘网络、基站切换等易丢包场景，使得重传局限在具体流中，全局网关依旧保持高吞吐。</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "HTTP/2 优先依赖调度树", "color": "#B58A7D", "title": "h2o_http2_scheduler_node_t 调度树的依赖拓扑与权值继承", "body": "<li>  <strong>技术机制</strong>: H2O 在 <code>lib/http2/scheduler.c</code> 中维护了一个树状优先调度结构。每个活跃的 HTTP/2 逻辑流都被映射为一个 <code>h2o_http2_scheduler_node_t</code> 节点。节点之间通过 Parent-Child 指针关联。每个节点持有特定的绝对权重，子节点按照权重比例瓜分父节点所分配到的物理带宽额度。</li><li>  <strong>应用策略</strong>: 浏览器可以通过 <code>PRIORITY</code> 帧动态修改树的结构，以调整核心渲染资源的优先级。</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "HTTP/2 优先依赖调度树", "color": "#B58A7D", "title": "h2o_http2_scheduler_run 调度器加权赤字轮询 (WDRR) 分配算法", "body": "<li>  <strong>技术机制</strong>: 调度树的遍历如果采用常规深度优先搜索，计算复杂度会随着并发流数暴增。H2O 采用加权赤字轮询（WDRR）算法：为每个节点维护一个赤字计数器（Deficit）。调度运行 <code>h2o_http2_scheduler_run</code> 时，快速扫描当前活动分枝，若节点赤字大于 0 则分发发送字节配额，否则增加赤字计数器并轮转，计算复杂度达到 $O(1)$。</li><li>  <strong>应用策略</strong>: 此算法解决了超高并发（如单连接上万并发流）下的 CPU 性能衰退问题，确保调度器的高效运行。</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "HTTP/2 优先依赖调度树", "color": "#B58A7D", "title": "16KB 数据分片发送限制与 TCP 发送缓冲区动态混流平衡", "body": "<li>  <strong>技术机制</strong>: 传统的服务器在发送响应时，会将几百 KB 的文件一次性塞给 Socket 缓冲区，导致排在后面的小包无法发出。H2O 调度器在执行底层写操作时，强制设置 16KB 发送配额上限。当流发送完 16KB 的数据块后，系统立即重新执行 WDRR 优先级树轮询，重新分配带宽，保证关键 CSS/JS 响应不受阻塞。</li><li>  <strong>应用策略</strong>: 通过 16KB 分片粒度的混流控制，在不影响大文件传输吞吐的前提下，最大化小文件的响应实时性。</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "HTTP/2 优先依赖调度树", "color": "#B58A7D", "title": "服务端启发式权重调度器策略与主流浏览器缺陷消解", "body": "<li>  <strong>技术机制</strong>: 部分浏览器（如早期 Chrome）未能正确实现 HTTP/2 依赖优先级规范，甚至将所有流挂载为根节点的同级平铺节点，导致优先级调度形同虚设。H2O 内部集成启发式分析引擎，在检测到这种平铺结构后，自动干预并改写权重分配，提高 CSS/JS 文件的权重，保证浏览器客户端的渲染耗时最小。</li><li>  <strong>应用策略</strong>: 属于开箱即用的协议优化，无需在前端编写任何适配逻辑即可提速页面加载。</li>"}, {"id": 18, "relativeId": "M4.5", "module": "M4", "moduleName": "HTTP/2 优先依赖调度树", "color": "#B58A7D", "title": "HTTP/2 流并发上限控制与 WINDOW_UPDATE 流量滑动窗口管理", "body": "<li>  <strong>技术机制</strong>: H2O 严格遵守 <code>SETTINGS_MAX_CONCURRENT_STREAMS</code> 限制（默认 100）。连接双端都维持着发送 and 接收的 <code>WINDOW_UPDATE</code> 滑动窗口。当客户端流耗尽发送窗口时，数据写入被自动挂起，直到收到对端返回的窗口更新帧，避免发送端缓冲区爆仓。</li><li>  <strong>应用策略</strong>: 优化滑动窗口大小可以解决在高带宽延迟积（BDP）的长途跨国网络中因流控太小导致的限速。</li>"}, {"id": 19, "relativeId": "M5.1", "module": "M5", "moduleName": "零拷贝内存与 I/O 优化", "color": "#5F7582", "title": "轻量级 I/O 向量 h2o_iovec_t 的结构与高效指针切片", "body": "<li>  <strong>技术机制</strong>: H2O 内部通过 <code>h2o_iovec_t</code> 表示内存片段。它只包含一个字符型 <code>base</code> 指针与一个 <code>len</code> 长度。该结构是非拥有型（Non-owning）的切片，在数据封装、多层代理转发、报头截取时，直接通过指针偏移表示新切片，绝对不产生任何数据拷贝，极度节省内存。</li><li>  <strong>应用策略</strong>: 在编写 C 自定义扩展模块时，应当遵循 <code>h2o_iovec_t</code> 生命周期原则，避免在异步回调中访问已释放的栈内存。</li>"}, {"id": 20, "relativeId": "M5.2", "module": "M5", "moduleName": "零拷贝内存与 I/O 优化", "color": "#5F7582", "title": "h2o_buffer_t 双向链表动态内存池分配与释放回收", "body": "<li>  <strong>技术机制</strong>: 接收请求载荷时，H2O 使用 <code>h2o_buffer_t</code> 动态扩展双向链表。对于小于阈值（通常为 64KB）的数据直接从 Worker 独占的内存池（Mempool）中分配高速缓冲区；一旦数据超出阈值，自动转换为临时文件存储，既保证了小包处理的高性能，又防止了大请求体打爆网关内存。</li><li>  <strong>应用策略</strong>: 生产环境中可调整 <code>max-request-entity-size</code>，以应对极高并发下的大包突发场景。</li>"}, {"id": 21, "relativeId": "M5.3", "module": "M5", "moduleName": "零拷贝内存与 I/O 优化", "color": "#5F7582", "title": "TCP sendfile 内核零拷贝发送实现", "body": "<li>  <strong>技术机制</strong>: H2O 在处理静态大文件下载时，弃用常规的 <code>read</code> ➜ <code>write</code> 循环。在确定文件路由后，直接向事件循环底层的套接字写入文件描述符，底层通过系统 <code>sendfile()</code> 绕过用户态内存，直接在内核空间将文件 Page Cache 与 TCP 缓冲区进行零拷贝衔接。</li><li>  <strong>应用策略</strong>: 配合操作系统级的 Page Cache 预读，可以使 H2O 的静态文件 serving 能力接近物理网卡理论极限。</li>"}, {"id": 22, "relativeId": "M5.4", "module": "M5", "moduleName": "零拷贝内存与 I/O 优化", "color": "#5F7582", "title": "UDP GSO 批量发送与 sendmmsg 内核优化", "body": "<li>  <strong>技术机制</strong>: UDP 的单次发送开销远高于 TCP。为支撑 HTTP/3 高包率，H2O 支持 Generic Segmentation Offload (GSO)。当发送多个 QUIC 帧时，H2O 在内存中将它们打成一个大型包，利用 <code>sendmmsg()</code> 并携带套接字选项一次性投递给内核，由网卡物理硬件芯片在发送前执行物理切片，极地释放了 CPU 的中断计算开销。</li><li>  <strong>应用策略</strong>: 在高带宽 HTTP/3 服务网关上，必须开启支持 GSO 的 Linux 内核版本（4.18+）以保证最高性能。</li>"}, {"id": 23, "relativeId": "M5.5", "module": "M5", "moduleName": "零拷贝内存与 I/O 优化", "color": "#5F7582", "title": "套接字写缓冲区回压 (Backpressure) 与异步可写事件挂起", "body": "<li>  <strong>技术机制</strong>: 当客户端接收慢或者物理链路发生严重拥塞时，H2O 写入 Socket 会返回 <code>EAGAIN</code> 错误。H2O 的 <code>h2o_socket_t</code> 立即停止后续数据生成，将未发送的 <code>h2o_iovec_t</code> 切片链挂起在内存发送队列中，并在 <code>evloop</code> 中注销写事件。等到内核通知 Socket 可写后，才重新触发回调发包，形成完美的回压流控。</li><li>  <strong>应用策略</strong>: 回压机制从物理上阻断了慢速客户端耗尽服务器网关内存的隐患，保证了系统多租户隔离的公平度。</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "高级特性与容灾优化", "color": "#BFA88F", "title": "103 Early Hints 规范的流式发送与静态资源抢跑推送", "body": "<li>  <strong>技术机制</strong>: 客户端发起请求后，H2O 可以根据配置，在后台 CGI/反向代理尚未计算出 200 OK 响应前，立即先向客户端返回包含 Link 头的 103 Early Hints 状态码响应。客户端根据 Link 头，在等待主响应期间提前并行去 DNS 解析和下载关联的 JS 和 CSS 资源。</li><li>  <strong>应用策略</strong>: 适用于复杂的现代 Web SPA 应用，配合 H2O 自身的 HTTP/2/3 多路复用，优化页面整体性能。</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "高级特性与容灾优化", "color": "#BFA88F", "title": "TLS Session Ticket 会话状态的外部存储热加载与分布式同步", "body": "<li>  <strong>技术机制</strong>: TLS 会话 Ticket 中包含加密的会话状态。为了在 H2O 多实例集群中实现完全的 0-RTT/1-RTT 会话复用，H2O 支持配置外部会话 Ticket 密钥文件并自动进行 inotify 监听热加载。当密钥文件通过脚本动态更新时，多台 H2O 会自动重新读取内存密钥，实现全集群任意节点对同一客户端 Ticket 的无感解密。</li><li>  <strong>应用策略</strong>: 运维团队可通过 Cron 任务定期滚动生成并分发 Ticket 密钥文件，兼顾集群连接复用率和前向安全性。</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "高级特性与容灾优化", "color": "#BFA88F", "title": "Quicly 中拥塞控制算法的可插拔接口与 Cubic 状态转移", "body": "<li>  <strong>技术机制</strong>: <code>quicly</code> 抽象出可插拔的拥塞控制层。内置实现 <code>cubic</code> 与 <code>reno</code> 两种拥塞策略。连接初始化时在上下文注册 <code>quicly_cc_type_t</code> 结构。每次收到 ACK 或检测到丢包，<code>quicly</code> 都会执行该结构中的 <code>on_acked</code> 或 <code>on_lost</code>，并在 CUBIC 状态机中转移参数（如乘性减小、加性增大），精确估算最佳带宽延迟积（BDP）。</li><li>  <strong>应用策略</strong>: 可以根据所处局域网、城域网或公网的环境特点，编译配置更适合当前带宽特征的拥塞控制插件。</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "高级特性与容灾优化", "color": "#BFA88F", "title": "优雅停机连接 Draining 与流平滑排空", "body": "<li>  <strong>技术机制</strong>: 收到系统 TERM 退出信号后，H2O 首先注销全局监听端口，拒绝接收任何新建连接。对于现存 TCP 连接，对于 HTTP/2 发送携带最大流 ID 的 <code>GOAWAY</code> 帧，对于 HTTP/3 触发 QUIC 的 Connection Draining。通知客户端当前连接即将断开，使现有事务在预设优雅超时内平滑执行完毕后，再平稳退役进程。</li><li>  <strong>应用策略</strong>: 极大减少了生产发布和版本更新时的请求中断故障，实现无缝不停服滚动更新。</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "高级特性与容灾优化", "color": "#BFA88F", "title": "抗 HTTP/2 & HTTP/3 慢速泛洪攻击流控防护策略", "body": "<li>  <strong>技术机制</strong>: 恶意客户端可能发起大量空逻辑流（如发完 HEADERS 帧后不再发送后续，或以极慢速率发包）企图占满服务器的流通道句柄。H2O 实施了严格的重置流频率计数（RST_STREAM rate-limiting）与并发流超时约束。一旦连接累计重置流次数超限或单个 HEADERS 占位时间过长，H2O 会立即关闭此物理连接，确保正常请求的转发资源。</li><li>  <strong>应用策略</strong>: 在互联网公开网关上，合理配置 <code>max-concurrent-streams</code> 和相关的 DoS 防御计时器，保障公网接入的高可用。</li>"}];

        function renderCards(filter) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            cardsData.forEach(card => {
                if (filter !== 'ALL' && card.module !== filter) return;
                
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.style.borderTop = `4px solid ${card.color}`;
                
                cardEl.innerHTML = `
                    <div class="card-header">
                        <span class="card-module">${card.moduleName}</span>
                        <span class="card-id" style="background-color:${card.color}">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                container.appendChild(cardEl);
            });
        }

        function filterCards(mod) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // Match active button by onclick argument
            event.target.classList.add('active');
            renderCards(mod);
        }

        // Init
        renderCards('ALL');
    </script>
</body>
</html>
