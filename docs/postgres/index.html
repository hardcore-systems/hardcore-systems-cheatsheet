    <style>
        :root {

    <script>
        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "\u8fdb\u7a0b\u6a21\u578b\u4e0e\u8fde\u63a5\u751f\u547d\u671f", "color": "#7A8B99", "title": "Postmaster \u4e0e Backend \u591a\u8fdb\u7a0b\u67b6\u6784 (Multi-process Architecture)", "body": "<li>  <strong>\u591a\u8fdb\u7a0b\u5f3a\u9694\u79bb\u9694\u79bb</strong>\uff1aPostgreSQL \u91c7\u7528\u591a\u8fdb\u7a0b\u67b6\u6784\u3002\u4e3b\u8fdb\u7a0b <code>Postmaster</code> \u76d1\u542c\u7aef\u53e3\uff0c\u5728\u5ba2\u6237\u7aef\u8fde\u5165\u65f6\u8c03\u7528 <code>fork()</code> \u6d3e\u751f\u4e00\u4e2a\u72ec\u7acb\u7684 <code>Backend</code> \u5de5\u4f5c\u8fdb\u7a0b\u5904\u7406\u8be5\u8fde\u63a5\u7684\u6240\u6709\u4e8b\u52a1\u3002</li><li>  <strong>\u6545\u969c\u5355\u70b9\u9694\u79bb</strong>\uff1a\u5355\u4e2a\u8fde\u63a5\u8fdb\u7a0b\u53d1\u751f\u5185\u5b58\u8d8a\u754c\u6216\u6302\u8d77\u5d29\u6e83\u65f6\uff0c\u4ec5\u9700\u7ec8\u6b62\u8be5\u540e\u53f0\u8fdb\u7a0b\uff0c\u5176\u4ed6\u8fde\u63a5\u4e0d\u53d7\u4efb\u4f55\u7269\u7406\u5f71\u54cd\uff0c\u4fdd\u8bc1\u4e86\u7cfb\u7edf\u7684\u6781\u9ad8\u5bb9\u9519\u6027\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "\u8fdb\u7a0b\u6a21\u578b\u4e0e\u8fde\u63a5\u751f\u547d\u671f", "color": "#7A8B99", "title": "\u5171\u4eab\u5185\u5b58\u6bb5\u7269\u7406\u6784\u6210\u4e0e\u4f5c\u7528 (Shared Memory Layout)", "body": "<li>  <strong>\u7269\u7406\u5171\u4eab\u9875\u8868\u6bb5</strong>\uff1a\u591a\u8fdb\u7a0b\u4f9d\u9760\u7269\u7406\u5171\u4eab\u5185\u5b58\uff08Shared Memory\uff09\u901a\u4fe1\u3002</li><li>  <strong>\u5171\u4eab\u63a7\u5236\u533a</strong>\uff1a\u5171\u4eab\u5185\u5b58\u4e3b\u8981\u5212\u5206\u4e3a <code>Shared Buffers</code>\uff08\u5171\u4eab\u9875\u9762\u7f13\u51b2\u533a\uff09\u3001<code>WAL Buffers</code>\uff08\u9884\u5199\u65e5\u5fd7\u7f13\u51b2\u533a\uff09\u3001\u5168\u5c40\u9501\u7ba1\u7406\u5668\uff08Lock Table\uff09\u3001\u4e8b\u52a1\u72b6\u6001\u8bb0\u5f55\uff08Commit Log, CLOG\uff09\u4ee5\u53ca\u7ef4\u62a4\u5168\u5c40\u8fdb\u7a0b\u72b6\u6001\u7684 <code>ProcArray</code>\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "\u8fdb\u7a0b\u6a21\u578b\u4e0e\u8fde\u63a5\u751f\u547d\u671f", "color": "#7A8B99", "title": "\u8fde\u63a5\u6c60\u4ee3\u7406\u5c42 pg_bouncer \u8c03\u4f18 (Connection Pooling)", "body": "<li>  <strong>\u8fdb\u7a0b\u521b\u5efa\u9ad8\u6602\u5f00\u9500</strong>\uff1a\u7531\u4e8e Postgres \u6bcf\u4e2a\u8fde\u63a5\u90fd\u662f OS \u8fdb\u7a0b\uff0c\u521b\u5efa\u548c\u9500\u6bc1\u8fde\u63a5\u9700\u8981\u8fdb\u884c\u7e41\u91cd\u7684\u9875\u8868\u62f7\u8d1d\u4e0e\u7cfb\u7edf\u8c03\u7528\u3002</li><li>  <strong>\u4e8b\u52a1\u7ea7\u8fde\u63a5\u6c60\u590d\u7528</strong>\uff1a\u751f\u4ea7\u4e2d\u5fc5\u987b\u914d\u7f6e <code>pg_bouncer</code>\u3002\u5176\u4e8b\u52a1\u7ea7\u6c60\uff08Transaction Mode\uff09\u80fd\u5728\u4e8b\u52a1\u7ed3\u675f\u540e\u7acb\u5373\u91ca\u653e Backend \u7ed9\u5176\u4ed6\u5ba2\u6237\u7aef\u590d\u7528\uff0c\u89c4\u907f\u8fdb\u7a0b\u4e0a\u9650\u5bfc\u81f4 CPU \u8017\u5c3d\u5728\u4e0a\u4e0b\u6587\u5207\u6362\u4e2d\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "\u8fdb\u7a0b\u6a21\u578b\u4e0e\u8fde\u63a5\u751f\u547d\u671f", "color": "#7A8B99", "title": "PostgreSQL \u524d\u540e\u7aef v3.0 \u901a\u4fe1\u534f\u8bae (Frontend/Backend Protocol)", "body": "<li>  <strong>\u7f51\u7edc\u62a5\u6587\u89c4\u8303</strong>\uff1aPG \u91c7\u7528 Frontend/Backend 3.0 \u534f\u8bae\u3002\u8fde\u63a5\u63e1\u624b\u65f6\u53d1\u9001 Startup Message\uff0c\u5305\u542b\u5e93\u540d\u4e0e\u8ba4\u8bc1\u3002</li><li>  <strong>\u4e24\u7c7b\u67e5\u8be2\u901a\u4fe1</strong>\uff1a</li><li>1.  <strong>Simple Query</strong>\uff1a\u53d1\u9001 SQL \u6587\u672c\uff0c\u8fd4\u56de RowDescription \u548c\u82e5\u5e72 DataRow\uff0c\u6700\u540e\u4ee5 ReadyForQuery \u95ed\u73af\u3002</li><li>2.  <strong>Extended Query</strong>\uff1a\u901a\u8fc7 Prepare\u3001Bind\u3001Execute \u4e09\u9636\u6bb5\u62a5\u6587\uff0c\u652f\u6301\u4e8c\u8fdb ": "#7D8F7B", "title": "\u4ee3\u4ef7\u4f18\u5316\u5668 CBO Join \u8def\u5f84\u89c4\u5212 (CBO Join Path Selection)", "body": "<li>  <strong>\u4ee3\u4ef7\u516c\u5f0f\u5224\u5b9a</strong>\uff1aCBO\uff08\u57fa\u4e8e\u4ee3\u4ef7\u4f18\u5316\u5668\uff09\u57fa\u4e8e\u5355\u8868 Scan \u4ee3\u4ef7\uff0c\u8ba1\u7b97\u751f\u6210\u7269\u7406 Path \u7684\u4ee3\u4ef7\u3002</li><li>  <strong>System R \u526a\u679d\u7b97\u6cd5</strong>\uff1a\u91c7\u7528 System R \u52a8\u6001\u89c4\u5212\u7b97\u6cd5\u81ea\u5e95\u5411\u4e0a\u641c\u7d22\u591a\u8868 Join \u7684\u8fde\u63a5\u987a\u5e8f\u3002\u901a\u8fc7\u914d\u7f6e <code>seq_page_cost</code> \u548c <code>random_page_cost</code> \u6307\u5bfc\u4f18\u5316\u5668\u5728 IndexScan \u4e0e SeqScan \u4e4b\u95f4\u505a\u51fa\u6700\u4f18\u4ee3\u4ef7\u51b3\u7b56\uff0c\u81ea\u52a8\u88c1\u526a\u4f4e\u6548\u5de6\u6df1\u6811\u3002</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668\u4e0e\u4f18\u5316\u5668", "color": "#7D8F7B", "title": "Volcano \u7b97\u5b50\u7269\u7406\u6267\u884c\u8282\u70b9\u63a7\u5236 (Executor Operator Nodes)", "body": "<li>  <strong>\u706b\u5c71\u8fed\u4ee3\u6811\u5f0f\u8c03\u7528</strong>\uff1a\u6267\u884c\u5668\uff08Executor\uff09\u63a5\u6536\u7269\u7406 Plan \u6811\u3002\u6bcf\u4e2a\u7b97\u5b50\uff08\u5982 HashJoin, SeqScan\uff09\u5747\u5b9e\u73b0\u7edf\u4e00\u63a5\u53e3\u3002</li><li>  <strong>\u81ea\u4e0b\u800c\u4e0a\u6d41\u5f0f\u62c9\u53d6</strong>\uff1a\u9876\u7ea7\u8282\u70b9\u9012\u5f52\u8c03\u7528\u5b50\u7b97\u5b50\u7684 <code>ExecProcNode()</code>\u3002\u5b50\u7b97\u5b50\u6309\u9700\u6d41\u5f0f\u62c9\u53d6\u4e00\u884c\u8bb0\u5f55\uff08Tuple\uff09\u5e76\u8fd4\u56de\uff0c\u5c06\u5185\u5b58\u5360\u7528\u9650\u5236\u5728\u5355\u884c\u7ea7\u522b\uff0c\u5b9e\u73b0\u4e86\u8ba1\u7b97\u6d41\u5f0f\u76f4\u901a\u3002</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "\u5173\u7cfb\u67e5\u8be2\u5904\u7406\u5668\u4e0e\u4f18\u5316\u5668", "color": "#7D8F7B" \u6d88\u9664\u4e86\u56de\u7ed5\u5d29\u6e83\u98ce\u9669\u3002</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "\u4e8b\u52a1\u9694\u79bb\u4e0e\u5e76\u53d1\u63a7\u5236", "color": "#B58A7D", "title": "\u9501\u7ba1\u7406\u5668\u591a\u6a21\u9501\u52a0\u9501\u4f18\u5148\u7ea7\u4e0e\u6b7b\u9501 (Lock Manager Layout)", "body": "<li>  <strong>\u591a\u6a21\u7b49\u9501\u54c8\u5e0c\u8868</strong>\uff1a\u9501\u7ba1\u7406\u5668\u7ef4\u62a4\u5168\u5c40\u54c8\u5e0c\u8868\u3002\u652f\u6301 8 \u79cd\u9501\u6a21\u5f0f\uff08\u5982 RowShare, AccessExclusive\uff09\uff0c\u9501\u6a21\u5f0f\u4e4b\u95f4\u6709\u8be6\u7ec6\u7684\u4e92\u65a5\u51b2\u7a81\u77e9\u9635\u3002</li><li>  <strong>\u6709\u5411\u56fe\u6b7b\u9501\u68c0\u6d4b</strong>\uff1a\u4e00\u65e6 Backend \u7533\u8bf7\u9501\u88ab\u963b\u585e\uff0c\u8fdb\u5165 Wait \u961f\u5217\u3002\u540e\u53f0\u7ebf\u7a0b\u542f\u52a8 <code>DeadlockTimeout</code>\uff0c\u6784\u5efa\u9501\u7b49\u5f85\u6709\u5411\u56fe\u3002\u4e00\u65e6\u68c0\u6d4b\u5230\u73af\u8def\uff0c\u5f3a\u5236\u56de\u6eda\uff08Abort\uff09\u5f53\u524d\u4e8b\u52a1\u4ee5\u91ca\u653e\u9501\u3002</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "\u9884\u5199\u65e5\u5fd7\u4e0e\u5d29\u6e83\u6062\u590d", "color": "#5F7582", "title": "WAL \u65e5\u5fd7\u7269\u7406\u6bb5\u7ed3\u6784\u4e0e LSN \u903b\u8f91\u6620\u5c04 (WAL Segments & LSN)", "body": "<li>  <strong>\u6bb5\u6587\u4ef6\u8ffd\u52a0\u5237\u76d8</strong>\uff1aWAL \u8bb0\u5f55\u5305\u542b\u5bf9\u6570\u636e\u7684\u7269\u7406\u4fee\u6539\u589e\u91cf\uff0c\u8fde\u7eed\u8ffd\u52a0\u5199\u5165 16MB \u5927\u5c0f\u7684 WAL segment \u6587\u4ef6\u4e2d\u3002</li><li>  <strong>LSN \u5b57\u8282\u6d41\u504f\u79fb</strong>\uff1a\u6bcf\u4e00\u6761 WAL \u8bb0\u5f55\u62e5\u6709\u4e00\u4e2a 64 \u4f4d\u65e0\u7b26\u53f7\u6574\u578b LSN\uff08Log Sequence Number\uff09\uff0c\u8868\u793a\u8be5\u8bb0\u5f55\u5728 WAL \u5b57\u8282\u6d41\u4e2d\u7684\u7edd\u5bf9\u504f\u79fb\u91cf\uff0c\u662f\u5d29\u6e83\u6062\u590d\u548c\u6d41\u590d\u5236\u7684\u7269\u7406\u65f6\u95f4\u8f74\u3002</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "\u9884\u5199\u65e5\u5fd7\u4e0e\u5d29\u6e83\u6062\u590d", "color": "#5F7582", "title": "Checkpointer \u80cc\u666f\u5199\u810f\u9875\u5206\u644a\u7b97\u6cd5 (Checkpointer Spreading)", "body": "<li>  <strong>Checkpoint \u505c\u987f\u505c\u6446</strong>\uff1a\u5982\u679c Checkpointer \u77ac\u65f6\u5c06\u5185\u5b58\u6240\u6709\u810f\u9875\u5199\u5165\u78c1\u76d8\uff0c\u4f1a\u5bfc\u81f4\u5bbf\u4e3b\u673a I/O \u88ab\u6253\u6ee1\u53d1\u751f\u4e25\u91cd Stall \u6296\u52a8\u3002</li><li>  <strong>\u5e73\u6ed1\u5199\u7cfb\u6570\u5e73\u644a</strong>\uff1aPostgres \u5f15\u5165 <code>checkpoint_completion_target</code>\uff08\u9ed8\u8ba4 0.9\uff09\u3002Checkpointer \u8ba1\u7b97\u4e0a\u6b21 checkpoint \u5230\u73b0\u5728\u7684\u65f6\u95f4\u5dee\uff0c\u5c06\u810f\u9875\u5199\u5165\u5e73\u644a\u5230 90% \u7684\u5468\u671f\u5185\u6267\u884c\uff0c\u5e73\u6ed1\u4e86\u78c1\u76d8 I/O\u3002</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "\u9884\u5199\u65e5\u5fd7\u4e0e\u5d29\u6e83\u6062\u590d", "color": "#5F7582", "title": "Crash Recovery \u5d29\u6e83\u91cd\u505a\u4e0e Hot Standby (Replay Redo & Hot Standby)", "body": "<li>  <strong>\u524d\u5411\u626b\u63cf\u91cd\u653e\u5386\u53f2</strong>\uff1a\u7cfb\u7edf\u5d29\u6e83\u91cd\u542f\u540e\uff0cStartup \u8fdb\u7a0b\u8bfb\u53d6\u63a7\u5236\u6587\u4ef6\uff0c\u627e\u5230\u6700\u540e\u4e00\u4e2a Checkpoint\uff0c\u5f00\u59cb\u6b63\u5411\u626b\u63cf WAL \u65e5\u5fd7\u5e76\u91cd\u653e Redo \u4fee\u6539\uff0c\u76f4\u5230 LSN \u8ffd\u5e73\u3002</li><li>  <strong>\u53ea\u8bfb\u6d41\u590d\u5236\u540c\u6b65</strong>\uff1aHot Standby \u5907\u5e93\u542f\u52a8\u53ea\u8bfb\u670d\u52a1\uff0c\u901a\u8fc7\u4e0d\u65ad\u63a5\u6536\u4e3b\u5e93\u53d1\u9001\u7684 WAL \u65e5\u5fd7\u5e76\u7269\u7406\u91cd\u653e\uff0c\u5b9e\u73b0\u4e0e\u4e3b\u5e93\u7684\u6beb\u79d2\u7ea7\u6570\u636e\u540c\u6b65\u3002</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "\u9884\u5199\u65e5\u5fd7\u4e0e\u5d29\u6e83\u6062\u590d", "color": "#5F7582", "title": "\u7269\u7406/\u903b\u8f91\u590d\u5236\u63d2\u69fd Streaming Replication (Replication Slots)", "body": "<li>  <strong>\u5907\u673a\u5ef6\u8fdf\u5bfc\u81f4\u7684\u65e5\u5fd7\u6e05\u7406</strong>\uff1a\u4f20\u7edf\u7684 Streaming Replication\uff0c\u82e5\u5907\u673a\u65ad\u5f00\uff0c\u4e3b\u673a\u53ef\u80fd\u4f1a\u5728 Checkpoint \u671f\u95f4\u5c06\u5907\u673a\u9700\u8981\u7684\u65e7 WAL \u6587\u4ef6\u7269\u7406\u6e05\u7406\u6389\u3002</li><li>  <strong>\u590d\u5236\u63d2\u69fd\u9501\u5b9a LSN</strong>\uff1a\u5f15\u5165 Replication Slot\u3002\u63d2\u69fd\u5728\u4e3b\u673a\u4e0a\u9501\u5b9a\u5907\u673a\u5f53\u524d\u7684\u6700\u5c0f\u8bfb\u53d6 LSN\uff0c\u5f3a\u5236\u4e3b\u673a\u4fdd\u7559\u8be5 LSN \u4e4b\u540e\u7684\u6240\u6709 WAL segment \u6587\u4ef6\uff0c\u76f4\u5230\u5907\u673a\u91cd\u65b0\u8fde\u5165\u540c\u6b65\u3002</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "\u9884\u5199\u65e5\u5fd7\u4e0e\u5d29\u6e83\u6062\u590d", "color": "#5F7582", "title": "PostgreSQL \u5206\u5e03\u5f0f\u4e8c\u9636\u6bb5\u63d0\u4ea4 2PC (PREPARE TRANSACTION)", "body": "<li>  <strong>\u8de8\u8282\u70b9\u72b6\u6001\u5bf9\u9f50</strong>\uff1a\u652f\u6301\u5206\u5e03\u5f0f 2PC \u63d0\u4ea4\u3002</li><li>  <strong>\u672c\u5730\u72b6\u6001\u6587\u4ef6\u56fa\u5316</strong>\uff1a\u6267\u884c <code>PREPARE TRANSACTION 'xid'</code> \u65f6\uff0cBackend \u8fdb\u7a0b\u5c06\u8be5\u4e8b\u52a1\u7684\u9501\u72b6\u6001\u548c\u4fee\u6539\u7684 CLOG \u5f3a\u5236\u5199\u5165\u672c\u5730 <code>pg_twophase</code> \u76ee\u5f55\u7684\u7269\u7406\u72b6\u6001\u6587\u4ef6\u4e2d\u3002\u6b64\u65f6\u5373\u4f7f\u8fdb\u7a0b\u91cd\u542f\uff0c\u9501\u548c\u72b6\u6001\u4f9d\u65e7\u4fdd\u7559\uff0c\u76f4\u5230\u540e\u7eed\u6536\u5230 <code>COMMIT PREPARED</code> \u5e7f\u64ad\u3002</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "\u9884\u5199\u65e5\u5fd7\u4e0e\u5d29\u6e83\u6062\u590d", "color": "#5F7582", "title": "\u53ef\u4e32\u884c\u5316\u5feb\u7167\u9694\u79bb SSI \u9501\u56e0\u679c\u94fe (Serializable Snapshot Isolation SSI)", "body": "<li>  <strong>\u5199\u503e\u659c\u65e0\u9501\u68c0\u6d4b</strong>\uff1aSSI \u5728\u6267\u884c\u65f6\u4e0d\u52a0\u4efb\u4f55\u7269\u7406\u963b\u585e\u9501\uff0c\u4f9d\u9760\u8bfb\u5199\u53cd\u4f9d\u8d56\u5173\u7cfb\uff08rw-antidependencies\uff09\u5224\u5b9a\u5199\u503e\u659c\u98ce\u9669\u3002</li><li>  <strong>\u56e0\u679c\u4f9d\u8d56\u6709\u5411\u73af</strong>\uff1a\u5185\u6838\u5728\u5171\u4eab\u5185\u5b58\u4e2d\u7ef4\u62a4 <code>SIREAD</code> \u865a\u62df\u9501\u3002\u4e00\u65e6\u53d1\u73b0 $T1 \\xrightarrow{rw} T2 \\xrightarrow{rw} T3$ \u8fd9\u79cd\u53cc\u91cd\u8bfb\u5199\u53cd\u4f9d\u8d56\u95ed\u73af\uff0c\u5224\u5b9a\u53d1\u751f\u4e32\u884c\u5316\u5f02\u5e38\uff0c\u5f3a\u5236 Abort \u5e76\u56de\u6eda\u6b63\u5728\u63d0\u4ea4\u7684\u4e8b\u52a1\u3002</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "Buffer Buffmgr \u65f6\u949f\u5faa\u73af\u9875\u9762\u6dd8\u6c70 (Shared Buffers Clock Sweep)", "body": "<li>  <strong>\u5f15\u7528\u81ea\u51cf\u6dd8\u6c70\u6307\u9488</strong>\uff1aPostgres \u7684\u5171\u4eab\u5185\u5b58\u7f13\u51b2\u6c60\u4f7f\u7528 <code>usage_count</code>\uff08\u4f7f\u7528\u8ba1\u6570\uff0c0~5\uff09\u6765\u7ba1\u7406\u6dd8\u6c70\u3002</li><li>  <strong>\u5927\u8868 Scan \u73af\u5f62\u7f13\u51b2</strong>\uff1a\u65f6\u949f\u6307\u9488\u5faa\u73af\u68c0\u67e5\u9875\u9762\uff0c\u975e 0 \u9875\u9762\u4f7f\u7528\u8ba1\u6570\u51cf 1\uff0c\u4e3a 0 \u4e14\u672a\u88ab Pin \u9501\u5b9a\u7684\u9875\u9762\u88ab\u76f4\u63a5\u9a71\u9010\u3002\u4e3a\u4e86\u9632\u6b62\u5927\u8868\u5168\u8868\u626b\u63cf\u6c61\u67d3\u6574\u4e2a\u7f13\u51b2\u6c60\uff0cPG \u5f15\u5165 Bulk Read \u73af\u5f62\u7f13\u51b2\u533a\u673a\u5236\uff0c\u4ec5\u5728\u56fa\u5b9a\u7684\u5c11\u91cf\u9875\u9762\u5185\u5faa\u73af\u66ff\u6362\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "FSM \u7a7a\u95f4\u56fe\u4e0e VM \u53ef\u89c1\u6027\u6620\u5c04\u7269\u7406\u4f5c\u7528 (FSM & VM Maps)", "body": "<li>  <strong>\u81ea\u7531\u7a7a\u95f4\u5b9a\u4f4d</strong>\uff1a<code>FSM</code> (Free Space Map) \u6587\u4ef6\u8bb0\u5f55\u5806\u9875\u9762\u7684\u53ef\u7528\u5b57\u8282\u6863\u4f4d\uff0c\u5199\u5165\u65f6\u53ef\u5fae\u79d2\u7ea7\u5b9a\u4f4d\u5230\u54ea\u4e2a\u7269\u7406\u9875\u6709\u7a7a\u95f2\u63d2\u5165\u5143\u7ec4\uff0c\u907f\u514d\u5168\u6587\u4ef6\u987a\u5e8f\u67e5\u627e\u3002</li><li>  <strong>\u53ef\u89c1\u6027\u7269\u7406\u6807\u8bb0</strong>\uff1a<code>VM</code> (Visibility Map) \u6807\u8bb0\u54ea\u4e9b\u9875\u9762\u7684\u5143\u7ec4\u5bf9\u4e8e\u5f53\u524d\u6240\u6709\u4e8b\u52a1\u5747\u5b8c\u5168\u53ef\u89c1\u3002Auto-vacuum \u53ef\u4ee5\u76f4\u63a5\u8df3\u8fc7\u5df2\u5168\u90e8\u53ef\u89c1\u7684\u9875\u9762\u626b\u63cf\uff0c\u4e14 Index-Only Scan \u53ef\u4ee5\u901a\u8fc7 VM \u76f4\u63a5\u5224\u65ad\uff0c\u65e0\u9700\u4e8c\u6b21\u8bfb\u53d6 Heap Page \u9a8c\u8bc1\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "LLVM JIT \u52a8\u6001\u8868\u8fbe\u5f0f\u6267\u884c\u7f16\u8bd1\u4f18\u5316 (LLVM JIT Compile)", "body": "<li>  <strong>\u590d\u6742 SQL \u89e3\u91ca\u5f00\u9500</strong>\uff1a\u5f53 SQL \u5305\u542b\u591a\u5c42 Projection\u3001Filter \u8868\u8fbe\u5f0f\u8ba1\u7b97\u65f6\uff0c\u4f20\u7edf\u7684\u89e3\u91ca\u5668\u5728 CPU \u7ea7\u6709\u5927\u91cf\u7684\u5206\u652f\u9884\u6d4b\u5931\u8d25\u548c\u5faa\u73af\u8df3\u8f6c\u5f00\u9500\u3002</li><li>  <strong>LLVM \u8fd0\u884c\u65f6\u673a\u5668\u7801\u751f\u6210</strong>\uff1aPostgres \u96c6\u6210 LLVM\u3002\u5728\u89c4\u5212\u671f\u52a8\u6001\u7f16\u8bd1\u8fd9\u4e9b\u8868\u8fbe\u5f0f\u751f\u6210\u672c\u5730 CPU \u673a\u5668\u7801\u6307\u4ee4\uff0c\u5728\u6267\u884c\u9636\u6bb5\u76f4\u63a5\u7531 CPU \u95ed\u73af\u6267\u884c\uff0c\u6027\u80fd\u63d0\u5347\u6570\u500d\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "Foreign Data Wrapper (FDW) \u8de8\u5e93\u8054\u90a6\u5f15\u64ce (Foreign Data Wrapper)", "body": "<li>  <strong>\u5f02\u6784\u5e93\u8868\u900f\u660e\u6302\u8f7d</strong>\uff1aPostgres \u7b26\u5408 SQL/MED \u6807\u51c6\u3002\u5229\u7528 FDW \u53ef\u4ee5\u5c06 MySQL, Oracle, MongoDB \u7b49\u5916\u90e8\u8868\u6302\u8f7d\u4e3a\u672c\u5730\u865a\u62df\u8868\u3002</li><li>  <strong>\u4f18\u5316\u5668\u7b97\u5b50\u4e0b\u63a8</strong>\uff1a\u5728\u6267\u884c\u67e5\u8be2\u65f6\uff0cCBO \u80fd\u591f\u5206\u6790\u5916\u90e8\u6570\u636e\u6e90\u7684\u7279\u6027\uff0c\u5c06 Where \u8fc7\u6ee4\u3001Limit \u4ee5\u53ca\u90e8\u5206\u7684 Join \u7b97\u5b50\u7269\u7406\u4e0b\u63a8\u5230\u8fdc\u7aef\u6570\u636e\u5e93\u6267\u884c\uff0c\u6700\u5c0f\u5316\u7f51\u7edc\u4f20\u8f93\u6d88\u8017\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "pg_stat_statements \u5168\u5c40\u6162\u67e5\u8be2\u6027\u80fd\u8bca\u65ad (pg_stat_statements)", "body": "<li>  <strong>\u67e5\u8be2\u6267\u884c\u7edf\u8ba1\u5e93</strong>\uff1aPG \u5b98\u65b9\u63d0\u4f9b\u7684\u6027\u80fd\u8bca\u65ad\u6269\u5c55\u3002\u80fd\u591f\u5c06\u5168\u5e93\u6267\u884c\u7684 SQL \u8fdb\u884c\u53c2\u6570\u6cdb\u5316\u5f52\u7c7b\u3002</li><li>  <strong>\u8bca\u65ad\u5206\u6790\u89c6\u56fe</strong>\uff1a\u5b9e\u65f6\u6536\u96c6\u6bcf\u79cd SQL \u7684\u8c03\u7528\u6b21\u6570\uff08calls\uff09\u3001\u603b\u6267\u884c\u65f6\u95f4\u3001\u5171\u4eab\u7f13\u51b2\u6c60\u547d\u7387\u548c I/O \u8bfb\u5199\u65f6\u957f\uff0c\u662f\u5b9a\u4f4d\u6162 SQL\u3001\u5206\u6790\u7f13\u51b2\u547d\u4e2d\u74f6\u9888\u7684\u7ec8\u6781\u8bca\u65ad\u5229\u5668\u3002</li>"}];
        let activeFilter = 'all';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            const searchVal = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            cards.forEach(card => {
                const matchesFilter = activeFilter === 'all' || card.module === activeFilter;
                const matchesSearch = card.title.toLowerCase().includes(searchVal) || card.body.toLowerCase().includes(searchVal);

                if (matchesFilter && matchesSearch) {
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card';
                    cardEl.style.borderTop = `4px solid ${card.color}`;
                    cardEl.innerHTML = `
                        <div class="card-header">
                            <span class="card-tag" style="background-color: ${card.color}">${card.relativeId}</span>
                            <span class="card-id">Card ${card.id}</span>
                        </div>
                        <h3 class="card-title">${card.title}</h3>
                        <div class="card-body">${card.body}</div>
                    `;
                    grid.appendChild(cardEl);
                }
            });
        }

        function setFilter(mod, btn) {
            activeFilter = mod;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        window.onload = renderCards;
    </script>
</body>
