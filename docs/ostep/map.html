    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161820;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-badge span.num {
            color: var(--accent-color);
            font-weight: 700;
        }
        .filter-controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 300px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent-color);
        }
        .filter-btn {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: #94a3b8;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .filter-btn:hover {
            color: var(--text-color);
            background-color: #2e3b4e;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .card-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            color: white;
            text-transform: uppercase;
        }
        .card-id {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: white;
        }
        .card-body {
            font-size: 0.9rem;
            color: #cbd5e1;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.75rem;
        }
        .card-body li {
            list-style-type: none;
            padding-left: 1.2rem;
            position: relative;
            margin-bottom: 0.5rem;
        }
        .card-body li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-color);
            font-weight: bold;
        }
        .card-body code {
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            font-family: monospace;
            color: #f43f5e;
        }
    </style>
</head>

    <script>
        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "CPU \u865a\u62df\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "\u8fdb\u7a0b\u72b6\u6001\u673a\u3001\u5185\u6838\u6808\u4e0e\u5bc4\u5b58\u5668\u4fdd\u5b58 (Process Lifecycle & Kernel Stack)", "body": "<li>  <strong>\u8fdb\u7a0b\u7269\u7406\u63cf\u8ff0\u7b26</strong>\uff1a\u64cd\u4f5c\u7cfb\u7edf\u4f7f\u7528 <code>struct proc</code>\uff08\u5728 Linux \u4e2d\u4e3a <code>task_struct</code>\uff09\u4fdd\u5b58\u8fdb\u7a0b\u7684\u72b6\u6001\u3001PID\u3001\u6587\u4ef6\u63cf\u8ff0\u7b26\u8868\u4ee5\u53ca\u9875\u8868\u6307\u9488\u3002</li><li>  <strong>\u5185\u6838\u6808\u4e0a\u4e0b\u6587\u5207\u6362</strong>\uff1a\u5f53\u89e6\u53d1\u8fdb\u7a0b\u5207\u6362\u65f6\uff0c\u8c03\u5ea6\u5668\u5c06\u5f53\u524d CPU \u7684\u5bc4\u5b58\u5668\uff08\u5982 EIP, ESP\uff09\u538b\u5165\u8be5\u8fdb\u7a0b\u4e13\u5c5e\u7684\u5185\u6838\u6808\uff08Kernel Stack\uff09\u4e2d\uff0c\u968f\u540e\u4fee\u6539 CPU \u7684\u6808\u6307\u9488\u5bc4\u5b58\u5668\uff08ESP\uff09\u5207\u6362\u5230\u76ee\u6807\u8fdb\u7a0b\u5185\u6838\u6808\uff0c\u5e76\u6267\u884c <code>pop</code> \u6062\u590d\u5bc4\u5b58\u5668\u72b6\u6001\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "CPU \u865a\u62df\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "\u53d7\u9650\u76f4\u63a5\u6267\u884c (LDE) \u4e0e\u7279\u6743\u6a21\u5f0f\u9677\u9631 (Limited Direct Execution)", "body": "<li>  <strong>\u7269\u7406\u73af\u7279\u6743\u7ea7\u9694\u79bb</strong>\uff1a\u786c\u4ef6\u901a\u8fc7 CPU \u7684 Mode Bit \u533a\u5206\u7528\u6237\u6001\uff08Ring 3\uff09\u548c\u5185\u6838\u6001\uff08Ring 0\uff09\u3002\u7528\u6237\u6001\u65e0\u6cd5\u6267\u884c\u7279\u6743\u6307\u4ee4\uff08\u5982\u4fee\u6539 CR3 \u5bc4\u5b58\u5668\u3001\u76f4\u63a5\u63a7\u5236 I/O \u786c\u4ef6\uff09\u3002</li><li>  <strong>Trap \u9677\u5165\u673a\u5236</strong>\uff1a\u7528\u6237\u7a0b\u5e8f\u9700\u8981\u7533\u8bf7\u7cfb\u7edf\u8d44\u6e90\u65f6\uff0c\u5fc5\u987b\u6267\u884c <code>syscall</code> \u6307\u4ee4\uff0c\u786c\u4ef6\u8bfb\u53d6\u9884\u5148\u914d\u7f6e\u7684 Trap Vector \u5e76\u8df3\u8f6c\u5230\u4e2d\u65ad\u5904\u7406\u7a0b\u5e8f\uff0c\u540c\u65f6\u4fee\u6539\u7279\u6743\u7ea7\u4e3a Ring 0\uff0c\u5b9e\u73b0\u53d7\u63a7\u7684\u7279\u6743\u7ea7\u8f6c\u6362\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "CPU \u865a\u62df\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "\u591a\u7ea7\u53cd\u9988\u961f\u5217 (MLFQ) \u8c03\u5ea6\u9632\u9965\u997f (MLFQ Scheduling)", "body": "<li>  <strong>\u52a8\u6001\u4f18\u5148\u7ea7\u6f14\u8fdb</strong>\uff1aMLFQ \u8bbe\u7acb\u591a\u4e2a\u4f18\u5148\u7ea7\u961f\u5217\u3002\u65b0\u8fdb\u7a0b\u8fdb\u5165\u6700\u9ad8\u4f18\u5148\u7ea7\u961f\u5217\uff08\u65f6\u95f4\u7247\u6700\u77ed\uff09\uff1b\u5982\u679c\u8fdb\u7a0b\u7528\u5b8c\u4e86\u6574\u4e2a\u65f6\u95f4\u7247\uff0c\u5219\u88ab\u964d\u7ea7\u5230\u4f4e\u4e00\u7ea7\u961f\u5217\uff08\u65f6\u95f4\u7247\u53d8\u957f\uff09\uff1b\u5982\u679c\u8fdb\u7a0b\u5728\u65f6\u95f4\u7247\u7ed3\u675f\u524d\u4e3b\u52a8\u8ba9\u51fa CPU\uff08\u5982\u7b49\u5f85 I/O\uff09\uff0c\u5219\u4f18\u5148\u7ea7\u4fdd\u6301\u4e0d\u53d8\u3002</li><li>  <strong>\u5468\u671f\u6027\u4f18\u5148\u7ea7\u63d0\u5347</strong>\uff1a\u4e3a\u4e86\u9632\u6b62\u957f\u8ba1\u7b97\u4efb\u52a1\u5728\u4f4e\u4f18\u5148\u7ea7\u961f\u5217\u53d1\u751f\u9965\u997f\uff08Starvation\uff09\uff0c\u7cfb\u7edf\u8bbe\u7f6e\u5468\u671f $S$\uff0c\u5230\u671f\u540e\u5f3a\u5236\u5c06\u7cfb\u7edf\u5185\u6240\u6709\u8fdb\u7a0b\u5168\u90e8\u63d0\u5347\u81f3\u6700\u9ad8\u4f18\u5148\u7ea7\u961f\u5217\uff0c\u91cd\u7f6e\u5176\u65f6\u95f4\u7247\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "CPU \u865a\u62df\u5316\u4e0e\u8fdb\u7a0b\u8c03\u5ea6", "color": "#7A8B99", "title": "\u6bd4\u4f8b\u4efd\u989d\u4e0e\u5b8c\u5168\u516c\u5e73\u8c03\u5ea6 (CFS) \u7ea2\u9ed1\u6811 (CFS Scheduling)", "body": "<li>  <strong 01c\u65e0\u72b6\u6001\u201d\uff08Stateless\uff09\uff0c\u4e0d\u4fdd\u5b58\u5ba2\u6237\u7aef\u6253\u5f00\u7684\u6587\u4ef6\u72b6\u6001\u3002\u5ba2\u6237\u7aef\u6bcf\u6b21\u8bf7\u6c42\u5fc5\u987b\u643a\u5e26 <code>File Handle</code>\uff08\u5305\u62ec Volume ID, Inode ID, Generation Number\uff09\u4ee5\u53ca\u7edd\u5bf9\u504f\u79fb\uff0c\u4f7f\u5f97\u670d\u52a1\u5668\u91cd\u542f\u540e\u5ba2\u6237\u7aef\u53ef\u65e0\u7f1d\u91cd\u8bd5\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e0e\u9ad8\u9636\u5b58\u50a8", "color": "#BFA88F", "title": "NFS \u5ba2\u6237\u7aef Cache \u4e00\u81f4\u6027\u59a5\u534f (NFS Cache Consistency)", "body": "<li>  <strong>\u7f51\u7edc\u5e26\u5bbd\u6027\u80fd\u6298\u8877</strong>\uff1a\u4e3a\u4e86\u964d\u4f4e\u7f51\u7edc RPC \u5ef6\u8fdf\uff0cNFS \u5ba2\u6237\u7aef\u5728\u672c\u5730\u7f13\u5b58\u6587\u4ef6\u5c5e\u6027\u548c\u6570\u636e\u3002</li><li>  <strong>\u4e00\u81f4\u6027\u6821\u9a8c\u59a5\u534f</strong>\uff1a</li><li>1.  <strong>Attribute Cache Timeout</strong>\uff1a\u5ba2\u6237\u7aef\u6bcf\u9694 $T$ \u79d2\uff08\u9ed8\u8ba4 3 \u79d2\uff09\u624d\u53bb\u670d\u52a1\u5668\u6821\u9a8c\u6587\u4ef6\u5c5e\u6027\u662f\u5426\u6539\u53d8\u3002</li><li>2.  <strong>Close-to-Open</strong>\uff1a\u5ba2\u6237\u7aef\u5728 <code>close()</code> \u6587\u4ef6\u65f6\u5f3a\u5236\u5c06\u810f\u9875\u540c\u6b65\u56de\u670d\u52a1\u5668\uff0c\u5728 <code>open()</code> \u6587\u4ef6\u65f6\u5f3a\u5236\u5411\u670d\u52a1\u5668\u53d1 RPC \u6821\u9a8c\u5c5e\u6027\uff0c\u5b9e\u73b0\u4e86\u8de8\u4e3b\u673a\u7684\u79d2\u7ea7\u4e00\u81f4\u6027\u59a5\u534f\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e0e\u9ad8\u9636\u5b58\u50a8", "color": "#BFA88F", "title": "\u95ea\u5b58\u56fa\u6001\u786c\u76d8 (SSD) \u7269\u7406\u7ea6\u675f\u9875\u5199\u5757\u64e6 (SSD Physics)", "body": "<li>  <strong>\u8bfb\u5199\u64e6\u7269\u7406\u8fb9\u754c</strong>\uff1a\u56fa\u6001\u786c\u76d8\u4ee5\u9875\uff08Page\uff0c\u901a\u5e38\u4e3a 4KB\uff09\u4e3a\u6700\u5c0f\u8bfb\u5199\u5355\u4f4d\uff0c\u4f46\u4ee5\u5757\uff08Block\uff0c\u901a\u5e38\u4e3a 128-512 \u4e2a Pages\uff09\u4e3a\u6700\u5c0f\u64e6\u9664\u5355\u4f4d\u3002</li><li>  <strong>\u64e6\u9664\u524d\u65e0\u6cd5\u8986\u5199</strong>\uff1a\u95ea\u5b58\u7269\u7406\u7279\u6027\u51b3\u5b9a\u4e86\u201c\u4e0d\u80fd\u5728\u5df2\u6709\u6570\u636e\u7684\u9875\u4e0a\u76f4\u63a5\u8986\u5199\u201d\uff0c\u5fc5\u987b\u5148\u5c06\u6574\u4e2a Block \u7269\u7406\u64e6\u9664\uff08Erase\uff09\u624d\u80fd\u518d\u6b21\u5199\u5165\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e0e\u9ad8\u9636\u5b58\u50a8", "color": "#BFA88F", "title": "FTL \u95ea\u5b58\u7ffb\u8bd1\u5c42\u4e0e\u5199\u653e\u5927 (FTL & Wear Leveling)", "body": "<li>  <strong>\u903b\u8f91\u5730\u5740\u7ffb\u8bd1</strong>\uff1aSSD \u5185\u90e8\u96c6\u6210\u63a7\u5236\u5668\uff0c\u8fd0\u884c FTL\uff08Flash Translation Layer\uff09\u56fa\u4ef6\uff0c\u5c06\u64cd\u4f5c\u7cfb\u7edf\u7684\u903b\u8f91\u5757\u53f7\u6620\u5c04\u5230\u95ea\u5b58\u7684\u7269\u7406\u9875\u53f7\u3002</li><li>  <strong>\u5f02\u5730\u66f4\u65b0\u4e0e\u5783\u573e\u56de\u6536</strong>\uff1aFTL \u91c7\u7528\u201c\u5f02\u5730\u66f4\u65b0\u201d\u907f\u514d\u968f\u673a\u64e6\u9664\u3002\u65e7\u9875\u88ab\u6807\u4e3a Invalid\uff0c\u65b0\u6570\u636e\u5199\u5165\u65b0\u9875\u3002\u5f53\u7a7a\u95f2\u5757\u4e0d\u8db3\u65f6\uff0c\u89e6\u53d1\u5783\u573e\u56de\u6536\uff08Garbage Collection\uff09\uff0c\u642c\u79fb\u6d3b\u9875\u5e76\u64e6\u9664\u6574\u5757\u3002\u8fd9\u4f1a\u5bfc\u81f4\u5199\u653e\u5927\u56e0\u5b50\uff08WAF\uff09\u98d9\u5347\uff0c\u901a\u8fc7\u201c\u78e8\u635f\u5747\u8861\uff08Wear Leveling\uff09\u201d\u5e73\u644a\u5199\u5165\u53ef\u4ee5\u5ef6\u957f SSD \u5bff\u547d\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e0e\u9ad8\u9636\u5b58\u50a8", "color": "#BFA88F", "title": "\u865a\u62df\u6587\u4ef6\u7cfb\u7edf (VFS) \u7edf\u4e00\u6307\u9488\u5206\u53d1 (VFS Abstraction)", "body": "<li>  <strong>\u5185\u6838\u865a\u62df\u6587\u4ef6\u7cfb\u7edf</strong>\uff1a\u64cd\u4f5c\u7cfb\u7edf\u63d0\u4f9b\u7edf\u4e00\u7684 VFS\uff08Virtual File System\uff09\u5c42\uff0c\u5411\u5e94\u7528\u66b4\u9732\u6807\u51c6\u7684 <code>open</code>\u3001<code>read</code>\u3001<code>write</code> \u7cfb\u7edf\u8c03\u7528\u3002</li><li>  <strong>\u865a\u8868\u6307\u9488\u52a8\u6001\u5206\u53d1</strong>\uff1aVFS \u5185\u90e8\u5b9a\u4e49 <code>struct file</code> \u548c <code>struct inode</code>\u3002\u901a\u8fc7\u5b9a\u4e49 <code>file_operations</code> \u865a\u8868\u6307\u9488\uff0c\u5728\u6253\u5f00\u6587\u4ef6\u65f6\u5c06 read/write \u52a8\u6001\u5206\u53d1\u5230\u5bf9\u5e94\u7684\u5177\u4f53\u5b9e\u73b0\uff08\u5982 <code>ext4_file_operations</code> \u6216 <code>nfs_file_operations</code>\uff09\uff0c\u5b9e\u73b0\u4e86\u591a\u6587\u4ef6\u7cfb\u7edf\u7684\u5b8c\u7f8e\u89e3\u8026\u3002</li>"}];
        let activeFilter = 'all';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            const searchVal = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            cards.forEach(card => {
                const matchesFilter = activeFilter === 'all' || card.module === activeFilter;
                const matchesSearch = card.title.toLowerCase().includes(searchVal) || card.body.toLowerCase().includes(searchVal);

                if (matchesFilter && matchesSearch) {
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card';
                    cardEl.style.borderTop = `4px solid ${card.color}`;
                    cardEl.innerHTML = `
                        <div class="card-header">
                            <span class="card-tag" style="background-color: ${card.color}">${card.relativeId}</span>
                            <span class="card-id">Card ${card.id}</span>
                        </div>
                        <h3 class="card-title">${card.title}</h3>
                        <div class="card-body">${card.body}</div>
                    `;
                    grid.appendChild(cardEl);
                }
            });
        }

        function setFilter(mod, btn) {
            activeFilter = mod;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        window.onload = renderCards;
    </script>
</body>
</html>
