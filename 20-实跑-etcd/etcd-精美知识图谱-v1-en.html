<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etcd-io / etcd Distributed Consensus & Coordination Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161820;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #f3f4f6, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .stat-item {
            background: #1e293b50;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn:hover {
            border-color: var(--accent-color);
            color: #fff;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--theme-color);
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--theme-color);
            box-shadow: 0 10px 20px -10px var(--theme-color-50);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .relative-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            background-color: var(--theme-color);
        }
        .module-tag {
            font-size: 0.7rem;
            color: var(--theme-color);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.75rem;
        }
        .card-body {
            font-size: 0.78rem;
            color: #94a3b8;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .card-body ul, .card-body ol {
            padding-left: 1rem;
            margin-top: 0.25rem;
        }
        .card-body li {
            margin-bottom: 0.25rem;
        }
        .card-body code {
            font-family: monospace;
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
            color: #3b82f6;
        }
        .card-body strong {
            color: #f1f5f9;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>etcd-io / etcd Distributed Consensus & Coordination Map</h1>
        <p>High-Density Distributed Architecture, Raft Consensus, and MVCC Storage Reference System</p>
        <div class="stats-bar">
            <span class="stat-item">Core Cards: 28</span>
            <span class="stat-item">Category Modules: 6</span>
            <span class="stat-item">3-Level Filtering</span>
            <span class="stat-item">Zone T Tuning Parameters</span>
        </div>
    </header>

    <div class="main-container">
        <div class="filter-controls">
            <button class="filter-btn active" onclick="filterModule('all', this)">ALL</button>
            <button class="filter-btn" style="--theme-color: var(--slate-blue)" onclick="filterModule('M1', this)">M1. Raft</button>
            <button class="filter-btn" style="--theme-color: var(--moss-green)" onclick="filterModule('M2', this)">M2. WAL & DB</button>
            <button class="filter-btn" style="--theme-color: var(--plum-rose)" onclick="filterModule('M3', this)">M3. MVCC</button>
            <button class="filter-btn" style="--theme-color: var(--terracotta)" onclick="filterModule('M4', this)">M4. Lease</button>
            <button class="filter-btn" style="--theme-color: var(--indigo)" onclick="filterModule('M5', this)">M5. Watch</button>
            <button class="filter-btn" style="--theme-color: var(--antique-gold)" onclick="filterModule('M6', this)">M6. Ops</button>
        </div>

        <div class="grid-layout" id="cardsGrid">
            <!-- Cards will be dynamically injected here -->
        </div>
    </div>

    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Raft Consensus", "color": "#7A8B99", "title": "Raft State Machine & Term", "body": "<li>  <strong>Role Transitions</strong>: Nodes transit between <code>Follower</code>, <code>Candidate</code>, and <code>Leader</code> roles. The <code>Term</code> acts as a logical clock, incremented with each election.</li><li>  <strong>Term Constraints</strong>: Any node receiving messages with a smaller Term discards them; receiving a message with a larger Term forces the node to step down to Follower and synchronize its local Term.</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Raft Consensus", "color": "#7A8B99", "title": "Leader Election & Randomized Timeout", "body": "<li>  <strong>Randomization</strong>: <code>Election Timeout</code> is randomized (e.g., 1000ms - 3000ms) to prevent split votes where multiple Candidates split the quorum, causing deadlocks.</li><li>  <strong>Election Safety</strong>: A Candidate must receive votes from a majority (Quorum) to win. A voter only votes for Candidates whose log is at least as up-to-date as its own (comparing Terms first, then log Index), ensuring the elected Leader contains all committed logs.</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Raft Consensus", "color": "#7A8B99", "title": "Log Replication & Commit", "body": "<li>  <strong>Three-Phase Pipeline</strong>: Leader receives a write $\\rightarrow$ appends log entry locally $\\rightarrow$ broadcasts <code>AppendEntries</code> to Followers $\\rightarrow$ upon receiving Quorum success, marks the log as committed and applies it to the state machine.</li><li>  <strong>State Tracking</strong>: Leader maintains <code>MatchIndex</code> (highest index known to be replicated) and <code>NextIndex</code> (index of next log entry to send) for each Follower, dynamically updating indices via fallback probes.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Raft Consensus", "color": "#7A8B99", "title": "Network Partition & Pre-Vote Phase", "body": "<li>  <strong>Partition Pain</strong>: A partitioned Follower cannot hear heartbeats, causing it to increment its Term and trigger elections. Upon reconnection, its high Term forces the active Leader to step down, disrupting the cluster.</li><li>  <strong>Pre-Vote Validation</strong>: Follower runs a mock \"Pre-Vote\" phase without incrementing its Term. It only escalates to Candidate if the Quorum agrees it has an up-to-date log, preventing split-brain disruption.</li>"}, {"id": 5, "relativeId": "M1.5", "module": "M1", "moduleName": "Raft Consensus", "color": "#7A8B99", "title": "Membership Changes & Joint Consensus", "body": "<li>  <strong>Transition Risks</strong>: Direct configuration switches ($C_{old} \\rightarrow C_{new}$) can cause split-brain if different nodes activate new memberships at different times, allowing overlapping majorities.</li><li>  <strong>Joint Consensus</strong>: etcd uses a transition state $C_{old,new}$. Proposals must win majorities in both $C_{old}$ and $C_{new}$ separately before committing, after which the transition to $C_{new}$ completes safely.</li>"}, {"id": 6, "relativeId": "M2.1", "module": "M2", "moduleName": "WAL & bbolt Storage", "color": "#7D8F7B", "title": "WAL Append-Only Structure", "body": "<li>  <strong>I/O Alignment</strong>: WAL files are preallocated to 64MB using <code>fallocate</code> to bypass filesystem disk block allocation delays and random disk writes.</li><li>  <strong>Sector Alignment</strong>: Log writes are aligned to <code>512 bytes</code> (physical sector size) and written sequentially, maximizing write throughput.</li>"}, {"id": 7, "relativeId": "M2.2", "module": "M2", "moduleName": "WAL & bbolt Storage", "color": "#7D8F7B", "title": "BoltDB/bbolt B+ Tree Storage", "body": "<li>  <strong>B+ Tree Layout</strong>: bbolt maps B+ tree pages directly to a single file. Leaf nodes store actual key revisions and value payloads, while interior nodes store index pointers.</li><li>  <strong>Zero-Copy Memory Map</strong>: Leverages <code>mmap</code> to map the db file directly into memory, allowing read transactions to run zero-copy without copying data from kernel to user buffers.</li>"}, {"id": 8, "relativeId": "M2.3", "module": "M2", "moduleName": "WAL & bbolt Storage", "color": "#7D8F7B", "title": "WAL & BoltDB Commit Sequence", "body": "<li>  <strong>Sequential Barrier</strong>: Write requests are <strong>always appended to the WAL and synced via fsync first</strong>, then committed to BoltDB.</li><li>  <strong>Crash Recovery</strong>: If the system crashes during BoltDB write phases, etcd replays the WAL log on startup to recover uncommitted state machine modifications.</li>"}, {"id": 9, "relativeId": "M2.4", "module": "M2", "moduleName": "WAL & bbolt Storage", "color": "#7D8F7B", "title": "Snapshotting & WAL Truncation", "body": "<li>  <strong>Memory Deflation</strong>: To prevent WAL from growing indefinitely, etcd takes periodic snapshots of BoltDB states.</li><li>  <strong>Log Recycler</strong>: Once a snapshot is flushed to disk, WAL entries older than the snapshot's Revision are safely truncated to reclaim disk space.</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "MVCC & Multi-Version KV", "color": "#9E828A", "title": "Revision & Generation Lifecycle", "body": "<li>  <strong>Revision Counter</strong>: etcd uses a 64-bit global incrementing revision index. Each mutation (PUT/DELETE) increments this counter by 1.</li><li>  <strong>Sub-Revision Struct</strong>: Revisions consist of <code>main</code> (write transaction sequence) and <code>sub</code> (internal transaction offset index, starting at 0), serving as a unique pointer to any KV modification.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "MVCC & Multi-Version KV", "color": "#9E828A", "title": "KeyIndex & In-Memory B-Tree", "body": "<li>  <strong>Index Mapping</strong>: Since BoltDB keys are revisions, etcd maintains an in-memory B-Tree mapping user keys to their revisions (<code>KeyIndex</code>).</li><li>  <strong>Generation Struct</strong>: Each <code>keyIndex</code> contains a <code>generations</code> array. A Generation tracks the life of a key from creation (PUT) to deletion (DELETE), recording all revisions associated with its changes.</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "MVCC & Multi-Version KV", "color": "#9E828A", "title": "MVCC Multi-Version Read Isolation", "body": "<li>  <strong>Lock-Free Read Snapshot</strong>: Reading without specifying a revision queries the latest revision. Querying with <code>--rev=100</code> searches <code>KeyIndex</code> for revision 100, then reads the data from BoltDB.</li><li>  <strong>Read-Write Concurrency</strong>: Since older versions remain in BoltDB, read transactions require no lock and can read historic snapshots, allowing non-blocking reads and writes.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "MVCC & Multi-Version KV", "color": "#9E828A", "title": "Compaction & DB Defragmentation", "body": "<li>  <strong>Revision Compaction</strong>: MVCC database growth requires regular <code>Compaction</code> to purge historical revisions before a specified threshold.</li><li>  <strong>Defragmentation</strong>: Compaction marks BoltDB pages as free but does not return space to the OS. <code>etcdctl defrag</code> reorganizes database files to physically reclaim disk space.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "Lease & TTL", "color": "#B58A7D", "title": "Lease Manager & Lease Map", "body": "<li>  <strong>Min-Heap Queue</strong>: The <code>LeaseManager</code> schedules lease expirations using a <strong>Min-Heap priority queue</strong> ordered by absolute expiration time ($O(1)$ time complexity to find expired leases).</li><li>  <strong>Fast ID Lookup</strong>: Maintains a hash map of <code>Lease ID</code> to lease structures for immediate lookup during keepalives and revocations.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "Lease & TTL", "color": "#B58A7D", "title": "KeepAlive & gRPC Bidirectional Stream", "body": "<li>  <strong>Multiplexed Connection</strong>: Instead of sending individual HTTP requests for every lease renewal, etcd leverages gRPC bidirectional streaming.</li><li>  <strong>Bandwidth Savings</strong>: Heartbeats are sent over a single TCP connection, drastically reducing network roundtrips and CPU overhead.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "Lease & TTL", "color": "#B58A7D", "title": "Lease Revocation & Key Expiration", "body": "<li>  <strong>Lessor Thread</strong>: Once the lessor thread detects an expired lease (TTL <= 0), it initiates a deletion transaction.</li><li>  <strong>Cascade Revocation</strong>: Extracts all keys bound to the Lease ID and issues delete operations to the Raft state machine, removing keys from BoltDB and notifying Watchers.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "Lease & TTL", "color": "#B58A7D", "title": "Lease Sharing & Scalability", "body": "<li>  <strong>Ephemeral Scalability</strong>: In Kubernetes, thousands of Pods might require leases. Creating unique leases for each client increases network heartbeats.</li><li>  <strong>Heartbeat Consolidation</strong>: etcd encourages binding multiple keys to a single Lease ID (e.g., a shared 60s lease), consolidating heartbeats and saving memory.</li>"}, {"id": 18, "relativeId": "M4.5", "module": "M4", "moduleName": "Lease & TTL", "color": "#B58A7D", "title": "Distributed Locks via Lease", "body": "<li>  <strong>Atomic Claim</strong>: Distributed locks use atomic PUT transactions tied to a lease. A lock is held by creating an ephemeral key bound to a Lease ID.</li><li>  <strong>KeepAlive Watchdog</strong>: A background thread (watchdog) renews the lease. If the lock holder crashes, the lease expires and the lock key is deleted, preventing deadlocks.</li>"}, {"id": 19, "relativeId": "M5.1", "module": "M5", "moduleName": "Watch & Event Streaming", "color": "#5F7582", "title": "Watcher & WatchStream", "body": "<li>  <strong>Event Pipeline</strong>: Clients stream events by creating a <code>Watcher</code> on key ranges. These watchers are multiplexed onto a single gRPC <code>WatchStream</code> connection.</li><li>  <strong>Event Payload</strong>: Applications applying writes convert mutations into Watch Events containing details of the action, key, new value, and previous value.</li>"}, {"id": 20, "relativeId": "M5.2", "module": "M5", "moduleName": "Watch & Event Streaming", "color": "#5F7582", "title": "WatchableStore synced/unsynced Queues", "body": "<li>  <strong>Buffer Isolation</strong>: <code>WatchableStore</code> manages two watcher queues in memory: <code>synced</code> (up-to-date watchers) and <code>unsynced</code> (watchers catching up on historical revisions).</li><li>  <strong>Queue Promotion</strong>: Once a watcher catches up to the current revision, it is promoted from <code>unsynced</code> to <code>synced</code> for real-time notification.</li>"}, {"id": 21, "relativeId": "M5.3", "module": "M5", "moduleName": "Watch & Event Streaming", "color": "#5F7582", "title": "Event Buffer & Flow Control", "body": "<li>  <strong>Memory Exhaustion Guard</strong>: Slow clients can cause event backlogs in memory. etcd allocates a fixed ring buffer for each watcher.</li><li>  <strong>Backpressure Drop</strong>: If a watcher's buffer overflows, etcd terminates the stream and returns <code>errCompacted</code>, forcing the client to reconnect and catch up.</li>"}, {"id": 22, "relativeId": "M5.4", "module": "M5", "moduleName": "Watch & Event Streaming", "color": "#5F7582", "title": "Watch Event Consolidation", "body": "<li>  <strong>Network Optimization</strong>: Under heavy write pressure, a key may be mutated multiple times in milliseconds. Sending every event degrades throughput.</li><li>  <strong>Debounce Updates</strong>: etcd consolidates multiple modifications to the same key within the same transaction batch (main revision), dispatching only the final state to reduce network overhead.</li>"}, {"id": 23, "relativeId": "M5.5", "module": "M5", "moduleName": "Watch & Event Streaming", "color": "#5F7582", "title": "Watch Resume via Revision", "body": "<li>  <strong>Disconnect Recovery</strong>: If a watcher disconnects, it can reconnect using the last received revision (e.g., <code>Watch(key, WithRev(last_received_rev + 1))</code>).</li><li>  <strong>History Fetch</strong>: etcd registers the watcher in <code>unsynced</code>, fetches missing events from BoltDB historical revisions, sends them, and moves it to <code>synced</code>.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "Ops & Gateway", "color": "#BFA88F", "title": "gRPC Protocol v3 Architecture", "body": "<li>  <strong>Protocol Overhaul</strong>: etcd v3 uses <code>gRPC</code> over <code>HTTP/2</code> with <code>Protocol Buffers</code> instead of v2 HTTP/1.x JSON.</li><li>  <strong>System Improvements</strong>: HTTP/2 multiplexing removes TCP connection handshakes, and Protobuf binary serialization reduces CPU and memory footprint, boosting throughput.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "Ops & Gateway", "color": "#BFA88F", "title": "Linearizable Reads & ReadIndex", "body": "<li>  <strong>Dirty Read Guard</strong>: Reading directly from Followers can return stale data. Linearizable reads guarantee the latest global state.</li><li>  <strong>ReadIndex Broadcast</strong>: Followers request the latest <code>ReadIndex</code> from the Leader. The Leader verifies its status by broadcasting heartbeats (Quorum check). Once the Follower's local <code>ApplyIndex</code> reaches the <code>ReadIndex</code>, the Follower returns the read payload.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "Ops & Gateway", "color": "#BFA88F", "title": "LeaseRead Optimization", "body": "<li>  <strong>RTT Reduction</strong>: ReadIndex requires network heartbeats to verify the Leader, introducing network roundtrip latency (RTT).</li><li>  <strong>Lease Validation</strong>: If local clocks are stable, <code>LeaseRead</code> allows the Leader to serve reads locally without broadcasting heartbeats, provided its lease duration is active (as no new Leader could have emerged).</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "Ops & Gateway", "color": "#BFA88F", "title": "Client Load Balancing & Failover", "body": "<li>  <strong>Decentralized Routing</strong>: Clients discover cluster endpoints and manage client-side retries.</li><li>  <strong>Automatic Handover</strong>: The client fetches the cluster node list and caches it. If the connected node fails, the client instantly reconnects to another healthy node.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "Ops & Gateway", "color": "#BFA88F", "title": "Etcd Gateway & Proxy Mode", "body": "<li>  <strong>Connection Fan-in</strong>: Thousands of clients connecting directly to etcd can exhaust TCP file descriptors (FDs).</li><li>  <strong>Edge Concentrator</strong>: Deploying <code>etcd gateway</code> or <code>etcd grpc-proxy</code> aggregates client traffic, multiplexing connections over a few long-lived sockets to the core etcd cluster.</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
