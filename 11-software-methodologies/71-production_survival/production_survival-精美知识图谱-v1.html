<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>业务工程学与防雪崩重构知识图谱</title>
    <style>
        body {
            margin: 0;
            background-color: #1A202C;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
        }
        #canvas {
            position: absolute;
            transform-origin: 0 0;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 3000px;
            height: 2000px;
            pointer-events: none;
        }
        .card {
            position: absolute;
            width: 130px;
            height: 80px;
            background-color: #2D3748;
            border-radius: 4px;
            padding: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 4px solid #E2E8F0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0,0,0,0.5);
        }
        .card-num {
            font-size: 8px;
            color: #A0AEC0;
            font-weight: bold;
        }
        .card-title {
            font-size: 10px;
            font-weight: bold;
            margin-top: 4px;
            height: 28px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-zh {
            font-size: 8px;
            color: #CBD5E0;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        #header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #FFFFFF;
        }
        #header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #A0AEC0;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 32, 44, 0.8);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #4A5568;
            font-size: 9px;
            z-index: 10;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>业务工程学与防雪崩重构知识图谱</h1>
        <p>Drag to pan. Left click on a card to see dependencies. Double click cards to see system details.</p>
    </div>
    
    <div id="legend">
        <div class="legend-item"><div class="legend-color" style="background: #4B5F7A;"></div>M1: Architecture & Isolation (重构隔离)</div>
        <div class="legend-item"><div class="legend-color" style="background: #6B8272;"></div>M2: Degradation & Flow (流控防御)</div>
        <div class="legend-item"><div class="legend-color" style="background: #9C6666;"></div>M3: Database & Consistency (数据一致)</div>
        <div class="legend-item"><div class="legend-color" style="background: #7A7A7A;"></div>M4: Deployments & State (金丝雀状态)</div>
        <div class="legend-item"><div class="legend-color" style="background: #9A825A;"></div>M5: Observability & Probes (链路探针)</div>
    </div>

    <div id="canvas-container">
        <div id="canvas">
            <svg id="links-svg"></svg>
            <div id="cards-container"></div>
        </div>
    </div>

    <script>
        const cards = [{'id': 1, 'title': 'Strangler Fig', 'zh': '渐进重构绞杀者模式', 'x': 100, 'y': 120, 'color': '#4B5F7A'}, {'id': 2, 'title': 'Anti-Corruption Layer', 'zh': '边界模型防腐层ACL', 'x': 240, 'y': 120, 'color': '#4B5F7A'}, {'id': 3, 'title': 'Dual-Write Migration', 'zh': '不停机双写数据库迁移', 'x': 380, 'y': 120, 'color': '#4B5F7A'}, {'id': 4, 'title': 'Outbox Event Out', 'zh': '事务发件箱Outbox模型', 'x': 520, 'y': 120, 'color': '#4B5F7A'}, {'id': 5, 'title': 'Saga Compensations', 'zh': '分布式事务Saga补偿协调', 'x': 660, 'y': 120, 'color': '#4B5F7A'}, {'id': 6, 'title': 'Idempotency Lock', 'zh': 'Redis原子幂等键限制', 'x': 800, 'y': 120, 'color': '#4B5F7A'}, {'id': 7, 'title': 'Token Bucket Limiter', 'zh': '令牌桶突发流量限流器', 'x': 100, 'y': 260, 'color': '#6B8272'}, {'id': 8, 'title': 'Circuit Breaker', 'zh': '三态滑动窗口熔断器', 'x': 240, 'y': 260, 'color': '#6B8272'}, {'id': 9, 'title': 'Bulkhead Isolation', 'zh': '独立线程池/信号量舱壁', 'x': 380, 'y': 260, 'color': '#6B8272'}, {'id': 10, 'title': 'Graceful Degradation', 'zh': '业务有损优雅降级逻辑', 'x': 520, 'y': 260, 'color': '#6B8272'}, {'id': 11, 'title': 'Optimistic ETag', 'zh': '乐观锁版本与ETag校验', 'x': 660, 'y': 260, 'color': '#6B8272'}, {'id': 12, 'title': 'API Versioning', 'zh': 'API多版本演进与路由', 'x': 800, 'y': 260, 'color': '#6B8272'}, {'id': 13, 'title': 'Schema Expand-Contract', 'zh': 'Expand-Contract表结构扩展', 'x': 100, 'y': 400, 'color': '#9C6666'}, {'id': 14, 'title': 'Shadow Database', 'zh': '流量染色全链路压测影子库', 'x': 240, 'y': 400, 'color': '#9C6666'}, {'id': 15, 'title': 'Chaos Fault Injection', 'zh': '混沌工程主动延迟与分区', 'x': 380, 'y': 400, 'color': '#9C6666'}, {'id': 16, 'title': 'Reconciliation Sync', 'zh': '最终一致性稽核与对账系统', 'x': 520, 'y': 400, 'color': '#9C6666'}, {'id': 17, 'title': 'Backoff Jitter', 'zh': '指数退避与重试防风暴抖动', 'x': 660, 'y': 400, 'color': '#9C6666'}, {'id': 18, 'title': 'Dead Letter Queue', 'zh': '死信队列隔离毒丸消息', 'x': 800, 'y': 400, 'color': '#9C6666'}, {'id': 19, 'title': 'Monolith Facade', 'zh': '单体外观层解耦隔离门面', 'x': 940, 'y': 400, 'color': '#9C6666'}, {'id': 20, 'title': 'Feature Canaries', 'zh': '特性开关与灰度金丝雀发布', 'x': 100, 'y': 540, 'color': '#7A7A7A'}, {'id': 21, 'title': 'Backpressure flow', 'zh': '背压传递与反向速率流控', 'x': 240, 'y': 540, 'color': '#7A7A7A'}, {'id': 22, 'title': 'Rolling Update', 'zh': '零停机滚动更新就绪探针', 'x': 380, 'y': 540, 'color': '#7A7A7A'}, {'id': 23, 'title': 'Lock Lease Dog', 'zh': '分布式锁看门狗自动续期', 'x': 520, 'y': 540, 'color': '#7A7A7A'}, {'id': 24, 'title': 'CQRS Sync', 'zh': 'CQRS读写模型异步同步', 'x': 660, 'y': 540, 'color': '#7A7A7A'}, {'id': 25, 'title': 'Client-side LB', 'zh': '去中心化客户端负载均衡', 'x': 100, 'y': 680, 'color': '#9A825A'}, {'id': 26, 'title': 'Health Probes', 'zh': 'Liveness/Readiness三态探针', 'x': 240, 'y': 680, 'color': '#9A825A'}, {'id': 27, 'title': 'Trace Context', 'zh': 'W3C TraceID链路透传上下文', 'x': 380, 'y': 680, 'color': '#9A825A'}, {'id': 28, 'title': 'Correlation ID Logs', 'zh': '日志关联ID微服务追踪链', 'x': 520, 'y': 680, 'color': '#9A825A'}];
        const links = [{'source': 1, 'target': 19}, {'source': 2, 'target': 1}, {'source': 3, 'target': 13}, {'source': 3, 'target': 16}, {'source': 4, 'target': 5}, {'source': 6, 'target': 4}, {'source': 7, 'target': 21}, {'source': 8, 'target': 9}, {'source': 9, 'target': 10}, {'source': 11, 'target': 6}, {'source': 14, 'target': 15}, {'source': 17, 'target': 18}, {'source': 20, 'target': 22}, {'source': 23, 'target': 6}, {'source': 24, 'target': 4}, {'source': 25, 'target': 26}, {'source': 27, 'target': 28}];

        const canvas = document.getElementById('canvas');
        const container = document.getElementById('canvas-container');
        const cardsContainer = document.getElementById('cards-container');
        const svg = document.getElementById('links-svg');

        let isDragging = false;
        let startX, startY;
        let translateX = 50, translateY = 50;

        container.addEventListener('mousedown', (e) => {
            if (e.target === container || e.target.id === 'canvas' || e.target.tagName === 'svg') {
                isDragging = true;
                container.style.cursor = 'grabbing';
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                canvas.style.transform = `translate(${translateX}px, ${translateY}px)`;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        // Render nodes
        cards.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.left = card.x + 'px';
            div.style.top = card.y + 'px';
            div.style.borderTopColor = card.color;
            div.id = 'card-' + card.id;

            div.innerHTML = `
                <div class="card-num">Card ${card.id.toString().padStart(2, '0')}</div>
                <div class="card-title">${card.title}</div>
                <div class="card-zh">${card.zh}</div>
            `;
            cardsContainer.appendChild(div);
        });

        // Render edges
        function drawLinks() {
            svg.innerHTML = '';
            links.forEach(link => {
                const sNode = cards.find(c => c.id === link.source);
                const tNode = cards.find(c => c.id === link.target);
                if (sNode && tNode) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', sNode.x + 65);
                    line.setAttribute('y1', sNode.y + 40);
                    line.setAttribute('x2', tNode.x + 65);
                    line.setAttribute('y2', tNode.y + 40);
                    line.setAttribute('stroke', '#4A5568');
                    line.setAttribute('stroke-width', '1.5');
                    line.setAttribute('marker-end', 'url(#arrow)');
                    svg.appendChild(line);
                }
            });
        }

        // Draw an arrowhead marker
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        marker.setAttribute('id', 'arrow');
        marker.setAttribute('viewBox', '0 0 10 10');
        marker.setAttribute('refX', '40'); // offset arrowhead from node center
        marker.setAttribute('refY', '5');
        marker.setAttribute('markerWidth', '6');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('orient', 'auto-start-reverse');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
        path.setAttribute('fill', '#4A5568');
        marker.appendChild(path);
        defs.appendChild(marker);
        svg.appendChild(defs);

        drawLinks();
        canvas.style.transform = `translate(${translateX}px, ${translateY}px)`;
    </script>
</body>
</html>
