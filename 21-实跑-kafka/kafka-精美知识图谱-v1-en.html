<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>apache / kafka-internals High-Throughput Log Storage & Zero-Copy I/O Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161820;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #f3f4f6, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .stat-item {
            background: #1e293b50;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn:hover {
            border-color: var(--accent-color);
            color: #fff;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--theme-color);
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--theme-color);
            box-shadow: 0 10px 20px -10px var(--theme-color-50);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .relative-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            background-color: var(--theme-color);
        }
        .module-tag {
            font-size: 0.7rem;
            color: var(--theme-color);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.75rem;
        }
        .card-body {
            font-size: 0.78rem;
            color: #94a3b8;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .card-body ul, .card-body ol {
            padding-left: 1rem;
            margin-top: 0.25rem;
        }
        .card-body li {
            margin-bottom: 0.25rem;
        }
        .card-body code {
            font-family: monospace;
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
            color: #3b82f6;
        }
        .card-body strong {
            color: #f1f5f9;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>apache / kafka-internals Log Storage & Zero-Copy Map</h1>
        <p>High-Density Log Layout, Page Cache Tuning, ISR Replications, and Consumer Groups Reference System</p>
        <div class="stats-bar">
            <span class="stat-item">Core Cards: 28</span>
            <span class="stat-item">Category Modules: 6</span>
            <span class="stat-item">3-Level Filtering</span>
            <span class="stat-item">Zone T Tuning Parameters</span>
        </div>
    </header>

    <div class="main-container">
        <div class="filter-controls">
            <button class="filter-btn active" onclick="filterModule('all', this)">ALL</button>
            <button class="filter-btn" style="--theme-color: var(--slate-blue)" onclick="filterModule('M1', this)">M1. Logs</button>
            <button class="filter-btn" style="--theme-color: var(--moss-green)" onclick="filterModule('M2', this)">M2. ZeroCopy</button>
            <button class="filter-btn" style="--theme-color: var(--plum-rose)" onclick="filterModule('M3', this)">M3. ISR</button>
            <button class="filter-btn" style="--theme-color: var(--terracotta)" onclick="filterModule('M4', this)">M4. KRaft</button>
            <button class="filter-btn" style="--theme-color: var(--indigo)" onclick="filterModule('M5', this)">M5. Producer</button>
            <button class="filter-btn" style="--theme-color: var(--antique-gold)" onclick="filterModule('M6', this)">M6. Consumer</button>
        </div>

        <div class="grid-layout" id="cardsGrid">
            <!-- Cards will be dynamically injected here -->
        </div>
    </div>

    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Log Storage", "color": "#7A8B99", "title": "Log Segment Layout", "body": "<li>  <strong>Segment File Partitioning</strong>: A Partition is divided into <code>Log Segments</code> to prevent single-file bloat, defaulting to 1GB per segment.</li><li>  <strong>Three-File Group</strong>: Each segment is defined by a triplet of files: <code>.log</code> (binary message payloads), <code>.index</code> (sparse offset-to-physical positions index), and <code>.timeindex</code> (timestamp-based lookup index).</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Log Storage", "color": "#7A8B99", "title": "Sparse Indexing & Binary Search", "body": "<li>  <strong>Sparse Index Entries</strong>: To save memory, the <code>.index</code> file maps offsets to physical file coordinates sparse-wise, adding an entry default every 4KB of appended data (<code>log.index.interval.bytes</code>).</li><li>  <strong>Binary Lookup</strong>: When resolving an offset, Kafka loads the <code>.index</code> file via <code>mmap</code>, performs a binary search to find the nearest prior offset block, and scans sequentially from that offset in the <code>.log</code> file.</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Log Storage", "color": "#7A8B99", "title": "TimeIndex & Message Expiration", "body": "<li>  <strong>Timestamp Mapping</strong>: <code>.timeindex</code> maps timestamps to relative offsets. It is queried when consumers search messages by time or when calculating log expirations.</li><li>  <strong>TTL Log Cleanup</strong>: If the oldest entry in a segment exceeds the retention threshold (<code>log.retention.hours</code>, default 7 days), the entire log segment is deleted or compacted.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Log Storage", "color": "#7A8B99", "title": "Log Compaction & Tombstone", "body": "<li>  <strong>Key-Based Compaction</strong>: Log compaction preserves the latest state for each key within a log segment, purging outdated historical updates to reclaim space.</li><li>  <strong>Deletion Tombstones</strong>: Deleting a key writes a message with a <code>Null Value</code> (tombstone). Tombstones are preserved for a grace period (<code>log.cleaner.delete.retention.ms</code>) so consumers can detect deletions.</li>"}, {"id": 5, "relativeId": "M1.5", "module": "M1", "moduleName": "Log Storage", "color": "#7A8B99", "title": "Log Recovery & Checkpoint", "body": "<li>  <strong>Recovery Boundaries</strong>: On crash startup, Kafka reads <code>recovery-point-offset-checkpoint</code> files to locate the last known persistent offset.</li><li>  <strong>Corrupt Log Truncation</strong>: Kafka checks log entries past the checkpoint, truncates corrupt or incomplete payloads, and aligns the LEO with the last valid physical record.</li>"}, {"id": 6, "relativeId": "M2.1", "module": "M2", "moduleName": "Zero-Copy I/O", "color": "#7D8F7B", "title": "Page Cache Utilization", "body": "<li>  <strong>Heap Allocation Bypass</strong>: Kafka writes messages using standard file write commands, transferring data directly to the operating system's <code>Page Cache</code> without java heap storage.</li><li>  <strong>Zero GC Overhead</strong>: This removes JVM heap overhead, preventing GC pauses (STW) while letting the OS manage dirty page flushes and write caching automatically.</li>"}, {"id": 7, "relativeId": "M2.2", "module": "M2", "moduleName": "Zero-Copy I/O", "color": "#7D8F7B", "title": "Zero-Copy Sendfile", "body": "<li>  <strong>I/O Overhead</strong>: Traditional file transfers require 4 context switches and 4 copies (Disk $\\rightarrow$ Page Cache $\\rightarrow$ User Buffer $\\rightarrow$ Socket Buffer $\\rightarrow$ NIC).</li><li>  <strong>sendfile Bypass</strong>: Kafka uses the <code>sendfile</code> system call. The OS transfers data from <code>Page Cache</code> directly to the NIC via DMA (0 CPU copies, 2 context switches), saturated-level line rate.</li>"}, {"id": 8, "relativeId": "M2.3", "module": "M2", "moduleName": "Zero-Copy I/O", "color": "#7D8F7B", "title": "Sequential vs Random I/O", "body": "<li>  <strong>Sequential Disk Throughput</strong>: Magnetic and flash media suffer major seek latency for random writes. Sequential writes bypass seek constraints, achieving disk throughput (~600MB/s) comparable to random memory writes.</li>"}, {"id": 9, "relativeId": "M2.4", "module": "M2", "moduleName": "Zero-Copy I/O", "color": "#7D8F7B", "title": "OS Page Cache Tuning", "body": "<li>  <strong>Preventing Write Stalls</strong>: Background page flushing (sync) can bottleneck active I/O.</li><li>  <strong>Dirty Ratio Tuning</strong>: In production, lower <code>vm.dirty_background_ratio</code> (e.g., 5%) to prompt continuous background flushing, preventing memory spikes that trigger blocking disk writes (<code>vm.dirty_ratio</code>, e.g., 20%).</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "Replication & ISR", "color": "#9E828A", "title": "ISR Membership", "body": "<li>  <strong>Active Sync Replicas</strong>: The <code>ISR</code> is the set of replicas actively synchronized with the Leader (including the Leader itself).</li><li>  <strong>Timeout Expulsion</strong>: Followers fail to issue <code>Fetch</code> requests within <code>replica.lag.time.max.ms</code> (default 30 seconds), or fall too far behind, are evicted from the ISR list.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "Replication & ISR", "color": "#9E828A", "title": "HW & LEO Propagation", "body": "<li>  <strong>High Watermark (HW)</strong>: The highest offset successfully replicated by all ISR members, representing the visible commit boundary for consumers.</li><li>  <strong>LEO Update Chain</strong>: Followers send Fetch requests containing their <code>Log End Offset (LEO)</code>. The Leader updates their states and advances the HW to match the minimum LEO in the ISR. The new HW is sent back in Fetch responses.</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "Replication & ISR", "color": "#9E828A", "title": "Leader Epoch Recovery", "body": "<li>  <strong>HW Split-Brain Vulnerability</strong>: Older Kafka versions truncated follower logs to their local HW upon reconnection. Under split elections, this causes log divergence and overwrites historical logs.</li><li>  <strong>Epoch-Based Sync</strong>: Recovering followers query the active Leader for the boundary offset of their current <code>Leader Epoch</code>. Log truncation is done using epoch boundaries rather than local HW, preventing data loss.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "Replication & ISR", "color": "#9E828A", "title": "Minimum In-Sync Replicas", "body": "<li>  <strong>Replication Guard</strong>: If the ISR drops to only the Leader, allowing writes with <code>acks=all</code> leaves the system vulnerable to loss if that node fails.</li><li>  <strong>Write Safety Threshold</strong>: Set <code>min.insync.replicas >= 2</code>. This requires at least two nodes (Leader + 1 Follower) to commit the write, returning a <code>NotEnoughReplicasException</code> otherwise.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "KRaft & Controller", "color": "#B58A7D", "title": "Active Controller Election", "body": "<li>  <strong>Cluster Orchestrator</strong>: The Controller node manages partition leadership changes, broker health, and metadata updates.</li><li>  <strong>Epoch Verification</strong>: The Controller carries a <code>Controller Epoch</code> counter. When a new leader takes over, the Epoch increments. Outdated commands from zombie controllers are rejected by brokers checking the Epoch.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "KRaft & Controller", "color": "#B58A7D", "title": "KRaft Metadata Mode", "body": "<li>  <strong>ZooKeeper Bottleneck</strong>: Older architectures rely on ZooKeeper. At millions of partition configurations, ZK synchronization latency causes multi-minute cluster freezes during controller switches.</li><li>  <strong>Built-in Raft Log</strong>: KRaft runs Controller metadata directly inside a built-in Raft consensus cluster. Metadata changes are logged as events and pushed to brokers instantly, dropping election failovers to milliseconds.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "KRaft & Controller", "color": "#B58A7D", "title": "Partition State Machine", "body": "<li>  <strong>Partition States</strong>: The Controller tracks partition lifecycles: <code>NonExistentPartition</code>, <code>NewPartition</code>, <code>OnlinePartition</code>, and <code>OfflinePartition</code>.</li><li>  <strong>State Triggering</strong>: Responds to topic creations, partition alterations, and broker failures by dispatching state updates to orchestrate leadership.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "KRaft & Controller", "color": "#B58A7D", "title": "Replica State Machine", "body": "<li>  <strong>Replica Lifecycles</strong>: Tracks replica states on brokers: <code>NewReplica</code>, <code>OnlineReplica</code>, <code>OfflineReplica</code>, and <code>NonExistentReplica</code>.</li><li>  <strong>Broker Isolation</strong>: If a broker heartbeat fails, the Controller transitions its replicas to Offline, triggering leader failovers for affected partitions.</li>"}, {"id": 18, "relativeId": "M4.5", "module": "M4", "moduleName": "KRaft & Controller", "color": "#B58A7D", "title": "Metadata Propagation", "body": "<li>  <strong>Routing Distribution</strong>: The Controller broadcasts metadata updates (<code>UpdateMetadataRequest</code>) to all brokers, ensuring they cache the full routing topology.</li><li>  <strong>Client Metadata Request</strong>: Producers and consumers fetch this cached metadata from any broker to locate partition leaders directly.</li>"}, {"id": 19, "relativeId": "M5.1", "module": "M5", "moduleName": "Producer Memory", "color": "#5F7582", "title": "RecordAccumulator & BufferPool", "body": "<li>  <strong>Memory Fragment Prevention</strong>: Repeatedly allocating and freeing byte arrays for network batches (e.g., 16KB) triggers JVM memory fragmentation and GC pauses.</li><li>  <strong>Page Allocation Recycling</strong>: The producer uses <code>BufferPool</code> to allocate fixed-size buffers (<code>ProducerBatch</code>, default 16KB). Once sent, buffers are cleared and returned to the pool.</li>"}, {"id": 20, "relativeId": "M5.2", "module": "M5", "moduleName": "Producer Memory", "color": "#5F7582", "title": "Message Batching & Sender Loop", "body": "<li>  <strong>Bandwidth Consolidation</strong>: Producers write records to the <code>RecordAccumulator</code>. Send operations are delayed until batches are full (<code>batch.size</code>, default 16KB) or linger limits expire (<code>linger.ms</code>, default 0ms).</li><li>  <strong>Sender Run Loop</strong>: The background <code>Sender</code> thread scans the accumulator, batches records, and dispatches them to brokers in single RPC packages.</li>"}, {"id": 21, "relativeId": "M5.3", "module": "M5", "moduleName": "Producer Memory", "color": "#5F7582", "title": "Sticky Partitioning", "body": "<li>  <strong>Batching Under Round-Robin</strong>: Round-robin partitioning splits sparse messages across multiple partition batches, slowing down batch accumulation.</li><li>  <strong>Sticky Assignment</strong>: The <code>StickyPartitioner</code> routes records to a single partition until its batch is full and sent, then switches partitions to maximize batch efficiency.</li>"}, {"id": 22, "relativeId": "M5.4", "module": "M5", "moduleName": "Producer Memory", "color": "#5F7582", "title": "Idempotent Producer", "body": "<li>  <strong>Duplicate Write Prevention</strong>: If network dropouts block write ACKs, producers retry writes, risking duplicate entries on the broker.</li><li>  <strong>Producer ID & Sequence</strong>: Enabling idempotency assigns a unique <code>Producer ID (PID)</code> and an incrementing <code>Sequence Number</code> to each batch. The broker rejects duplicate sequences, returning ACKs without writing duplicate data.</li>"}, {"id": 23, "relativeId": "M5.5", "module": "M5", "moduleName": "Producer Memory", "color": "#5F7582", "title": "Transactional Message & 2PC", "body": "<li>  <strong>Atomic Multi-Partition Writes</strong>: Supports atomic \"Read-Process-Write\" pipelines across partitions managed by a <strong>Transaction Coordinator</strong>.</li><li>  <strong>Commit Markers</strong>: Employs a two-phase commit (2PC) protocol. The state transitions to <code>Prepare</code>, then a <code>CommitMarker</code> is written to log segments. Consumers only read transactional data once commit markers are logged.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "Consumer Rebalance", "color": "#BFA88F", "title": "Group Coordinator Election", "body": "<li>  <strong>Coordinator Mapping</strong>: A designated broker manages group memberships and consumer offsets for each Consumer Group.</li><li>  <strong>Hash Distribution</strong>: The coordinator broker is located by hashing the group ID: <code>Math.abs(groupId.hashCode()) % 50</code>. The Leader of this partition in <code>__consumer_offsets</code> is elected as the Coordinator.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "Consumer Rebalance", "color": "#BFA88F", "title": "JoinGroup & SyncGroup Rebalance Protocol", "body": "<li>  <strong>Two-Phase Rebalance</strong>:</li><li>1.  <strong>JoinGroup Phase</strong>: Consumers disconnect from current assignments and register with the Coordinator. The Coordinator elects a group Leader and shares member details.</li><li>2.  <strong>SyncGroup Phase</strong>: The consumer Leader calculates new partition layouts and submits them. The Coordinator distributes assignments back to all members.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "Consumer Rebalance", "color": "#BFA88F", "title": "Heartbeats & Consumer Liveness", "body": "<li>  <strong>Heartbeat Thread</strong>: Consumer background threads send periodic <code>Heartbeat</code> requests. If no heartbeat arrives within <code>session.timeout.ms</code> (default 45s), the consumer is removed.</li><li>  <strong>Poll Timeout Guard</strong>: If record processing halts or exceeds <code>max.poll.interval.ms</code> (default 5m), the client steps down, triggering a rebalance.</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "Consumer Rebalance", "color": "#BFA88F", "title": "Offset Commit & Storage", "body": "<li>  <strong>Offset Persistency</strong>: Consumers commit offset checkpoints to save their progress.</li><li>  <strong>Consumer Offsets Log</strong>: Committed offsets are stored as messages in the internal <code>__consumer_offsets</code> topic, enabling newly assigned consumers to resume consumption seamlessly.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "Consumer Rebalance", "color": "#BFA88F", "title": "Cooperative Sticky Assignor", "body": "<li>  <strong>Incremental Rebalances</strong>: The Eager protocol revokes all partitions group-wide, pausing consumption during rebalances.</li><li>  <strong>Incremental Transitions</strong>: The cooperative sticky assignor executes incremental rebalances, only revoking partitions that need relocation, keeping unaffected pipelines active.</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
