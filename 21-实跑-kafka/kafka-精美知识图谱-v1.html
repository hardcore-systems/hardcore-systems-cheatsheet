itle": "\u6d88\u606f\u6279\u5904\u7406 Sender \u7ebf\u7a0b\u5faa\u73af (Message Batching)", "body": "<li>  <strong>\u7f51\u7edc\u5e26\u5bbd\u5229\u7528\u7387\u6700\u5927\u5316</strong>\uff1a\u751f\u4ea7\u8005\u7ebf\u7a0b\u5e76\u4e0d\u5b9e\u65f6\u53d1\u9001\u6d88\u606f\uff0c\u800c\u662f\u5199\u5165 RecordAccumulator\u3002\u5f53 Batch \u79ef\u6ee1\uff08<code>batch.size</code>\uff0c\u9ed8\u8ba4 16KB\uff09\u6216\u8005\u7b49\u5f85\u65f6\u95f4\u8d85\u65f6\uff08<code>linger.ms</code>\uff0c\u9ed8\u8ba4 0ms\uff09\uff0c\u89e6\u53d1\u53d1\u9001\u6761\u4ef6\u3002</li><li>  <strong>Sender \u5f02\u6b65\u73af</strong>\uff1a\u540e\u53f0 <code>Sender</code> \u7ebf\u7a0b\u626b\u63cf\u6ee1\u8db3\u6761\u4ef6\u7684 batch\uff0c\u805a\u5408\u6253\u5305\u53d1\u9001\u7ed9\u5bf9\u5e94\u7684 Broker\uff0c\u6781\u5927\u5730\u51cf\u5c11\u4e86\u7f51\u7edc\u5c0f\u5305\u4e0e\u7cfb\u7edf\u8c03\u7528\u4e0a\u4e0b\u6587\u5207\u6362\u5f00\u9500\u3002</li>"}, {"id": 21, "relativeId": "M5.3", "module": "M5", "moduleName": "\u751f\u4ea7\u8005\u6279\u5904\u7406", "color": "#5F7582", "title": "\u5ba2\u6237\u7aef\u7c98\u6027\u5206\u533a\u9009\u62e9\u7b56\u7565 (Sticky Partitioning)", "body": "<li>  <strong>\u5747\u5300\u5206\u6279\u74f6\u9888</strong>\uff1a\u5728\u672a\u6307\u5b9a Key \u7684\u60c5\u51b5\u4e0b\uff0c\u4f20\u7edf\u8f6e\u8be2\u5206\u533a\u53d1\u9001\u4f1a\u5bfc\u81f4\u6bcf\u6761\u6d88\u606f\u5199\u5165\u4e0d\u540c\u7684\u5206\u533a\uff0c\u65e0\u6cd5\u5feb\u901f\u51d1\u6ee1\u4e00\u4e2a Batch\uff0816KB\uff09\uff0c\u4ece\u800c\u5ef6\u8fdf\u53d1\u9001\u3002</li><li>  <strong>\u7c98\u6027\u6574\u5305\u673a\u5236</strong>\uff1a\u7c98\u6027\u5206\u914d\u5668\uff08Sticky Partitioner\uff09\u4f1a\u5c06\u6d88\u606f\u8fde\u7eed\u5199\u5165\u540c\u4e00\u4e2a\u7279\u5b9a\u5206\u533a\uff0c\u76f4\u5230\u8be5\u5206\u533a\u7684 batch \u5199\u6ee1\uff0816KB\uff09\u5e76\u53d1\u9001\u540e\uff0c\u624d\u52a8\u6001\u91cd\u65b0\u9009\u62e9\u53e6\u4e00\u4e2a\u5206\u533a\u3002\u6b64\u673a\u5236\u5728\u5927\u541e\u5410\u4e0b\u51cf\u5c11\u4e86\u5ef6\u8fdf\u3002</li>"}, {"id": 22, "relativeId": "M5.4", "module": "M5", "moduleName": "\u751f\u4ea7\u8005\u6279\u5904\u7406", "color": "#5F7582", "title": "\u751f\u4ea7\u8005\u5e42\u7b49\u6027\u539f\u7406\u89e3\u6790 (Idempotent Producer)", "body": "<li>  <strong>\u7f51\u7edc\u91cd\u8bd5\u9632\u91cd</strong>\uff1a\u5f53 Producer \u6536\u5230\u53d1\u9001\u8d85\u65f6\u5e76\u5c1d\u8bd5\u91cd\u8bd5\u65f6\uff0c\u53ef\u80fd\u6d88\u606f\u5728 Broker \u7aef\u5df2\u88ab\u6210\u529f\u843d\u76d8\uff0c\u53ea\u662f ACK \u4e22\u5931\uff0c\u5bfc\u81f4\u6570\u636e\u91cd\u590d\u3002</li><li>  <strong>\u53cc\u6807\u8bc6\u53bb\u91cd\u94fe</strong>\uff1a\u5f00\u542f\u5e42\u7b49\u6027\u540e\uff0cBroker \u4e3a\u751f\u4ea7\u8005\u5206\u914d\u552f\u4e00\u7684 <code>Producer ID (PID)</code>\uff0c\u4e14\u5728\u6d88\u606f\u5934\u5199\u5165\u5355\u8c03\u9012\u589e\u7684 <code>Sequence Number</code>\u3002Broker \u6821\u9a8c <code>Sequence</code>\uff0c\u53ea\u63a5\u53d7 <code>Seq = last_seq + 1</code> \u7684\u6d88\u606f\uff0c\u91cd\u590d\u6d88\u606f\u76f4\u63a5\u4e22\u5f03\u4e14\u8fd4\u56de ACK\uff0c\u4fdd\u8bc1\u5355\u5206\u533a\u7edd\u5bf9\u4ec5\u5199\u5165\u4e00\u6b21\u3002</li>"}, {"id": 23, "relativeId": "M5.5", "module": "M5", "moduleName": "\u751f\u4ea7\u8005\u6279\u5904\u7406", "color": "#5F7582", "title": "\u4e8b\u52a1\u6d88\u606f\u4e0e\u4e24\u9636\u6bb5\u63d0\u4ea4 (Transactional Message & 2PC)", "body": "<li>  <strong>\u8de8\u5206\u533a\u539f\u5b50\u5199\u5165</strong>\uff1aKafka \u652f\u6301\u201cRead-Process-Write\u201d\u8de8\u5206\u533a\u4e8b\u52a1\u3002\u901a\u8fc7\u5f15\u5165 <strong>\u4e8b\u52a1\u534f\u8c03\u5668 (Transaction Coordinator)</strong> \u7ba1\u7406\u5168\u5c40\u4e8b\u52a1\u72b6\u6001\u3002</li><li>  <strong>\u63a7\u5236\u6d88\u606f\u6807\u8bb0</strong>\uff1a\u4f7f\u7528\u4e8c\u9636\u6bb5\u63d0\u4ea4\uff082PC\uff09\u534f\u8bae\u3002\u9996\u5148\u5c06\u4e8b\u52a1\u72b6\u6001\u8bbe\u4e3a <code>Prepare</code>\uff0c\u968f\u540e\u5199\u5165\u4e8b\u52a1\u63d0\u4ea4\u63a7\u5236\u6807\u8bb0 <code>CommitMarker</code> \u5230\u6d88\u606f\u65e5\u5fd7\u4e2d\u3002\u6d88\u8d39\u8005\u8bfb\u53d6\u5230 <code>CommitMarker</code> \u540e\uff0c\u624d\u5411\u5ba2\u6237\u7aef\u66b4\u9732\u6b64\u4e8b\u52a1\u6240\u6d89\u53ca\u7684\u6d88\u606f\uff0c\u786e\u4fdd\u4e86\u4e8b\u52a1\u5f3a\u4e00\u81f4\u6027\u3002</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "\u6d88\u8d39\u8005\u7ec4\u4e0e\u518d\u5e73\u8861", "color": "#BFA88F", "title": "Group Coordinator \u5b9a\u4f4d\u9009\u4e3e (Group Coordinator Finder)", "body": "<li>  <strong>\u53bb\u4e2d\u5fc3\u5316\u534f\u8c03\u4e2d\u5fc3</strong>\uff1a\u6bcf\u4e2a\u6d88\u8d39\u8005\u7ec4\uff08Consumer Group\uff09\u5728\u670d\u52a1\u7aef\u90fd\u4f1a\u5206\u6d3e\u4e00\u4e2a\u7279\u5b9a\u7684 Broker \u4f5c\u4e3a <code>Group Coordinator</code> \u8d1f\u8d23\u534f\u8c03\u91cd\u5e73\u8861\u4e0e offset \u7ba1\u7406\u3002</li><li>  <strong>Offsets \u54c8\u5e0c\u6563\u5217\u6620\u5c04</strong>\uff1a\u5b9a\u4f4d\u89c4\u5219\u4e3a\uff1a\u8ba1\u7b97\u6d88\u8d39\u8005\u7ec4 ID \u7684\u54c8\u5e0c\u503c <code>Math.abs(groupId.hashCode()) % 50</code>\uff0c\u83b7\u53d6\u5176\u6620\u5c04\u5230\u5185\u90e8\u4e3b\u9898 <code>__consumer_offsets</code> \u7684\u7279\u5b9a\u5206\u533a\u53f7\uff0c\u8be5\u5206\u533a\u7684 Leader \u6240\u5728\u7684 Broker \u5373\u4e3a\u8be5\u6d88\u8d39\u8005\u7ec4\u7684 Coordinator\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u6d88\u8d39\u8005\u7ec4\u4e0e\u518d\u5e73\u8861", "color": "#BFA88F", "title": "JoinGroup \u4e0e SyncGroup \u91cd\u5e73\u8861\u534f\u8bae (Join/Sync two-phase Protocol)", "body": "<li>  <strong>\u4e8c\u9636\u6bb5\u534f\u4f5c\u6d41</strong>\uff1a</li><li>1.  <strong>JoinGroup \u9636\u6bb5</strong>\uff1a\u5c0f\u7ec4\u6210\u5458\u65ad\u5f00\u5f53\u524d\u6d88\u8d39\uff0c\u5411 Coordinator \u53d1\u9001 <code>JoinGroup</code> \u7533\u8bf7\u3002Coordinator \u9009\u62e9\u7b2c\u4e00\u4e2a\u52a0\u5165\u7684\u6d88\u8d39\u8005\u4e3a Leader\uff0c\u5e76\u8fd4\u56de\u6210\u5458\u5217\u8868\u3002</li><li>2.  <strong>SyncGroup \u9636\u6bb5</strong>\uff1aConsumer Leader \u672c\u5730\u8ba1\u7b97\u597d\u5206\u533a\u5206\u914d\u7b56\u7565\uff0c\u5e76\u5c01\u88c5\u5728 <code>SyncGroupRequest</code> \u4e2d\u53d1\u9001\u7ed9 Coordinator\uff0cCoordinator \u968f\u540e\u5c06\u6b64\u7b56\u7565\u4e0b\u53d1\u5206\u914d\u7ed9\u6240\u6709\u6d88\u8d39\u8005\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u6d88\u8d39\u8005\u7ec4\u4e0e\u518d\u5e73\u8861", "color": "#BFA88F", "title": "\u5fc3\u8df3\u7ef4\u6301\u4e0e\u6d3b\u6027\u63a2\u6d4b\u673a\u5236 (Heartbeats & Liveness)", "body": "<li>  <strong>\u63a2\u9488\u4fdd\u6d3b</strong>\uff1a\u6d88\u8d39\u8005\u901a\u8fc7\u72ec\u7acb\u7684\u540e\u53f0\u5fc3\u8df3\u7ebf\u7a0b\u5b9a\u671f\u5411 Coordinator \u53d1\u9001 <code>Heartbeat</code>\u3002\u82e5\u8d85\u8fc7 <code>session.timeout.ms</code>\uff08\u9ed8\u8ba4 45 \u79d2\uff09\u6ca1\u6709\u53d1\u9001\u5fc3\u8df3\uff0c\u8be5\u6d88\u8d39\u8005\u88ab\u79fb\u51fa\u5e76\u89e6\u53d1 Rebalance\u3002</li><li>  <strong>\u5904\u7406\u505c\u6ede\u68c0\u6d4b</strong>\uff1a\u5982\u679c\u6d88\u8d39\u8005\u5904\u7406\u6570\u636e\u8017\u65f6\u8fc7\u957f\uff0c\u62c9\u53d6\u95f4\u9694\u8d85\u9650\uff08<code>max.poll.interval.ms</code>\uff0c\u9ed8\u8ba4 5 \u5206\u949f\uff09\uff0c\u5373\u4f7f\u5fc3\u8df3\u6b63\u5e38\uff0c\u4e5f\u4f1a\u88ab\u5224\u5b9a\u4e3a\u50f5\u6b7b\u6d88\u8d39\uff0c\u5f3a\u5236\u79fb\u51fa\u7fa4\u7ec4\u5e76\u518d\u5e73\u8861\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u6d88\u8d39\u8005\u7ec4\u4e0e\u518d\u5e73\u8861", "color": "#BFA88F", "title": "\u6d88\u8d39\u504f\u79fb\u91cf\u63d0\u4ea4\u4e0e offsets \u6301\u4e45\u5316 (Offset Commit Storage)", "body": "<li>  <strong>\u6d88\u8d39\u5f52\u6863\u4f4d\u7f6e</strong>\uff1a\u6d88\u8d39\u8005\u9700\u8981\u5c06\u5176\u8bfb\u53d6\u7684\u6700\u65b0 Offset \u63d0\u4ea4\u5f52\u6863\u3002</li><li>  <strong>Offsets \u5185\u90e8\u65e5\u5fd7\u7269\u7406\u5b58\u50a8</strong>\uff1a\u63d0\u4ea4\u7684\u504f\u79fb\u91cf\u8bb0\u5f55\u4f1a\u8f6c\u6362\u6210\u6d88\u606f\u5199\u5165 Kafka \u5185\u90e8\u4e3b\u9898 <code>__consumer_offsets</code>\u3002\u8fd9\u4fdd\u969c\u4e86\u6d88\u8d39\u8005\u53d1\u751f\u6545\u969c\u6f02\u79fb\u540e\uff0c\u65b0\u627f\u63a5\u7684\u6d88\u8d39\u8005\u53ef\u4ee5\u76f4\u63a5\u901a\u8fc7\u8bfb\u53d6\u6b64\u4e3b\u9898\u7684\u5386\u53f2 Offset \u63a5\u7740\u8fdb\u884c\u6d88\u8d39\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u6d88\u8d39\u8005\u7ec4\u4e0e\u518d\u5e73\u8861", "color": "#BFA88F", "title": "\u5408\u4f5c\u5f0f\u7c98\u6027\u5206\u914d\u4e0e\u589e\u91cf Rebalance (Cooperative Sticky Assignor)", "body": "<li>  <strong>Stop-The-World \u7834\u9664</strong>\uff1a\u4f20\u7edf Eager \u534f\u8bae\u91cd\u5e73\u8861\u8981\u6c42\u5168\u5458\u65ad\u5f00\u6240\u6709\u5206\u533a\uff08STW \u8017\u65f6\u4e45\uff09\u3002</li><li>  <strong>\u589e\u91cf\u5206\u914d</strong>\uff1a\u5408\u4f5c\u5f0f\u7c98\u6027\u5206\u914d\u5668\uff08CooperativeStickyAssignor\uff09\u5347\u7ea7\u4e3a\u201c\u6e10\u8fdb\u5f0f\u91cd\u5e73\u8861\u201d\u3002\u5b83\u53ea\u6302\u8d77\u90a3\u4e9b\u9700\u8981\u88ab\u8fc1\u79fb\u7684\u5206\u533a\u8fdb\u884c\u91cd\u65b0\u6307\u5411\uff0c\u5176\u4ed6\u672a\u53d7\u5f71\u54cd\u7684\u5206\u533a\u6b63\u5e38\u62c9\u53d6\u6d88\u606f\uff0c\u5927\u5e45\u5ea6\u524a\u51cf\u4e86\u7f51\u7edc\u6296\u52a8\u5e26\u6765\u7684\u4e1a\u52a1\u505c\u6ede\u3002</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
