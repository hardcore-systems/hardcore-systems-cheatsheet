    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "\u6838\u5fc3\u4e8b\u4ef6\u5faa\u73af\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "ae.c \u5355\u7ebf\u7a0b\u4e8b\u4ef6\u9a71\u52a8\u6a21\u578b (ae.c Single-Threaded Event Loop)", "body": "<li>  <strong>\u7f51\u7edc\u4e0e\u65f6\u95f4\u4e8b\u4ef6\u5408\u5e76</strong>\uff1a\u4e3b\u5faa\u73af\u6838\u5fc3\u7531 <code>aeProcessEvents</code> \u9a71\u52a8\u3002\u5b83\u5728\u5355\u6b21\u5faa\u73af\u4e2d\u4e0d\u4ec5\u5904\u7406\u7f51\u7edc Socket \u53ef\u8bfb\u53ef\u5199\u4e8b\u4ef6\uff0c\u8fd8\u5904\u7406\u5185\u90e8\u65f6\u95f4\u4e8b\u4ef6\uff08\u5982\u8fc7\u671f\u626b\u63cf\u3001\u4e3b\u4ece\u5fc3\u8df3\uff09\u3002</li><li>  <strong>\u6d88\u9664\u4e0a\u4e0b\u6587\u5207\u6362</strong>\uff1a\u5b8c\u5168\u5728\u5355\u7ebf\u7a0b\u5185\u8fd0\u884c\uff0c\u6d88\u9664\u4e86\u591a\u7ebf\u7a0b\u4e0a\u4e0b\u6587\u5207\u6362\u3001\u4e92\u65a5\u9501\u7ade\u4e89\u548c CPU Cache \u88ab\u5176\u4ed6\u7ebf\u7a0b\u6c61\u67d3\u7684\u5f0a\u7aef\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "\u6838\u5fc3\u4e8b\u4ef6\u5faa\u73af\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "I/O \u591a\u8def\u590d\u7528\u64cd\u4f5c\u7cfb\u7edf\u62bd\u8c61 (I/O Multiplexing Abstraction)", "body": "<li>  <strong>\u5e73\u53f0\u81ea\u9002\u5e94\u5305\u88c5</strong>\uff1aRedis \u5c06\u64cd\u4f5c\u7cfb\u7edf\u975e\u963b\u585e I/O \u539f\u8bed\u8fdb\u884c\u4e86\u4e8c\u6b21\u5c01\u88c5\uff08<code>ae_select.c</code>\u3001<code>ae_epoll.c</code>\u3001<code>ae_kqueue.c</code>\uff09\u3002</li><li>  <strong>\u5b8f\u7f16\u8bd1\u7f16\u8bd1\u6289\u62e9</strong>\uff1a\u5728\u7f16\u8bd1\u671f\u4f18\u5148\u4f7f\u7528\u6548\u7387\u6700\u9ad8\u7684\u5e73\u53f0\u539f\u8bed\uff08Linux \u5e73\u53f0\u4e3a epoll\uff0cBSD \u5e73\u53f0\u4e3a kqueue\uff09\uff0c\u5b9e\u73b0 $O(1)$ \u7684\u6d3b\u8dc3 Socket \u76d1\u542c\u54cd\u5e94\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "\u6838\u5fc3\u4e8b\u4ef6\u5faa\u73af\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "\u5ba2\u6237\u7aef\u67e5\u8be2\u7f13\u51b2\u533a\u8bfb\u5199\u961f\u5217 (Client Query Buffers)", "body": "<li>  <strong>\u7f13\u51b2\u533a\u7a7a\u95f4\u63a7\u5236</strong>\uff1a\u6bcf\u4e2a\u5ba2\u6237\u7aef\u8fde\u5165\u5bf9\u5e94\u4e00\u4e2a <code>connection</code> \u7ed3\u6784\u3002\u8bfb\u7f13\u51b2\u533a\uff08Query Buffer\uff09\u521d\u59cb\u5206\u914d 16KB\uff0c\u968f\u547d\u4ee4\u5927\u5c0f\u81ea\u52a8\u6269\u5bb9\uff0c\u4f46\u82e5\u8fbe\u5230 1GB \u786c\u6027\u9608\u503c\u5c06\u5f3a\u5236\u65ad\u5f00\u8fde\u63a5\u3002</li><li>  <strong>\u5199\u54cd\u5e94\u961f\u5217</strong>\uff1a\u5199\u56de\u65f6\u5c06\u54cd\u5e94\u5185\u5bb9\u5148\u6253\u5305\u5165\u5ba2\u6237\u7aef\u9759\u6001 16KB \u7f13\u5b58\u533a\u6216\u6302\u8f7d\u5230 <code>reply</code> \u53cc\u5411\u94fe\u8868\u4e2d\uff0c\u5728 ae \u5faa\u73af\u53ef\u5199\u4e8b\u4ef6\u56de\u8c03\u4e2d\u6279\u91cf flush \u53d1\u9001\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "\u6838\u5fc3\u4e8b\u4ef6\u5faa\u73af\u4e0e\u7f51\u7edc", "color": "#7A8B99", "title": "RESP \u901a\u4fe1\u534f\u8bae\u89e3\u6790\u4e0e\u5185\u5b58\u5e8f\u5217\u5316 (RESP Protocol Parser)", "body": "<li>  <strong>\u4e8c\u8fdb\u5236\u5b89\u5168\u683c\u5f0f</strong>\uff1aRESP\uff08Redis Serialization Protocol\uff09\u91c7\u7528\u524d\u7f00\u6807\u793a\u6570\u636e\u7c7b\u578b\u3002\u5982 <code>+</code> \u4ee3\u8868\u7b80\u5355\u5b57\u7b26\u4e32\uff0c<code>$</code> \u4ee3\u8868 Bulk String\uff0c<code>:</code> \u4ee3\u8868\u6574\u578b\u3002</li><li>  <strong>\u7b80\u6613\u5feb\u901f\u89e3\u6790</strong>\uff1a\u4f9d\u9760\u8bfb\u7f13\u51b2\u533a\u6307\u9488\u524d\u79fb\u5feb\u901f\u5207\u5272\u547d\u4ee4\uff0c\u4e0d\u5305\u542b\u590d\u6742\u7684 XML/JSON \u89e3\u6790\u5f00\u9500\uff0c\u4e14\u56e0\u660e\u786e\u5b9a\u4e49\u5b57\u7b26\u4e32\u957f\u5ea6\u800c\u652f\u6301\u4e8c\u8fdb\u5236\u5b89\u5168\u3002</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "\u52a8\u6001\u5185\u5b58\u6570\u636e\u7ed3\u6784", "color": "#7D8F7B", "title": "SDS \u7b80\u5355\u52a8\u6001\u5b57\u7b26\u4e32\u7ed3\u6784 (Simple Dynamic String SDS)", "body": "<li>  <strong>\u6d88\u9664 strlen \u5f00\u9500</strong>\uff1aSDS \u5934\u90e8\u7ed3\u6784\u4f53\u5b9a\u4e49\u4e86\u5df2\u7528\u957f\u5ea6 <code>len</code>\u3001\u5206\u914d\u5bb9\u91cf <code>alloc</code> \u4ee5\u53ca\u63a7\u5236\u5934\u90e8\u79cd\u7c7b\u7684 <code>flags</code>\uff0c\u652f\u6301\u5e38\u6570\u65f6\u95f4 $O(1)$ \u83b7\u53d6\u4e32\u957f\u5ea6\u3002</li><li>  <strong>\u9632\u7f13\u51b2\u533a\u6ea2\u51fa</strong>\uff1aSDS \u4fee\u6539\u65f6\u4f1a\u5148\u5224\u5b9a <code>alloc</code> \u5269\u4f59\u7a7a\u95f4\uff0c\u4e0d\u8db3\u65f6\u81ea\u52a8\u89e6\u53d1\u5185\u5b58\u9884\u5206\u914d\u903b\u8f91\uff08\u5c0f\u4e8e 1MB \u7ffb\u500d\uff0c\u5927\u4e8e 1MB \u589e\u91cf 1MB\uff09\uff0c\u5e76\u4e14\u4ee5 <code>\\0</code> \u7ed3\u5c3e\u517c\u5bb9 C \u6807\u51c6\u4e32\u3002</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "\u52a8\u6001\u5185\u5b58\u6570\u636e\u7ed3\u6784", "color": "#7D8F7B", "title": "\u53cc HashTable \u4e0e\u6e10\u8fdb\u5f0f Rehash (dict.h & Progressive Rehash)", "body": "<li>  <strong>\u53cc\u8868\u5185\u5b58\u6e10\u8fdb\u8fc1\u79fb</strong>\uff1aRedis \u7684\u5b57\u5178 <code>dict</code> \u7ed3\u6784\u4f53\u4e2d\u5305\u542b\u4e24\u4e2a\u54c8\u5e0c\u8868 <code>ht[0]</code> \u548c <code>ht[1]</code>\u3002\u5f53\u4e3b\u8868\u51b2\u7a81\u7387\u8fc7\u9ad8\u65f6\uff0c\u521d\u59cb\u5316 <code>ht[1]</code> \u4e3a\u5176\u4e24\u500d\u5927\u5c0f\u3002</li><li>  <strong>rehashidx \u6307\u9488\u642c\u8fd0</strong>\uff1a\u5c06\u8fc1\u79fb\u4efb\u52a1\u5e73\u644a\u3002\u6bcf\u6b21\u5bf9\u5b57\u5178\u6267\u884c\u8bfb\u3001\u5199\u6216\u5220\u9664\u65f6\uff0c\u4e3b\u52a8\u5c06 <code>ht[0]</code> \u5728 <code>rehashidx</code> \u6307\u5411\u7684\u54c8\u5e0c\u94fe\u8868\u642c\u8fd0\u5230 <code>ht[1]</code> \u5e76\u5728\u5b8c\u6210\u540e 9\u4e4b\u95f4\u5b9a\u671f\u4e92\u53d1 <code>PING/PONG</code> \u5305\uff0c\u643a\u5e26\u81ea\u8eab\u72b6\u6001\u4ee5\u53ca\u96c6\u7fa4\u4e2d 1/10 \u8282\u70b9\u7684\u5143\u6570\u636e\u4fe1\u606f\uff0c\u5b9e\u73b0\u62d3\u6251\u72b6\u6001\u7684\u5f02\u6b65\u81ea\u6cbb\u6536\u655b\u3002</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "\u9ad8\u53ef\u7528\u590d\u5236\u4e0e\u5206\u7247", "color": "#5F7582", "title": "16384 \u54c8\u5e0c\u69fd\u7269\u7406\u8def\u7531\u4e0e ASK/MOVED (Hash Slots Routing & Redirect)", "body": "<li>  <strong>\u69fd\u4f4d\u7a7a\u95f4\u5206\u914d</strong>\uff1a\u96c6\u7fa4\u5c06\u6570\u636e\u5212\u5206\u4e3a 16384 \u4e2a\u865a\u62df\u54c8\u5e0c\u69fd\uff08Slots\uff09\u3002</li><li>  <strong>\u8df3\u8f6c\u91cd\u5b9a\u5411</strong>\uff1a\u5ba2\u6237\u7aef\u53ef\u4ee5\u5411\u4efb\u610f\u8282\u70b9\u53d1\u8d77\u8bf7\u6c42\u3002\u82e5\u76ee\u6807\u69fd\u4f4d\u4e0d\u5728\u8be5\u8282\u70b9\u4e0a\uff0c\u8282\u70b9\u8fd4\u56de <code>MOVED <slot> <ip>:<port></code> \u5f3a\u5236\u5ba2\u6237\u7aef\u66f4\u65b0\u672c\u5730\u69fd\u8def\u7531\u56fe\u3002\u82e5\u5904\u4e8e\u69fd\u8fc1\u79fb\u4e2d\uff0c\u8fd4\u56de <code>ASK</code> \u4e34\u65f6\u8df3\u8f6c\uff0c\u4fdd\u8bc1\u4e86\u6570\u636e\u7684\u8fc1\u79fb\u4e00\u81f4\u6027\u3002</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "\u9ad8\u53ef\u7528\u590d\u5236\u4e0e\u5206\u7247", "color": "#5F7582", "title": "\u4e8b\u52a1\u673a\u5236 ACID \u9650\u754c\u4e0e WATCH (Redis Transaction Limits)", "body": "<li>  <strong>\u65e0\u56de\u6eda\u673a\u5236</strong>\uff1aRedis \u4e8b\u52a1\uff08<code>MULTI/EXEC</code>\uff09\u4ec5\u63d0\u4f9b\u4e00\u7ec4\u547d\u4ee4\u7684\u6253\u5305\u987a\u5e8f\u6267\u884c\uff0c\u6267\u884c\u8fc7\u7a0b\u4e2d\u82e5\u6709\u5355\u6761\u547d\u4ee4\u51fa\u9519\uff0c\u5176\u4ed6\u547d\u4ee4\u4f9d\u7136\u4f1a\u7ee7\u7eed\u6267\u884c\uff0c\u4e0d\u652f\u6301 ACID \u7684 Atomicity \u539f\u5b50\u56de\u6eda\u3002</li><li>  <strong>WATCH \u4e50\u89c2\u9501\u63a7\u5236</strong>\uff1a\u4f7f\u7528 <code>WATCH</code> \u76d1\u63a7\u7279\u5b9a\u952e\uff0c\u5728 <code>EXEC</code> \u4e4b\u524d\u5982\u679c\u6709\u5176\u4ed6\u8fde\u63a5\u4fee\u6539\u4e86\u8be5\u952e\uff0c\u4e8b\u52a1\u6267\u884c\u81ea\u52a8\u5931\u8d25\u3002</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "\u9ad8\u53ef\u7528\u590d\u5236\u4e0e\u5206\u7247", "color": "#5F7582", "title": "Lua \u811a\u672c\u5d4c\u5165\u6c99\u76d2\u4e0e\u539f\u5b50\u6267\u884c\u539f\u7406 (Lua Script Atomicity)", "body": "<li>  <strong>\u6267\u884c\u4e92\u65a5\u9501\u673a\u5236</strong>\uff1aRedis \u5d4c\u5165\u4e86 Lua \u865a\u62df\u673a\u3002\u4efb\u4f55 Lua \u811a\u672c\u5728\u6267\u884c\u65f6\u90fd\u88ab\u89c6\u4e3a\u4e00\u6761\u5355\u547d\u4ee4\u3002</li><li>  <strong>\u6267\u884c\u72ec\u5360\u9632\u5e72\u6270</strong>\uff1a\u811a\u672c\u6267\u884c\u671f\u95f4\uff0c\u4e3b\u4e8b\u4ef6\u5faa\u73af\u4fdd\u6301\u72ec\u5360\u72b6\u6001\uff0c\u4efb\u4f55\u5176\u4ed6\u5ba2\u6237\u7aef\u7684\u7f51\u7edc\u8bfb\u5199\u90fd\u88ab\u6302\u8d77\uff0c\u4fdd\u8bc1\u4e86\u811a\u672c\u5185\u591a\u6b65\u903b\u8f91\u5bf9\u5185\u5b58\u64cd\u4f5c\u7684\u7edd\u5bf9\u539f\u5b50\u6027\u3002</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "Threaded I/O \u591a\u7ebf\u7a0b\u7f51\u7edc\u5904\u7406\u4f18\u5316 (Threaded I/O in Redis 6.0)", "body": "<li>  <strong>\u5378\u8f7d Socket \u8bfb\u5199\u74f6\u9888</strong>\uff1a\u968f\u7740\u4e07\u5146\u7f51\u5361\u666e\u53ca\uff0c\u5355\u7ebf\u7a0b Socket \u8bfb\u5199\u548c RESP \u89e3\u6790\u6210\u4e3a\u74f6\u9888\u3002</li><li>  <strong>\u903b\u8f91\u5355\u7ebf\u7a0b\u6838\u5fc3</strong>\uff1aRedis 6.0 \u5f15\u5165\u591a\u7ebf\u7a0b I/O\u3002\u591a\u4e2a helper \u7ebf\u7a0b\u5e76\u53d1\u4ece\u5ba2\u6237\u7aef Socket \u8bfb\u53d6\u5b57\u8282\u6d41\u5e76\u89e3\u6790\uff0c\u5199\u56de\u65f6\u4e5f\u662f\u5e76\u53d1\u5199\u56de Socket\uff0c\u4f46\u6838\u5fc3\u7684\u6570\u636e\u7ed3\u6784\u4fee\u6539\u6267\u884c\u4ecd\u7136\u5728\u4e3b\u7ebf\u7a0b\u4e2d\u987a\u5e8f\u5355\u7ebf\u7a0b\u6267\u884c\uff0c\u517c\u987e\u4e86\u5b89\u5168\u4e0e\u5e76\u53d1\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "\u5185\u5b58\u52a8\u6001\u788e\u7247\u6574\u7406\u673a\u5236\u539f\u7406 (Active Defragmentation)", "body": "<li>  <strong>\u7269\u7406\u5185\u5b58\u79fb\u52a8\u91cd\u7ec4</strong>\uff1a\u957f\u671f\u8fd0\u884c\u4e0b jemalloc \u4ea7\u751f\u7684\u788e\u7247\u65e0\u6cd5\u81ea\u52a8\u5f52\u8fd8 OS\u3002</li><li>  <strong>\u539f\u5730\u62f7\u8d1d\u9875\u5bf9\u9f50</strong>\uff1a\u5f00\u542f active defragmentation \u540e\uff0cRedis \u626b\u63cf\u5185\u5b58\uff0c\u5f53\u53d1\u73b0\u788e\u5c0f\u7684\u5206\u914d\u5757\u65f6\uff0c\u52a8\u6001\u5c06\u5176\u7269\u7406\u62f7\u8d1d\u5230\u4e00\u7247\u8fde\u7eed\u7684\u65b0\u5730\u5740\uff0c\u5e76\u66f4\u65b0\u539f dict \u7684\u6570\u636e\u6307\u9488\uff0c\u4ee5\u6b64\u817e\u51fa\u6574\u9875\u7269\u7406\u7a7a\u95f4\u5f52\u8fd8 OS\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "\u5ba2\u6237\u7aef\u7f13\u5b58\u5931\u6548\u8ddf\u8e2a\u673a\u5236 (Client-Side Caching)", "body": "<li>  <strong>\u7f13\u5b58\u4e8c\u7ea7\u91cd\u5b9a\u5411</strong>\uff1a\u914d\u5408 RESP3 \u534f\u8bae\u5b9e\u73b0\u3002Redis \u5141\u8bb8\u5ba2\u6237\u7aef\u5728\u672c\u5730\u5185\u5b58\u4e2d\u7f13\u5b58\u6570\u636e\u3002</li><li>  <strong>\u5931\u6548\u63a8\u9001\u63a7\u5236</strong>\uff1a\u4e3b\u5e93\u7ef4\u62a4\u4e00\u4e2a Tracking \u5217\u8868\u8bb0\u5f55\u54ea\u4e9b\u5ba2\u6237\u7aef\u8bfb\u53d6\u4e86\u54ea\u4e9b\u952e\u3002\u4e00\u65e6\u8fd9\u4e9b\u952e\u53d1\u751f\u4fee\u6539\uff0c\u4e3b\u5e93\u5411\u5bf9\u5e94\u7684\u5ba2\u6237\u7aef\u53d1\u9001 <code>Invalidation</code>\uff08\u5931\u6548\u901a\u77e5\uff09\u6d88\u606f\uff0c\u5b9e\u73b0\u9ad8\u6548\u7684\u591a\u8fdb\u7a0b\u4e8c\u7ea7\u7f13\u5b58\u540c\u6b65\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "\u6162\u65e5\u5fd7\u6392\u67e5\u4e0e\u5ef6\u8fdf\u533b\u751f\u8bca\u65ad\u5de5\u5177 (Slowlog & Latency Doctor)", "body": "<li>  <strong>\u963b\u585e\u65f6\u95f4\u8bb0\u5f55</strong>\uff1a<code>slowlog</code> \u8bb0\u5f55\u7684\u662f\u547d\u4ee4\u5728\u4e3b\u4e8b\u4ef6\u5faa\u73af\u4e2d\u6267\u884c\u7684\u51c0\u65f6\u95f4\uff08\u4e0d\u542b\u7f51\u7edc I/O \u7b49\u5f85\uff09\u3002</li><li>  <strong>\u7cfb\u7edf\u5065\u5eb7\u5ea6\u8bca\u65ad</strong>\uff1a\u4f7f\u7528 <code>LATENCY DOCTOR</code> \u547d\u4ee4\u53ef\u4ee5\u5206\u6790\u7cfb\u7edf\u5404\u5f15\u64ce\u7684\u5ef6\u8fdf\u5cf0\u503c\uff08\u5982 fork \u8017\u65f6\u3001AOF \u5237\u76d8\u8017\u65f6\u3001\u8fc7\u671f\u5220\u9664\u8017\u65f6\uff09\uff0c\u8f93\u51fa\u7cfb\u7edf\u7ea7\u8bca\u65ad\u62a5\u544a\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u9ad8\u9636\u4f18\u5316\u4e0e\u8c03\u8bd5\u76d1\u63a7", "color": "#BFA88F", "title": "\u6a21\u5757 API \u7269\u7406\u62d3\u5c55\u63a5\u53e3 (Redis Modules API)", "body": "<li>  <strong>\u52a0\u8f7d\u5171\u4eab\u5e93\u6ce8\u5165</strong>\uff1aRedis \u63d0\u4f9b\u6a21\u5757\u7cfb\u7edf\u3002\u5f00\u53d1\u8005\u53ef\u4ee5\u4f7f\u7528 C/C++ \u7f16\u5199\u5171\u4eab\u5e93\u5e76\u5728\u542f\u52a8\u65f6\u52a0\u8f7d\u3002</li><li>  <strong>\u539f\u751f\u6027\u80fd\u62d3\u5c55</strong>\uff1a\u6a21\u5757\u53ef\u4ee5\u76f4\u63a5\u8c03\u7528 Redis \u5185\u5b58\u6838\u5fc3\uff0c\u521b\u5efa\u65b0\u7684\u7269\u7406\u6570\u636e\u7c7b\u578b\u6216\u5b9e\u73b0\u9ad8\u6027\u80fd\u8ba1\u7b97\u903b\u8f91\uff0c\u7ed5\u8fc7\u4e86 Lua \u865a\u62df\u673a\u7684\u8f6c\u6362\u635f\u8017\u3002</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
