<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sqlite-internals SQLite Storage Engine Architecture Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161820;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #f3f4f6, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .stat-item {
            background: #1e293b50;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn:hover {
            border-color: var(--accent-color);
            color: #fff;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--theme-color);
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--theme-color);
            box-shadow: 0 10px 20px -10px var(--theme-color-50);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .relative-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            background-color: var(--theme-color);
        }
        .module-tag {
            font-size: 0.7rem;
            color: var(--theme-color);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.75rem;
        }
        .card-body {
            font-size: 0.78rem;
            color: #94a3b8;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.5rem;
        }
        .card-body ul, .card-body ol {
            padding-left: 1rem;
            margin-top: 0.25rem;
        }
        .card-body li {
            margin-bottom: 0.25rem;
        }
        .card-body code {
            font-family: monospace;
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
            color: #3b82f6;
        }
        .card-body strong {
            color: #f1f5f9;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>sqlite-internals Storage Engine Map</h1>
        <p>High-Density VDBE Bytecode, B-Tree Page Layouts, Rollback Journals, and WAL Mode Concurrency Reference System</p>
        <div class="stats-bar">
            <span class="stat-item">Core Cards: 28</span>
            <span class="stat-item">Category Modules: 6</span>
            <span class="stat-item">3-Level Filtering</span>
            <span class="stat-item">Zone T Tuning Parameters</span>
        </div>
    </header>

    <div class="main-container">
        <div class="filter-controls">
            <button class="filter-btn active" onclick="filterModule('all', this)">ALL</button>
            <button class="filter-btn" style="--theme-color: var(--slate-blue)" onclick="filterModule('M1', this)">M1. SQL Compiler</button>
            <button class="filter-btn" style="--theme-color: var(--moss-green)" onclick="filterModule('M2', this)">M2. VDBE VM</button>
            <button class="filter-btn" style="--theme-color: var(--plum-rose)" onclick="filterModule('M3', this)">M3. B-Tree & Pager</button>
            <button class="filter-btn" style="--theme-color: var(--terracotta)" onclick="filterModule('M4', this)">M4. Rollback</button>
            <button class="filter-btn" style="--theme-color: var(--indigo)" onclick="filterModule('M5', this)">M5. WAL Mode</button>
            <button class="filter-btn" style="--theme-color: var(--antique-gold)" onclick="filterModule('M6', this)">M6. VFS & Locks</button>
        </div>

        <div class="grid-layout" id="cardsGrid">
            <!-- Cards will be dynamically injected here -->
        </div>
    </div>

    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "SQL Compiler & Lemon", "color": "#7A8B99", "title": "Tokenizer & Lemon Parser Generator", "body": "<li>  <strong>Reentrant Parser Generator</strong>: SQLite rejects Bison/Yacc in favor of the custom Lemon parser generator. Lemon constructs LALR(1) parsers that are reentrant and lack global state variables.</li><li>  <strong>Low Stack Footprint</strong>: Lemon parameterizes grammar actions, minimizing stack size during parsing to protect low-resource embedded devices from stack overflows.</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "SQL Compiler & Lemon", "color": "#7A8B99", "title": "Code Generator & Query Flattening", "body": "<li>  <strong>Instruction Generation</strong>: The code generator performs AST traversals to output flat VDBE register bytecode.</li><li>  <strong>Query Flattening</strong>: Optimizations flatten nested SELECT statements and subqueries into single-level joins, eliminating intermediate temporary table allocations during VM execution.</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "SQL Compiler & Lemon", "color": "#7A8B99", "title": "Cost-Based Optimizer & Index Selection", "body": "<li>  <strong>Heuristic Cost Estimation</strong>: The query planner estimates cost boundaries by calculating expected physical page scans.</li><li>  <strong>Expression Indexes</strong>: Supports indexes built directly on computed expressions, replacing AST expression trees during optimization to avoid runtime computation.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "SQL Compiler & Lemon", "color": "#7A8B99", "title": "Prepared Statement Cache", "body": "<li>  <strong>Compilation Reuse</strong>: The <code>sqlite3_prepare_v2</code> call compiles SQL strings into pre-allocated VDBE programs with unbound parameters (e.g., <code>?</code>).</li><li>  <strong>Zero-Allocation Binding</strong>: Developers execute queries using <code>sqlite3_bind_*</code> and <code>sqlite3_step</code> loops, bypassing parsing and optimizer phases.</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "VDBE VM & Opcode", "color": "#7D8F7B", "title": "VDBE Architecture & Opcode Loop", "body": "<li>  <strong>Register-Based Soft CPU</strong>: VDBE is a register-based virtual machine that treats operations as sequences of pseudo-machine instructions.</li><li>  <strong>Central Dispatch Loop</strong>: The execution engine in <code>sqlite3VdbeExec()</code> runs as a giant switch-case loop that dispatches opcodes via program counter offsets.</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "VDBE VM & Opcode", "color": "#7D8F7B", "title": "VDBE Registers & Dynamic Typing", "body": "<li>  <strong>Dynamic Mem Cells</strong>: VDBE registers are represented by <code>Mem</code> struct cells. They support dynamic typing (NULL, INTEGER, REAL, TEXT, BLOB) and handle pointer reuse.</li><li>  <strong>Type Affinity</strong>: Registers automatically cast data types at runtime based on column affinity rules, allowing flexible schema designs.</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "VDBE VM & Opcode", "color": "#7D8F7B", "title": "Cursor Operations & B-Tree Interface", "body": "<li>  <strong>Cursor Handles</strong>: VDBE uses cursors to read and write records in B-Tree pages.</li><li>  <strong>B-Tree Seeking</strong>: Opcodes like <code>OpenRead</code> allocate cursors, <code>SeekRowid</code> executes binary searches, and <code>Column</code> extracts values directly from B-Tree cells.</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "VDBE VM & Opcode", "color": "#7D8F7B", "title": "Bytecode Subroutines & Coroutines", "body": "<li>  <strong>Context Switching</strong>: VDBE avoids deep call stacks by using <code>Yield</code> and <code>Gosub</code> instructions to act as light coroutines.</li><li>  <strong>Temporary Table Avoidance</strong>: In sorting and GROUP BY operations, VDBE yields rows dynamically to consumers, minimizing memory buffers.</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "VDBE VM & Opcode", "color": "#7D8F7B", "title": "VDBE Explain Command & Analysis", "body": "<li>  <strong>Query Plan Diagnostics</strong>: Executing <code>EXPLAIN QUERY PLAN <SQL></code> outputs query execution plans, documenting index use (e.g., <code>USING INDEX</code>).</li><li>  <strong>Bytecode Disassembly</strong>: Using <code>EXPLAIN <SQL></code> prints the complete disassembly of VDBE opcodes (e.g., <code>Init</code>, <code>OpenRead</code>, <code>Column</code>, <code>ResultRow</code>).</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "B-Tree & Pager", "color": "#9E828A", "title": "B-Tree Page Structure & Layout", "body": "<li>  <strong>Node Alignments</strong>: B-Tree page sizes range from 512B to 64KB. Headers contain 8 to 12 bytes of metadata indicating node status (leaf or interior).</li><li>  <strong>Cell Organization</strong>: Cells (keys and payload data) grow from the page end toward the top, while offsets are stored in cell pointer arrays growing from the header downward.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "B-Tree & Pager", "color": "#9E828A", "title": "Overflow Pages", "body": "<li>  <strong>Large Payload Eviction</strong>: If a cell's payload exceeds page-specific thresholds, SQLite evicts the excess data to overflow pages.</li><li>  <strong>Link Pointer Chains</strong>: The primary leaf cell retains only a portion of the payload and a 4-byte pointer to the overflow chain, preserving node fan-out.</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "B-Tree & Pager", "color": "#9E828A", "title": "Pager Logic & PCache Management", "body": "<li>  <strong>Page to Memory Mapping</strong>: The Pager sits between VDBE/B-Tree and OS. It maps file blocks into memory Page nodes tracked by the PCache.</li><li>  <strong>Pinning & Dirty Flags</strong>: Pager locks pages in memory by pinning them, and flags modified buffers as dirty to trigger writes.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "B-Tree & Pager", "color": "#9E828A", "title": "Free-list & Compaction", "body": "<li>  <strong>Page Deallocation</strong>: When data is deleted, page offsets are appended to a global free-list rather than truncating the database file.</li><li>  <strong>Physical Compaction</strong>: The <code>VACUUM</code> command creates a clean database copy on disk and copies active pages, removing fragments and shrinking file size.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "Rollback Journal", "color": "#B58A7D", "title": "-journal File Layout", "body": "<li>  <strong>Original State Cache</strong>: In rollback mode, Pager writes original page contents to a <code>-journal</code> file before any page modifications occur.</li><li>  <strong>Journal Header</strong>: The header specifies magic numbers, transaction page counts, and the original database file size for rollbacks.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "Rollback Journal", "color": "#B58A7D", "title": "Rollback Mode Commit & Recovery", "body": "<li>  <strong>Two-Phase Write Barrier</strong>:</li><li>1.  <strong>Log Sync</strong>: Write original pages to the journal and issue <code>fsync</code> on the journal.</li><li>2.  <strong>DB Update</strong>: Write dirty pages to the database file and issue <code>fsync</code> on it. Delete/truncate the journal file.</li><li>  <strong>Automatic Rollback</strong>: If a crash occurs mid-write, Pager reads the <code>-journal</code> file on restart to restore original pages to the database.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "Rollback Journal", "color": "#B58A7D", "title": "Lock States in Rollback Mode", "body": "<li>  <strong>Lock Hierarchy</strong>:</li><li>1.  <strong>SHARED</strong>: Readers read the file. No writes allowed.</li><li>2.  <strong>RESERVED</strong>: One writer plans to write. Readers can read.</li><li>3.  <strong>PENDING</strong>: Writer waits for active readers to finish. Blocks new readers.</li><li>4.  <strong>EXCLUSIVE</strong>: Writer holds exclusive access, allowing page writes to disk.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "Rollback Journal", "color": "#B58A7D", "title": "Multi-process Write Constraints", "body": "<li>  <strong>Concurrency Block</strong>: Rollback writes require an EXCLUSIVE file lock, blocking all readers and returning SQLITE_BUSY.</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "WAL Mode", "color": "#5F7582", "title": "-wal File Layout", "body": "<li>  <strong>Append-Only Log</strong>: WAL mode writes updates to a separate <code>-wal</code> file, keeping the main database file untouched during transactions.</li><li>  <strong>WAL Frame Headers</strong>: The file starts with a 32-byte header, followed by frames containing 24-byte headers and physical page payloads.</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "WAL Mode", "color": "#5F7582", "title": "-shm Shared-Memory Index", "body": "<li>  <strong>Index Acceleration</strong>: To avoid scanning gigabytes of WAL frames, SQLite generates a <code>-shm</code> index file mapping pages to WAL offsets.</li><li>  <strong>Process Shared Map</strong>: Different processes map the <code>-shm</code> file using <code>mmap</code> to locate page frames within microseconds.</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "WAL Mode", "color": "#5F7582", "title": "WAL Read-Write Concurrency", "body": "<li>  <strong>Snapshot Isolation</strong>: Writers append frames to WAL. Readers locate frames via the <code>-shm</code> index, reading from WAL or database.</li><li>  <strong>Non-Blocking Concurrency</strong>: Readers and a single writer run simultaneously without conflicts or locks.</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "WAL Mode", "color": "#5F7582", "title": "Checkpoint Process", "body": "<li>  <strong>Dirty Page Sync</strong>: Checkpointing reads frames from WAL and writes them back to the <code>.db</code> file in order, updating file states.</li><li>  <strong>WAL Reset</strong>: Resets the WAL write pointer. If readers are referencing old frames, a PASSIVE checkpoint leaves those frames in WAL until readers exit.</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "WAL Mode", "color": "#5F7582", "title": "WAL fsync Rules", "body": "<li>  <strong>Fsync Barriers</strong>:</li><li>1.  <strong>Commit</strong>: Flush dirty pages to WAL and execute <code>fsync</code> on the WAL file.</li><li>2.  <strong>Checkpoint</strong>: Write frames to DB, execute <code>fsync</code> on the DB file, write checkpoint flags to WAL, and sync the database.</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "WAL Mode", "color": "#5F7582", "title": "WAL Page Eviction & Wraparound", "body": "<li>  <strong>Log Wraparound</strong>: SQLite monitors the minimum read frame index across all active connections using <code>-shm</code> state tables.</li><li>  <strong>Zero-Overhead Reuse</strong>: When readers advance past the WAL header, writes reset to offset 0, preventing file growth.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "OS VFS & Locks", "color": "#BFA88F", "title": "VFS (Virtual File System) Abstraction", "body": "<li>  <strong>OS Agnostic Layer</strong>: The VFS abstracts platform-specific storage APIs.</li><li>  <strong>Interface Hooks</strong>: The <code>sqlite3_vfs</code> structure exposes functions like <code>xOpen</code>, <code>xDelete</code>, <code>xRead</code>, <code>xWrite</code>, <code>xLock</code>, and <code>xUnlock</code> to keep kernel logic clean.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "OS VFS & Locks", "color": "#BFA88F", "title": "Windows vs Unix File Locking", "body": "<li>  <strong>Unix Byte Range Locking</strong>: Unix VFS uses <code>fcntl</code> advisory locks on database byte ranges (starting at offset 1,073,741,824) to represent SHARED/PENDING/EXCLUSIVE locks.</li><li>  <strong>Win32 LockFileEx</strong>: Windows VFS uses <code>LockFileEx</code> to lock matching byte ranges, ensuring cross-process security.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "OS VFS & Locks", "color": "#BFA88F", "title": "Thread vs Process Locks", "body": "<li>  <strong>Mutex Protections</strong>: Mutexes isolate thread modifications to database connections.</li><li>  <strong>File Lock Barriers</strong>: Process concurrency is managed by file lock tables, preventing concurrent modifications by different programs.</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "OS VFS & Locks", "color": "#BFA88F", "title": "mmap I/O Optimization", "body": "<li>  <strong>Zero-Copy Access</strong>: Configuring <code>PRAGMA mmap_size</code> maps database pages directly into the process's virtual memory address space.</li><li>  <strong>Bypassing Kernels</strong>: Eliminates read system calls and kernel-to-user memory copy operations, accelerating page reads.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "OS VFS & Locks", "color": "#BFA88F", "title": "SEE & SQLCipher Encryption", "body": "<li>  <strong>Page-Level Encryption</strong>: SEE and SQLCipher encrypt pages (excluding the first 100 bytes of the database file) using AES-256 before writes.</li><li>  <strong>Decryption Pipeline</strong>: Pages are decrypted upon loading into PCache, presenting clear text to VDBE while maintaining encrypted files on disk.</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
