    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "SQL \u7f16\u8bd1\u4e0e\u5206\u6790\u6811", "color": "#7A8B99", "title": "Tokenizer \u4e0e Lemon \u8bed\u6cd5\u89e3\u6790\u5668 (Lemon Parser Generator)", "body": "<li>  <strong>\u8bed\u6cd5\u89e3\u6790\u751f\u6210\u5668</strong>\uff1aSQLite \u4e0d\u4f7f\u7528 Bison/Yacc\uff0c\u800c\u662f\u4f7f\u7528\u5b9a\u5236\u7684 Lemon \u751f\u6210\u5668\u3002Lemon \u5177\u6709 LALR(1) \u8bed\u6cd5\u7279\u6027\uff0c\u80fd\u751f\u6210\u7ebf\u7a0b\u5b89\u5168\u4e14\u65e0\u5168\u5c40\u53d8\u91cf\u7684\u89e3\u6790\u5668\u3002</li><li>  <strong>\u6781\u5c0f\u5806\u6808\u6d88\u8017</strong>\uff1aLemon \u8bed\u6cd5\u6587\u4ef6 <code>parse.y</code> \u5c06\u8bed\u6cd5\u52a8\u4f5c\u53c2\u6570\u5316\uff0c\u907f\u514d\u4e86 Yacc \u5806\u6808\u6ea2\u51fa\u98ce\u9669\uff0c\u80fd\u6709\u6548\u8fd0\u884c\u5728\u6781\u4f4e\u5185\u5b58 footprints \u7684\u5d4c\u5165\u5f0f\u8bbe\u5907\u4e2d\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "SQL \u7f16\u8bd1\u4e0e\u5206\u6790\u6811", "color": "#7A8B99", "title": "\u4ee3\u7801\u751f\u6210\u5668\u4e0e\u67e5\u8be2\u91cd\u5199\u4f18\u5316 (Code Generator & Query Flattening)", "body": "<li>  <strong>\u6307\u4ee4\u7f16\u8bd1\u6d41\u6c34</strong>\uff1a\u4ee3\u7801\u751f\u6210\u5668\u904d\u5386 AST\uff0c\u81ea\u9876\u5411\u4e0b\u8f93\u51fa VDBE \u64cd\u4f5c\u7801\u5b57\u8282\u7801\u3002</li><li>  <strong>\u67e5\u8be2\u6241\u5e73\u5316</strong>\uff1a\u4f18\u5316\u9636\u6bb5\u4f1a\u5bf9\u591a\u8868 Join \u548c\u5b50\u67e5\u8be2\u8fdb\u884c\u67e5\u8be2\u6253\u5e73\uff08Query Flattening\uff09\uff0c\u5c06\u5185\u5d4c\u7684 SELECT \u8bed\u53e5\u5408\u5e76\u5230\u5916\u5c42\uff0c\u6d88\u9664 VDBE \u865a\u62df\u673a\u5728\u6267\u884c\u65f6\u7684\u4e34\u65f6\u8868\u5206\u914d\u5f00\u9500\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "SQL \u7f16\u8bd1\u4e0e\u5206\u6790\u6811", "color": "#7A8B99", "title": "\u7d22\u5f15\u9009\u62e9\u4e0e\u4ee3\u4ef7\u8bc4\u4f30\u6a21\u578b (SQLite Cost-Based Index Selector)", "body": "<li>  <strong>\u542f\u53d1\u65f6\u4ee3\u4ef7\u8bc4\u4f30</strong>\uff1a\u67e5\u8be2\u89c4\u5212\u5668\u8bc4\u4f30\u5168\u8868\u626b\u63cf\u4e0e\u7d22\u5f15\u626b\u63cf\u7684\u76f8\u5bf9\u4ee3\u4ef7\u3002</li><li>  <strong>\u8868\u8fbe\u5f0f\u7d22\u5f15\u652f\u6301</strong>\uff1a\u652f\u6301\u5bf9\u8ba1\u7b97\u8868\u8fbe\u5f0f\u5efa\u7acb\u7d22\u5f15\uff08Expression Indexes\uff09\uff0c\u5728 CBO \u9636\u6bb5\u76f4\u63a5\u66ff\u6362 AST \u8282\u70b9\uff0c\u907f\u514d VDBE \u8fd0\u884c\u65f6\u52a8\u6001\u8ba1\u7b97\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "SQL \u7f16\u8bd1\u4e0e\u5206\u6790\u6811", "color": "#7A8B99", "title": "Prepared Statement \u7f13\u5b58\u673a\u5236 (Prepared Statement Cache)", "body": "<li>  <strong>\u9884\u7f16\u8bd1\u91cd\u7528</strong>\uff1a\u901a\u8fc7 <code>sqlite3_prepare_v2</code> \u5c06 SQL \u7f16\u8bd1\u4e3a VDBE \u4f2a\u4ee3\u7801\u7a0b\u5e8f\uff0c\u5e76\u5c06\u53c2\u6570\u5360\u4f4d\u7b26\uff08\u5982 <code>?</code>\uff09\u7559\u7a7a\u3002</li><li>  <strong>\u96f6\u5206\u914d\u7ed1\u5b9a</strong>\uff1a\u8fd0\u884c\u65f6\u4f7f\u7528 <code>sqlite3_bind_*</code> \u586b\u5145\u53c2\u6570\uff0c\u7528 <code>sqlite3_step</code> \u5faa\u73af\u6267\u884c\u3002\u89c4\u907f\u4e86\u91cd\u590d\u7684\u5206\u8bcd\u3001\u8bed\u6cd5\u5206\u6790\u53ca\u8ba1\u5212\u751f\u6210\u5f00\u9500\u3002</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "VDBE \u865a\u62df\u673a\u4e0e\u5b57\u8282\u7801", "color": "#7D8F7B", "title": "VDBE \u6838\u5fc3\u67b6\u6784\u4e0e\u64cd\u4f5c\u7801\u5faa\u73af (VDBE Architecture & Opcode Loop)", "body": "<li>  <strong>\u8f6f CPU \u6838\u5fc3</strong>\uff1aVDBE \u662f\u4e00\u4e2a\u57fa\u4e8e\u5bc4\u5b58\u5668\u7684\u8f6f\u865a\u62df\u673a\u3002\u5b83\u5c06 SQL \u903b\u8f91\u6241\u5e73\u5316\u4e3a\u5b57\u8282\u7801\u6307\u4ee4\u3002</li><li>  <strong>\u5206\u53d1\u89e3\u91ca\u5faa\u f1a\u5728 Checkpoint \u671f\u95f4\u5c06\u9875\u56de\u5199\u4e3b\u5e93\u540e\uff0c\u5148\u5bf9 <code>.db</code> \u4e3b\u6587\u4ef6\u6267\u884c <code>fsync</code>\uff0c\u7136\u540e\u518d\u5411 WAL \u5199\u5165\u6807\u8bb0\uff0c\u6700\u540e\u66f4\u65b0 <code>-shm</code>\u3002</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "WAL \u6a21\u5f0f\u4e0e\u5e76\u53d1\u63a7\u5236", "color": "#5F7582", "title": "\u8ffd\u5c3e\u907f\u514d\u4e0e WAL \u91cd\u5199\u91cd\u7f6e (WAL Wraparound)", "body": "<li>  <strong>\u5b89\u5168\u8986\u76d6\u673a\u5236</strong>\uff1a\u5f53 WAL \u6587\u4ef6\u4e0d\u65ad\u53d8\u5927\uff0cSQLite \u4f1a\u68c0\u67e5 <code>-shm</code> \u4e2d\u6240\u6709\u6d3b\u8dc3\u8bfb\u8fde\u63a5\u7684\u6700\u5c0f\u8bfb\u53d6\u5e27 LSN\u3002</li><li>  <strong>\u96f6\u5f00\u9500\u91cd\u7f6e</strong>\uff1a\u5982\u679c\u8be5\u6700\u5c0f\u5e27\u53f7\u5df2\u7ecf\u8986\u76d6\u4e86\u5f53\u524d\u7684 WAL \u5934\u90e8\uff0c\u5199\u4e8b\u52a1\u53ef\u4ee5\u76f4\u63a5\u4ece WAL \u6587\u4ef6\u504f\u79fb 0 \u5904\u91cd\u65b0\u5199\u5165\uff0c\u907f\u514d\u4e86\u9891\u7e41\u7684\u6587\u4ef6\u7269\u7406\u5220\u9664\u4e0e\u91cd\u65b0\u5206\u914d\u3002</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "OS \u62bd\u8c61\u5c42\u4e0e VFS \u9501", "color": "#BFA88F", "title": "VFS \u865a\u62df\u6587\u4ef6\u7cfb\u7edf\u62bd\u8c61\u5c42 (VFS Abstraction Layer)", "body": "<li>  <strong>\u591a\u5e73\u53f0\u7269\u7406\u62bd\u8c61</strong>\uff1aVFS\uff08\u865a\u62df\u6587\u4ef6\u7cfb\u7edf\uff09\u5c06\u64cd\u4f5c\u7cfb\u7edf\u7684\u6587\u4ef6 I/O \u9694\u79bb\u3002</li><li>  <strong>\u63a5\u53e3\u6620\u5c04\u5b50\u96c6</strong>\uff1a<code>sqlite3_vfs</code> \u7ed3\u6784\u4f53\u5b9a\u4e49\u4e86 <code>xOpen</code>\u3001<code>xDelete</code>\u3001<code>xRead</code>\u3001<code>xWrite</code>\u3001<code>xLock</code>\u3001<code>xUnlock</code> \u7b49\u865a\u51fd\u6570\u3002\u4e0d\u540c\u5e73\u53f0\uff08\u5982 <code>unix</code> \u6216 <code>win32</code>\uff09\u901a\u8fc7\u5b9e\u73b0\u8fd9\u4e9b\u51fd\u6570\uff0c\u4fdd\u8bc1\u4e86\u5185\u6838\u903b\u8f91 100% \u5e73\u53f0\u65e0\u5173\u3002</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "OS \u62bd\u8c61\u5c42\u4e0e VFS \u9501", "color": "#BFA88F", "title": "Windows \u4e0e Unix \u9501\u5b9a\u539f\u8bed\u7269\u7406\u6620\u5c04 (Win32 vs POSIX File Locking)", "body": "<li>  <strong>Unix \u5b57\u8282\u8303\u56f4\u9501</strong>\uff1aUnix VFS \u5229\u7528 <code>fcntl</code> \u5b57\u8282\u8303\u56f4\u9501\uff0c\u901a\u8fc7\u5728\u6570\u636e\u5e93\u6587\u4ef6\u7684\u7279\u5b9a\u504f\u79fb\u533a\u95f4\uff08\u5982\u4ece 1073741824 \u5b57\u8282\u5f00\u59cb\u7684\u4e00\u6bb5\u7a7a\u95f4\uff09\u7533\u8bf7\u6392\u4ed6\u9501\u6765\u6a21\u62df SHARED/PENDING/EXCLUSIVE \u72b6\u6001\u3002</li><li>  <strong>Win32 \u5f3a\u5236\u9501</strong>\uff1aWindows \u5e73\u53f0\u5219\u4f7f\u7528 <code>LockFileEx</code> \u6765\u9501\u5b9a\u76f8\u540c\u7684\u865a\u62df\u5b57\u8282\u533a\u95f4\uff0c\u4fdd\u969c\u8de8\u8fdb\u7a0b\u5e76\u53d1\u5b89\u5168\u3002</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "OS \u62bd\u8c61\u5c42\u4e0e VFS \u9501", "color": "#BFA88F", "title": "\u591a\u7ebf\u7a0b\u4e0e\u591a\u8fdb\u7a0b\u9501\u9694\u79bb\u5c4f\u969c (Thread vs Process Locks)", "body": "<li>  <strong>\u4e92\u65a5\u4f53\u5c4f\u969c</strong>\uff1a\u4e3a\u4e86\u4fdd\u62a4\u5e93\u5185\u5168\u5c40\u72b6\u6001\uff0c\u5728\u591a\u7ebf\u7a0b\u73af\u5883\u4e0b\u4f7f\u7528\u4e92\u65a5\u9501\uff08Mutex\uff09\u3002</li><li>  <strong>\u6587\u4ef6\u9501\u5c4f\u969c</strong>\uff1a\u5728\u8de8\u8fdb\u7a0b\uff08\u5982\u4e0d\u540c\u7684 Python \u6216 PHP \u811a\u672c\uff09\u5e76\u53d1\u8bbf\u95ee\u540c\u4e00\u4e2a\u5355\u6587\u4ef6\u65f6\uff0c\u4f7f\u7528 VFS \u6587\u4ef6\u9501\u534f\u8c03\u4e8b\u52a1\u9694\u79bb\uff0c\u4fdd\u8bc1\u53cc\u91cd\u9632\u62a4\u65e0\u6b7b\u89d2\u3002</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "OS \u62bd\u8c61\u5c42\u4e0e VFS \u9501", "color": "#BFA88F", "title": "mmap \u5185\u5b58\u6620\u5c04\u7269\u7406 I/O (mmap I/O Optimization)", "body": "<li>  <strong>\u96f6\u62f7\u8d1d\u52a0\u901f</strong>\uff1a\u901a\u8fc7\u914d\u7f6e <code>PRAGMA mmap_size</code>\uff0cSQLite \u5141\u8bb8 VFS \u5c06\u7269\u7406\u6570\u636e\u5e93\u6587\u4ef6\u76f4\u63a5\u901a\u8fc7 <code>mmap</code> \u6620\u5c04\u5230\u5bbf\u4e3b\u8fdb\u7a0b\u7684\u865a\u62df\u5730\u5740\u7a7a\u95f4\u3002</li><li>  <strong>\u65c1\u8def Buffer \u62f7\u8d1d</strong>\uff1a\u53ea\u8bfb\u64cd\u4f5c\u53ef\u4ee5\u76f4\u63a5\u5728\u6307\u9488\u4e0a\u8bfb\u53d6\u5b57\u8282\uff0c\u7ed5\u8fc7\u4e86\u64cd\u4f5c\u7cfb\u7edf\u7684 Read \u7cfb\u7edf\u8c03\u7528\u548c\u5185\u6838\u7f13\u51b2\u4e0e\u7528\u6237\u7a7a\u95f4\u7684\u4e8c\u6b21\u62f7\u8d1d\uff0c\u5927\u5e45\u8282\u7ea6 CPU \u5468\u671f\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "OS \u62bd\u8c61\u5c42\u4e0e VFS \u9501", "color": "#BFA88F", "title": "\u52a0\u5bc6\u6269\u5c55\u4e0e\u7269\u7406\u9875\u5b89\u5168\u6027\u52a0\u5bc6 (SQLite Encryption Extension SEE)", "body": "<li>  <strong>\u9875\u7ea7\u5757\u52a0\u5bc6</strong>\uff1a\u7531\u4e8e SQLite \u6309\u9875\u5b58\u50a8\uff0cSEE \u548c SQLCipher \u5728 Pager \u5199\u5165\u78c1\u76d8\u524d\uff0c\u5bf9\u6574\u9875\uff08\u9664\u7b2c\u4e00\u9875\u7684\u524d 100 \u5b57\u8282\u6587\u4ef6\u5934\u5916\uff09\u8fdb\u884c AES \u52a0\u5bc6\u3002</li><li>  <strong>\u8bfb\u9875\u89e3\u5bc6\u95ed\u73af</strong>\uff1a\u7269\u7406\u9875\u8bfb\u5165 Pager \u7f13\u5b58\u540e\uff0c\u5728\u5185\u5b58\u4e2d\u5b8c\u6210\u89e3\u5bc6\u3002\u5916\u90e8 VDBE \u770b\u5230\u7684\u662f\u660e\u6587\uff0c\u800c\u78c1\u76d8\u4e0a\u5219\u662f\u9ad8\u5f3a\u5ea6\u5bc6\u6587\uff0c\u4fdd\u62a4\u4e86\u672c\u5730\u5355\u6587\u4ef6\u5b89\u5168\u3002</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
</body>
</html>
