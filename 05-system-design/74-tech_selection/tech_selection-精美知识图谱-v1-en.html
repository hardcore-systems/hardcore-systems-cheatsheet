<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Opinionated Tech Selection Map</title>
    <style>
        body {
            margin: 0;
            background-color: #1A202C;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
        }
        #canvas {
            position: absolute;
            transform-origin: 0 0;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 3000px;
            height: 2000px;
            pointer-events: none;
        }
        .card {
            position: absolute;
            width: 130px;
            height: 80px;
            background-color: #2D3748;
            border-radius: 4px;
            padding: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 4px solid #E2E8F0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0,0,0,0.5);
        }
        .card-num {
            font-size: 8px;
            color: #A0AEC0;
            font-weight: bold;
        }
        .card-title {
            font-size: 10px;
            font-weight: bold;
            margin-top: 4px;
            height: 28px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-zh {
            font-size: 8px;
            color: #CBD5E0;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        #header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #FFFFFF;
        }
        #header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #A0AEC0;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 32, 44, 0.8);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #4A5568;
            font-size: 9px;
            z-index: 10;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Opinionated Tech Selection Map</h1>
        <p>Opinionated Architecture Design Trade-off Matrix Map</p>
    </div>
    <div id="canvas-container">
        <div id="canvas">
            <svg id="svg-links"></svg>
            <div id="cards-container"></div>
        </div>
    </div>
    <div id="legend">
        <div class="legend-item"><div class="legend-color" style="background-color: #4B5F7A;"></div>M1: Databases & Storage</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #6B8272;"></div>M2: Message Queues & Streams</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #9C6666;"></div>M3: API Protocols & Gateway</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #7A7A7A;"></div>M4: Consensus & Coordination</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #9A825A;"></div>M5: Deploy & Microservices</div>
    </div>

    <script>
        const cards = [{'id': 1, 'title': 'MySQL vs PG', 'zh': '关系型数据库底层结构折中', 'x': 100, 'y': 120, 'color': '#4B5F7A'}, {'id': 2, 'title': 'Mongo vs Cassandra', 'zh': 'NoSQL文档型与宽列式抉择', 'x': 240, 'y': 120, 'color': '#4B5F7A'}, {'id': 3, 'title': 'Redis vs Memcached', 'zh': '内存缓存单线程与Slab隔离', 'x': 380, 'y': 120, 'color': '#4B5F7A'}, {'id': 4, 'title': 'Influx vs Timescale', 'zh': '时序TSM与Hypertable分块抉择', 'x': 520, 'y': 120, 'color': '#4B5F7A'}, {'id': 5, 'title': 'RocksDB vs LevelDB', 'zh': '单机LSM多核优化嵌入式存储', 'x': 660, 'y': 120, 'color': '#4B5F7A'}, {'id': 6, 'title': 'Cockroach vs TiDB', 'zh': 'NewSQL共识写入与HTAP调度', 'x': 800, 'y': 120, 'color': '#4B5F7A'}, {'id': 7, 'title': 'Kafka vs Pulsar', 'zh': '高性能事件流计算存储分离', 'x': 100, 'y': 260, 'color': '#6B8272'}, {'id': 8, 'title': 'RocketMQ vs RabbitMQ', 'zh': 'CommitLog混写拉取与Actor推送', 'x': 240, 'y': 260, 'color': '#6B8272'}, {'id': 9, 'title': 'Redis Streams vs MQTT', 'zh': '轻量Radix Tree与物联网主题QoS', 'x': 380, 'y': 260, 'color': '#6B8272'}, {'id': 10, 'title': 'Event Sourcing vs EDA', 'zh': '不可变状态重播与离散解耦事件', 'x': 520, 'y': 260, 'color': '#6B8272'}, {'id': 11, 'title': 'Push vs Pull Consumer', 'zh': '主动推送阻塞与拉取长轮询折中', 'x': 660, 'y': 260, 'color': '#6B8272'}, {'id': 12, 'title': 'Partition vs Hash Ring', 'zh': '物理分区绑定与一致性哈希弹性', 'x': 800, 'y': 260, 'color': '#6B8272'}, {'id': 13, 'title': 'REST vs gRPC', 'zh': '文本JSON通信与Protobuf二进制契约', 'x': 100, 'y': 400, 'color': '#9C6666'}, {'id': 14, 'title': 'GraphQL vs REST', 'zh': '网关单端点按需与传统路由缓存', 'x': 240, 'y': 400, 'color': '#9C6666'}, {'id': 15, 'title': 'WebSocket vs SSE', 'zh': 'TCP全双工升级与HTTP单向流式', 'x': 380, 'y': 400, 'color': '#9C6666'}, {'id': 16, 'title': 'Protobuf vs JSON vs Avro', 'zh': '二进制Tag整型、可读文本与Schema载荷', 'x': 520, 'y': 400, 'color': '#9C6666'}, {'id': 17, 'title': 'Dubbo vs gRPC', 'zh': 'Java生态完整治理与通用契约RPC', 'x': 660, 'y': 400, 'color': '#9C6666'}, {'id': 18, 'title': 'Kong vs Envoy', 'zh': 'OpenResty Lua插件与xDS网格网关', 'x': 800, 'y': 400, 'color': '#9C6666'}, {'id': 19, 'title': 'Raft vs Paxos', 'zh': '强Leader日志强更与对等二阶段凝聚', 'x': 100, 'y': 540, 'color': '#7A7A7A'}, {'id': 20, 'title': 'etcd vs ZooKeeper', 'zh': 'Go MVCC Watcher与Java树ZNode会话', 'x': 240, 'y': 540, 'color': '#7A7A7A'}, {'id': 21, 'title': 'Strong vs Eventual', 'zh': '分布式线性Read锁开销与最终Quorum', 'x': 380, 'y': 540, 'color': '#7A7A7A'}, {'id': 22, 'title': 'Gossip vs Registry', 'zh': '随机UDP广播收敛与探活注册中心', 'x': 520, 'y': 540, 'color': '#7A7A7A'}, {'id': 23, 'title': 'Redlock vs ZK Lock', 'zh': '时钟漂移双重锁风险与临时节点排队', 'x': 660, 'y': 540, 'color': '#7A7A7A'}, {'id': 24, 'title': 'Vector vs HLC Clock', 'zh': '数组因果全序膨胀与毫秒逻辑64位混合', 'x': 800, 'y': 540, 'color': '#7A7A7A'}, {'id': 25, 'title': 'Sync IPC vs Async EDA', 'zh': '请求阻塞链级联雪崩与MQ背压消峰', 'x': 100, 'y': 680, 'color': '#9A825A'}, {'id': 26, 'title': 'Sidecar Mesh vs Proxyless', 'zh': 'iptables流量拦截劫持与SDK直接交互', 'x': 240, 'y': 680, 'color': '#9A825A'}, {'id': 27, 'title': 'FaaS vs K8s Pod', 'zh': '事件驱动零常驻冷启动与微服务容器池', 'x': 380, 'y': 680, 'color': '#9A825A'}, {'id': 28, 'title': 'Blue-Green vs Canary', 'zh': '两倍资源一键全切与灰度流量微调', 'x': 520, 'y': 680, 'color': '#9A825A'}];
        const links = [{'source': 1, 'target': 6}, {'source': 3, 'target': 1}, {'source': 5, 'target': 6}, {'source': 7, 'target': 11}, {'source': 8, 'target': 11}, {'source': 12, 'target': 7}, {'source': 16, 'target': 13}, {'source': 17, 'target': 13}, {'source': 18, 'target': 26}, {'source': 19, 'target': 20}, {'source': 20, 'target': 23}, {'source': 21, 'target': 19}, {'source': 24, 'target': 21}, {'source': 25, 'target': 8}, {'source': 26, 'target': 25}, {'source': 27, 'target': 26}, {'source': 28, 'target': 27}];

        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('canvas');
        const svg = document.getElementById('svg-links');
        const cardsContainer = document.getElementById('cards-container');

        let zoom = 1.0;
        let panX = 100;
        let panY = 100;
        let isDragging = false;
        let startX, startY;

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        // Render cards
        cards.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.left = card.x + 'px';
            div.style.top = card.y + 'px';
            div.style.borderTopColor = card.color;
            
            const num = document.createElement('div');
            num.className = 'card-num';
            num.innerText = 'Card ' + card.id;

            const title = document.createElement('div');
            title.className = 'card-title';
            title.innerText = card.title;

            const zh = document.createElement('div');
            zh.className = 'card-zh';
            zh.innerText = card.title;

            div.appendChild(num);
            div.appendChild(title);
            div.appendChild(zh);
            cardsContainer.appendChild(div);
        });

        // Render links
        function drawLinks() {
            svg.innerHTML = '';
            links.forEach(link => {
                const fromCard = cards.find(c => c.id === link.source);
                const toCard = cards.find(c => c.id === link.target);
                if (fromCard && toCard) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', fromCard.x + 65);
                    line.setAttribute('y1', fromCard.y + 40);
                    line.setAttribute('x2', toCard.x + 65);
                    line.setAttribute('y2', toCard.y + 40);
                    line.setAttribute('stroke', '#4A5568');
                    line.setAttribute('stroke-width', '1.5');
                    line.setAttribute('marker-end', 'url(#arrow)');
                    svg.appendChild(line);
                }
            });
        }

        // Add Marker
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        marker.setAttribute('id', 'arrow');
        marker.setAttribute('viewBox', '0 0 10 10');
        marker.setAttribute('refX', '30');
        marker.setAttribute('refY', '5');
        marker.setAttribute('markerWidth', '6');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('orient', 'auto-start-reverse');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
        path.setAttribute('fill', '#4A5568');
        marker.appendChild(path);
        defs.appendChild(marker);
        svg.appendChild(defs);

        drawLinks();
        updateTransform();

        // Dragging & Zooming logic
        container.addEventListener('mousedown', e => {
            if (e.target.closest('.card')) return;
            isDragging = true;
            container.style.cursor = 'grabbing';
            startX = e.clientX - panX;
            startY = e.clientY - panY;
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        container.addEventListener('wheel', e => {
            e.preventDefault();
            const scaleFactor = 1.1;
            if (e.deltaY < 0) zoom *= scaleFactor;
            else zoom /= scaleFactor;
            zoom = Math.max(0.3, Math.min(zoom, 3.0));
            updateTransform();
        });
    </script>
</body>
</html>
