<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DevOps & SRE Firefighting Map</title>
    <style>
        body {
            margin: 0;
            background-color: #1A202C;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
        }
        #canvas {
            position: absolute;
            transform-origin: 0 0;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 3000px;
            height: 2000px;
            pointer-events: none;
        }
        .card {
            position: absolute;
            width: 130px;
            height: 80px;
            background-color: #2D3748;
            border-radius: 4px;
            padding: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 4px solid #E2E8F0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0,0,0,0.5);
        }
        .card-num {
            font-size: 8px;
            color: #A0AEC0;
            font-weight: bold;
        }
        .card-title {
            font-size: 10px;
            font-weight: bold;
            margin-top: 4px;
            height: 28px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-zh {
            font-size: 8px;
            color: #CBD5E0;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        #header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #FFFFFF;
        }
        #header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #A0AEC0;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 32, 44, 0.8);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #4A5568;
            font-size: 9px;
            z-index: 10;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>DevOps & SRE Firefighting Map</h1>
        <p>Drag to pan. Left click on a card to see dependencies. Double click cards to see system details.</p>
    </div>
    
    <div id="legend">
        <div class="legend-item"><div class="legend-color" style="background: #4B5F7A;"></div>M1: Container Runtime (容器运行时)</div>
        <div class="legend-item"><div class="legend-color" style="background: #6B8272;"></div>M2: Networking & DNS (网络与网关)</div>
        <div class="legend-item"><div class="legend-color" style="background: #9C6666;"></div>M3: IaC & Cloud Storage (存储卷与IaC)</div>
        <div class="legend-item"><div class="legend-color" style="background: #7A7A7A;"></div>M4: Observability (可观测性指标)</div>
        <div class="legend-item"><div class="legend-color" style="background: #9A825A;"></div>M5: Incident Recovery (应急预案高可用)</div>
    </div>

    <div id="canvas-container">
        <div id="canvas">
            <svg id="links-svg"></svg>
            <div id="cards-container"></div>
        </div>
    </div>

    <script>
        const cards = [{'id': 1, 'title': 'OOMKilled 137', 'zh': 'K8s容器内存OOMKilled定位', 'x': 100, 'y': 120, 'color': '#4B5F7A'}, {'id': 2, 'title': 'CrashLoopBackOff', 'zh': 'Pod启动退避重启排错流', 'x': 240, 'y': 120, 'color': '#4B5F7A'}, {'id': 3, 'title': 'Pod Pending', 'zh': '调度硬限制与调度受阻排查', 'x': 380, 'y': 120, 'color': '#4B5F7A'}, {'id': 4, 'title': 'ImagePullBackOff', 'zh': '镜像拉取认证网络故障', 'x': 520, 'y': 120, 'color': '#4B5F7A'}, {'id': 5, 'title': 'Ephemeral Storage', 'zh': '临时存储超限容器驱逐定位', 'x': 660, 'y': 120, 'color': '#4B5F7A'}, {'id': 6, 'title': 'Pod Evicted QoS', 'zh': '节点水位压力与QoS驱逐自愈', 'x': 800, 'y': 120, 'color': '#4B5F7A'}, {'id': 7, 'title': 'DNS ndots search', 'zh': 'CoreDNS ndots search重复路径', 'x': 100, 'y': 260, 'color': '#6B8272'}, {'id': 8, 'title': 'SYN Flood somaxconn', 'zh': 'TCP SYN洪流与半全连接队列', 'x': 240, 'y': 260, 'color': '#6B8272'}, {'id': 9, 'title': 'TCP RST conntrack', 'zh': 'Connection RST与conntrack丢包', 'x': 380, 'y': 260, 'color': '#6B8272'}, {'id': 10, 'title': 'Nginx 502 refused', 'zh': 'Nginx 502上游拒绝与端口存活', 'x': 520, 'y': 260, 'color': '#6B8272'}, {'id': 11, 'title': 'Nginx 504 timeout', 'zh': 'Nginx 504上游等待响应超时', 'x': 660, 'y': 260, 'color': '#6B8272'}, {'id': 12, 'title': 'Cilium eBPF redirect', 'zh': 'SOCKMAP数据面网络重定向', 'x': 800, 'y': 260, 'color': '#6B8272'}, {'id': 13, 'title': 'Terraform State Lock', 'zh': 'Terraform后端状态锁锁定解锁', 'x': 100, 'y': 400, 'color': '#9C6666'}, {'id': 14, 'title': 'PV PVC CSI Multi-Attach', 'zh': 'CSI独占锁多节点挂载卡死', 'x': 240, 'y': 400, 'color': '#9C6666'}, {'id': 15, 'title': 'IMDSv2 Hop Limit', 'zh': '云端元数据IMDSv2跳数限制', 'x': 380, 'y': 400, 'color': '#9C6666'}, {'id': 16, 'title': 'VPC Peering CIDR conflict', 'zh': '对等连接路由重叠冲突排查', 'x': 520, 'y': 400, 'color': '#9C6666'}, {'id': 17, 'title': 'Vault Lease expiration', 'zh': 'Vault动态凭证租约失效灾备', 'x': 660, 'y': 400, 'color': '#9C6666'}, {'id': 18, 'title': 'Bucket Public Access Allow', 'zh': '云存储桶匿名通配授权审计', 'x': 800, 'y': 400, 'color': '#9C6666'}, {'id': 19, 'title': 'Prometheus Card churn', 'zh': 'Prometheus时间序列高基数爆炸', 'x': 100, 'y': 540, 'color': '#7A7A7A'}, {'id': 20, 'title': 'Fluentd Backpressure queue', 'zh': '日志收集端背压卡死与磁盘缓冲', 'x': 240, 'y': 540, 'color': '#7A7A7A'}, {'id': 21, 'title': 'Trace Context propagation', 'zh': '链路Trace Context传递丢失定位', 'x': 380, 'y': 540, 'color': '#7A7A7A'}, {'id': 22, 'title': 'Grafana range scan', 'zh': '大跨度历史指标扫描慢查询优化', 'x': 520, 'y': 540, 'color': '#7A7A7A'}, {'id': 23, 'title': 'Alertmanager group wait', 'zh': 'Alertmanager告警聚合去重抑制', 'x': 660, 'y': 540, 'color': '#7A7A7A'}, {'id': 24, 'title': 'SRE SLO Burn Rate', 'zh': 'SLO错误预算烧钱率告警编写', 'x': 800, 'y': 540, 'color': '#7A7A7A'}, {'id': 25, 'title': 'Chaos Mesh network delay', 'zh': '混沌工程网络延迟丢包故障注入', 'x': 100, 'y': 680, 'color': '#9A825A'}, {'id': 26, 'title': 'Feature Flag fallback', 'zh': '服务分级降级Feature Flag动态控制', 'x': 240, 'y': 680, 'color': '#9A825A'}, {'id': 27, 'title': 'Database PITR recovery', 'zh': '数据库秒级PITR增量WAL回放', 'x': 380, 'y': 680, 'color': '#9A825A'}, {'id': 28, 'title': 'Blameless Post-Mortem Timeline', 'zh': 'SRE无指责复盘时间线事故分析', 'x': 520, 'y': 680, 'color': '#9A825A'}];
        const links = [{'source': 1, 'target': 6}, {'source': 2, 'target': 1}, {'source': 3, 'target': 14}, {'source': 4, 'target': 3}, {'source': 5, 'target': 6}, {'source': 7, 'target': 12}, {'source': 8, 'target': 9}, {'source': 10, 'target': 11}, {'source': 12, 'target': 10}, {'source': 14, 'target': 13}, {'source': 15, 'target': 18}, {'source': 16, 'target': 15}, {'source': 17, 'target': 26}, {'source': 19, 'target': 22}, {'source': 20, 'target': 19}, {'source': 21, 'target': 20}, {'source': 23, 'target': 24}, {'source': 24, 'target': 28}, {'source': 25, 'target': 24}, {'source': 26, 'target': 27}, {'source': 27, 'target': 28}];

        const canvas = document.getElementById('canvas');
        const container = document.getElementById('canvas-container');
        const cardsContainer = document.getElementById('cards-container');
        const svg = document.getElementById('links-svg');

        let isDragging = false;
        let startX, startY;
        let translateX = 50, translateY = 50;

        container.addEventListener('mousedown', (e) => {
            if (e.target === container || e.target.id === 'canvas' || e.target.tagName === 'svg') {
                isDragging = true;
                container.style.cursor = 'grabbing';
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                canvas.style.transform = `translate(${translateX}px, ${translateY}px)`;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        // Render nodes
        cards.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.left = card.x + 'px';
            div.style.top = card.y + 'px';
            div.style.borderTopColor = card.color;
            div.id = 'card-' + card.id;

            div.innerHTML = `
                <div class="card-num">Card ${card.id.toString().padStart(2, '0')}</div>
                <div class="card-title">${card.title}</div>
                <div class="card-zh">${card.zh}</div>
            `;
            cardsContainer.appendChild(div);
        });

        // Render edges
        function drawLinks() {
            svg.innerHTML = '';
            links.forEach(link => {
                const sNode = cards.find(c => c.id === link.source);
                const tNode = cards.find(c => c.id === link.target);
                if (sNode && tNode) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', sNode.x + 65);
                    line.setAttribute('y1', sNode.y + 40);
                    line.setAttribute('x2', tNode.x + 65);
                    line.setAttribute('y2', tNode.y + 40);
                    line.setAttribute('stroke', '#4A5568');
                    line.setAttribute('stroke-width', '1.5');
                    line.setAttribute('marker-end', 'url(#arrow)');
                    svg.appendChild(line);
                }
            });
        }

        // Draw an arrowhead marker
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        marker.setAttribute('id', 'arrow');
        marker.setAttribute('viewBox', '0 0 10 10');
        marker.setAttribute('refX', '40'); // offset arrowhead from node center
        marker.setAttribute('refY', '5');
        marker.setAttribute('markerWidth', '6');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('orient', 'auto-start-reverse');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
        path.setAttribute('fill', '#4A5568');
        marker.appendChild(path);
        defs.appendChild(marker);
        svg.appendChild(defs);

        drawLinks();
        canvas.style.transform = `translate(${translateX}px, ${translateY}px)`;
    </script>
</body>
</html>
