<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Intel SGX 飞地安全计算拓扑图谱</title>
    <style>
        body {
            background-color: #121824;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4B5F7A;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #canvas-container {
            width: 90%;
            height: 600px;
            border: 2px solid #24324F;
            border-radius: 8px;
            background-color: #1A202C;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-align: center;
        }
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.1);
        }
        #tooltip {
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background-color: #2D3748;
            border-left: 5px solid #4B5F7A;
            border-radius: 4px;
            min-height: 80px;
        }
        /* Color classes */
        .colorM1 { background-color: #4B5F7A; }
        .colorM2 { background-color: #6B8272; }
        .colorM3 { background-color: #9C6666; }
        .colorM4 { background-color: #7A7A7A; }
        .colorM5 { background-color: #9A825A; }
        .colorM6 { background-color: #755B77; }
    </style>
</head>
<body>
    <h1>Intel SGX 飞地安全计算拓扑图谱</h1>
    <div id="canvas-container"></div>
    <div id="tooltip">
        <h3>点击卡片节点查看详细架构原理与物理源码坐标</h3>
    </div>

    <script>
        const cards = [
            { id: 1, group: 'M1', label: 'PRM & EPC', zh: 'PRM/EPC 硬件分配', desc: 'BIOS PRMRR registers partition PRM. EPC pages allocated via sgx_alloc_epc_page (4KB pages).', src: 'arch/x86/kernel/cpu/sgx/main.c', x: 50, y: 100 },
            { id: 2, group: 'M1', label: 'EPCM Rules', zh: 'EPCM 访问控制', desc: 'CPU hardware page attribute checking table. MMU enforces R/W/X and SECS ID matching.', src: 'arch/x86/kernel/cpu/sgx/encl.c', x: 200, y: 100 },
            { id: 3, group: 'M1', label: 'MEE Crypt', zh: 'MEE 内存加密', desc: 'Embedded Memory Encryption Engine crypts cachelines via AES-XTS and maintains MCTS.', src: 'arch/x86/kernel/cpu/sgx/main.c', x: 350, y: 100 },
            { id: 4, group: 'M1', label: 'SGX Ops', zh: 'SGX 生命周期指令', desc: 'ECREATE, EADD, EEXTEND, and EINIT instructions create and lock Enclave measurement.', src: 'arch/x86/kernel/cpu/sgx/ioctl.c', x: 500, y: 100 },
            { id: 5, group: 'M1', label: 'Ring 3 Limit', zh: 'Ring 3 运行限制', desc: 'Enclave executes strictly in user mode Ring 3; privileged opcodes trigger AEX immediately.', src: 'arch/x86/kernel/cpu/sgx/encl.c', x: 650, y: 100 },
            
            { id: 6, group: 'M2', label: 'AEX Cleanup', zh: 'AEX 寄存器零化', desc: 'Asynchronous Enclave Exit clears registers to zeroes and pushes original state onto SSA stack frame.', src: 'sdk/simulation/assembly/assembly.S', x: 50, y: 250 },
            { id: 7, group: 'M2', label: 'Page Fault S-C', zh: '#PF 侧信道防御', desc: 'Hides control-flow page fault tracing through ORAM or local timer hardware verification.', src: 'arch/x86/kernel/cpu/sgx/encl.c', x: 200, y: 250 },
            { id: 8, group: 'M2', label: 'L1TF / Foreshadow', zh: 'Foreshadow 漏洞防御', desc: 'Speculative cache load mitigation via L1 data flush and disabling Hyper-Threading.', src: 'arch/x86/kernel/cpu/sgx/main.c', x: 350, y: 250 },
            { id: 9, group: 'M2', label: 'TCS & SSA', zh: 'TCS 与 SSA 结构', desc: 'Thread Control Structure controls entry offsets and designates the SSA backup frame.', src: 'arch/x86/kernel/cpu/sgx/encl.h', x: 500, y: 250 },
            { id: 10, group: 'M2', label: 'EPC Swapping', zh: 'EPC 换页机制', desc: 'EBLOCK, ETRACK, EWB encrypt and swap pages to host memory, tracking rollback counters.', src: 'arch/x86/kernel/cpu/sgx/ioctl.c', x: 650, y: 250 },

            { id: 11, group: 'M3', label: 'Local Attest', zh: '本地对称认证', desc: 'EREPORT creates cryptographic report validated via shared symmetric platform keys.', src: 'sdk/attestation/local.c', x: 50, y: 400 },
            { id: 12, group: 'M3', label: 'Remote Attest', zh: '远程证书 Quote', desc: 'QE (Quoting Enclave) signs EREPORT using PCE keys converting it into an ECDSA Quote.', src: 'sdk/attestation/quote.c', x: 200, y: 400 },
            { id: 13, group: 'M3', label: 'Intel PCS', zh: 'Intel PCS 证书服务', desc: 'Distributes PCK certificates ensuring Quote keys trace back directly to genuine Intel Silicon.', src: 'sdk/attestation/pcs.c', x: 350, y: 400 },
            { id: 14, group: 'M3', label: 'ECDSA RA', zh: 'ECDSA 远程认证', desc: 'Local cached attestation architecture replacing latency-heavy Intel EPID zero-knowledge.', src: 'sdk/attestation/ecdsa.c', x: 500, y: 400 },
            { id: 15, group: 'M3', label: 'MRENCLAVE', zh: 'MRENCLAVE 测定', desc: 'Enclave code identity (MRENCLAVE) and developer signing key identity (MRSIGNER).', src: 'sdk/tlibc/tattest.c', x: 650, y: 400 }
        ];

        const container = document.getElementById('canvas-container');
        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'node color' + c.group;
            div.style.left = c.x + 'px';
            div.style.top = c.y + 'px';
            div.innerText = c.zh;
            
            div.onclick = () => {
                document.getElementById('tooltip').innerHTML = `
                    <h3>\${c.zh} (Group \${c.group})</h3>
                    <p><strong>Description:</strong> \${c.desc}</p>
                    <p><strong>Source Code Mapping:</strong> <code>\${c.src}</code></p>
                `;
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
