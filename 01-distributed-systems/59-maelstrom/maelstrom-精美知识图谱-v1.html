<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Maelstrom 分布式一致性与容错测试大图</title>
    <style>
        body {
            background-color: #121824;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4B5F7A;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #canvas-container {
            width: 90%;
            height: 600px;
            border: 2px solid #24324F;
            border-radius: 8px;
            background-color: #1A202C;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-align: center;
        }
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.1);
        }
        #tooltip {
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background-color: #2D3748;
            border-left: 5px solid #4B5F7A;
            border-radius: 4px;
            min-height: 80px;
        }
        .colorM1 { background-color: #4B5F7A; }
        .colorM2 { background-color: #6B8272; }
        .colorM3 { background-color: #9C6666; }
        .colorM4 { background-color: #7A7A7A; }
        .colorM5 { background-color: #9A825A; }
        .colorM6 { background-color: #755B77; }
    </style>
</head>
<body>
    <h1>Maelstrom 分布式一致性与容错测试大图</h1>
    <div id="canvas-container"></div>
    <div id="tooltip">
        <h3>点击卡片查看 Maelstrom 分布式系统测试核心组件</h3>
    </div>

    <script>
        const nodes = [
            { id: 1, group: 'M1', x: 80, y: 80, label: 'Card 1: Clojure Runtime', zh: '卡片 1: Clojure JVM 运行时', desc: 'Runs Jepsen environment on JVM, spawning test node processes.' },
            { id: 2, group: 'M1', x: 80, y: 160, label: 'Card 2: STDIN/STDOUT Protocol', zh: '卡片 2: STDIN/STDOUT 文本协议', desc: 'Mediates RPC commands via newline-delimited JSON stdin/stdout channels.' },
            { id: 3, group: 'M1', x: 80, y: 240, label: 'Card 3: Node-Node Communication', zh: '卡片 3: 节点间消息通信', desc: 'Intercepts and routes virtual packets in-memory without physical socket IO.' },
            { id: 4, group: 'M1', x: 80, y: 320, label: 'Card 4: Loop & State', zh: '卡片 4: 状态循环与并发', desc: 'Maintains state concurrency leveraging Clojure Agents, Refs and Atoms.' },
            { id: 5, group: 'M1', x: 80, y: 400, label: 'Card 5: JSON Schema RPC', zh: '卡片 5: JSON Schema RPC', desc: 'Standardizes RPC fields including msg_id, in_reply_to, and error_code.' },
            
            { id: 6, group: 'M2', x: 260, y: 80, label: 'Card 6: Knossos Linearizability', zh: '卡片 6: Knossos 线性化校验', desc: 'Verifies single-key consistency via WGL path analysis.' },
            { id: 7, group: 'M2', x: 260, y: 160, label: 'Card 7: Elle Transaction Checker', zh: '卡片 7: Elle 事务一致性分析', desc: 'Generates transactional dependency graphs to detect anomalies in isolation models.' },
            { id: 8, group: 'M2', x: 260, y: 240, label: 'Card 8: Generator Pipeline', zh: '卡片 8: Generator 事件生成器', desc: 'Schedules clients workloads and concurrency profiles.' },
            { id: 9, group: 'M2', x: 260, y: 320, label: 'Card 9: Checker Engine', zh: '卡片 9: Checker 归纳引擎', desc: 'Parses history log files to evaluate validation results.edn.' },
            { id: 10, group: 'M2', x: 260, y: 400, label: 'Card 10: Client Proxy', zh: '卡片 10: 客户端代理物理并发', desc: 'Binds simulated clients to physical OS concurrent threads.' },

            { id: 11, group: 'M3', x: 440, y: 80, label: 'Card 11: Causal Consistency', zh: '卡片 11: 因果一致性验证', desc: 'Ensures causally related writes are observed in same order across replicas.' },
            { id: 12, group: 'M3', x: 440, y: 160, label: 'Card 12: Read Uncommitted / Committed', zh: '卡片 12: 读未提交与已提交', desc: 'Differentiates dirty reads from MVCC visibility logic.' },
            { id: 13, group: 'M3', x: 440, y: 240, label: 'Card 13: Repeatable Read', zh: '卡片 13: 可重复读', desc: 'Requires identical read returns inside a transaction via locking.' },
            { id: 14, group: 'M3', x: 440, y: 320, label: 'Card 14: Serializability', zh: '卡片 14: 串行化一致性', desc: 'Validates equivalent total serial ordering via Elle cycle checks.' },
            { id: 15, group: 'M3', x: 440, y: 400, label: 'Card 15: Monotonic Read/Write', zh: '卡片 15: 单调读写约束', desc: 'Guarantees monotonic values relative to user session watermarks.' },

            { id: 16, group: 'M4', x: 620, y: 80, label: 'Card 16: Lin-KV Strong', zh: '卡片 16: Lin-KV 强一致存储', desc: 'Maelstrom shared linearizable key-value store endpoint.' },
            { id: 17, group: 'M4', x: 620, y: 160, label: 'Card 17: Seq-KV Sequential', zh: '卡片 17: Seq-KV 顺序一致存储', desc: 'Shared sequential KV offering lower latencies than lin-kv.' },
            { id: 18, group: 'M4', x: 620, y: 240, label: 'Card 18: Lww-Register', zh: '卡片 18: Lww-Register 冲突合并', desc: 'CRDT register resolving conflicts using highest timestamp.' },
            { id: 19, group: 'M4', x: 620, y: 320, label: 'Card 19: PN-Counter', zh: '卡片 19: PN-Counter 状态合并', desc: 'State-based CRDT merging positive/negative counters.' },
            { id: 20, group: 'M4', x: 620, y: 400, label: 'Card 20: Replicated Log', zh: '卡片 20: 副本日志同步', desc: 'Requires majority quorum agreement before committing logs.' },

            { id: 21, group: 'M5', x: 800, y: 80, label: 'Card 21: Network Partition', zh: '卡片 21: 网络分区混沌注入', desc: 'Injects network partitioning boundaries separating cluster nodes.' },
            { id: 22, group: 'M5', x: 800, y: 160, label: 'Card 22: Packet Drop', zh: '卡片 22: 丢包率动态模拟', desc: 'Drops messages at random to evaluate network retry safety.' },
            { id: 23, group: 'M5', x: 800, y: 240, label: 'Card 23: Latency Inflation', zh: '卡片 23: 时延膨胀与乱序', desc: 'Simulates congestion delays and packets reordering.' },
            { id: 24, group: 'M5', x: 800, y: 320, label: 'Card 24: Nemesis Coordinator', zh: '卡片 24: Nemesis 故障引入器', desc: 'Central orchestrator scheduling fault injections.' },
            { id: 25, group: 'M5', x: 800, y: 400, label: 'Card 25: Recovery Reconnect', zh: '卡片 25: 恢复重连与路由恢复', desc: 'Heals connections and tests node data catch-up.' },

            { id: 26, group: 'M6', x: 980, y: 100, label: 'Card 26: Gnuplot Rendering', zh: '卡片 26: Gnuplot 吞吐时延图', desc: 'Renders raw latency scatterplots and throughput graphs.' },
            { id: 27, group: 'M6', x: 980, y: 220, label: 'Card 27: History Log Analyzer', zh: '卡片 27: History 历史日志追踪', desc: 'Parses history.txt records to pinpoint transaction failures.' },
            { id: 28, group: 'M6', x: 980, y: 340, label: 'Card 28: Test CLI Parameters', zh: '卡片 28: 命令行参数调优字典', desc: 'Provides runtime parameter settings for Jepsen tests.' }
        ];

        const container = document.getElementById('canvas-container');
        const tooltip = document.getElementById('tooltip');

        nodes.forEach(n => {
            const div = document.createElement('div');
            div.className = `node color${n.group}`;
            div.style.left = `${n.x}px`;
            div.style.top = `${n.y}px`;
            div.innerText = n.zh;
            div.onclick = () => {
                tooltip.innerHTML = `
                    <h3>${n.zh}</h3>
                    <p><strong>Module:</strong> ${n.group} | <strong>Details:</strong> ${n.desc}</p>
                `;
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
