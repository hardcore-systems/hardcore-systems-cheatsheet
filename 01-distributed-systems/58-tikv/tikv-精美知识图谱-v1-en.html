<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TiKV Distributed Database Map</title>
    <style>
        body {
            background-color: #121824;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4B5F7A;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #canvas-container {
            width: 90%;
            height: 600px;
            border: 2px solid #24324F;
            border-radius: 8px;
            background-color: #1A202C;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-align: center;
        }
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.1);
        }
        #tooltip {
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background-color: #2D3748;
            border-left: 5px solid #4B5F7A;
            border-radius: 4px;
            min-height: 80px;
        }
        .colorM1 { background-color: #4B5F7A; }
        .colorM2 { background-color: #6B8272; }
        .colorM3 { background-color: #9C6666; }
        .colorM4 { background-color: #7A7A7A; }
        .colorM5 { background-color: #9A825A; }
        .colorM6 { background-color: #755B77; }
    </style>
</head>
<body>
    <h1>TiKV Distributed Database Map</h1>
    <div id="canvas-container"></div>
    <div id="tooltip">
        <h3>Click a card to inspect TiKV's internal components</h3>
    </div>

    <script>
        const nodes = [
            { id: 1, group: 'M1', x: 80, y: 80, label: 'Card 1: Region Range', zh: '卡片 1: Region 范围分片', desc: 'Slices global key space into static 96MB Region shards.' },
            { id: 2, group: 'M1', x: 80, y: 160, label: 'Card 2: Raft Log Commit', zh: '卡片 2: Raft 日志复制状态机', desc: 'Leader replicates logs, commits on majority and applies to VM.' },
            { id: 3, group: 'M1', x: 80, y: 240, label: 'Card 3: Region Split', zh: '卡片 3: Region 物理分裂', desc: 'Overloaded key sizes trigger splitConfChanges dynamically.' },
            { id: 4, group: 'M1', x: 80, y: 320, label: 'Card 4: Region Merge', zh: '卡片 4: Region 物理合并', desc: 'Merges cold region ranges to optimize background heartbeat costs.' },
            { id: 5, group: 'M1', x: 80, y: 400, label: 'Card 5: PD Coordinator', zh: '卡片 5: PD 全局路由调度', desc: 'Centralized etcd-based manager directing region rebalances.' },
            
            { id: 6, group: 'M2', x: 260, y: 80, label: 'Card 6: Percolator 2PC', zh: '卡片 6: Percolator 分布式 2PC', desc: 'Two-phase commit via primary key locks without global locking.' },
            { id: 7, group: 'M2', x: 260, y: 160, label: 'Card 7: Lock CF Lock', zh: '卡片 7: Lock CF 并发锁管理', desc: 'RocksDB lock column family registers active transaction limits.' },
            { id: 8, group: 'M2', x: 260, y: 240, label: 'Card 8: MVCC CF Paths', zh: '卡片 8: MVCC 物理读写路径', desc: 'Reads data snapshots via Write CF and Default CF records.' },
            { id: 9, group: 'M2', x: 260, y: 320, label: 'Card 9: Opt vs Pessimistic', zh: '卡片 9: 乐观与悲观锁差异', desc: 'Pessimistic locks block conflicts early to prevent large abort rolls.' },
            { id: 10, group: 'M2', x: 260, y: 400, label: 'Card 10: Deadlock Detect', zh: '卡片 10: 分布式死锁检测', desc: 'Finds waiting relation cycles dynamically on graph coordinators.' },

            { id: 11, group: 'M3', x: 440, y: 80, label: 'Card 11: RocksDB Dual', zh: '卡片 11: RocksDB 双引擎集成', desc: 'Separates business datasets (kvdb) from consensus logs (raftdb).' },
            { id: 12, group: 'M3', x: 440, y: 160, label: 'Card 12: WAL & MemTable', zh: '卡片 12: WAL 与 MemTable 写入', desc: 'Appends WAL disk logs and writes concurrently to SkipLists.' },
            { id: 13, group: 'M3', x: 440, y: 240, label: 'Card 13: SST Compaction', zh: '卡片 13: SSTable 归并压实', desc: 'LSM-tree background sorting removes deleted tombstones.' },
            { id: 14, group: 'M3', x: 440, y: 320, label: 'Card 14: Cache & Bloom', zh: '卡片 14: Cache 与布隆过滤器', desc: 'Bloom filters screen key absence while Block Cache speed reads.' },
            { id: 15, group: 'M3', x: 440, y: 400, label: 'Card 15: Amplification', zh: '卡片 15: 写入放大调优折中', desc: 'Trades CPU compaction IO bandwidth for storage read latencies.' },

            { id: 16, group: 'M4', x: 620, y: 80, label: 'Card 16: Coprocessor', zh: '卡片 16: 协处理器算子下推', desc: 'Runs filter and aggregates on storage nodes to save network.' },
            { id: 17, group: 'M4', x: 620, y: 160, label: 'Card 17: DAG Plan Parser', zh: '卡片 17: DAG 执行计划解析', desc: 'Builds tree plan structures from incoming protobuf schemas.' },
            { id: 18, group: 'M4', x: 620, y: 240, label: 'Card 18: Vectorized Exec', zh: '卡片 18: 向量化算子执行', desc: 'Processes records in batches (Chunks) to exploit CPU cache.' },
            { id: 19, group: 'M4', x: 620, y: 320, label: 'Card 19: Chunk Layout', zh: '卡片 19: Chunk 内存布局', desc: 'Contiguous column-oriented buffers optimized for direct send.' },
            { id: 20, group: 'M4', x: 620, y: 400, label: 'Card 20: CPU SIMD', zh: '卡片 20: CPU SIMD 硬件加速', desc: 'Compiles loop steps to parallel SIMD machine instructions.' },

            { id: 21, group: 'M5', x: 800, y: 80, label: 'Card 21: gRPC Heartbeat', zh: '卡片 21: gRPC 多路复用', desc: 'Shares socket connections using HTTP/2 protocol frames.' },
            { id: 22, group: 'M5', x: 800, y: 180, label: 'Card 22: Raft Pipeline', zh: '卡片 22: Raft 异步流水线', desc: 'Pipelining network receive, raftdb write and apply loops.' },
            { id: 23, group: 'M5', x: 800, y: 280, label: 'Card 23: Zero-Copy Snap', zh: '卡片 23: 零拷贝 Snapshot', desc: 'Direct sendfile socket pipes bypass user space copies.' },
            { id: 24, group: 'M5', x: 800, y: 380, label: 'Card 24: Backpressure', zh: '卡片 24: 背压自愈限流', desc: 'Slows down Raft confirmations when RocksDB queues build.' },

            { id: 25, group: 'M6', x: 980, y: 80, label: 'Card 25: Self-Healing', zh: '卡片 25: 网络分区自愈', desc: 'Majority quorum handles writes while minority partitions lock.' },
            { id: 26, group: 'M6', x: 980, y: 180, label: 'Card 26: Failpoint Chaos', zh: '卡片 26: Failpoint 混沌测试', desc: 'Injects run-time errors dynamically to confirm state safety.' },
            { id: 27, group: 'M6', x: 980, y: 280, label: 'Card 27: RocksDB Monitor', zh: '卡片 27: RocksDB 运行期监控', desc: 'Polls SST levels, caching hits, and write stall counts.' },
            { id: 28, group: 'M6', x: 980, y: 380, label: 'Card 28: Tracing Trace', zh: '卡片 28: 分布式 Tracing', desc: 'Traces lifecycle spanning across RPCs and store layers.' }
        ];

        const container = document.getElementById('canvas-container');
        const tooltip = document.getElementById('tooltip');

        nodes.forEach(n => {
            const div = document.createElement('div');
            div.className = `node color${n.group}`;
            div.style.left = `${n.x}px`;
            div.style.top = `${n.y}px`;
            div.innerText = n.label;
            div.onclick = () => {
                tooltip.innerHTML = `
                    <h3>\${n.label}</h3>
                    <p><strong>Module:</strong> \${n.group} | <strong>Details:</strong> \${n.desc}</p>
                `;
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
