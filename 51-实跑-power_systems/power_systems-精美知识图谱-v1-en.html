<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PowerSystems.jl Grid Modeling & Simulation Map</title>
    <style>
        body {
            background-color: #121824;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4B5F7A;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #canvas-container {
            width: 90%;
            height: 600px;
            border: 2px solid #24324F;
            border-radius: 8px;
            background-color: #1A202C;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-align: center;
        }
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.1);
        }
        #tooltip {
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background-color: #2D3748;
            border-left: 5px solid #4B5F7A;
            border-radius: 4px;
            min-height: 80px;
        }
        .colorM1 { background-color: #4B5F7A; }
        .colorM2 { background-color: #6B8272; }
        .colorM3 { background-color: #9C6666; }
        .colorM4 { background-color: #7A7A7A; }
        .colorM5 { background-color: #9A825A; }
        .colorM6 { background-color: #755B77; }
    </style>
</head>
<body>
    <h1>PowerSystems.jl Grid Modeling & Simulation Map</h1>
    <div id="canvas-container"></div>
    <div id="tooltip">
        <h3>Click a card node to inspect technical details and source code coordinates</h3>
    </div>

    <script>
        const nodes = [
            { id: 1, group: 'M1', x: 80, y: 100, label: 'Card 1: Bus Modeling', zh: '卡片 1: 母线节点建模', desc: 'PQ, PV & Slack bus boundary specs.' },
            { id: 2, group: 'M1', x: 80, y: 220, label: 'Card 2: Pi Line Model', zh: '卡片 2: 线路等效模型', desc: 'Series impedance and shunt capacitance.' },
            { id: 3, group: 'M1', x: 80, y: 340, label: 'Card 3: Ybus Matrix', zh: '卡片 3: 节点导纳矩阵', desc: 'Admittance matrix assembly.' },
            { id: 4, group: 'M1', x: 80, y: 460, label: 'Card 4: Gen Limit', zh: '卡片 4: 发电机有功无功出力限额', desc: 'P-Q operating capability curves.' },
            { id: 5, group: 'M1', x: 80, y: 540, label: 'Card 5: ZIP Load Model', zh: '卡片 5: ZIP 负荷模型', desc: 'Constant Z, I, P voltage dependence.' },
            
            { id: 6, group: 'M2', x: 260, y: 100, label: 'Card 6: Power Flow Eq', zh: '卡片 6: 潮流平衡方程', desc: 'Active/reactive nodal balances.' },
            { id: 7, group: 'M2', x: 260, y: 220, label: 'Card 7: Newton-Raphson', zh: '卡片 7: 牛顿-拉夫逊法', desc: 'Nonlinear solver via Jacobian.' },
            { id: 8, group: 'M2', x: 260, y: 340, label: 'Card 8: Fast Decoupled', zh: '卡片 8: 快速去耦潮流', desc: 'Decoupled P-theta and Q-V.' },
            { id: 9, group: 'M2', x: 260, y: 460, label: 'Card 9: DC Power Flow', zh: '卡片 9: 直流潮流线性化', desc: 'Linearized active power flow.' },
            { id: 10, group: 'M2', x: 260, y: 540, label: 'Card 10: Optimal OPF', zh: '卡片 10: 最优潮流优化', desc: 'Interior point method cost minimization.' },

            { id: 11, group: 'M3', x: 440, y: 100, label: 'Card 11: Swing Equation', zh: '卡片 11: 经典转子运动方程', desc: 'Rotor inertia and dynamics.' },
            { id: 12, group: 'M3', x: 440, y: 220, label: 'Card 12: Detailed Gen', zh: '卡片 12: 同步发电机多阶模型', desc: 'Transient double-axis dynamic equations.' },
            { id: 13, group: 'M3', x: 440, y: 340, label: 'Card 13: AVR & Gov', zh: '卡片 13: 励磁与调速控制器', desc: 'Voltage regulator and governor response.' },
            { id: 14, group: 'M3', x: 440, y: 460, label: 'Card 14: DAE Integration', zh: '卡片 14: DAE 刚性微分方程', desc: 'Implicit trapezoidal rule solver.' },
            { id: 15, group: 'M3', x: 440, y: 540, label: 'Card 15: Network Interface', zh: '卡片 15: 网络动态接口', desc: 'Norton current source matching.' },

            { id: 16, group: 'M4', x: 620, y: 100, label: 'Card 16: Small-Signal', zh: '卡片 16: 小信号稳定特征值', desc: 'Eigenvalue analysis and damping ratios.' },
            { id: 17, group: 'M4', x: 620, y: 220, label: 'Card 17: Equal Area', zh: '卡片 17: 等面积法则', desc: 'Transient stability margin.' },
            { id: 18, group: 'M4', x: 620, y: 340, label: 'Card 18: CCT Calculation', zh: '卡片 18: 极限切除时间', desc: 'Critical clearing time calculation.' },
            { id: 19, group: 'M4', x: 620, y: 460, label: 'Card 19: Droop & AGC', zh: '卡片 19: 下垂与AGC调频', desc: 'Primary and secondary frequency controls.' },

            { id: 20, group: 'M5', x: 800, y: 100, label: 'Card 20: BESS SoC', zh: '卡片 20: 储能并网模型', desc: 'Battery SoC and inner resistance.' },
            { id: 21, group: 'M5', x: 800, y: 220, label: 'Card 21: Inverter Droop', zh: '卡片 21: 逆变器下垂控制', desc: 'P-f and Q-V loops.' },
            { id: 22, group: 'M5', x: 800, y: 340, label: 'Card 22: ADN state Est', zh: '卡片 22: 主动配网状态估计', desc: 'Unbalanced grid state estimation.' },
            { id: 23, group: 'M5', x: 800, y: 460, label: 'Card 23: Virtual Sync', zh: '卡片 23: 虚拟同步发电机', desc: 'Virtual inertia and damping support.' },
            { id: 24, group: 'M5', x: 800, y: 540, label: 'Card 24: Island & Black', zh: '卡片 24: 孤岛与黑启动', desc: 'Grid restoration and self-sync.' },

            { id: 25, group: 'M6', x: 980, y: 100, label: 'Card 25: Wind LVRT', zh: '卡片 25: 风电机组低压穿越', desc: 'Transient DFIG crowbar protection.' },
            { id: 26, group: 'M6', x: 980, y: 220, label: 'Card 26: Solar MPPT', zh: '卡片 26: 太阳能最大功率点', desc: 'MPPT tracking via P&O.' },
            { id: 27, group: 'M6', x: 980, y: 340, label: 'Card 27: LMP Pricing', zh: '卡片 27: 节点边际电价', desc: 'Marginal pricing and congestion.' },
            { id: 28, group: 'M6', x: 980, y: 460, label: 'Card 28: Inertia Dilution', zh: '卡片 28: 电网惯量稀释', desc: 'Inertia reduction impact on RoCoF.' }
        ];

        const container = document.getElementById('canvas-container');
        const tooltip = document.getElementById('tooltip');

        nodes.forEach(n => {
            const div = document.createElement('div');
            div.className = `node color${n.group}`;
            div.style.left = `${n.x}px`;
            div.style.top = `${n.y}px`;
            div.innerText = n.label;
            div.onclick = () => {
                tooltip.innerHTML = `
                    <h3>\${n.label}</h3>
                    <p><strong>Module:</strong> \${n.group} | <strong>Details:</strong> \${n.desc}</p>
                    <p><strong>Julia Source Path:</strong> <code>PowerSystems.jl/src/models/\${n.group.toLowerCase()}/\${n.label.replace(' ', '_')}.jl</code></p>
                `;
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
