<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Awesome Robotics Architecture & SLAM Map</title>
    <style>
        body {
            background-color: #121824;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4B5F7A;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #canvas-container {
            width: 90%;
            height: 600px;
            border: 2px solid #24324F;
            border-radius: 8px;
            background-color: #1A202C;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-align: center;
        }
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.1);
        }
        #tooltip {
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background-color: #2D3748;
            border-left: 5px solid #4B5F7A;
            border-radius: 4px;
            min-height: 80px;
        }
        .colorM1 { background-color: #4B5F7A; }
        .colorM2 { background-color: #6B8272; }
        .colorM3 { background-color: #9C6666; }
        .colorM4 { background-color: #7A7A7A; }
        .colorM5 { background-color: #9A825A; }
        .colorM6 { background-color: #755B77; }
    </style>
</head>
<body>
    <h1>Awesome Robotics Architecture & SLAM Map</h1>
    <div id="canvas-container"></div>
    <div id="tooltip">
        <h3>Click a card node to inspect technical details and source code coordinates</h3>
    </div>

    <script>
        const cards = [
            { id: 1, group: 'M1', label: 'D-H Modelling', zh: 'D-H 连杆建模', desc: 'Denavit-Hartenberg parameterization maps successive links using 4 geometry fields.', src: 'orocos_kdl/src/models.cpp', x: 50, y: 100 },
            { id: 2, group: 'M1', label: 'Inverse Kinematics', zh: '逆运动学解算', desc: 'Translates spatial position coordinates into multi-joint angles via Newton-Raphson iterations.', src: 'orocos_kdl/src/chainiksolverpos_nr.cpp', x: 200, y: 100 },
            { id: 3, group: 'M1', label: 'Robotic Jacobian', zh: '雅可比矩阵传导', desc: 'Velocity/force linear mapping between operational spaces and joints.', src: 'orocos_kdl/src/chainjnttojacsolver.cpp', x: 350, y: 100 },
            { id: 4, group: 'M1', label: 'Singularity Checks', zh: '运动学奇异判定', desc: 'Identifies det(Jacobian)=0 states, deploying damped least squares to avoid overflow.', src: 'orocos_kdl/src/chainiksolvervel_wdls.cpp', x: 500, y: 100 },
            { id: 5, group: 'M1', label: 'Rigid Body Dyn', zh: '刚体动力学建模', desc: 'Euler-Lagrange equations yield closed-form joint matrices: M(q)*q_dd + C*q_d + G = Torque.', src: 'orocos_kdl/src/chaindynparam.cpp', x: 650, y: 100 },
            
            { id: 6, group: 'M2', label: 'EKF Sensor Fusion', zh: '扩展卡尔曼滤波', desc: 'Linearizes system dynamics to fuse wheel encoders, IMU and GPS positioning.', src: 'robot_localization/src/ekf.cpp', x: 50, y: 250 },
            { id: 7, group: 'M2', label: 'V-SLAM Front-end', zh: '视觉 SLAM 前端', desc: 'KLT Optical Flow maps image intensity shifts to track frame-by-frame camera pose.', src: 'orb_slam3/src/Frame.cc', x: 200, y: 250 },
            { id: 8, group: 'M2', label: 'Bundle Adjustment', zh: 'BA 光束法平差', desc: 'Joint optimization of poses and landmark points by minimizing reprojection error via Schur complement.', src: 'g2o/core/sparse_optimizer.cpp', x: 350, y: 250 },
            { id: 9, group: 'M2', label: 'ICP LiDAR SLAM', zh: '雷达 ICP 点云对齐', desc: 'Iterative Closest Point algorithm translates/rotates cloud scans using SVD.', src: 'pcl/registration/icp.hpp', x: 500, y: 250 },
            { id: 10, group: 'M2', label: 'Loop BoW Search', zh: '回环检测词袋检索', desc: 'DBoW2 matches sparse visual vocabulary tree vectors, triggering factor-graph closure optimizations.', src: 'orb_slam3/src/LoopClosing.cc', x: 650, y: 250 },

            { id: 11, group: 'M3', label: 'Dijkstra & A*', zh: 'Dijkstra/A* 图搜索', desc: 'A* accelerates Dijkstra shortest-path calculations using Manhattan distance heuristics.', src: 'navigation2/nav2_astar_planner/src/astar_planner.cpp', x: 50, y: 400 },
            { id: 12, group: 'M3', label: 'RRT / RRT*', zh: 'RRT* 随机采样规划', desc: 'Rapidly-exploring Random Trees dynamically rewire node trees locally for asymptotic optimality.', src: 'ompl/geometric/planners/rrt/RRTstar.cpp', x: 200, y: 400 },
            { id: 13, group: 'M3', label: 'Minimum Snap', zh: 'Minimum Snap 轨迹生成', desc: 'Generates snap-continuous smooth polynomials bounding corridors using Quadratic Programming (QP).', src: 'planning/minimum_snap.cpp', x: 350, y: 400 },
            { id: 14, group: 'M3', label: 'GJK Collision', zh: 'GJK 凸包碰撞检测', desc: 'Calculates Minkowski difference to locate origin proximity, confirming convex intersections.', src: 'fcl/narrowphase/detail/gjk.cpp', x: 500, y: 400 },
            { id: 15, group: 'M3', label: 'MPC Tracking', zh: '模型预测控制 MPC', desc: 'Online rolling-horizon quadratic optimization solving dynamic tracking error constraints.', src: 'navigation2/nav2_mppi_controller/src/mppi.cpp', x: 650, y: 400 }
        ];

        const container = document.getElementById('canvas-container');
        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'node color' + c.group;
            div.style.left = c.x + 'px';
            div.style.top = c.y + 'px';
            div.innerText = c.label;
            
            div.onclick = () => {
                document.getElementById('tooltip').innerHTML = `
                    <h3>\${c.label} (Group \${c.group})</h3>
                    <p><strong>Description:</strong> \${c.desc}</p>
                    <p><strong>Source Code Mapping:</strong> <code>\${c.src}</code></p>
                `;
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
