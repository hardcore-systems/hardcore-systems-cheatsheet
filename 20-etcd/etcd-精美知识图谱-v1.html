    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {

            --terracotta: #B58A7D;

        * {

            padding: 0;
        }
        body {

            max-width: 1200px;

        .card-body li {

</head>

    <script>
        const cardsData = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Raft\u5171\u8bc6\u4e0e\u65e5\u5fd7\u590d\u5236", "color": "#7A8B99", "title": "Raft \u72b6\u6001\u673a\u4e0e\u4efb\u671f\u673a\u5236 (Raft State Machine & Term)", "body": "<li>  <strong>\u72b6\u6001\u8f6c\u6362\u7269\u7406\u673a</strong>\uff1a\u8282\u70b9\u5728 <code>Follower</code> (\u8ddf\u968f\u8005)\u3001<code>Candidate</code> (\u5019\u9009\u8005)\u3001<code>Leader</code> (\u9886\u5bfc\u8005) \u4e09\u79cd\u89d2\u8272\u95f4\u5355\u5411\u8f6c\u6362\u3002\u4efb\u671f <code>Term</code> \u662f\u903b\u8f91\u65f6\u949f\uff0c\u6bcf\u6b21\u9009\u4e3b\u81ea\u589e\u3002</li><li>  <strong>Term \u5b89\u5168\u7ea6\u675f</strong>\uff1a\u4efb\u4f55\u8282\u70b9\u6536\u5230\u6bd4\u81ea\u5df1\u5c0f\u7684 Term \u6d88\u606f\u76f4\u63a5\u5ffd\u7565\uff1b\u6536\u5230\u6bd4\u81ea\u5df1\u5927\u7684 Term \u6d88\u606f\u5219\u7acb\u5373\u9000\u5316\u4e3a Follower\uff0c\u5e76\u66f4\u65b0\u672c\u5730 Term\uff0c\u4ee5\u4fdd\u969c\u96c6\u7fa4\u903b\u8f91\u65f6\u949f\u5f3a\u4e00\u81f4\u540c\u6b65\u3002</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Raft\u5171\u8bc6\u4e0e\u65e5\u5fd7\u590d\u5236", "color": "#7A8B99", "title": "\u9886\u5bfc\u8005\u9009\u4e3e\u4e0e\u968f\u673a\u8d85\u65f6 (Leader Election & Randomized Timeout)", "body": "<li>  <strong>\u968f\u673a\u5316\u907f\u649e (Randomized Timeout)</strong>\uff1a<code>Election Timeout</code> \u968f\u673a\u5316\u8bbe\u7f6e\uff08\u5982 1000ms - 3000ms\uff09\uff0c\u907f\u514d\u591a\u4e2a Follower \u540c\u65f6\u8d85\u65f6\u6210\u4e3a Candidate \u5e76\u53d1\u8d77\u9009\u4e3e\uff0c\u9020\u6210\u9009\u7968\u74dc\u5206\uff08Split Vote\uff09\u6b7b\u9501\u3002</li><li>  <strong>\u5f3a\u4e00\u81f4\u9009\u4e3b\u7279\u6743</strong>\uff1aCandidate \u5fc5\u987b\u83b7\u5f97\u8d85\u8fc7\u534a\u6570\u8282\u70b9\uff08Quorum\uff09\u7684\u6295\u8d5e\u6210\u7968\u624d\u80fd\u5f53\u9009\u3002\u6295\u7968\u89c4\u5219\u4e3a\uff1a\u672c\u5730\u65e5\u5fd7\u6bd4\u81ea\u5df1\u65b0\uff08Term \u66f4\u5927\uff0c\u6216 Term \u76f8\u540c\u4f46\u65e5\u5fd7 Index \u66f4\u5927\uff09\u7684 Candidate \u624d\u80fd\u6295\u8d5e\u6210\u7968\uff0c\u4fdd\u8bc1\u9009\u51fa\u7684 Leader \u5fc5\u5b9a\u5305\u542b\u6240\u6709\u5df2\u63d0\u4ea4\u7684\u65e5\u5fd7\u3002</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Raft\u5171\u8bc6\u4e0e\u65e5\u5fd7\u590d\u5236", "color": "#7A8B99", "title": "\u65e5\u5fd7\u590d\u5236\u4e0e\u4e24\u9636\u6bb5\u63d0\u4ea4 (Log Replication & Commit)", "body": "<li>  <strong>\u4e09\u9636\u6bb5\u6d41\u6c34\u7ebf</strong>\uff1aLeader \u63a5\u6536\u5199\u8bf7\u6c42 $\\rightarrow$ \u672c\u5730\u987a\u5e8f\u8ffd\u52a0\u672a\u63d0\u4ea4\u65e5\u5fd7 $\\rightarrow$ \u5411\u6240\u6709 Follower \u5e7f\u64ad <code>AppendEntries</code> \u6d88\u606f $\\rightarrow$ \u6536\u5230\u8fc7\u534a\u6570 Follower \u6210\u529f\u5e94\u7b54 $\\rightarrow$ \u6807\u8bb0\u65e5\u5fd7\u4e3a\u5df2\u63d0\u4ea4\uff08Committed\uff09\u5e76\u5e7f\u64ad\u5e94\u7528\uff08Apply\uff09\u81f3\u72b6\u6001\u673a\u3002</li><li>  <strong>\u72b6\u6001\u8ffd\u8e2a\u6307\u9488</strong>\uff1aLeader \u4e3a\u6bcf\u4e2a Follower \u7269\u7406\u7ef4\u62a4 <code>MatchIndex</code>\uff08\u8be5 Follower \u5df2\u540c\u6b65\u7684\u6700\u5927\u65e5\u5fd7\u7d22\u5f15\uff09\u4e0e <code>NextIndex</code>\uff08\u4e0b\u4e00\u6b21\u5411\u8be5 Follower \u53d1\u9001\u65e5\u5fd7\u7684\u7d22\u5f15\uff09\uff0c\u901a\u8fc7\u56de\u9000\u63a2\u6d4b\u81ea\u52a8\u5bf9\u9f50\u5206\u533a\u8282\u70b9\u65e5\u5fd7\u3002</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Raft\u5171\u8bc6\u4e0e\u65e5\u5fd7\u590d\u5236", "color": "#7A8B99", "title": "\u7f51\u7edc\u5206\u533a\u4e0e Pre-Vote \u9884\u6295\u7968\u673a\u5236 (Pre-Vote Phase)", "body": "<li>  <strong>\u65e7\u7248\u75db\u70b9</strong>\uff1a\u7f51\u7edc\u5206\u533a\u7684 Follower \u65e0\u6cd5\u6536\u5230 Leader \u5fc3\u8df3\uff0c\u4f1a\u4e0d\u65ad\u8d85\u65f6\u81ea\u589e Term \u53d1\u8d77\u9009\u4e3 {new}$\uff0c\u4fdd\u969c\u6210\u5458\u52a8\u6001\u70ed\u6269\u7f29\u5bb9\u65f6\u7684\u7edd\u5bf9\u5b89\u5168\u3002</li>"}, {"id": 6, "relativeId": "M2.1", "module": "M2", "moduleName": "WAL\u9884\u5199\u65e5\u5fd7\u4e0e\u5b58\u50a8", "color": "#7D8F7B", "title": "WAL \u9884\u5199\u65e5\u5fd7\u987a\u5e8f\u8ffd\u52a0\u7ed3\u6784 (WAL Append-Only Structure)", "body": "<li>  <strong>\u78c1\u76d8 I/O \u7269\u7406\u5bf9\u9f50</strong>\uff1aWAL \u6587\u4ef6\u5927\u5c0f\u56fa\u5b9a\u4e3a 64MB\u3002\u4e3a\u6d88\u9664\u78c1\u76d8\u5206\u914d\u6307\u9488\u65f6\u7684\u6587\u4ef6\u7a7a\u6d1e\u4e0e\u968f\u673a I/O \u5ef6\u8fdf\uff0cetcd \u5728\u521b\u5efa WAL \u65f6\u5229\u7528 <code>fallocate</code> \u7cfb\u7edf\u8c03\u7528\u5728\u7269\u7406\u4ecb\u8d28\u4e0a\u9884\u5206\u914d\u5e76\u9501\u5b9a\u5168\u90e8 64MB \u8fde\u7eed\u5757\u3002</li><li>  <strong>\u5185\u5b58\u5199\u5bf9\u9f50</strong>\uff1a\u5199\u65e5\u5fd7\u65f6\u4ee5 <code>512 \u5b57\u8282\uff08\u6247\u533a\u5927\u5c0f\uff09</code> \u8fdb\u884c\u5bf9\u9f50\uff0c\u5e76\u4f7f\u7528\u987a\u5e8f\u8ffd\u52a0\uff08Append-Only\uff09\u65e5\u5fd7\u6bb5\uff0c\u6781\u5927\u5730\u5229\u7528\u4e86\u78c1\u76d8\u7684\u987a\u5e8f\u5199\u6027\u80fd\u3002</li>"}, {"id": 7, "relativeId": "M2.2", "module": "M2", "moduleName": "WAL\u9884\u5199\u65e5\u5fd7\u4e0e\u5b58\u50a8", "color": "#7D8F7B", "title": "BoltDB/bbolt \u5d4c\u5165\u5f0f\u5b58\u50a8\u5f15\u64ce (bbolt B+ Tree Storage)", "body": "<li>  <strong>\u7269\u7406\u5b58\u50a8\u5e95\u5ea7</strong>\uff1aetcd \u91c7\u7528\u7eaf Go \u5b9e\u73b0\u7684\u5355\u6587\u4ef6\u5d4c\u5165\u5f0f\u952e\u503c\u6570\u636e\u5e93 <code>bbolt</code>\u3002\u5185\u90e8\u901a\u8fc7 B+ \u6811\u7269\u7406\u9875\u9762\u7ec4\u7ec7\u6570\u636e\uff0c\u53f6\u5b50\u8282\u70b9\u5b58\u50a8\u5b9e\u9645\u7684 Revision \u548c KV \u8bb0\u5f55\uff0c\u975e\u53f6\u5b50\u8282\u70b9\u5b58\u50a8\u8def\u7531\u7d22\u5f15\u3002</li><li>  <strong>\u5171\u4eab\u5185\u5b58\u5e76\u53d1</strong>\uff1a\u901a\u8fc7 <code>mmap</code> \ a5\u53e3\u83b7\u53d6\u6240\u6709\u8282\u70b9\u5217\u8868\u5e76\u7f13\u5b58\u5728\u5185\u5b58\u4e2d\u3002\u5f53\u5f53\u524d\u8fde\u63a5\u8282\u70b9\u53d1\u751f\u786c\u4ef6\u5b95\u673a\u6216\u65ad\u7f51\u65f6\uff0c\u5ba2\u6237\u7aef\u80fd\u591f\u79d2\u7ea7\u611f\u77e5\u5e76\u900f\u660e\u91cd\u8bd5\u6f02\u79fb\u5230\u5176\u4ed6\u53ef\u7528\u8282\u70b9\uff0c\u4fdd\u6301\u670d\u52a1\u9ad8\u53ef\u7528\u3002</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "\u96c6\u7fa4\u53d8\u66f4\u4e0e\u5f3a\u4e00\u81f4\u8bfb", "color": "#BFA88F", "title": "Etcd \u7f51\u5173\u4e0e\u4ee3\u7406\u8f6c\u53d1\u6a21\u5f0f (Etcd Gateway & L4 Proxy)", "body": "<li>  <strong>\u7269\u7406\u67b6\u6784\u89e3\u8026</strong>\uff1a\u5f53\u5ba2\u6237\u7aef\u8282\u70b9\u6210\u5343\u4e0a\u4e07\uff08\u5982\u6d77\u91cf\u8fb9\u7f18\u7269\u7406\u8282\u70b9\uff09\u65f6\uff0c\u76f4\u8fde etcd \u96c6\u7fa4\u4f1a\u5bfc\u81f4 etcd \u8282\u70b9\u4e0a\u7684 TCP \u7aef\u53e3\u8fde\u63a5\u6570\u66b4\u589e\uff0c\u8017\u5c3d\u7cfb\u7edf\u6587\u4ef6\u63cf\u8ff0\u7b26\uff08FD\uff09\u3002</li><li>  <strong>\u8fb9\u7f18\u6d41\u91cf\u4ee3\u7406</strong>\uff1a\u90e8\u7f72 <code>etcd gateway</code> \u6216 <code>etcd grpc-proxy</code> \u4f5c\u4e3a\u56db\u5c42\u65e0\u72b6\u6001\u53cd\u5411\u4ee3\u7406\u3002\u7f51\u5173\u6c47\u805a\u8fb9\u7f18\u5ba2\u6237\u7aef\u7684 gRPC \u8fde\u63a5\uff0c\u5e76\u901a\u8fc7\u5c11\u91cf\u3001\u590d\u7528\u7684\u957f\u8fde\u63a5\u4e0e\u6838\u5fc3 etcd \u96c6\u7fa4\u4ea4\u4e92\uff0c\u8d77\u5230\u4e86\u8fde\u63a5\u6570\u9632\u706b\u5899\u7684\u4f5c\u7528\u3002</li>"}];

        function renderCards(filtered) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.setProperty('--theme-color', card.color);
                el.style.setProperty('--theme-color-50', card.color + '33');
                el.innerHTML = `
                    <div class="card-header">
                        <span class="module-tag">${card.moduleName}</span>
                        <span class="relative-id">${card.relativeId}</span>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-body">${card.body}</div>
                `;
                grid.appendChild(el);
            });
        }

        function filterModule(mod, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            if (mod === 'all') {
                renderCards(cardsData);
            } else {
                const filtered = cardsData.filter(c => c.module === mod);
                renderCards(filtered);
            }
        }

        // Initial render
        renderCards(cardsData);
    </script>
