<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>postgres-internals PostgreSQL Architecture & Internals Knowledge Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161820;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2d3d;
            --slate-blue: #7A8B99;
            --moss-green: #7D8F7B;
            --plum-rose: #9E828A;
            --terracotta: #B58A7D;
            --indigo: #5F7582;
            --antique-gold: #BFA88F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-badge span.num {
            color: var(--accent-color);
            font-weight: 700;
        }
        .filter-controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 300px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent-color);
        }
        .filter-btn {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: #94a3b8;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .filter-btn:hover {
            color: var(--text-color);
            background-color: #2e3b4e;
        }
        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .card-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            color: white;
            text-transform: uppercase;
        }
        .card-id {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: white;
        }
        .card-body {
            font-size: 0.9rem;
            color: #cbd5e1;
            flex-grow: 1;
        }
        .card-body p {
            margin-bottom: 0.75rem;
        }
        .card-body li {
            list-style-type: none;
            padding-left: 1.2rem;
            position: relative;
            margin-bottom: 0.5rem;
        }
        .card-body li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-color);
            font-weight: bold;
        }
        .card-body code {
            background-color: #0f1115;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            font-family: monospace;
            color: #f43f5e;
        }
    </style>
</head>
<body>
    <header>
        <h1>postgres-internals Storage Kernel Map</h1>
        <p>High-Density Process Model, Volcano Query Executions, Heap MVCC page, xmin/xmax tuple flags, WAL logs, and SSI serialized anomalies reference system</p>
    </header>

    <div class="stats-bar">
        <div class="stat-badge">Core Cards: <span class="num">28</span></div>
        <div class="stat-badge">Category Modules: <span class="num">6</span></div>
        <div class="stat-badge">3-Level Filtering: <span class="num">L0 $ightarrow$ L2</span></div>
        <div class="stat-badge">Zone T Tuning Parameters: <span class="num">T1/T2</span></div>
    </div>

    <div class="filter-controls">
        <input type="text" id="search" class="search-box" placeholder="Search cards..." oninput="filterCards()">
        <button class="filter-btn active" data-mod="all" onclick="setFilter('all', this)">All Modules</button>
        <button class="filter-btn" data-mod="M1" onclick="setFilter('M1', this)">M1: Process Model</button>
        <button class="filter-btn" data-mod="M2" onclick="setFilter('M2', this)">M2: Optimizer</button>
        <button class="filter-btn" data-mod="M3" onclick="setFilter('M3', this)">M3: Storage</button>
        <button class="filter-btn" data-mod="M4" onclick="setFilter('M4', this)">M4: MVCC</button>
        <button class="filter-btn" data-mod="M5" onclick="setFilter('M5', this)">M5: WAL & Rep</button>
        <button class="filter-btn" data-mod="M6" onclick="setFilter('M6', this)">M6: High-Level</button>
    </div>

    <div class="grid" id="cards-grid"></div>

    <script>
        const cards = [{"id": 1, "relativeId": "M1.1", "module": "M1", "moduleName": "Process Model & Connections", "color": "#7A8B99", "title": "Postmaster & Backend Process Model (Multi-process Architecture)", "body": "<li>  <strong>Process Per Connection</strong>: PostgreSQL utilizes a multi-process architecture. The master process <code>Postmaster</code> listens on the port, and forks a new <code>Backend</code> process to handle each incoming client connection.</li><li>  <strong>Failure Isolation</strong>: If a single backend process crashes due to memory corruption, only that connection is terminated. The Postmaster recovers by cleaning up shared resources, leaving other active backends unaffected.</li>"}, {"id": 2, "relativeId": "M1.2", "module": "M1", "moduleName": "Process Model & Connections", "color": "#7A8B99", "title": "Shared Memory Layout & Structures (Shared Memory Layout)", "body": "<li>  <strong>IPC Shared Segment</strong>: Backend processes coordinate using a physical shared memory segment.</li><li>  <strong>Key Shared Areas</strong>: This segment contains the <code>Shared Buffers</code> (caching data pages), <code>WAL Buffers</code> (caching transaction log records), the global Lock Table (managing concurrency), the Commit Log (<code>CLOG</code>, storing transaction commit states), and <code>ProcArray</code> (tracking active transaction states).</li>"}, {"id": 3, "relativeId": "M1.3", "module": "M1", "moduleName": "Process Model & Connections", "color": "#7A8B99", "title": "pg_bouncer Connection Pooling (Connection Pooling)", "body": "<li>  <strong>Fork Overhead</strong>: Creating and destroying operating system processes for each database connection incurs high CPU and memory overhead due to page table copying.</li><li>  <strong>Transaction-Level Reuse</strong>: Deploying <code>pg_bouncer</code> in transaction mode allows backends to be reused as soon as a transaction commits, capping the maximum process count and reducing context-switch thrashing.</li>"}, {"id": 4, "relativeId": "M1.4", "module": "M1", "moduleName": "Process Model & Connections", "color": "#7A8B99", "title": "Frontend/Backend Protocol v3.0 (Frontend/Backend Protocol)", "body": "<li>  <strong>Message Framing</strong>: PG uses the Frontend/Backend v3.0 protocol, starting with a StartupMessage containing database names and credentials.</li><li>  <strong>Query Sub-protocols</strong>:</li><li>1.  <strong>Simple Query</strong>: Sends SQL plain text; returns RowDescription, multiple DataRow messages, and ends with ReadyForQuery.</li><li>2.  <strong>Extended Query</strong>: Separates execution into Prepare (parse SQL), Bind (bind parameters), and Execute phases, enabling binary data transfer.</li>"}, {"id": 5, "relativeId": "M2.1", "module": "M2", "moduleName": "Optimizer & Executor", "color": "#7D8F7B", "title": "Parsing & System Catalog Verification (Parsing & Catalog Lookup)", "body": "<li>  <strong>AST Construction</strong>: The Parser converts SQL query text into an Abstract Syntax Tree (AST) using flex/bison.</li><li>  <strong>Catalog Semantics</strong>: The Analyzer performs semantic validation on the AST, looking up table, column, and type definitions in the System Catalog (such as <code>pg_class</code> and <code>pg_attribute</code>).</li>"}, {"id": 6, "relativeId": "M2.2", "module": "M2", "moduleName": "Optimizer & Executor", "color": "#7D8F7B", "title": "pg_rewrite Rules System & View Expansion (Rules System pg_rewrite)", "body": "<li>  <strong>Query Transformation</strong>: The Rewriter processes the query tree using rules defined in the <code>pg_rewrite</code> system table, expanding views into their underlying query trees.</li><li>  <strong>Row-Level Security</strong>: This phase applies Row-Level Security (RLS) policies by dynamically injecting filter expressions into the query tree's WHERE clause based on the session user.</li>"}, {"id": 7, "relativeId": "M2.3", "module": "M2", "moduleName": "Optimizer & Executor", "color": "#7D8F7B", "title": "CBO Join Path Selection & Planning (CBO Join Path Selection)", "body": "<li>  <strong>Cost Estimation</strong>: The Cost-Based Optimizer (CBO) calculates disk I/O and CPU costs for potential paths.</li><li>  <strong>System R Search Space</strong>: It uses a System R dynamic programming algorithm to explore join combinations, evaluating costs based on parameters like <code>seq_page_cost</code> and <code>random_page_cost</code> to select the optimal scan and join order.</li>"}, {"id": 8, "relativeId": "M2.4", "module": "M2", "moduleName": "Optimizer & Executor", "color": "#7D8F7B", "title": "Volcano Executor Iteration Model (Executor Operator Nodes)", "body": "<li>  <strong>Operator Tree</strong>: The Executor processes the physical plan tree, where each node (e.g., HashJoin, SeqScan) implements a uniform iterator interface.</li><li>  <strong>On-Demand Fetching</strong>: Parent nodes recursively call <code>ExecProcNode()</code> on child nodes. Children return a single tuple per call, maintaining a streaming execution pipeline that limits memory usage.</li>"}, {"id": 9, "relativeId": "M2.5", "module": "M2", "moduleName": "Optimizer & Executor", "color": "#7D8F7B", "title": "Parallel Query & Gather Execution (Parallel Query Workers)", "body": "<li>  <strong>Worker Spawning</strong>: If the optimizer decides a parallel scan is cost-effective, it designs a plan with a <code>Gather</code> operator.</li><li>  <strong>Dynamic Shared Memory (DSM)</strong>: The main backend allocates a DSM segment to coordinate with parallel worker processes, dividing scan tasks across workers and merging results at the Gather node.</li>"}, {"id": 10, "relativeId": "M3.1", "module": "M3", "moduleName": "Storage & Heap Page", "color": "#9E828A", "title": "Heap Page Layout & Slot Pointers (Heap Page Layout)", "body": "<li>  <strong>Bi-directional Layout</strong>: PostgreSQL uses 8KB pages. The page header contains PageHeaderData with page metadata.</li><li>  <strong>Item Pointers & Tuples</strong>: Line pointers (ItemIds, 4 bytes each) grow forward from the page header, while the actual tuple data grows backward from the end of the page, maximizing usable space.</li>"}, {"id": 11, "relativeId": "M3.2", "module": "M3", "moduleName": "Storage & Heap Page", "color": "#9E828A", "title": "TOAST Out-of-Line Storage (TOAST Spillage)", "body": "<li>  <strong>Size Limit</strong>: Due to the 8KB page size, a single tuple cannot exceed approximately 2KB.</li><li>  <strong>TOAST Tables</strong>: Larger columns (like TEXT or BYTEA) are compressed and split into chunks of up to 2KB, stored in a separate TOAST table. The main heap page only retains a 18-byte pointer (OID).</li>"}, {"id": 12, "relativeId": "M3.3", "module": "M3", "moduleName": "Storage & Heap Page", "color": "#9E828A", "title": "Lehman & Yao B-Tree Concurrency (B-Tree High-Key & Right-Link)", "body": "<li>  <strong>Lock-Free Read Splits</strong>: B-Tree splits utilize the Lehman & Yao algorithm.</li><li>  <strong>Right-Links & High Keys</strong>: When a page splits, a <code>Right-Link</code> pointer is created to link the original page to the new right page, and a <code>High Key</code> is set. Readers scan rightwards via the link if their key exceeds the High Key, avoiding parent-page write-lock contention.</li>"}, {"id": 13, "relativeId": "M3.4", "module": "M3", "moduleName": "Storage & Heap Page", "color": "#9E828A", "title": "GIN, GiST, and BRIN Index Structures (GIN & BRIN Indexes)", "body": "<li>  <strong>Specialized Indexes</strong>:</li><li>1.  <strong>GIN (Generalized Inverted Index)</strong>: Indexes composite elements (arrays, JSONB, tsvector) by building a B-Tree of keys pointing to rows containing them.</li><li>2.  <strong>BRIN (Block Range Index)</strong>: For physically ordered data, BRIN records min/max values per block range (default 128 pages), minimizing index size and I/O.</li>"}, {"id": 14, "relativeId": "M4.1", "module": "M4", "moduleName": "MVCC & Concurrency", "color": "#B58A7D", "title": "Tuple xmin/xmax & Visibility Rules (Tuple Header xmin/xmax)", "body": "<li>  <strong>Transaction ID Fields</strong>: Every tuple header contains <code>t_xmin</code> (the XID of the inserting transaction) and <code>t_xmax</code> (the XID of the deleting/updating transaction).</li><li>  <strong>Snapshot visibility</strong>: Active transactions capture a <code>SnapshotData</code> structure listing active XIDs. Tuples are filtered on-the-fly by checking if their xmin/xmax belong to committed or active XIDs in the snapshot.</li>"}, {"id": 15, "relativeId": "M4.2", "module": "M4", "moduleName": "MVCC & Concurrency", "color": "#B58A7D", "title": "Vacuum Garbage Purge & FSM Updates (Vacuum Space Reclamation)", "body": "<li>  <strong>Dead Tuple Accumulation</strong>: Because updates write new tuple versions to the heap page, dead versions accumulate over time.</li><li>  <strong>Space Reclamation</strong>: The <code>VACUUM</code> process scans pages, removes dead tuples, and updates the Free Space Map (FSM) so future inserts can reuse the space. It does not shrink the physical file size.</li>"}, {"id": 16, "relativeId": "M4.3", "module": "M4", "moduleName": "MVCC & Concurrency", "color": "#B58A7D", "title": "Transaction ID Wraparound & Freezing (Transaction ID Wraparound & Freeze)", "body": "<li>  <strong>32-bit Limit</strong>: XIDs are 32-bit integers compared using modular arithmetic. If the age of the oldest active XID exceeds 2 billion, newer transactions appear older, causing \"wraparound\".</li><li>  <strong>Freeze Operations</strong>: Auto-vacuum scans old pages and marks ancient tuple xmins with a special <code>FrozenTransactionId</code> (value 2), which is always visible, preventing catalog corruption and system freeze.</li>"}, {"id": 17, "relativeId": "M4.4", "module": "M4", "moduleName": "MVCC & Concurrency", "color": "#B58A7D", "title": "Lock Manager & Deadlock Detection (Lock Manager Layout)", "body": "<li>  <strong>Conflict Matrix</strong>: The global lock table supports 8 lock levels (e.g., RowShare, AccessExclusive).</li><li>  <strong>Graph Cycles</strong>: When a backend is blocked, it waits. After <code>deadlock_timeout</code>, a daemon builds a wait-for graph of transactions. If a cycle is detected, it aborts the current transaction to break the deadlock.</li>"}, {"id": 18, "relativeId": "M5.1", "module": "M5", "moduleName": "WAL & Replication", "color": "#5F7582", "title": "WAL Segments & Log Sequence Numbers (WAL Segments & LSN)", "body": "<li>  <strong>Sequential Log</strong>: Postgres writes physical modifications to 16MB WAL segment files.</li><li>  <strong>LSN Address</strong>: Each log record has a 64-bit Log Sequence Number (LSN), representing its byte offset in the WAL stream. LSNs act as a physical timeline for crash recovery and replication.</li>"}, {"id": 19, "relativeId": "M5.2", "module": "M5", "moduleName": "WAL & Replication", "color": "#5F7582", "title": "Checkpointer & Smooth Dirty Page Writes (Checkpointer Spreading)", "body": "<li>  <strong>I/O Spikes</strong>: Writing all dirty pages from Shared Buffers to disk simultaneously during a checkpoint creates disk I/O bottlenecks.</li><li>  <strong>Completion Target</strong>: Setting <code>checkpoint_completion_target</code> (default 0.9) spreads dirty page writes over 90% of the checkpoint interval, stabilizing disk write rates.</li>"}, {"id": 20, "relativeId": "M5.3", "module": "M5", "moduleName": "WAL & Replication", "color": "#5F7582", "title": "Crash Recovery & Hot Standby (Replay Redo & Hot Standby)", "body": "<li>  <strong>REDO Replay</strong>: After an unclean shutdown, the startup process reads the control file to find the last checkpoint and replays WAL records from that LSN forward.</li><li>  <strong>Hot Standby</strong>: A standby server reads the WAL stream from the primary, applying page modifications to keep its read-only replica synchronized in near real-time.</li>"}, {"id": 21, "relativeId": "M5.4", "module": "M5", "moduleName": "WAL & Replication", "color": "#5F7582", "title": "Replication Slots & WAL Preservation (Replication Slots)", "body": "<li>  <strong>Missing WAL Files</strong>: In streaming replication, if a standby falls behind, the primary may purge WAL files needed by the standby during checkpoints.</li><li>  <strong>Slot Constraints</strong>: A Replication Slot locks the minimum LSN read by the standby, forcing the primary to keep all subsequent WAL segments until they are consumed.</li>"}, {"id": 22, "relativeId": "M5.5", "module": "M5", "moduleName": "WAL & Replication", "color": "#5F7582", "title": "Distributed Two-Phase Commit 2PC (PREPARE TRANSACTION)", "body": "<li>  <strong>Cross-Node Consensuses</strong>: Postgres supports two-phase commit via SQL.</li><li>  <strong>Twophase State Files</strong>: Running <code>PREPARE TRANSACTION 'xid'</code> writes transaction lock states and modifications to a state file in the <code>pg_twophase</code> directory. The state survives crashes until a <code>COMMIT PREPARED</code> or <code>ROLLBACK PREPARED</code> is received.</li>"}, {"id": 23, "relativeId": "M5.6", "module": "M5", "moduleName": "WAL & Replication", "color": "#5F7582", "title": "Serializable Snapshot Isolation SSI (Serializable Snapshot Isolation SSI)", "body": "<li>  <strong>Write Skew Anomaly</strong>: SSI detects write skew without locking using read-write anti-dependencies.</li><li>  <strong>SIREAD Locks</strong>: The engine registers virtual <code>SIREAD</code> locks. If it detects a cycle of dependencies: $T1 \\xrightarrow{rw} T2 \\xrightarrow{rw} T3$, it aborts the committing transaction to preserve serializability.</li>"}, {"id": 24, "relativeId": "M6.1", "module": "M6", "moduleName": "Optimizations & Debug", "color": "#BFA88F", "title": "Shared Buffer Management & Clock Sweep (Shared Buffers Clock Sweep)", "body": "<li>  <strong>Clock Hand Sweep</strong>: Postgres manages its buffer pool using a clock sweep algorithm. It increments a <code>usage_count</code> (0 to 5) when pages are accessed, and decrements it during sweeps, evicting pages with count 0.</li><li>  <strong>Ring Buffer</strong>: To prevent large scans from thrashing the buffer cache, sequential scans use a small ring buffer to read and replace pages.</li>"}, {"id": 25, "relativeId": "M6.2", "module": "M6", "moduleName": "Optimizations & Debug", "color": "#BFA88F", "title": "Free Space Map & Visibility Map (FSM & VM Maps)", "body": "<li>  <strong>Space Map (FSM)</strong>: The FSM tracks free space within heap pages, allowing inserts to quickly find pages with sufficient room.</li><li>  <strong>Visibility Map (VM)</strong>: The VM flags pages where all tuples are visible to all transactions, enabling vacuum to skip these pages and permitting Index-Only Scans to bypass heap reads.</li>"}, {"id": 26, "relativeId": "M6.3", "module": "M6", "moduleName": "Optimizations & Debug", "color": "#BFA88F", "title": "LLVM JIT Compiler (LLVM JIT Compile)", "body": "<li>  <strong>Expression Overhead</strong>: Evaluating complex projection and filter expressions in SQL queries creates interpreter overhead, leading to CPU branch mispredictions.</li><li>  <strong>JIT Compilation</strong>: Postgres integrates LLVM to dynamically compile expressions into native machine code at runtime, accelerating query evaluation.</li>"}, {"id": 27, "relativeId": "M6.4", "module": "M6", "moduleName": "Optimizations & Debug", "color": "#BFA88F", "title": "Foreign Data Wrapper FDW (Foreign Data Wrapper)", "body": "<li>  <strong>SQL/MED Federated Access</strong>: Postgres supports the SQL/MED standard, allowing external tables in MySQL, Oracle, or MongoDB to be mapped as local tables.</li><li>  <strong>Query Pushdown</strong>: The optimizer evaluates remote table statistics and pushes down filter clauses, limit offsets, and joins to the external source to reduce network transfer.</li>"}, {"id": 28, "relativeId": "M6.5", "module": "M6", "moduleName": "Optimizations & Debug", "color": "#BFA88F", "title": "pg_stat_statements Slow Query Diagnosis (pg_stat_statements)", "body": "<li>  <strong>Query Tracking</strong>: An extension that tracks execution statistics for all SQL statements executed on the server.</li><li>  <strong>Diagnostics View</strong>: It aggregates queries by parameterizing literals, tracking execution counts, total/max runtime, and cache hit ratios to help identify performance bottlenecks.</li>"}];
        let activeFilter = 'all';

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            const searchVal = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            cards.forEach(card => {
                const matchesFilter = activeFilter === 'all' || card.module === activeFilter;
                const matchesSearch = card.title.toLowerCase().includes(searchVal) || card.body.toLowerCase().includes(searchVal);

                if (matchesFilter && matchesSearch) {
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card';
                    cardEl.style.borderTop = `4px solid ${card.color}`;
                    cardEl.innerHTML = `
                        <div class="card-header">
                            <span class="card-tag" style="background-color: ${card.color}">${card.relativeId}</span>
                            <span class="card-id">Card ${card.id}</span>
                        </div>
                        <h3 class="card-title">${card.title}</h3>
                        <div class="card-body">${card.body}</div>
                    `;
                    grid.appendChild(cardEl);
                }
            });
        }

        function setFilter(mod, btn) {
            activeFilter = mod;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        window.onload = renderCards;
    </script>
</body>
</html>
